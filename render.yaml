services:
  - type: web
    name: glen-knowledge-chat
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --worker-class gevent --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: GHL_API_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: CONSOLE_SECRET
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: PRACTICE_BETTER_CLIENT_ID
        sync: false
      - key: PRACTICE_BETTER_CLIENT_SECRET
        sync: false
      - key: AUTHNET_API_LOGIN_ID
        sync: false
      - key: AUTHNET_TRANSACTION_KEY
        sync: false
      - key: WISE_API_TOKEN
        sync: false
      - key: QUICKBOOKS_PROD_CLIENT_ID
        sync: false
      - key: QUICKBOOKS_PROD_CLIENT_SECRET
        sync: false
      - key: QUICKBOOKS_PROD_REALM_ID
        sync: false
      - key: QUICKBOOKS_PROD_REFRESH_TOKEN
        sync: false
      - key: GHL_LOCATION_ID
        sync: false
      - key: HEYGEN_API_KEY
        sync: false
      - key: BRAIN_SNAPSHOT_PATH
        value: /data/brain-state.json
      - key: DATA_DIR
        value: /data
    healthCheckPath: /
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
