services:
  - type: web
    name: glen-knowledge-chat
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --worker-class gevent --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: GHL_API_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: CONSOLE_SECRET
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: PRACTICE_BETTER_CLIENT_ID
        sync: false
      - key: PRACTICE_BETTER_CLIENT_SECRET
        sync: false
      - key: AUTHNET_API_LOGIN_ID
        sync: false
      - key: AUTHNET_TRANSACTION_KEY
        sync: false
      - key: WISE_API_TOKEN
        sync: false
      - key: QUICKBOOKS_PROD_CLIENT_ID
        sync: false
      - key: QUICKBOOKS_PROD_CLIENT_SECRET
        sync: false
      - key: QUICKBOOKS_PROD_REALM_ID
        sync: false
      - key: QUICKBOOKS_PROD_REFRESH_TOKEN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_ACTIVE
        sync: false
      # Project B — GET tax. Off until Rae/CPA confirm the rates (then set
      # TAX_ENABLED=true). Rates default in code (retail 0.045 / wholesale 0.005).
      - key: TAX_ENABLED
        sync: false
      - key: GET_RETAIL_RATE
        sync: false
      - key: GET_WHOLESALE_RATE
        sync: false
      - key: GET_HOME_STATE
        sync: false
      - key: GHL_LOCATION_ID
        sync: false
      - key: HEYGEN_API_KEY
        sync: false
      # EasyPost shipping. Absent = Orders falls back to manual USPS Click-N-Ship.
      # Set = orders.create_label buys the lowest USPS rate and returns a label.
      - key: EASYPOST_API_KEY
        sync: false
      # Public funnel domain. Customer-facing links (full-report email footer,
      # affiliate recruit_url, etc.) derive from this. illtowell.com is live and
      # serving this service; keep this authoritative so links never read the
      # raw onrender host. Code default is also https://illtowell.com.
      - key: PUBLIC_BASE_URL
        value: https://illtowell.com
      # NOTE: prod env (incl. feature flags like CLIENT_LOGIN_ENABLED) is set in
      # DOPPLER (remedy-match/prd) and synced to Render — render.yaml is NOT the
      # lever for flags (a value here doesn't apply on a code deploy + competes
      # with the Doppler sync). See claude-memory/feedback_render_env_not_doppler.
      - key: BRAIN_SNAPSHOT_PATH
        value: /data/brain-state.json
      - key: DATA_DIR
        value: /data
      - key: GMAIL_TOKEN_PATH
        value: /data/google-token.json
      # Projects tracker — kanban cache + pending edits. Without these the
      # files default to /tmp (ephemeral) and the pending-edit queue and
      # cached PROJECTS.md get wiped on every deploy.
      - key: PROJECTS_SNAPSHOT_PATH
        value: /data/projects.md
      - key: PROJECTS_PENDING_PATH
        value: /data/pending_project_ideas.json
      - key: CRON_SECRET
        sync: false
    healthCheckPath: /
    disk:
      name: data
      mountPath: /data
      sizeGB: 1

  # Cron container does NOT share the web service's persistent disk —
  # it just curls /cron/personal-send on the web service, which runs the
  # orchestrator inside the web container where the disk + chat_log.db
  # live. Cron stays minimal: stdlib-only, no Pinecone/Anthropic keys,
  # no DATA_DIR.
  - type: cron
    name: glen-personal-email-daily
    runtime: python
    schedule: "0 17 * * *"   # 7 AM HST daily (HST is UTC-10)
    buildCommand: "true"     # stdlib-only, no deps to install
    startCommand: python scripts/run_personal_email_cron.py
    envVars:
      - key: WEB_URL
        value: https://glen-knowledge-chat.onrender.com
      - fromService:
          type: web
          name: glen-knowledge-chat
          envVarKey: CRON_SECRET
      # CONSOLE_SECRET (distinct from CRON_SECRET): this cron also fires the
      # Pay It Forward gift-note invites at /api/cron/pif-gift-note-invites,
      # which is gated by require_console_key (X-Console-Key), not X-Cron-Secret.
      - fromService:
          type: web
          name: glen-knowledge-chat
          envVarKey: CONSOLE_SECRET

  # Daily testimonial-invite scan — mines recent client comms + Gmail (from known
  # clients) for positive results, adding review candidates to the Invite Queue.
  # Cross-container pattern: cron curls the web service (which holds the Gmail token + DB).
  # NOTE: NOT provisioned as a standalone Render service — folded into the daily
  # glen-personal-email-daily cron (run_daily_piggybacks) so it fires without a
  # dedicated cron service. Commented out (not a live spec) so applying this
  # blueprint can't re-provision it and cause double-runs. Documentation only:
  #   - type: cron
  #     name: glen-testimonial-invites-scan
  #     runtime: python
  #     schedule: "30 13 * * *"   # 3:30 AM HST daily (HST is UTC-10)
  #     buildCommand: "true"      # stdlib-only, no deps to install
  #     startCommand: python scripts/run_testimonial_invites_scan_cron.py
  #     envVars:
  #       - key: WEB_URL
  #         value: https://glen-knowledge-chat.onrender.com
  #       - fromService:
  #           type: web
  #           name: glen-knowledge-chat
  #           envVarKey: CONSOLE_SECRET

  # Reply watcher — runs the Gmail inbox reply watcher. Now a thin stdlib-only curl
  # to /api/cron/reply-watch (was an in-process job needing pip + the Gmail token).
  # The watcher needs the token (/data/google-token.json) + chat_log.db, which live on
  # the WEB service, so the work happens there. NOTE: the WEB service must have
  # GMAIL_TOKEN_PATH=/data/google-token.json set for reply_watcher to find the token.
  - type: cron
    name: glen-reply-watcher
    runtime: python
    schedule: "*/15 * * * *"   # every 15 minutes
    buildCommand: "true"       # stdlib-only, no deps to install
    startCommand: python scripts/run_reply_watcher_cron.py
    envVars:
      - key: WEB_URL
        value: https://glen-knowledge-chat.onrender.com
      - fromService:
          type: web
          name: glen-knowledge-chat
          envVarKey: CRON_SECRET

  # Weekly USPS Flat Rate watcher — scrapes USPS retail prices, stages any
  # changes as pending updates at /admin/shipping for Glen to confirm. Same
  # cross-container pattern as glen-personal-email-daily: cron just curls
  # the web service, which holds the persistent disk + DB.
  # NOTE: NOT provisioned as a standalone Render service — folded into the daily
  # glen-personal-email-daily cron (run_daily_piggybacks), Monday-gated. Commented
  # out (not a live spec) so applying this blueprint can't re-provision it and cause
  # double-runs. Documentation only:
  #   - type: cron
  #     name: glen-usps-rate-check
  #     runtime: python
  #     schedule: "0 16 * * 1"     # Mondays 6 AM HST (HST is UTC-10)
  #     buildCommand: "true"       # stdlib-only, no deps to install
  #     startCommand: python scripts/run_usps_rate_check_cron.py
  #     envVars:
  #       - key: WEB_URL
  #         value: https://glen-knowledge-chat.onrender.com
  #       - fromService:
  #           type: web
  #           name: glen-knowledge-chat
  #           envVarKey: CRON_SECRET

  # Daily Intelligence-briefings regenerator — refreshes the 5 Intelligence
  # cards (daily-briefing, eyes-on-every-street, founders-radar, revenue-x-ray,
  # pattern-which-connects). Same cross-container pattern: cron curls the web
  # service, which gathers live stats + calls Claude inside the web container
  # where ANTHROPIC_API_KEY and the persistent disk live.
  - type: cron
    name: glen-briefings-daily
    runtime: python
    schedule: "30 17 * * *"    # 7:30 AM HST daily (HST is UTC-10)
    buildCommand: "true"       # stdlib-only, no deps to install
    startCommand: python scripts/run_briefings_cron.py
    envVars:
      - key: WEB_URL
        value: https://glen-knowledge-chat.onrender.com
      - fromService:
          type: web
          name: glen-knowledge-chat
          envVarKey: CRON_SECRET

  # Daily People-hub chain (one cron, to stay under Render's cron-service limit).
  # run_pb_tag_sync_cron.py now curls THREE web endpoints in sequence:
  #   1. /admin/sync-pb-tags          (Practice Better → people + GHL pb: tags)
  #   2. /admin/sync-practitioner-tags (Supabase practitioners → people, tagged)
  #   3. /admin/sync-people-to-ghl     (classify + mirror opted-in → GHL)
  # Ordered so tags are fresh before the GHL mirror. Cross-container pattern —
  # the cron only curls; the work runs in the web container with the disk + creds.
  # (run_pb_tag_sync_cron.py also curls a 4th endpoint: /api/cron/charge-subscriptions.)
  # NOTE: NOT provisioned as a standalone Render service — the 4-step chain is folded
  # into the daily glen-personal-email-daily cron (run_daily_piggybacks). Commented
  # out (not a live spec) so applying this blueprint can't re-provision it and cause
  # double-runs. Documentation only:
