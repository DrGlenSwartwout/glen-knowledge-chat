services:
  - type: web
    name: glen-knowledge-chat
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --worker-class gevent --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: GHL_API_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: CONSOLE_SECRET
        sync: false
    healthCheckPath: /
