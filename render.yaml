services:
  - type: web
    name: glen-knowledge-chat
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --worker-class gevent --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: GHL_API_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: CONSOLE_SECRET
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: PRACTICE_BETTER_CLIENT_ID
        sync: false
      - key: PRACTICE_BETTER_CLIENT_SECRET
        sync: false
      - key: AUTHNET_API_LOGIN_ID
        sync: false
      - key: AUTHNET_TRANSACTION_KEY
        sync: false
      - key: WISE_API_TOKEN
        sync: false
      - key: QUICKBOOKS_PROD_CLIENT_ID
        sync: false
      - key: QUICKBOOKS_PROD_CLIENT_SECRET
        sync: false
      - key: QUICKBOOKS_PROD_REALM_ID
        sync: false
      - key: QUICKBOOKS_PROD_REFRESH_TOKEN
        sync: false
      - key: GHL_LOCATION_ID
        sync: false
      - key: HEYGEN_API_KEY
        sync: false
      - key: BRAIN_SNAPSHOT_PATH
        value: /data/brain-state.json
      - key: DATA_DIR
        value: /data
      - key: GMAIL_TOKEN_PATH
        value: /data/google-token.json
      - key: CRON_SECRET
        sync: false
    healthCheckPath: /
    disk:
      name: data
      mountPath: /data
      sizeGB: 1

  # Cron container does NOT share the web service's persistent disk —
  # it just curls /cron/personal-send on the web service, which runs the
  # orchestrator inside the web container where the disk + chat_log.db
  # live. Cron stays minimal: stdlib-only, no Pinecone/Anthropic keys,
  # no DATA_DIR.
  - type: cron
    name: glen-personal-email-daily
    runtime: python
    schedule: "0 17 * * *"   # 7 AM HST daily (HST is UTC-10)
    buildCommand: "true"     # stdlib-only, no deps to install
    startCommand: python scripts/run_personal_email_cron.py
    envVars:
      - key: WEB_URL
        value: https://glen-knowledge-chat.onrender.com
      - fromService:
          type: web
          name: glen-knowledge-chat
          envVarKey: CRON_SECRET

  - type: cron
    name: glen-reply-watcher
    runtime: python
    schedule: "*/15 * * * *"   # every 15 minutes
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/run_reply_watcher_cron.py
    envVars:
      - fromService:
          type: web
          name: glen-knowledge-chat
          envVarKey: ANTHROPIC_API_KEY
      - key: DATA_DIR
        value: /data
      - key: GMAIL_TOKEN_PATH
        value: /data/google-token.json

  # Weekly USPS Flat Rate watcher — scrapes USPS retail prices, stages any
  # changes as pending updates at /admin/shipping for Glen to confirm. Same
  # cross-container pattern as glen-personal-email-daily: cron just curls
  # the web service, which holds the persistent disk + DB.
  - type: cron
    name: glen-usps-rate-check
    runtime: python
    schedule: "0 16 * * 1"     # Mondays 6 AM HST (HST is UTC-10)
    buildCommand: "true"       # stdlib-only, no deps to install
    startCommand: python scripts/run_usps_rate_check_cron.py
    envVars:
      - key: WEB_URL
        value: https://glen-knowledge-chat.onrender.com
      - fromService:
          type: web
          name: glen-knowledge-chat
          envVarKey: CRON_SECRET
