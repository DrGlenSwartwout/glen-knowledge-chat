<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Minding Body Mentor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Raleway:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a150d;
    --surface: #111f16;
    --surface2: #162318;
    --border: #21472d;
    --text: #fdf4d8;
    --text-muted: #a89870;
    --accent: #d4a843;
    --accent2: #3d8a52;
    --source-bg: #0f1c12;
    --source-border: #d4a84340;
    --user-bg: #152019;
    --assistant-bg: #111f16;
    --pill-bg: #162318;
    --score-high: #3d8a52;
    --score-mid: #d4a843;
    --score-low: #a89870;
    --radius: 10px;
    --font: "Open Sans", -apple-system, BlinkMacSystemFont, sans-serif;
    --heading-font: "Raleway", -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.6;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  header .logo {
    width: 36px; height: 36px;
    border-radius: 8px;
    flex-shrink: 0;
    overflow: hidden;
  }
  header .logo img {
    width: 100%; height: 100%; object-fit: cover;
  }
  header h1 { font-size: 16px; font-weight: 700; font-family: var(--heading-font); }
  header .subtitle { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  header .spacer { flex: 1; }
  #clear-btn {
    background: none; border: 1px solid var(--border);
    color: var(--text-muted); border-radius: 6px;
    padding: 5px 12px; font-size: 12px; cursor: pointer;
    transition: all 0.15s;
  }
  #clear-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Main layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Chat pane ── */
  #chat-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .message {
    padding: 16px 24px;
    max-width: 100%;
  }
  .message.user {
    background: var(--user-bg);
    border-left: 3px solid var(--accent);
  }
  .message.assistant {
    background: var(--assistant-bg);
    border-left: 3px solid var(--accent2);
  }
  .message .role-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .message.user .role-label { color: var(--accent); }
  .message.assistant .role-label { color: var(--accent2); }

  .message-body { line-height: 1.7; }
  .message-body p { margin-bottom: 0.8em; }
  .message-body p:last-child { margin-bottom: 0; }
  .message-body strong { color: var(--text); font-weight: 600; }
  .message-body em { color: #cdd9e5; }
  .message-body ul, .message-body ol { padding-left: 1.4em; margin-bottom: 0.8em; }
  .message-body li { margin-bottom: 0.3em; }
  .message-body h3 { font-size: 14px; font-weight: 700; margin: 1em 0 0.4em; color: var(--text); font-family: var(--heading-font); }
  .message-body code {
    font-family: var(--mono); font-size: 13px;
    background: var(--surface2); border-radius: 4px;
    padding: 2px 5px; color: #f78166;
  }

  /* ── Thinking indicator ── */
  .thinking {
    display: flex; align-items: center; gap: 8px;
    padding: 16px 24px;
    color: var(--text-muted); font-size: 13px;
  }
  .dots span {
    display: inline-block; width: 6px; height: 6px;
    background: var(--text-muted); border-radius: 50%;
    animation: bounce 1.2s infinite ease-in-out;
    margin-right: 3px;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── Level selector ── */
  #level-bar {
    display: flex; gap: 6px; align-items: center;
    padding: 10px 24px 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #level-bar .level-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-muted);
    margin-right: 4px;
    white-space: nowrap;
  }
  .level-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-muted);
    font-family: var(--font);
    font-size: 12px;
    padding: 4px 14px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .level-btn:hover { border-color: var(--accent); color: var(--text); }
  .level-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 700;
  }

  /* ── Input bar ── */
  #input-bar {
    padding: 10px 24px 16px;
    background: var(--surface);
    display: flex; gap: 10px; align-items: flex-end;
    flex-shrink: 0;
  }
  #query-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    padding: 10px 14px;
    resize: none;
    min-height: 44px;
    max-height: 160px;
    line-height: 1.5;
    outline: none;
    transition: border-color 0.15s;
  }
  #query-input:focus { border-color: var(--accent); }
  #query-input::placeholder { color: var(--text-muted); }

  #send-btn {
    background: var(--accent);
    border: none; border-radius: var(--radius);
    color: #000; font-weight: 700;
    font-size: 13px; padding: 10px 18px;
    cursor: pointer; flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
    height: 44px;
  }
  #send-btn:hover { opacity: 0.88; }
  #send-btn:active { transform: scale(0.97); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Sources pane ── */
  #sources-pane {
    width: 320px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--source-bg);
    transition: width 0.25s ease;
  }
  #sources-pane.collapsed {
    width: 40px;
  }
  #sources-pane.collapsed #sources-list { display: none; }
  #sources-header {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    cursor: pointer;
    user-select: none;
  }
  #sources-header:hover { color: var(--text); }
  #sources-toggle {
    margin-left: auto;
    font-size: 14px;
    transition: transform 0.25s ease;
    color: var(--text-muted);
  }
  #sources-pane.collapsed #sources-toggle { transform: rotate(180deg); }
  #sources-pane.collapsed #sources-header-label,
  #sources-pane.collapsed #sources-count { display: none; }
  #sources-count {
    background: var(--pill-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1px 8px;
    font-size: 11px;
    color: var(--text-muted);
  }
  #sources-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  #sources-list::-webkit-scrollbar { width: 5px; }
  #sources-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .source-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .source-card:hover { border-color: var(--source-border); }

  .source-card-header {
    padding: 10px 12px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    user-select: none;
  }
  .source-score {
    width: 36px; height: 36px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    flex-shrink: 0;
  }
  .score-high { background: #3fb95020; color: var(--score-high); border: 1px solid #3fb95040; }
  .score-mid  { background: #d2992220; color: var(--score-mid);  border: 1px solid #d2992240; }
  .score-low  { background: #8b949e20; color: var(--score-low);  border: 1px solid #8b949e40; }

  .source-info { flex: 1; min-width: 0; }
  .source-name {
    font-size: 13px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .source-field {
    font-size: 11px; color: var(--text-muted);
    margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .source-chevron {
    color: var(--text-muted); font-size: 11px;
    transition: transform 0.2s; flex-shrink: 0; margin-top: 2px;
  }
  .source-card.open .source-chevron { transform: rotate(90deg); }

  .source-card-body {
    display: none;
    padding: 0 12px 12px;
    border-top: 1px solid var(--border);
  }
  .source-card.open .source-card-body { display: block; }
  .source-chunks {
    font-size: 11px; color: var(--text-muted);
    padding-top: 8px;
    margin-bottom: 6px;
  }
  .source-file {
    font-size: 10px; font-family: var(--mono);
    color: var(--text-muted);
    word-break: break-all;
    opacity: 0.7;
  }

  /* ── Empty state ── */
  .empty-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; gap: 12px;
    color: var(--text-muted);
    padding: 40px;
    text-align: center;
  }
  .empty-state .icon { font-size: 48px; opacity: 0.3; }
  .empty-state .logo-icon { width: 120px; height: 120px; object-fit: contain; opacity: 0.85; }
  .empty-state p { font-size: 13px; max-width: 220px; }

  /* ── Example queries ── */
  .example-queries {
    display: flex; flex-direction: column; gap: 6px;
    margin-top: 20px; width: 100%;
    max-width: 600px;
    padding: 0 24px;
  }
  .example-q {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }
  .example-q:hover { border-color: var(--accent); color: var(--text); }

  /* ── Metadata bar ── */
  .meta-bar {
    font-size: 11px; color: var(--text-muted);
    padding: 6px 24px 0;
  }

  /* ── Action buttons (Copy / Share) ── */
  .msg-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .action-btn {
    display: flex; align-items: center; gap: 5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 12px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--font);
  }
  .action-btn:hover { border-color: var(--accent); color: var(--text); }
  .action-btn.copied { border-color: var(--accent2); color: var(--accent2); }
  .action-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

  /* Share popover */
  .share-wrap { position: relative; }
  .share-popover {
    display: none;
    position: absolute;
    bottom: calc(100% + 6px);
    left: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px;
    z-index: 100;
    min-width: 180px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .share-popover.open { display: block; }
  .share-option {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px;
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.12s, color 0.12s;
    white-space: nowrap;
  }
  .share-option:hover { background: var(--border); color: var(--text); }
  .share-option svg { width: 15px; height: 15px; flex-shrink: 0; }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    #sources-pane { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><img src="/static/logo.png" alt="Mentorship University"></div>
  <div>
    <h1>The Minding Body Mentor</h1>
  </div>
  <div class="spacer"></div>
  <button id="clear-btn" onclick="clearChat()">Clear</button>
</header>

<div class="main">

  <!-- Chat pane -->
  <div id="chat-pane">
    <div id="messages">
      <div class="empty-state" id="empty-state">
        <img class="logo-icon" src="/static/logo.png" alt="Mentorship University">
        <p>Ask about Healing Body, Mind, Spirit, Science and Medicine.</p>
        <div class="example-queries">
          <button class="example-q" onclick="fillQuery(this.textContent)">How does Fritz Popp's biophoton research relate to NES body-field scanning?</button>
          <button class="example-q" onclick="fillQuery(this.textContent)">What is Glen's 5 Phases of Health model and how does BEV terrain work?</button>
          <button class="example-q" onclick="fillQuery(this.textContent)">Explain the connection between mercury toxicity, EMF, and chronic illness.</button>
          <button class="example-q" onclick="fillQuery(this.textContent)">What organizations validate electromagnetic hypersensitivity as a medical condition?</button>
          <button class="example-q" onclick="fillQuery(this.textContent)">How do Wal Thornhill, Halton Arp, and Stephen Crothers challenge mainstream cosmology?</button>
        </div>
      </div>
    </div>

    <div id="level-bar">
      <span class="level-label">Level:</span>
      <button class="level-btn active" data-level="self-healing" onclick="setLevel(this)">Self-Healing</button>
      <button class="level-btn" data-level="health-care" onclick="setLevel(this)">Health Care</button>
      <button class="level-btn" data-level="science" onclick="setLevel(this)">Science</button>
    </div>
    <div id="input-bar">
      <textarea
        id="query-input"
        placeholder="Ask about mentors, clinical theory, energy medicine, organizations…"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="send-btn" onclick="sendQuery()">Send</button>
    </div>
  </div>

  <!-- Sources pane -->
  <div id="sources-pane">
    <div id="sources-header" onclick="toggleSources()">
      <span id="sources-header-label">Sources</span>
      <span id="sources-count">0</span>
      <span id="sources-toggle">‹</span>
    </div>
    <div id="sources-list">
      <div class="empty-state">
        <div class="icon">◉</div>
        <p>Retrieved sources will appear here after each response.</p>
      </div>
    </div>
  </div>

</div>

<script>
  const history = [];
  let isLoading = false;
  let currentLevel = 'self-healing';

  function setLevel(btn) {
    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLevel = btn.dataset.level;
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuery();
    }
  }

  function fillQuery(text) {
    const inp = document.getElementById('query-input');
    inp.value = text;
    autoResize(inp);
    inp.focus();
  }

  function toggleSources() {
    document.getElementById('sources-pane').classList.toggle('collapsed');
  }

  function clearChat() {
    history.length = 0;
    document.getElementById('messages').innerHTML =
      `<div class="empty-state" id="empty-state">
        <img class="logo-icon" src="/static/logo.png" alt="Mentorship University">
        <p>Ask about Healing Body, Mind, Spirit, Science and Medicine.</p>
        <div class="example-queries">
          <button class="example-q" onclick="fillQuery(this.textContent)">How does Fritz Popp's biophoton research relate to NES body-field scanning?</button>
          <button class="example-q" onclick="fillQuery(this.textContent)">What is Glen's 5 Phases of Health model and how does BEV terrain work?</button>
          <button class="example-q" onclick="fillQuery(this.textContent)">Explain the connection between mercury toxicity, EMF, and chronic illness.</button>
          <button class="example-q" onclick="fillQuery(this.textContent)">What organizations validate electromagnetic hypersensitivity as a medical condition?</button>
          <button class="example-q" onclick="fillQuery(this.textContent)">How do Wal Thornhill, Halton Arp, and Stephen Crothers challenge mainstream cosmology?</button>
        </div>
      </div>`;
    renderSourcesPanel([]);
  }

  async function sendQuery() {
    if (isLoading) return;
    const inp = document.getElementById('query-input');
    const query = inp.value.trim();
    if (!query) return;

    inp.value = '';
    inp.style.height = 'auto';

    // Hide empty state
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    // Append user message
    appendMessage('user', query);

    // Show thinking indicator
    const thinkingId = 'thinking-' + Date.now();
    appendThinking(thinkingId);

    isLoading = true;
    document.getElementById('send-btn').disabled = true;

    try {
      const resp = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, history: history.slice(), level: currentLevel })
      });

      const data = await resp.json();
      removeElement(thinkingId);

      if (data.error) {
        appendMessage('assistant', `**Error:** ${data.error}`);
      } else {
        appendMessage('assistant', data.answer, data.chunks_retrieved);
        renderSourcesPanel(data.sources || []);
        history.push({ role: 'user', content: query });
        history.push({ role: 'assistant', content: data.answer });
      }
    } catch (e) {
      removeElement(thinkingId);
      appendMessage('assistant', `**Connection error:** ${e.message}`);
    }

    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    inp.focus();
  }

  let _msgCounter = 0;

  function appendMessage(role, text, chunksRetrieved) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const msgId = 'msg-' + (++_msgCounter);
    div.dataset.msgId = msgId;
    div.dataset.rawText = text;

    const label = role === 'user' ? 'You' : 'Mentor';

    // Action bar only on assistant messages
    const actionsHtml = role === 'assistant' ? `
      <div class="msg-actions">
        <button class="action-btn" onclick="copyMessage('${msgId}')" id="copy-${msgId}">
          <svg viewBox="0 0 16 16" fill="currentColor"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"/><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/></svg>
          Copy
        </button>
        <div class="share-wrap">
          <button class="action-btn" onclick="toggleShare('${msgId}', event)">
            <svg viewBox="0 0 16 16" fill="currentColor"><path d="M11.5 2.75a2.25 2.25 0 1 1 4.5 0 2.25 2.25 0 0 1-4.5 0Zm-9.25 5a2.25 2.25 0 1 1 4.5 0 2.25 2.25 0 0 1-4.5 0Zm9.25 5a2.25 2.25 0 1 1 4.5 0 2.25 2.25 0 0 1-4.5 0ZM12.99 4.061l-5.48 2.739a.75.75 0 0 1-.67-1.34l5.48-2.739a.75.75 0 0 1 .67 1.34Zm-.67 6.68-5.48 2.739a.75.75 0 1 1-.67-1.34l5.48-2.739a.75.75 0 0 1 .67 1.34Z"/></svg>
            Share
          </button>
          <div class="share-popover" id="share-${msgId}">
            <a class="share-option" href="#" onclick="shareEmail('${msgId}'); return false;">
              <svg viewBox="0 0 16 16" fill="currentColor"><path d="M1.75 2h12.5c.966 0 1.75.784 1.75 1.75v8.5A1.75 1.75 0 0 1 14.25 14H1.75A1.75 1.75 0 0 1 0 12.25v-8.5C0 2.784.784 2 1.75 2ZM1.5 4.552v7.698c0 .138.112.25.25.25h12.5a.25.25 0 0 0 .25-.25V4.552L8.66 8.944a1 1 0 0 1-1.32 0Zm13-1.102-6.5 5.2-6.5-5.2Z"/></svg>
              Email
            </a>
            <a class="share-option" href="#" onclick="shareTwitter('${msgId}'); return false;">
              <svg viewBox="0 0 16 16" fill="currentColor"><path d="M9.294 7.28 14.99 0h-1.37L8.672 6.35 4.565 0H0l5.981 8.706L0 16h1.37l5.226-5.975L11.435 16H16ZM6.251 9.474l-.605-.847L1.87 1.04h2.073l3.884 5.437.605.847 5.048 7.068h-2.073Z"/></svg>
              X / Twitter
            </a>
            <a class="share-option" href="#" onclick="shareLinkedIn('${msgId}'); return false;">
              <svg viewBox="0 0 16 16" fill="currentColor"><path d="M0 1.146C0 .514.53 0 1.18 0h13.64C15.47 0 16 .513 16 1.146v13.708c0 .633-.53 1.146-1.18 1.146H1.18C.53 16 0 15.487 0 14.854zm4.943 12.248V6.169H2.542v7.225zm-1.2-8.212c.837 0 1.358-.554 1.358-1.248-.015-.709-.52-1.248-1.342-1.248S2.4 3.226 2.4 3.934c0 .694.521 1.248 1.327 1.248zm4.908 8.212V9.359c0-.216.016-.432.08-.586.173-.431.568-.878 1.232-.878.869 0 1.216.662 1.216 1.634v3.865h2.401V9.25c0-2.22-1.184-3.252-2.764-3.252-1.274 0-1.845.7-2.165 1.193v.025h-.016l.016-.025V6.169h-2.4c.03.678 0 7.225 0 7.225z"/></svg>
              LinkedIn
            </a>
            <a class="share-option" href="#" onclick="shareFacebook('${msgId}'); return false;">
              <svg viewBox="0 0 16 16" fill="currentColor"><path d="M16 8.049c0-4.446-3.582-8.05-8-8.05C3.58 0-.002 3.603-.002 8.05c0 4.017 2.926 7.347 6.75 7.951v-5.625h-2.03V8.05H6.75V6.275c0-2.017 1.195-3.131 3.022-3.131.876 0 1.791.157 1.791.157v1.98h-1.009c-.993 0-1.303.621-1.303 1.258v1.51h2.218l-.354 2.326H9.25V16c3.824-.604 6.75-3.934 6.75-7.951"/></svg>
              Facebook
            </a>
            <a class="share-option" href="#" onclick="shareWhatsApp('${msgId}'); return false;">
              <svg viewBox="0 0 16 16" fill="currentColor"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/></svg>
              WhatsApp
            </a>
          </div>
        </div>
      </div>` : '';

    div.innerHTML = `
      <div class="role-label">${label}</div>
      <div class="message-body">${renderMarkdown(text)}</div>
      ${actionsHtml}
    `;
    msgs.appendChild(div);

    if (role === 'assistant' && chunksRetrieved !== undefined) {
      const meta = document.createElement('div');
      meta.className = 'meta-bar';
      meta.textContent = `${chunksRetrieved} chunks retrieved`;
      msgs.appendChild(meta);
    }

    msgs.scrollTop = msgs.scrollHeight;
  }

  function appendThinking(id) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.id = id;
    div.className = 'thinking';
    div.innerHTML = `<span>Retrieving and synthesizing</span>
      <div class="dots">
        <span></span><span></span><span></span>
      </div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeElement(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function renderSourcesPanel(sources) {
    const list = document.getElementById('sources-list');
    const count = document.getElementById('sources-count');
    count.textContent = sources.length;

    if (!sources.length) {
      list.innerHTML = `<div class="empty-state">
        <div class="icon">◉</div>
        <p>No sources retrieved.</p>
      </div>`;
      return;
    }

    list.innerHTML = sources.map((s, i) => {
      const scoreVal = s.score;
      const scorePct = Math.round(scoreVal * 100);
      let scoreClass = 'score-low';
      if (scoreVal >= 0.82) scoreClass = 'score-high';
      else if (scoreVal >= 0.76) scoreClass = 'score-mid';

      const chunks = (s.chunks || []).join(', ');
      const file = s.source_file || '';

      return `<div class="source-card" id="src-${i}">
        <div class="source-card-header" onclick="toggleSource(${i})">
          <div class="source-score ${scoreClass}">${scorePct}%</div>
          <div class="source-info">
            <div class="source-name">${escHtml(s.name)}</div>
            <div class="source-field">${escHtml(s.field || '')}</div>
          </div>
          <div class="source-chevron">▶</div>
        </div>
        <div class="source-card-body">
          <div class="source-chunks">Chunks: ${escHtml(chunks)}</div>
          <div class="source-file">${escHtml(file)}</div>
        </div>
      </div>`;
    }).join('');
  }

  function toggleSource(i) {
    const card = document.getElementById(`src-${i}`);
    card.classList.toggle('open');
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Copy & Share ──

  function getMsgText(msgId) {
    const el = document.querySelector(`[data-msg-id="${msgId}"]`);
    return el ? (el.dataset.rawText || '') : '';
  }

  async function copyMessage(msgId) {
    const text = getMsgText(msgId);
    const btn = document.getElementById('copy-' + msgId);
    try {
      await navigator.clipboard.writeText(text);
      btn.classList.add('copied');
      btn.innerHTML = btn.innerHTML.replace('Copy', 'Copied!');
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = btn.innerHTML.replace('Copied!', 'Copy');
      }, 2000);
    } catch {
      // Fallback for older browsers
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
  }

  function toggleShare(msgId, e) {
    e.stopPropagation();
    // Close any other open popovers
    document.querySelectorAll('.share-popover.open').forEach(p => {
      if (p.id !== 'share-' + msgId) p.classList.remove('open');
    });
    document.getElementById('share-' + msgId).classList.toggle('open');
  }

  // Close popovers when clicking elsewhere
  document.addEventListener('click', () => {
    document.querySelectorAll('.share-popover.open').forEach(p => p.classList.remove('open'));
  });

  function getShareSnippet(msgId) {
    const text = getMsgText(msgId);
    // Trim to a sensible share length
    return text.length > 280 ? text.slice(0, 277) + '…' : text;
  }

  function shareEmail(msgId) {
    const text = getMsgText(msgId);
    const subject = encodeURIComponent('The Minding Body Mentor');
    const body = encodeURIComponent(text);
    window.open(`mailto:?subject=${subject}&body=${body}`);
    document.getElementById('share-' + msgId).classList.remove('open');
  }

  function shareTwitter(msgId) {
    const snippet = getShareSnippet(msgId);
    const url = encodeURIComponent('https://mentorshipu.com');
    const text = encodeURIComponent(snippet);
    window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
    document.getElementById('share-' + msgId).classList.remove('open');
  }

  function shareLinkedIn(msgId) {
    // LinkedIn share only supports a URL; we open with a summary
    const snippet = encodeURIComponent(getShareSnippet(msgId));
    window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent('https://mentorshipu.com')}&summary=${snippet}`, '_blank');
    document.getElementById('share-' + msgId).classList.remove('open');
  }

  function shareFacebook(msgId) {
    window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent('https://mentorshipu.com')}`, '_blank');
    document.getElementById('share-' + msgId).classList.remove('open');
  }

  function shareWhatsApp(msgId) {
    const snippet = getShareSnippet(msgId);
    window.open(`https://wa.me/?text=${encodeURIComponent(snippet)}`, '_blank');
    document.getElementById('share-' + msgId).classList.remove('open');
  }

  // Minimal markdown renderer
  function renderMarkdown(text) {
    // Escape HTML first
    let html = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    // Code blocks
    html = html.replace(/```[\s\S]*?```/g, m => {
      const code = m.replace(/^```[^\n]*\n?/, '').replace(/```$/, '');
      return `<pre style="background:var(--surface2);padding:12px;border-radius:6px;overflow-x:auto;font-size:12px;margin:8px 0"><code>${code}</code></pre>`;
    });

    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    // Bold
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

    // Italic
    html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

    // H3
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');

    // H2
    html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');

    // H1
    html = html.replace(/^# (.+)$/gm, '<h3>$1</h3>');

    // Unordered list items
    html = html.replace(/^\s*[-*] (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>(\n|$))+/g, m => `<ul>${m}</ul>`);

    // Ordered list
    html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

    // Horizontal rule
    html = html.replace(/^---+$/gm, '<hr style="border:none;border-top:1px solid var(--border);margin:12px 0">');

    // Paragraphs (double newline)
    html = html
      .split(/\n\n+/)
      .map(p => {
        p = p.trim();
        if (!p) return '';
        if (p.startsWith('<h3>') || p.startsWith('<ul>') || p.startsWith('<pre>') || p.startsWith('<hr')) return p;
        return `<p>${p.replace(/\n/g, '<br>')}</p>`;
      })
      .join('');

    return html;
  }
</script>
