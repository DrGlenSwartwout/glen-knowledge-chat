<!doctype html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/static/favicon.png">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<title>By the Fire with Glendalf</title>
<style>
  :root { --warm:#f3e2c7; --dim:#b89a72; }
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; background:#0c0703; color:var(--warm);
    font-family: Georgia, 'Times New Roman', serif; overflow:hidden; }
  #fireside { position:fixed; left:0; right:0; top:0; height:100dvh; display:flex; flex-direction:column;
    align-items:center; justify-content:flex-end; }
  #stage-wrap { position:absolute; inset:0; background:#0c0703; }
  /* The clips are 16:9. `cover` fills the stage, which is right on 16:9 and on
     anything TALLER (phones) where it crops the sides harmlessly. But on a
     viewport WIDER than 16:9 — ultrawide and double-wide monitors — cover
     scales to the width and crops vertically, taking Glendalf's head off. Past
     16:9 we switch to `contain` so the whole frame stays visible, letterboxed
     against the stage background. At exactly 16:9 the two are identical, so
     there is no jump at the boundary. */
  #stageA, #stageB { object-fit: cover; }
  @media (min-aspect-ratio: 16/9) {
    #stageA, #stageB { object-fit: contain; }
  }
  #vignette { position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(ellipse at 50% 40%, transparent 30%, rgba(0,0,0,.78) 100%); }
  #subtitle { position:relative; z-index:2; max-width:760px; width:92%;
    text-align:center; font-size:clamp(20px,3.4vw,30px); line-height:1.45;
    text-shadow:0 2px 18px rgba(0,0,0,.95); margin-bottom:18px; min-height:1.5em; }
  #replay { display:inline-flex; vertical-align:middle; margin-left:.4em; }
  #replay .tts-btn { background:none; border:none; color:var(--dim); cursor:pointer;
    font-size:.7em; }
  #composer { position:relative; z-index:2; width:92%; max-width:760px;
    display:flex; gap:10px; margin-bottom:max(22px, env(safe-area-inset-bottom));
    transition:opacity .4s; }
  #say { flex:1; background:rgba(20,12,6,.72); border:1px solid #6b5436;
    color:var(--warm); border-radius:26px; padding:14px 20px;
    font-size:18px; font-family:inherit; outline:none; }
  #say::placeholder { color:#7d6647; }
  #send { background:#6b5436; border:none; color:var(--warm); border-radius:50%;
    width:52px; height:52px; font-size:22px; cursor:pointer; }
  #send:disabled { opacity:.4; cursor:default; }
  #begin-overlay { position:absolute; inset:0; z-index:5; display:flex;
    align-items:center; justify-content:center; background:rgba(6,3,1,.55); }
  #begin-overlay button { background:#6b5436; color:var(--warm); border:none;
    border-radius:30px; padding:16px 34px; font-size:20px; font-family:inherit;
    cursor:pointer; }
  #yes { display:none; position:relative; z-index:2; margin-bottom:26px;
    background:linear-gradient(#caa86a,#8a6a38); color:#1a0f06; border:none;
    border-radius:30px; padding:16px 40px; font-size:22px; font-family:inherit;
    cursor:pointer; box-shadow:0 0 26px 6px rgba(220,180,90,.7);
    animation:glow 2.2s ease-in-out infinite; }
  @keyframes glow { 0%,100%{box-shadow:0 0 22px 4px rgba(220,180,90,.55);}
    50%{box-shadow:0 0 40px 12px rgba(240,200,110,.95);} }
  /* Voice-first input: speak to Glendalf; typing stays as a fallback */
  #voice { position:relative; z-index:2; display:flex; flex-direction:column;
    align-items:center; gap:10px; margin-bottom:max(26px, env(safe-area-inset-bottom)); }
  #mic { width:76px; height:76px; border-radius:50%; border:1px solid #6b5436;
    background:radial-gradient(circle at 50% 38%, #caa86a, #6b5436); color:#1a0f06;
    font-size:30px; cursor:pointer; box-shadow:0 0 26px 6px rgba(220,180,90,.5);
    transition:transform .2s, box-shadow .3s, opacity .3s; }
  #mic:hover { transform:scale(1.05); }
  #mic.mic-live { animation:micpulse 1.3s ease-in-out infinite; }
  #mic.mic-thinking { opacity:.4; pointer-events:none; box-shadow:none; }
  @keyframes micpulse { 0%,100%{box-shadow:0 0 26px 6px rgba(220,180,90,.5);}
    50%{box-shadow:0 0 46px 16px rgba(240,200,110,.95);} }
  #mic-hint { font-size:15px; color:var(--dim); min-height:1.2em; letter-spacing:.02em; }
  #type-toggle { background:none; border:none; color:#7d6647; font-family:inherit;
    font-size:14px; text-decoration:underline; cursor:pointer; }
  .hidden { display:none !important; }
</style>
</head>
<body>
<main id="fireside">
  <div id="stage-wrap">
    <video id="stageA" playsinline muted loop preload="auto"
      style="position:absolute;inset:0;width:100%;height:100%;background:#0c0703;opacity:1;"></video>
    <video id="stageB" playsinline muted loop
      style="position:absolute;inset:0;width:100%;height:100%;opacity:0;"></video>
    <canvas id="sparks"
      style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;"></canvas>
    <button id="muteBtn" aria-label="Toggle ambient sound"
      style="position:absolute;right:12px;bottom:12px;background:rgba(20,12,6,.72);border:1px solid #6b5436;color:var(--warm);border-radius:50%;width:36px;height:36px;font-size:16px;cursor:pointer;z-index:2;">🔊</button>
    <button id="fsBtn" aria-label="Enter fullscreen"
      style="position:absolute;right:56px;bottom:12px;background:rgba(20,12,6,.72);border:1px solid #6b5436;color:var(--warm);border-radius:50%;width:36px;height:36px;font-size:15px;cursor:pointer;z-index:6;">⛶</button>
  </div>
  <div id="vignette"></div>
  <div id="subtitle" aria-live="polite"></div>
  <button id="yes" type="button">Yes</button>
  <div id="voice" class="hidden">
    <button id="mic" type="button" aria-label="Speak to Glendalf">🎙️</button>
    <div id="mic-hint">Tap to speak</div>
    <button id="type-toggle" type="button">or type instead</button>
  </div>
  <form id="composer" autocomplete="off">
    <input id="say" name="say" type="text" placeholder="Tell me what's on your heart…"
           aria-label="Speak to Glendalf" />
    <button id="send" type="submit" aria-label="Send">➤</button>
  </form>
  <form id="optin" class="hidden" autocomplete="on"
    style="position:relative;z-index:2;width:92%;max-width:520px;display:flex;flex-direction:column;gap:12px;align-items:center;margin-bottom:26px;">
    <input id="optin-email" name="email" type="email" placeholder="Where shall I send the way?"
      aria-label="Your email"
      style="width:100%;background:rgba(20,12,6,.72);border:1px solid #6b5436;color:var(--warm);border-radius:26px;padding:14px 20px;font-size:18px;font-family:inherit;outline:none;text-align:center;" />
    <label style="font-size:14px;color:var(--dim);display:flex;gap:8px;align-items:center;">
      <input id="optin-tos" type="checkbox" /> I agree to the <a href="https://illtowell.com/terms" target="_blank" rel="noopener" style="color:var(--dim);">terms</a>, and if I choose to share my referral link, I will share it ethically with people who may genuinely benefit.
    </label>
    <button id="optin-send" type="submit"
      style="background:linear-gradient(#caa86a,#8a6a38);color:#1a0f06;border:none;border-radius:30px;padding:14px 36px;font-size:20px;font-family:inherit;cursor:pointer;box-shadow:0 0 22px 4px rgba(220,180,90,.55);">Send me the way</button>
  </form>
  <div id="begin-overlay"><button id="begin-btn" type="button">Sit by the fire</button></div>
</main>

<script src="/static/tts-output.js"></script>
<script>
(function(){
  // Mobile keyboard fix: pin the fireside to the VISIBLE viewport so the
  // on-screen keyboard shrinks the scene instead of shoving Glendalf's face
  // off the top. visualViewport tracks the keyboard on iOS/Android; the
  // interactive-widget=resizes-content viewport hint covers the rest.
  var vv = window.visualViewport;
  function fit(){
    var el = document.getElementById('fireside');
    if(!el) return;
    el.style.height = (vv ? vv.height : window.innerHeight) + 'px';
  }
  if(vv){ vv.addEventListener('resize', fit); vv.addEventListener('scroll', fit); }
  window.addEventListener('resize', fit);
  window.addEventListener('orientationchange', fit);
  document.addEventListener('DOMContentLoaded', fit);
  fit();
})();
</script>
<script>
(function () {
  "use strict";
  var stage = document.getElementById('stageA');  // stageA is the primary/intro video panel
  var sub = document.getElementById('subtitle');
  var say = document.getElementById('say');
  var send = document.getElementById('send');
  var composer = document.getElementById('composer');
  var yes = document.getElementById('yes');
  var overlay = document.getElementById('begin-overlay');
  var beginBtn = document.getElementById('begin-btn');
  var voice = document.getElementById('voice');
  var mic = document.getElementById('mic');
  var micHint = document.getElementById('mic-hint');
  var typeToggle = document.getElementById('type-toggle');

  // ── fullscreen ────────────────────────────────────────────────────────────
  // The page already fakes immersion with position:fixed + 100dvh + a
  // visualViewport handler. This makes it real where the browser allows it.
  // iOS Safari only fullscreens <video> elements, never arbitrary containers,
  // so there the button hides and the CSS treatment remains the fallback.
  var fsBtn = document.getElementById('fsBtn');
  var fsTarget = document.getElementById('fireside');
  var fsEnter = fsTarget && (fsTarget.requestFullscreen || fsTarget.webkitRequestFullscreen);
  var fsExit  = document.exitFullscreen || document.webkitExitFullscreen;

  function fsCurrent() {
    return document.fullscreenElement || document.webkitFullscreenElement || null;
  }

  function fsSync() {
    if (!fsBtn) return;
    var on = !!fsCurrent();
    fsBtn.innerHTML = on ? '✕' : '⛶';
    fsBtn.setAttribute('aria-label', on ? 'Exit fullscreen' : 'Enter fullscreen');
  }

  if (fsBtn) {
    if (!fsEnter) {
      fsBtn.classList.add('hidden');
    } else {
      fsBtn.addEventListener('click', function () {
        try {
          if (fsCurrent()) { if (fsExit) fsExit.call(document); }
          else {
            var p = fsEnter.call(fsTarget);
            if (p && p.catch) p.catch(function (e) { console.warn('fullscreen denied', e); });
          }
        } catch (e) { /* denied by the browser: stay windowed */ }
      });
      document.addEventListener('fullscreenchange', fsSync);
      document.addEventListener('webkitfullscreenchange', fsSync);
      fsSync();
    }
  }

  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  var voiceMode = false, rec = null, recActive = false, voiceAuto = false, autoListenTimer = null;
  var silenceTimer = null, voiceFinal = '', voiceInterim = '', PAUSE_MS = 1200;  // ~1.2s quiet = end of the traveler's turn

  var manifest = null;
  var state = 'intro';
  var replyFinished = false;
  var lastFiller = null, lastInter = null;
  var travelerTurns = 0, interjections = 0, turnsSinceInterjection = 99;
  var idleTimer = null;
  var fillerAudio = new Audio();
  var replyAudio = new Audio();
  var murmurAudio = new Audio();                 // soft "thinking" hum that bridges the processing gap
  var replyStarted = false, murmurTimer = null, lastMurmur = null;
  // Reaction director + ambience (initialized after manifest loads, via module script)
  var director = null, ambience = null;
  var lastInputMs = 0;
  var typeDebounceTimer = null;

  function pick(arr, lastId) {
    if (!arr || !arr.length) return null;
    if (arr.length === 1) return arr[0];
    var c; do { c = arr[Math.floor(Math.random() * arr.length)]; } while (c.id === lastId);
    return c;
  }

  function setVideo(src, opts) {
    opts = opts || {};
    if (stage.getAttribute('data-src') === src) return;
    stage.setAttribute('data-src', src);
    stage.src = src;
    stage.loop = opts.loop !== false;
    stage.muted = true;
    stage.play().catch(function () {});
  }

  function pondering() {
    if (director) return;                 // Director owns the stage pair (its _ponder/toResting drive video)
    var p = manifest.pondering_loops;
    if (!p || !p.length) return;
    setVideo(p[Math.floor(Math.random() * p.length)], {loop:true});
  }
  function listening()  { pondering(); state = 'listening'; if (director) director.toResting();
    micReady(); if (voiceMode && voiceAuto) { scheduleAutoListen(); } }
  function speakingLoop(){
    if (director) return;                 // Director.toSpeaking() handles the speaking loop crossfade
    setVideo(manifest.speaking_loop, {loop:true});
  }

  function playClip(audio, file) {
    try { audio.pause(); audio.currentTime = 0; } catch (e) {}
    audio.src = file; audio.muted = false;
    return audio.play().catch(function () {});
  }

  // --- Interjection: rare, on a typing pause, rate-capped, never on turn 1 ---
  function maybeInterject() {
    if (state !== 'listening') return;
    if (!say.value.trim()) return;
    if (travelerTurns < 1) return;                 // never before the first real turn
    if (interjections >= 3) return;                // hard cap per session
    if (turnsSinceInterjection < 3) return;        // at most once per 3 turns
    var clip = pick(manifest.interjections, lastInter);
    if (!clip) return;
    lastInter = clip.id; interjections++; turnsSinceInterjection = 0;
    playClip(fillerAudio, clip.file);
  }
  function armIdle() {
    lastInputMs = Date.now();
    if (idleTimer) clearTimeout(idleTimer);
    if (typeDebounceTimer) clearTimeout(typeDebounceTimer);
    // 400ms debounce: director onType for video backchannels
    typeDebounceTimer = setTimeout(function () {
      if (director) director.onType(say.value, {nowMs: Date.now(), turn: travelerTurns});
    }, 400);
    // 3500ms idle: existing audio interjection + director interjection/interruption
    idleTimer = setTimeout(function () {
      maybeInterject();
      if (director) {
        var idleMs = Date.now() - lastInputMs;
        director.maybeInterject({idleMs: idleMs, sessionCount: interjections, turn: travelerTurns});
        if (director.maybeInterruption({turn: travelerTurns, idleMs: idleMs})) {
          localStorage.setItem('fireside_interruption_seen', '1');
        }
      }
    }, 3500);
  }

  // --- A turn ---
  // Thinking murmur: a soft hum that bridges the gap AFTER the break-in filler
  // while the reply is still composing. Skipped if the reply is already ready,
  // and faded out the instant it becomes ready — so it's only heard when needed.
  function playMurmur() {
    var mur = pick(manifest.thinking_murmurs, lastMurmur);
    if (!mur) return;
    lastMurmur = mur.id;
    try { murmurAudio.pause(); murmurAudio.currentTime = 0; } catch (e) {}
    murmurAudio.src = mur.file; murmurAudio.volume = 0.5; murmurAudio.muted = false;
    murmurAudio.onended = function () {
      if (!replyStarted && (state === 'pondering' || state === 'speaking')) playMurmur();  // keep bridging a long wait
    };
    murmurAudio.play().catch(function () {});
  }
  function startMurmurIfNeeded() {
    murmurTimer = null;
    if (replyStarted) return;                                   // reply already speaking -> skip it
    if (state !== 'pondering' && state !== 'speaking') return;
    playMurmur();
  }
  function stopMurmur() {
    if (murmurTimer) { clearTimeout(murmurTimer); murmurTimer = null; }
    murmurAudio.onended = null;
    if (murmurAudio.paused) return;
    var v = murmurAudio.volume, i = 0;                          // quick fade so the cut isn't abrupt
    var fade = setInterval(function () {
      i++; murmurAudio.volume = Math.max(0, v * (1 - i / 5));
      if (i >= 5) { clearInterval(fade); try { murmurAudio.pause(); murmurAudio.currentTime = 0; } catch (e) {} murmurAudio.volume = v; }
    }, 40);
  }

  function sendTurn(message) {
    state = 'pondering';
    send.disabled = true;
    if (idleTimer) clearTimeout(idleTimer);
    travelerTurns++; turnsSinceInterjection++;
    sub.textContent = '';
    // 1. instant filler (zero-latency, so never silent) — the spoken break-in
    var f = pick(manifest.fillers, lastFiller);
    // 1b. bridge with the thinking murmur only AFTER the spoken filler has ENDED,
    // so the hum never competes with Glendalf's break-in line — and only if the
    // reply still isn't ready. (Was a fixed 1.1s timer that overlapped longer fillers.)
    replyStarted = false;
    if (murmurTimer) clearTimeout(murmurTimer);
    if (f) {
      lastFiller = f.id;
      fillerAudio.onended = function () {
        fillerAudio.onended = null;
        if (murmurTimer) { clearTimeout(murmurTimer); murmurTimer = null; }
        startMurmurIfNeeded();
      };
      playClip(fillerAudio, f.file);
      // fallback if 'ended' never fires (filler failed to load, etc.)
      murmurTimer = setTimeout(function () { fillerAudio.onended = null; startMurmurIfNeeded(); }, 3000);
    } else {
      murmurTimer = setTimeout(startMurmurIfNeeded, 1100);   // no filler -> brief bridge
    }
    // 2. pondering video while we think
    pondering();
    // 3 + 4. stream subtitles via SSE while TTS renders in parallel
    streamReply(message);
    // director: hero-reaction on submit then ponder (no-ops when reactions:[])
    try { if (director) director.onSubmit(message); } catch (e) { console.warn('director.onSubmit failed', e); }
  }

  function streamReply(message) {
    replyFinished = false;
    var full = '';
    fetch('/begin/fireside/agent', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: message})
    }).then(function (r) {
      var reader = r.body.getReader(), dec = new TextDecoder(), buf = '';
      (function pump() {
        return reader.read().then(function (res) {
          if (res.done) return finishReply(full, false);
          buf += dec.decode(res.value, {stream: true});
          var parts = buf.split('\n\n'); buf = parts.pop();
          parts.forEach(function (p) {
            var line = p.replace(/^data: /, '').trim();
            if (!line) return;
            var msg; try { msg = JSON.parse(line); } catch (e) { return; }
            if (msg.token) { full += msg.token; sub.textContent = full; }
            else if (msg.error) { finishReply(full || 'My thoughts wandered. Say that again?', false); }
            else if (msg.done) {
              if (msg.user_name) window.__firesideName = String(msg.user_name);  // for personalized hobbit-call
              finishReply(full, !!msg.hook);
            }
          });
          return pump();
        });
      })();
    }).catch(function () { finishReply('My thoughts wandered. Tell me again?', false); });
  }

  function finishReply(text, hook) {
    if (replyFinished) return;
    replyFinished = true;
    sub.textContent = text;
    // render the reply voice (parallel path); play when ready, then return to listening
    fetch('/chat/tts', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text: text})
    }).then(function (r) {
      if (!r.ok) throw new Error('tts ' + r.status);
      return r.blob();
    }).then(function (blob) {
      replyStarted = true; stopMurmur();          // reply audio is ready — the murmur's job is done
      var url = URL.createObjectURL(blob);
      replyAudio.src = url; replyAudio.muted = false;
      speakingLoop(); state = 'speaking';
      try { if (director) director.onReplyReady(); } catch (e) { console.warn('director.onReplyReady failed', e); }  // crossfade to speaking on Director's back panel
      replyAudio.onended = function () { URL.revokeObjectURL(url); afterReply(text, hook); };
      replyAudio.onerror = function () { URL.revokeObjectURL(url); afterReply(text, hook); };
      replyAudio.play().catch(function () { afterReply(text, hook); });
    }).catch(function () {
      replyStarted = true; stopMurmur();          // reply resolved (fallback) — stop bridging
      // voice failed -> speechSynthesis fallback via TTS helper, then continue
      if (window.TTS && window.TTS.attachAndSpeak) { try { window.TTS.attachAndSpeak(sub, text); } catch (e) {} }
      setTimeout(function () { afterReply(text, hook); }, 600);
    });
  }

  function afterReply(text, hook) {
    // free replay affordance (cached /chat/tts) + speechSynthesis fallback
    var holder = document.getElementById('replay');
    if (holder) holder.remove();
    holder = document.createElement('span'); holder.id = 'replay';
    sub.appendChild(holder);
    if (window.TTS && window.TTS.attach) { try { window.TTS.attach(holder, text); } catch (e) {} }
    if (hook) { endOnHook(); return; }
    send.disabled = false; listening(); say.focus();
  }

  function endOnHook() {
    state = 'ended';
    stopRec();
    voice.classList.add('hidden');
    composer.classList.add('hidden');
    yes.style.display = 'inline-block';
    if (director) director.toResting(); else pondering();
  }

  // --- Intro ---
  // Round-robin an intro variant per browser so repeat visits (same person/IP) get variety.
  function rotate(arr, key) {
    if (!arr || !arr.length) return null;
    var i = 0;
    try { i = (parseInt(localStorage.getItem(key) || '-1', 10) + 1) % arr.length; localStorage.setItem(key, i); } catch (e) {}
    return arr[i] || arr[0];
  }

  function startIntro() {
    if (!manifest) return;
    overlay.remove();
    state = 'intro';
    var read = rotate(manifest.intro_reads, 'fs_intro_read') || manifest.intro_read;
    if (read) {
      // He's absorbed in his book; the reading LOOPS until the visitor engages.
      setVideo(read, {loop: true});
      stage.muted = true;
      stage.onended = null;
      stage.play().catch(function () { toWelcome(); });
      // first click/type in the chat makes him notice you
      say.addEventListener('focus', armWelcome, {once: true});
      say.addEventListener('input', armWelcome, {once: true});
    } else {
      // legacy single intro video
      setVideo(manifest.intro_video, {loop: false});
      stage.muted = false;
      stage.onended = function () { stage.muted = true; listening(); say.focus(); };
      stage.play().catch(function () { listening(); say.focus(); });
    }
  }

  function armWelcome() { if (state === 'intro') toWelcome(); }

  function toWelcome() {
    if (state !== 'intro') return;
    state = 'intro-welcome';
    var wv = rotate(manifest.intro_welcomes, 'fs_intro_welcome') || manifest.intro_welcome;
    var wa = rotate(manifest.intro_welcome_audios, 'fs_intro_welcome_audio') || manifest.intro_welcome_audio;
    if (wv) {
      setVideo(wv, {loop: false});
      stage.muted = true;
      if (wa) {
        try { replyAudio.src = wa; replyAudio.play().catch(function () {}); } catch (e) {}
      }
      stage.onended = function () { listening(); say.focus(); };
      stage.play().catch(function () { listening(); say.focus(); });
    } else { listening(); say.focus(); }
  }

  // --- Voice-first input (speak to Glendalf; typing stays as fallback) ---
  function micReady() {
    if (!voiceMode) return;
    mic.classList.remove('mic-thinking');
    if (!recActive) micHint.textContent = 'Tap to speak';
  }
  function micThinking() {
    if (!voiceMode) return;
    mic.classList.add('mic-thinking');
    micHint.textContent = '';
  }
  function stopRec() { if (rec) { try { rec.stop(); } catch (e) {} } }
  function scheduleAutoListen() {
    // Hands-free: after Glendalf finishes speaking, reopen the mic so the
    // traveler can simply reply. A short grace keeps it from feeling abrupt.
    if (autoListenTimer) clearTimeout(autoListenTimer);
    autoListenTimer = setTimeout(function () {
      if (voiceMode && voiceAuto && state === 'listening' && !recActive) startRec();
    }, 500);
  }
  function toTypeMode() {
    voiceMode = false; voiceAuto = false;
    voiceFinal = ''; voiceInterim = ''; clearSilence();  // don't auto-submit a half-spoken thought
    stopRec();
    if (autoListenTimer) clearTimeout(autoListenTimer);
    voice.classList.add('hidden');
    composer.classList.remove('hidden');
    say.focus();
  }
  function clearSilence() { if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; } }
  function armSilence() { clearSilence(); silenceTimer = setTimeout(endpoint, PAUSE_MS); }  // reset on every speech
  function endpoint() {
    // The traveler has gone quiet ~PAUSE_MS -> take their turn. sendTurn plays a
    // short break-in ("So…", "Ah, I see.") in Glendalf's voice, then streams the reply.
    clearSilence();
    var t = (voiceFinal + voiceInterim).trim();
    voiceFinal = ''; voiceInterim = '';
    if (!t || state !== 'listening') return;
    stopRec();
    say.value = ''; micThinking();
    sendTurn(t);
  }
  function startRec() {
    if (recActive) { stopRec(); return; }         // tap again to cancel
    if (state !== 'listening' || !SR) return;
    voiceFinal = ''; voiceInterim = '';
    try {
      rec = new SR();
      // Continuous + interim so WE decide the end-of-turn pause (the API's own
      // endpoint isn't tunable and clips reflective pauses).
      rec.lang = 'en-US'; rec.interimResults = true; rec.maxAlternatives = 1; rec.continuous = true;
      rec.onstart  = function () { recActive = true; mic.classList.add('mic-live'); micHint.textContent = 'Listening…'; };
      rec.onerror  = function (ev) {
        recActive = false; clearSilence(); mic.classList.remove('mic-live');
        // mic blocked -> fall back to typing so the traveler is never stuck
        if (ev && (ev.error === 'not-allowed' || ev.error === 'service-not-allowed')) { toTypeMode(); }
        else { micHint.textContent = 'Tap to speak'; }
      };
      rec.onend    = function () {
        recActive = false; mic.classList.remove('mic-live');
        // iOS Safari ignores continuous and ends per-utterance -> use that as the endpoint
        if ((voiceFinal + voiceInterim).trim() && state === 'listening') { endpoint(); return; }
        clearSilence();
        if (micHint.textContent === 'Listening…') micHint.textContent = 'Tap to speak';
      };
      rec.onresult = function (ev) {
        voiceInterim = '';
        for (var i = ev.resultIndex; i < ev.results.length; i++) {
          var r = ev.results[i];
          if (r.isFinal) voiceFinal += r[0].transcript; else voiceInterim += r[0].transcript;
        }
        if ((voiceFinal + voiceInterim).trim()) armSilence();
      };
      rec.start();
    } catch (e) { toTypeMode(); }
  }

  // --- wire up ---
  if (SR) { voiceMode = true; voice.classList.remove('hidden'); composer.classList.add('hidden'); }
  mic.addEventListener('click', function () {
    if (state === 'intro') { voiceAuto = true; armWelcome(); return; }  // first tap: he notices you, then listens hands-free
    if (state === 'listening') { voiceAuto = true; startRec(); }         // opting into voice keeps it hands-free for later turns
  });
  typeToggle.addEventListener('click', toTypeMode);
  composer.addEventListener('submit', function (e) {
    e.preventDefault();
    var m = say.value.trim();
    if (!m || state === 'intro' || state === 'intro-welcome' || state === 'pondering' || state === 'speaking' || state === 'ended') return;
    say.value = '';
    sendTurn(m);
  });
  say.addEventListener('input', armIdle);
  say.addEventListener('blur', function () {
    if (idleTimer) clearTimeout(idleTimer);
    if (typeDebounceTimer) clearTimeout(typeDebounceTimer);
  });
  // Hook handoff: "Yes, I'm ready" -> reveal a warm email capture -> onboard -> confirm.
  var optin = document.getElementById('optin');
  var optinEmail = document.getElementById('optin-email');
  var optinTos = document.getElementById('optin-tos');
  yes.addEventListener('click', function () {
    yes.style.display = 'none';
    optin.classList.remove('hidden');
    var who = window.__firesideName ? (', ' + window.__firesideName) : '';
    sub.textContent = 'Then it is settled' + who + '. Leave word of where to find you, and I will send you the way to your first Remedy Match.';
    optinEmail.focus();
  });
  optin.addEventListener('submit', function (e) {
    e.preventDefault();
    var email = (optinEmail.value || '').trim();
    if (!email || email.indexOf('@') < 0) { optinEmail.focus(); return; }
    if (!optinTos.checked) { sub.textContent = 'A small matter first — the terms, if you would.'; return; }
    var btn = document.getElementById('optin-send');
    btn.disabled = true; btn.textContent = 'Sending…';
    fetch('/begin/fireside/opt-in', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, tos: true, name: window.__firesideName || '' })
    }).then(function (r) { return r.ok ? r.json() : null; })
      .then(function (res) {
        optin.classList.add('hidden');
        var nm = (res && res.name) ? (', ' + res.name) : (window.__firesideName ? (', ' + window.__firesideName) : '');
        sub.textContent = 'It is done' + nm + '. Your first Remedy Match is set aside — look for it by fire-mail. Until next we sit.';
      })
      .catch(function () {
        btn.disabled = false; btn.textContent = 'Send me the way';
        sub.textContent = 'The fire flickered — try once more?';
      });
  });
  beginBtn.addEventListener('click', function () {
    startIntro();
    if (ambience) ambience.start();  // autoplay-safe: only runs after user gesture
  });

  fetch('/static/fireside/fireside-manifest.json')
    .then(function (r) { return r.json(); })
    .then(function (m) {
      manifest = m;
      stage.poster = m.intro_poster;
      // Initialize reaction director + ambience via the module script's init function
      // Bounded retry: module script may load after a cache-warm manifest fetch resolves
      (function initDirectorWhenReady(tries){
        if (window.__firesideInit) {
          try {
            var r = window.__firesideInit(m, replyAudio);
            if (r) { director = r.director; ambience = r.ambience; }
          } catch (e) { console.warn('fireside director init failed', e); }
        } else if (tries < 40) {
          setTimeout(function(){ initDirectorWhenReady(tries + 1); }, 50);
        }
        // after 40 tries (~2s) give up: director/ambience stay null → existing behavior preserved (graceful degradation)
      })(0);
    })
    .catch(function () { sub.textContent = 'The fire is not lit just now. Please return shortly.'; });
})();
</script>

<script type="module">
  import { normalizeManifest } from '/static/fireside/manifest-normalize.js';
  import { Director } from '/static/fireside/director.js';
  import { Ambience } from '/static/fireside/ambience.js';

  const stageA = document.getElementById('stageA');
  const stageB = document.getElementById('stageB');
  const canvas  = document.getElementById('sparks');
  const ctx     = canvas.getContext('2d');
  const muteBtn = document.getElementById('muteBtn');

  // Dedicated audio element for Director-triggered interjection/reaction audio
  const _interAudio = new Audio();

  // Stable array ref for hearth spark origin — mutated in syncCanvas so it stays current after resize
  const sparkXY = [0, 0];

  // Keep canvas pixel dimensions in sync with its display size for correct spark rendering
  function syncCanvas() {
    canvas.width  = canvas.clientWidth  || window.innerWidth;
    canvas.height = canvas.clientHeight || window.innerHeight;
    sparkXY[0] = canvas.width  * 0.22;
    sparkXY[1] = canvas.height * 0.62;
  }
  syncCanvas();
  window.addEventListener('resize', syncCanvas);

  // Personalized hobbit-call: play caller audio, then a runtime-TTS'd reply that speaks the
  // visitor's name (fetched in parallel so it's ready by the time the caller finishes), then the
  // departing footsteps. Falls back to the clip's generic combined audio if the TTS fails.
  function playPersonalizedInterruption(clip, name) {
    var line = clip.reply_template.replace(/\{name\}/g, name);
    var ttsUrl = null;
    var ttsReady = fetch('/chat/tts', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: line })
    }).then(function (r) { return r.ok ? r.blob() : null; })
      .then(function (b) { ttsUrl = b ? URL.createObjectURL(b) : null; })
      .catch(function () { ttsUrl = null; });

    function playSrc(src, onend) {
      try { _interAudio.pause(); _interAudio.currentTime = 0; } catch (e) {}
      _interAudio.src = src;
      _interAudio.onended = onend || null;
      _interAudio.play().catch(function () { if (onend) onend(); });
    }
    function playLeave() {
      if (ttsUrl) { try { URL.revokeObjectURL(ttsUrl); } catch (e) {} ttsUrl = null; }
      if (clip.leave_audio) playSrc(clip.leave_audio, function () { _interAudio.onended = null; });
      else _interAudio.onended = null;
    }
    function playReply() {
      ttsReady.then(function () {
        if (ttsUrl) playSrc(ttsUrl, playLeave);
        else if (clip.audio) playSrc(clip.audio, function () { _interAudio.onended = null; }); // fallback: generic reply
        else playLeave();
      });
    }
    playSrc(clip.caller_audio, playReply);
  }

  // Called by the inline script after the manifest fetch resolves.
  // Returns { director, ambience } so the inline script can hold references.
  window.__firesideInit = function (rawManifest, ttsAudioEl) {
    const norm = normalizeManifest(rawManifest);

    const director = new Director(norm, {
      videoA: stageA,
      videoB: stageB,
      onInterjectionAudio: function (clip) {
        if (!clip) return;
        var name = window.__firesideName;
        // Personalized hobbit-call: caller -> runtime-TTS reply (with the visitor's name) -> leave
        if (clip.reply_template && clip.caller_audio && name) {
          playPersonalizedInterruption(clip, name);
          return;
        }
        if (!clip.audio) return;
        try { _interAudio.pause(); _interAudio.currentTime = 0; } catch (e) {}
        _interAudio.onended = null;
        _interAudio.src = clip.audio;
        _interAudio.play().catch(function () {});
      },
    });

    // Seed once-per-client interruption flag so Glendalf never waves off the
    // same hobbit-voice intruder twice across sessions on this browser.
    director._interruptionSeen = localStorage.getItem('fireside_interruption_seen') === '1';

    const ambience = new Ambience(norm.ambience, {
      isVoicePlaying: function () {
        return ttsAudioEl && !ttsAudioEl.paused && !ttsAudioEl.ended;
      },
      sparkCtx: ctx,
      // Hearth is roughly 22% from left, 62% down the frame
      // sparkXY is a stable module-level array; syncCanvas() mutates [0]/[1] on resize
      sparkXY: sparkXY,
    });

    // Mute toggle: affects ambience bed + oneshots only (voice TTS is never muted here)
    let _muted = false;
    muteBtn.addEventListener('click', function () {
      _muted = !_muted;
      ambience.setMuted(_muted);
      muteBtn.textContent = _muted ? '🔇' : '🔊';
    });

    return { director, ambience };
  };
</script>
