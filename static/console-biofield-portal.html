<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Biofield Portal · Console</title>
<link rel="icon" type="image/png" href="/static/favicon.png">
<style>
  /* Shared Business OS console theme — deep green + gold, matching the other tabs. */
  :root{--bg:#0a150d;--surface:#111f16;--surface2:#162318;--border:#21472d;
        --cream:#fdf4d8;--muted:#a89870;--gold:#d4a843;--green:#3d8a52;--err:#c0432b}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--cream);font-family:"Open Sans",system-ui,sans-serif;padding:24px}
  /* Center page content (full-width nav preserved), like the other consoles. */
  body > :not(.op-nav-bar):not(.op-nav-sub):not(#gate):not(script):not(style){
    max-width:900px;margin-left:auto;margin-right:auto}
  h1{font-family:"Raleway",sans-serif;font-size:22px;margin:.4rem 0 .2rem;color:var(--cream)}
  .sub{color:var(--muted);font-size:13px;margin:0 0 1rem}
  code{color:var(--gold)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin:14px 0}
  .card h2{font-family:"Raleway",sans-serif;font-size:15px;margin:0 0 .7rem}
  label{display:block;font-size:.78rem;color:var(--muted);margin:.5rem 0 .2rem}
  input,textarea,select{width:100%;padding:9px 11px;background:var(--bg);color:var(--cream);
    border:1px solid var(--border);border-radius:8px;font:inherit;font-size:14px}
  textarea{resize:vertical;min-height:54px}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .row > div{flex:1;min-width:120px}
  .btn{background:var(--gold);color:var(--bg);border:0;border-radius:8px;padding:10px 16px;font-weight:700;cursor:pointer}
  .btn.ghost{background:transparent;border:1px solid var(--border);color:var(--cream);font-weight:600}
  .btn.ghost:hover{border-color:var(--gold);color:var(--gold)}
  .btn.sm{padding:5px 10px;font-size:.82rem}
  .btn:disabled{opacity:.5;cursor:default}
  .layer,.reitem{border:1px solid var(--border);border-radius:10px;padding:10px;margin:8px 0;background:var(--surface2)}
  .layer .top,.reitem .top{display:flex;gap:10px;align-items:center;margin-bottom:6px}
  .layer .top input{width:64px}
  .x{margin-left:auto;background:transparent;border:1px solid var(--border);color:var(--err);border-radius:6px;padding:4px 9px;cursor:pointer}
  .muted{color:var(--muted)} .small{font-size:.84rem}
  .status{padding:10px 12px;border-radius:8px;margin:10px 0;display:none;font-size:13px}
  .status.ok{background:var(--surface2);border:1px solid var(--green);color:var(--green);display:block}
  .status.bad{background:var(--surface2);border:1px solid var(--err);color:var(--err);display:block}
  #gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;text-align:center}
  #gate .card{min-width:300px}
  a.preview{display:inline-block;margin-left:10px;color:var(--gold);font-weight:600}
  .ac{position:absolute;z-index:60;background:var(--surface2);border:1px solid var(--border);
    border-radius:8px;max-height:240px;overflow:auto;min-width:240px;box-shadow:0 8px 24px rgba(0,0,0,.45)}
  .ac-item{padding:8px 11px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)}
  .ac-item:last-child{border-bottom:0}
  .ac-item:hover{background:var(--surface);color:var(--gold)}
  .ac-item .em{color:var(--muted);font-size:.82em}
  .stresses{margin-top:8px;border-top:1px dashed var(--border);padding-top:6px}
  .slabel{color:var(--muted);font-size:.74rem;margin-bottom:3px}
  .finding{font-size:13px;padding:3px 0}
  .fhead{cursor:pointer} .fcode{color:var(--gold);font-weight:700}
  .fx{color:var(--muted);margin-left:4px;font-size:.8em}
  .fdesc{display:none;color:var(--muted);font-size:.86em;margin:2px 0 4px 12px;white-space:pre-wrap}
  .finding.open .fdesc{display:block}
  #unbalanced .finding .fhead input{margin-right:6px;width:auto}
</style>
</head>
<body>
<script src="/static/op-nav.js" data-active="bos" data-sub="biofield"></script>
  <div id="gate" style="display:none"><div class="card" style="min-width:300px">
    <h2>Console key</h2>
    <input id="key" type="password" placeholder="CONSOLE_SECRET">
    <p style="margin-top:10px"><button class="btn" onclick="unlock()">Unlock</button></p>
  </div></div>

  <div id="clientac" class="ac" style="display:none"></div>
  <div id="app" class="wrap" style="display:none">
    <h1>Biofield Portal Editor</h1>
    <p class="sub">Compose or edit a client's healing-home portal, then publish. Paste your narrative skill's <code>portal-seed.json</code> to pre-fill.</p>

    <div class="card">
      <h2>Client</h2>
      <div class="row">
        <div><label>Email</label><input id="email" type="email" placeholder="client@example.com"></div>
        <div><label>Name</label><input id="name" type="text" placeholder="Full name"></div>
        <div style="flex:0 0 auto;align-self:flex-end"><button class="btn ghost" onclick="loadExisting()">Load existing</button></div>
        <div style="flex:0 0 auto;align-self:flex-end"><button class="btn" onclick="importFmp()">Import from FMP</button></div>
        <div id="scanWrap" style="flex:0 0 auto;align-self:flex-end;display:none">
          <label>Scan date</label>
          <select id="scanSel" onchange="loadExisting(this.value)"></select>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Paste portal-seed.json (optional)</h2>
      <textarea id="paste" placeholder='{"greeting": "...", "video": {...}, "layers": [...], "reorder_items": [...]}'></textarea>
      <p style="margin:.6rem 0 0"><button class="btn ghost" onclick="fillFromPaste()">Fill form from JSON</button>
        <span id="pasteErr" class="small" style="color:var(--err)"></span></p>
    </div>

    <div class="card">
      <h2>Greeting &amp; video</h2>
      <label>Greeting</label><textarea id="greeting" placeholder="Aloha [name] 🌺 ..."></textarea>
      <div class="row">
        <div><label>Video URL</label><input id="videoUrl" type="url" placeholder="https://app.heygen.com/share/..."></div>
        <div><label>Video button label</label><input id="videoLabel" type="text" placeholder="Watch your Biofield walkthrough"></div>
      </div>
    </div>

    <div class="card">
      <h2>Healing path layers</h2>
      <div id="layers"></div>
      <button class="btn ghost sm" onclick="addLayer(); renderFindings()">+ Add layer</button>
    </div>

    <div id="unbalanced" class="card" style="display:none"></div>

    <div class="card">
      <h2>Order remedies</h2>
      <datalist id="catalog"></datalist>
      <div id="reitems"></div>
      <button class="btn ghost sm" onclick="addItem()">+ Add remedy</button>
      <button class="btn ghost sm" onclick="syncOrderFromLayers()">Sync order list from layers</button>
      <label style="margin-top:.8rem">Pricing note (optional)</label>
      <input id="pricingNote" type="text" placeholder="Your certified-practitioner price.">
    </div>

    <div id="status" class="status"></div>
    <p>
      <button class="btn" id="pubBtn" onclick="publish(false)">Publish to portal</button>
      <button class="btn ghost" onclick="publish(true)">Publish &amp; email client</button>
      <a id="previewLink" class="preview" target="_blank" rel="noopener" style="display:none">Preview portal ↗</a>
    </p>
  </div>

<script>
function key(){ return localStorage.getItem('console_key') || ''; }
(function(){ var u=new URLSearchParams(location.search).get('key'); if(u) localStorage.setItem('console_key', u); })();
function unlock(){ localStorage.setItem('console_key', document.getElementById('key').value);
  document.getElementById('gate').style.display='none'; boot(); }

const $ = id => document.getElementById(id);
const val = id => ($(id).value || "").trim();
let CAT_BY_NAME = {};
let FINDINGS = {}; let FINDINGS_LIST = [];

function boot(){
  if(!key()){ $('gate').style.display='flex'; return; }
  $('app').style.display='block';
  loadCatalog();
  if($('#layers') && $('layers').children.length===0) addLayer();
  $('email').addEventListener('input', clientSearch);
  $('name').addEventListener('input', clientSearch);
  document.addEventListener('click', e=>{
    if(!e.target.closest('#clientac') && e.target!==$('email') && e.target!==$('name')) acHide();
  });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') acHide(); });
}

// ── Client type-ahead (name OR email; matches first/last name too, server-side) ──
let _acTimer=null;
function acHide(){ const d=$('clientac'); if(d){ d.style.display='none'; d.innerHTML=''; } }
function clientSearch(ev){
  const input=ev.target, q=(input.value||'').trim();
  clearTimeout(_acTimer);
  if(q.length<2){ acHide(); return; }
  _acTimer=setTimeout(async ()=>{
    const r=await api('GET', `/api/people?q=${encodeURIComponent(q)}&limit=8`);
    const people=(r.ok && r.json.people) || [];
    if(!people.length){ acHide(); return; }
    const d=$('clientac');
    d.innerHTML=people.map(p=>{
      const nm=esc(p.name || [p.first_name,p.last_name].filter(Boolean).join(' ') || '(no name)');
      return `<div class="ac-item" data-email="${esc(p.email||'')}" data-name="${esc(p.name||'')}">`
           + `${nm} <span class="em">${esc(p.email||'')}</span></div>`;
    }).join('');
    const rect=input.getBoundingClientRect();
    d.style.left=(rect.left+window.scrollX)+'px';
    d.style.top=(rect.bottom+window.scrollY+2)+'px';
    d.style.width=rect.width+'px';
    d.style.display='block';
    d.querySelectorAll('.ac-item').forEach(it=>it.onclick=()=>{
      $('email').value=it.dataset.email; $('name').value=it.dataset.name;
      acHide(); loadExisting();
    });
  }, 250);
}

async function api(method, path, body){
  const opt = {method, headers:{'X-Console-Key':key()}};
  if(body){ opt.headers['Content-Type']='application/json'; opt.body=JSON.stringify(body); }
  const r = await fetch(path, opt);
  return {ok:r.ok, status:r.status, json: await r.json().catch(()=>({}))};
}

async function loadCatalog(){
  const r = await api('GET', '/api/console/biofield-portal/catalog');
  if(!r.ok) return;
  const dl = $('catalog'); dl.innerHTML=''; CAT_BY_NAME={};
  (r.json.products||[]).forEach(p=>{
    if(!p.slug) return;
    CAT_BY_NAME[(p.name||'').trim().toLowerCase()] = p.slug;
    const o=document.createElement('option');
    o.value=p.slug; o.label=`${p.name||p.slug} — $${((p.price_cents||0)/100).toFixed(2)}`;
    dl.appendChild(o);
  });
}

// ── Layers ────────────────────────────────────────────────────────────────
function addLayer(L){
  L = L || {};
  const i = $('layers').children.length + 1;
  const el = document.createElement('div'); el.className='layer';
  el.dataset.patterns = JSON.stringify((L && L.patterns) || []);
  el.innerHTML = `
    <div class="top">
      <input class="ln" type="number" min="1" value="${L.n!=null?L.n:i}" title="layer order">
      <input class="lt" type="text" placeholder="Layer title" value="${esc(L.title||'')}" style="flex:1">
      <button class="x" onclick="this.closest('.layer').remove(); renderFindings()">delete</button>
    </div>
    <textarea class="lm" placeholder="Meaning — what this layer addresses">${esc(L.meaning||'')}</textarea>
    <input class="lr" type="text" placeholder="Remedy (free text)" value="${esc(L.remedy||'')}" style="margin-top:6px">
    <input class="ld" type="text" placeholder="Dosing protocol" value="${esc(L.dosing||'')}" style="margin-top:6px">`;
  $('layers').appendChild(el);
}
function collectLayers(){
  return [...$('layers').children].map(el=>({
    n: parseInt(el.querySelector('.ln').value)||null,
    title: el.querySelector('.lt').value.trim(),
    meaning: el.querySelector('.lm').value.trim(),
    remedy: el.querySelector('.lr').value.trim(),
    dosing: el.querySelector('.ld').value.trim(),
    patterns: JSON.parse(el.dataset.patterns || '[]'),
  })).filter(L=>L.title).sort((a,b)=>(a.n||0)-(b.n||0));
}

// ── Reorder items ───────────────────────────────────────────────────────────
function addItem(it){
  it = it || {};
  const el = document.createElement('div'); el.className='reitem';
  el.innerHTML = `
    <div class="top">
      <input class="rs" list="catalog" placeholder="product-slug" value="${esc(it.slug||'')}" style="flex:1">
      <input class="rq" type="number" min="1" value="${it.qty||1}" style="width:64px" title="qty">
      <input class="rp" type="number" min="0" placeholder="¢ override" value="${it.price_cents!=null?it.price_cents:''}" style="width:110px" title="price override (cents)">
      <button class="x" onclick="this.closest('.reitem').remove()">delete</button>
    </div>`;
  $('reitems').appendChild(el);
}
function collectItems(){
  return [...$('reitems').children].map(el=>{
    const slug = el.querySelector('.rs').value.trim();
    if(!slug) return null;
    const o = {slug, qty: parseInt(el.querySelector('.rq').value)||1};
    const p = el.querySelector('.rp').value.trim();
    if(p!=='') o.price_cents = parseInt(p);
    return o;
  }).filter(Boolean);
}
function syncOrderFromLayers(){
  const layers = collectLayers();
  const existing = {}; collectItems().forEach(it => existing[it.slug] = it);  // keep qty/price
  const slugs = [];
  layers.forEach(L => (L.remedy||'').split('+').forEach(part => {
    const slug = CAT_BY_NAME[part.trim().toLowerCase()];
    if(slug && !slugs.includes(slug)) slugs.push(slug);
  }));
  $('reitems').innerHTML = '';
  slugs.forEach(slug => addItem(existing[slug] || {slug, qty: 1}));
  setStatus(`Order list synced from layers — ${slugs.length} item(s).`, true);
}

// ── Paste import ────────────────────────────────────────────────────────────
function fillFromPaste(){
  $('pasteErr').textContent='';
  let d;
  try{ d = JSON.parse($('paste').value); }
  catch(e){ $('pasteErr').textContent='Not valid JSON — form left unchanged.'; return; }
  populate(d);
}
// ── Findings (stress patterns) ───────────────────────────────────────────────
function findingLine(f, checkbox){
  const cb = checkbox ? `<input type="checkbox" class="ufx" value="${esc(f.code)}">` : '';
  const note = f.clinical_notes ? ('\n' + f.clinical_notes) : '';
  return `<div class="finding"><div class="fhead" onclick="this.parentNode.classList.toggle('open')">`
       + `${cb}<span class="fcode">[${esc(f.code)}]</span> ${esc(f.name||'')}`
       + `${f.rank!=null?(' · #'+f.rank):''}<span class="fx">▾</span></div>`
       + `<div class="fdesc">${esc((f.description||'(no description)') + note)}</div></div>`;
}
function renderFindings(){
  const layers = [...$('layers').children];
  if(!FINDINGS_LIST.length){
    layers.forEach(el=>{ const b=el.querySelector('.stresses'); if(b) b.remove(); });
    $('unbalanced').style.display='none'; $('unbalanced').innerHTML=''; return;
  }
  const balanced = new Set();
  layers.forEach(el=>{
    const codes = JSON.parse(el.dataset.patterns||'[]');
    codes.forEach(c=>balanced.add(c));
    let box = el.querySelector('.stresses');
    if(!box){ box=document.createElement('div'); box.className='stresses'; el.appendChild(box); }
    box.innerHTML = codes.length
      ? '<div class="slabel">Stresses this balances:</div>'
        + codes.map(c=>FINDINGS[c]?findingLine(FINDINGS[c],false):'').join('')
      : '';
  });
  const unb = FINDINGS_LIST.filter(f=>!balanced.has(f.code));
  const panel = $('unbalanced');
  if(!unb.length){ panel.style.display='none'; panel.innerHTML=''; return; }
  panel.style.display='block';
  panel.innerHTML = `<h2>Unbalanced stresses (${unb.length})</h2>`
    + unb.map(f=>findingLine(f,true)).join('')
    + `<div style="margin-top:.6rem">`
    + `<button class="btn ghost sm" onclick="addLayerForSelected()">Add a layer for selected</button> `
    + `<button class="btn ghost sm" onclick="document.querySelectorAll('.ufx').forEach(c=>c.checked=true)">Select all</button></div>`;
}
function addLayerForSelected(){
  const codes = [...document.querySelectorAll('.ufx:checked')].map(c=>c.value);
  if(!codes.length){ setStatus('Select one or more stresses first.', false); return; }
  addLayer({patterns: codes, title: '', meaning: ''});
  renderFindings();
}

function populate(d){
  $('greeting').value = d.greeting||'';
  $('videoUrl').value = (d.video&&d.video.url)||'';
  $('videoLabel').value = (d.video&&d.video.label)||'';
  $('pricingNote').value = d.pricing_note||'';
  $('layers').innerHTML=''; (d.layers||[]).forEach(addLayer);
  if($('layers').children.length===0) addLayer();
  $('reitems').innerHTML=''; (d.reorder_items||[]).forEach(addItem);
  FINDINGS_LIST = d.findings || []; FINDINGS = {};
  FINDINGS_LIST.forEach(f=>{ FINDINGS[f.code]=f; });
  renderFindings();
}

// ── Load / publish ──────────────────────────────────────────────────────────
let curScanDate = "";
async function loadExisting(scanDate){
  const email = val('email');
  if(!email){ setStatus('Enter an email first.', false); return; }
  let url = `/api/console/biofield-portal?email=${encodeURIComponent(email)}`;
  if(scanDate) url += `&scan_date=${encodeURIComponent(scanDate)}`;
  const r = await api('GET', url);
  if(!r.ok){ setStatus('Could not load.', false); return; }
  if(!r.json.found){ setStatus('No portal yet for that email — fill the form to create one.', true);
    $('scanWrap').style.display='none'; curScanDate=""; return; }
  $('name').value = r.json.name||'';
  populate(r.json.content||{});
  const dates = r.json.scan_dates || [];
  curScanDate = r.json.scan_date || "";
  const wrap = $('scanWrap'), sel = $('scanSel');
  if(dates.length){
    sel.innerHTML = dates.map(d=>`<option value="${esc(d)}"${d===curScanDate?' selected':''}>${esc(d)}</option>`).join('');
    wrap.style.display='';
  } else { wrap.style.display='none'; }
  const stat = r.json.status ? ` [${r.json.status}]` : '';
  setStatus(curScanDate
    ? `Loaded scan ${curScanDate}${stat} — edit and Publish to confirm this report.`
    : 'Loaded existing portal — edit and republish (the link stays the same).', true);
}

async function importFmp(){
  const email = val('email');
  if(!email){ setStatus('Enter the client’s email first.', false); return; }
  curScanDate=""; $('scanWrap').style.display='none';
  setStatus('Pulling the Causal Chain Report from FMP and drafting the write-up…', true);
  const r = await api('POST', '/api/console/biofield-portal/import-fmp', {email, name: val('name')});
  if(!r.ok){ setStatus((r.json && r.json.error) || 'Import failed.', false); return; }
  if(!r.json.found){ setStatus('No biofield test found in FMP for that email.', false); return; }
  populate(r.json.content||{});
  setStatus('Imported from FMP — review the layers and the drafted greeting/meanings, then Publish.', true);
}

function buildContent(){
  const c = { greeting: val('greeting'), layers: collectLayers() };
  const vu = val('videoUrl');
  if(vu) c.video = { url: vu, label: val('videoLabel') || 'Watch your Biofield walkthrough' };
  const items = collectItems(); if(items.length) c.reorder_items = items;
  const pn = val('pricingNote'); if(pn) c.pricing_note = pn;
  if(FINDINGS_LIST.length) c.findings = FINDINGS_LIST;
  return c;
}

async function publish(send){
  const email = val('email');
  if(!email){ setStatus('Email is required.', false); return; }
  const content = buildContent();
  if(!(content.layers.length || (content.video&&content.video.url) || content.greeting)){
    setStatus('Add at least one layer, a video, or a greeting.', false); return; }
  $('pubBtn').disabled = true;
  const body = {email, name: val('name'), content, send};
  if(curScanDate) body.scan_date = curScanDate;
  const r = await api('POST', '/api/console/biofield-portal', body);
  $('pubBtn').disabled = false;
  if(!r.ok){ setStatus(r.json.error || 'Publish failed.', false); return; }
  const link = $('previewLink');
  if(r.json.url){ link.href = r.json.url; link.style.display='inline-block'; }
  setStatus((r.json.updated ? 'Updated — same link.' : 'Published! New portal link created.')
    + (r.json.emailed ? ' Email sent to the client.' : '') + (r.json.url ? '  ' + r.json.url : ''), true);
}

function setStatus(msg, ok){ const s=$('status'); s.textContent=msg; s.className='status '+(ok?'ok':'bad'); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

boot();
</script>
</body>
</html>
