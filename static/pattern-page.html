<!DOCTYPE html><html lang="en"><head>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stress Pattern · Dr. Glen Swartwout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Raleway:wght@600;700&display=swap" rel="stylesheet">
  <style>
    /* Canonical funnel palette (dark default); theme-toggle.js redefines these same
       names for [data-theme="light"], so the page adapts to either theme. */
    :root{ --bg:#0a150d; --surface:#111f16; --surface-2:#162318; --border:#21472d;
      --cream:#fdf4d8; --muted:#a89870; --gold:#d4a843; --green:#3d8a52; }
    body{margin:0;background:var(--bg);color:var(--cream);font-family:'Open Sans',sans-serif;line-height:1.55}
    .wrap{max-width:760px;margin:0 auto;padding:32px 20px 80px}
    h1{font-family:Raleway,sans-serif;font-size:1.7rem;margin:.2rem 0;color:var(--cream)}
    .full{color:var(--muted);font-size:1rem;margin:0 0 .6rem}
    .badge{display:inline-block;font-size:.72rem;letter-spacing:.04em;text-transform:uppercase;
      background:var(--green);color:#fff;border-radius:10px;padding:2px 9px;margin-bottom:14px}
    .desc{font-size:1.02rem;margin:.4rem 0 1.4rem;color:var(--cream)}
    .sgroup{margin:1rem 0}
    .sgroup h3{font-family:Raleway,sans-serif;font-size:1rem;margin:.2rem 0 .5rem;color:var(--cream)}
    .schips{display:flex;flex-wrap:wrap;gap:6px}
    .schip{background:var(--surface-2);border:1px solid var(--border);color:var(--cream);
      border-radius:13px;padding:4px 11px;font-size:.86rem}
    .schip.primary{border-color:var(--green)}
    a.schip-link{text-decoration:none;color:var(--cream);cursor:pointer}
    a.schip-link:hover{border-color:var(--gold);color:var(--gold)}
    .rx-sec{margin-top:1.6rem}
    .rx-sec h3{font-family:Raleway,sans-serif;font-size:1.05rem;margin:.2rem 0 .5rem;color:var(--cream)}
    ul.rx{list-style:none;margin:0;padding:0}
    ul.rx li{padding:6px 0;font-size:.95rem;border-top:1px solid var(--border)}
    ul.rx li:first-child{border-top:none}
    ul.rx a.rx-link{color:var(--green);text-decoration:none;border-bottom:1px dashed var(--green)}
    ul.rx a.rx-link:hover{color:var(--gold);border-bottom-color:var(--gold)}
    .rx-note{color:var(--muted);font-size:.8rem;margin-top:.5rem}
    .sf-sec{margin-top:1.6rem}
    .sf-sec h3{font-family:Raleway,sans-serif;font-size:1.05rem;margin:.2rem 0 .3rem;color:var(--cream)}
    .sf-intro{color:var(--muted);font-size:.82rem;margin:0 0 .6rem}
    .sf-cat{color:var(--muted);font-size:.72rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin:.6rem 0 .2rem}
    ul.sf{list-style:none;margin:0;padding:0}
    ul.sf li{font-size:.86rem;padding:3px 0;line-height:1.5}
    .sf-tier{display:inline-block;font-size:.66rem;font-weight:700;letter-spacing:.03em;text-transform:uppercase;border-radius:6px;padding:1px 6px;margin-right:7px;vertical-align:1px}
    .sf-tier.strong{background:var(--green);color:#08130d}
    .sf-tier.moderate{background:var(--gold);color:#241a05}
    .sf-tier.weak{background:var(--surface-2);color:var(--muted);border:1px solid var(--border)}
    .sf-tier.traditional{background:#4a6b8a;color:#eaf2fb}
    .sf-tier.contested{background:#8a5a3a;color:#fbeee2}
    .sf-name{color:var(--cream);font-weight:600}
    .sf-organ{color:var(--gold);font-size:.76rem}
    .sf-note{color:var(--muted)}
    ul.sf a.sf-src{color:var(--muted);text-decoration:none;border-bottom:1px dotted var(--muted);font-size:.76rem}
    ul.sf a.sf-src:hover{color:var(--gold);border-bottom-color:var(--gold)}
    .back{display:inline-block;margin-bottom:18px;color:var(--muted);text-decoration:none;font-size:.9rem}
    .muted{color:var(--muted)} .hidden{display:none}
  </style>
  <script src="/static/theme-toggle.js"></script>
</head><body>
  <div class="wrap">
    <a class="back" href="/learn/patterns">← All stress patterns</a>
    <div id="pat-loading" class="muted">Loading…</div>
    <div id="pat-notfound" class="hidden muted">We couldn't find that stress pattern. <a href="/learn/patterns">Browse the glossary</a>.</div>
    <div id="pat-body" class="hidden">
      <span id="pat-badge" class="badge hidden"></span>
      <h1 id="pat-title"></h1>
      <p id="pat-full" class="full hidden"></p>
      <p id="pat-desc" class="desc hidden"></p>
      <div id="pat-structs"></div>
      <div id="pat-remedies"></div>
      <div id="pat-stress"></div>
    </div>
  </div>
  <script>
    var STYPE_LABELS = {organ:"Organs",system:"Body systems",function:"Functions",
      emotion:"Emotions",substance:"Substances",immune_cell:"Immune cells",other:"Other"};
    var STYPE_ORDER = ["organ","system","function","emotion","substance","immune_cell","other"];
    function show(id){document.getElementById(id).classList.remove('hidden');}
    function hide(id){document.getElementById(id).classList.add('hidden');}
    var slug = decodeURIComponent(location.pathname.split('/').filter(Boolean).pop() || '');
    fetch('/learn/pattern-data/' + encodeURIComponent(slug), {credentials:'same-origin'})
      .then(function(r){ if(!r.ok) return null; return r.json(); })
      .then(function(d){
        hide('pat-loading');
        if(!d || d.state === 'unknown'){ show('pat-notfound'); return; }
        show('pat-body');
        document.title = (d.name || 'Stress Pattern') + ' · Dr. Glen Swartwout';
        document.getElementById('pat-title').textContent = d.name || d.code || '';
        if(d.full_name && d.full_name !== d.name){ var f=document.getElementById('pat-full'); f.textContent=d.full_name; show('pat-full'); }
        if(d.category){ var b=document.getElementById('pat-badge'); b.textContent=d.category; show('pat-badge'); }
        if(d.description){ var p=document.getElementById('pat-desc'); p.textContent=d.description; show('pat-desc'); }
        var byType = {};
        (d.structures || []).forEach(function(s){ (byType[s.stype||'other']=byType[s.stype||'other']||[]).push(s); });
        var host = document.getElementById('pat-structs');
        var any = false;
        STYPE_ORDER.forEach(function(t){
          var items = byType[t]; if(!items || !items.length) return;
          any = true;
          var g = document.createElement('div'); g.className='sgroup';
          var h = document.createElement('h3'); h.textContent = STYPE_LABELS[t] || t; g.appendChild(h);
          var chips = document.createElement('div'); chips.className='schips';
          items.forEach(function(s){
            var c;
            if(s.clinical_slug){
              // organ that exists in the clinical glossary -> deep-link to its entry
              c = document.createElement('a');
              c.href = '/learn/glossary/organs#' + encodeURIComponent(s.clinical_slug);
              c.className = 'schip schip-link' + (s.is_primary?' primary':'');
            } else {
              c = document.createElement('span'); c.className = 'schip' + (s.is_primary?' primary':'');
            }
            c.textContent = s.structure; chips.appendChild(c);
          });
          g.appendChild(chips); host.appendChild(g);
        });
        if(any){
          var head = document.createElement('h3'); head.style.marginTop='1.4rem';
          head.textContent = 'Body structures & functions involved';
          host.insertBefore(head, host.firstChild);
        }
        // "What may help": mapped formulations, product-linked where resolved.
        var rem = d.remedies || [];
        if(rem.length){
          var sec = document.getElementById('pat-remedies'); sec.className = 'rx-sec';
          var rh = document.createElement('h3'); rh.textContent = 'What may help'; sec.appendChild(rh);
          var ul = document.createElement('ul'); ul.className = 'rx';
          rem.forEach(function(r){
            var li = document.createElement('li');
            if(r.product_slug){
              var a = document.createElement('a'); a.className = 'rx-link';
              a.href = '/begin/product/' + encodeURIComponent(r.product_slug);
              a.target = '_blank'; a.rel = 'noopener'; a.textContent = r.name;
              li.appendChild(a);
            } else {
              li.appendChild(document.createTextNode(r.name));
            }
            ul.appendChild(li);
          });
          sec.appendChild(ul);
          var note = document.createElement('p'); note.className = 'rx-note';
          note.textContent = 'General support associated with this pattern — not a substitute for a personalized Biofield Analysis.';
          sec.appendChild(note);
        }
        // Characteristic stress factors of the organs this pattern involves.
        var sf = d.stress_factors || [];
        if(sf.length){
          var CAT_LABEL={toxin:'Toxins',microbe:'Microbial',emotional:'Emotional (TCM)',physical:'Physical'};
          var CAT_ORDER=['toxin','microbe','emotional','physical'];
          var TIERS={strong:1,moderate:1,weak:1,traditional:1,contested:1};
          var ss=document.getElementById('pat-stress'); ss.className='sf-sec';
          var sh=document.createElement('h3'); sh.textContent='Characteristic stress factors'; ss.appendChild(sh);
          var si=document.createElement('p'); si.className='sf-intro';
          si.textContent='Environmental and constitutional stressors associated with the organs this pattern involves (organ-level reference — not a claim that they cause this pattern).';
          ss.appendChild(si);
          CAT_ORDER.forEach(function(cat){
            var rows=sf.filter(function(f){return (f.category||'')===cat;});
            if(!rows.length) return;
            var cl=document.createElement('div'); cl.className='sf-cat'; cl.textContent=CAT_LABEL[cat]||cat; ss.appendChild(cl);
            var ul2=document.createElement('ul'); ul2.className='sf';
            rows.forEach(function(t){
              var li=document.createElement('li');
              var tier=(t.tier||'').toLowerCase(); if(!TIERS[tier]) tier='weak';
              var b=document.createElement('span'); b.className='sf-tier '+tier; b.textContent=t.tier||'—'; li.appendChild(b);
              var nm=document.createElement('span'); nm.className='sf-name'; nm.textContent=t.factor||''; li.appendChild(nm);
              if(t.organs && t.organs.length){ var og=document.createElement('span'); og.className='sf-organ'; og.textContent=' (via '+t.organs.join(', ')+')'; li.appendChild(og); }
              if(t.note){ li.appendChild(document.createTextNode(' — ')); var nt=document.createElement('span'); nt.className='sf-note'; nt.textContent=t.note; li.appendChild(nt); }
              if(t.url){ li.appendChild(document.createTextNode(' ')); var a2=document.createElement('a'); a2.className='sf-src'; a2.href=t.url; a2.target='_blank'; a2.rel='noopener'; a2.textContent='['+(t.source||'source')+']'; li.appendChild(a2); }
              ul2.appendChild(li);
            });
            ss.appendChild(ul2);
          });
        }
      })
      .catch(function(){ hide('pat-loading'); show('pat-notfound'); });
  </script>
</body></html>
