// Task 5: client clinical intake, gating the Biofield Consult slot-picker.
// Renders the declarative form from GET /api/intake/form, prefills from
// GET /api/intake/state, autosaves via POST /api/intake/save-draft (1.2s
// debounce after any field change), and on POST /api/intake/submit success
// (or a 409 already_submitted) reveals the existing consult-sched/consult-slots
// UI and re-runs consultSchedule() to load times immediately. All labels/help/
// options come from Glen's own INTAKE_FORM (dashboard/intake.py) but are still
// built via createElement/textContent only — never innerHTML — matching the
// coaches-card pattern above.
async function initConsultIntakeCard(){
  const schedBtn = document.getElementById("consult-sched");
  const host = document.getElementById("consult-intake-host");
  if(!schedBtn || !host) return; // consult card isn't in the "ready" state
  let s = {};
  try{
    const r = await fetch(`/api/consult/state?token=${encodeURIComponent(seg)}`);
    s = r.ok ? await r.json() : {};
  }catch(e){ s = {}; }
  const slotsBox = document.getElementById("consult-slots");
  if(s && s.intake_submitted){
    host.hidden = true; host.innerHTML = "";
    schedBtn.hidden = false;
    if(slotsBox) slotsBox.hidden = false;
    return;
  }
  host.hidden = false;
  schedBtn.hidden = true;
  if(slotsBox) slotsBox.hidden = true;
  renderIntakeForm(host, seg, function(){
    host.hidden = true;
    host.innerHTML = "";
    schedBtn.hidden = false;
    if(slotsBox) slotsBox.hidden = false;
    consultSchedule();
  });
}

async function renderIntakeForm(host, tokenVal, onDone){
  host.innerHTML = "";
  const loading = document.createElement("p");
  loading.className = "muted small";
  loading.textContent = "Loading your intake form…";
  host.appendChild(loading);

  let formDef = null, stateData = null;
  try{
    const results = await Promise.all([
      fetch(`/api/intake/form?token=${encodeURIComponent(tokenVal)}`),
      fetch(`/api/intake/state?token=${encodeURIComponent(tokenVal)}`),
    ]);
    formDef = results[0].ok ? await results[0].json() : null;
    stateData = results[1].ok ? await results[1].json() : null;
  }catch(e){ /* handled by the null-checks below */ }

  host.innerHTML = "";

  if(stateData && stateData.submitted){ if(onDone) onDone(); return; }
  if(!formDef || !Array.isArray(formDef.sections)){
    const err = document.createElement("p");
    err.className = "err small";
    err.textContent = "We could not load your intake form. Please refresh the page.";
    host.appendChild(err);
    return;
  }

  const answers = (stateData && stateData.answers) || {};
  const getters = {};   // field id -> () => current value
  const fieldEls = {};  // field id -> element to highlight on a 400

  const title = document.createElement("h2");
  title.textContent = "Before your consult";
  host.appendChild(title);
  const intro = document.createElement("p");
  intro.className = "muted small";
  intro.textContent = "Please complete your intake so Dr. Glen can prepare for your consult.";
  host.appendChild(intro);

  const collectAnswers = ()=>{
    const out = {};
    Object.keys(getters).forEach(fid => { out[fid] = getters[fid](); });
    return out;
  };

  let saveTimer = null;
  const scheduleSave = ()=>{
    if(saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(async ()=>{
      try{
        await fetch(`/api/intake/save-draft?token=${encodeURIComponent(tokenVal)}`, {
          method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({answers: collectAnswers()}),
        });
      }catch(e){ /* best-effort autosave; Submit re-sends everything anyway */ }
    }, 1200);
  };

  formDef.sections.forEach(sec => {
    const secWrap = document.createElement("div");
    secWrap.className = "intake-sec";
    const h3 = document.createElement("h3");
    h3.textContent = sec.title || "";
    secWrap.appendChild(h3);
    (sec.fields || []).forEach(f => {
      secWrap.appendChild(renderIntakeField(f, answers[f.id], getters, fieldEls, scheduleSave));
    });
    host.appendChild(secWrap);
  });

  const errMsg = document.createElement("p");
  errMsg.className = "err small";
  errMsg.hidden = true;
  host.appendChild(errMsg);

  const submitBtn = document.createElement("button");
  submitBtn.type = "button";
  submitBtn.className = "btn full";
  submitBtn.style.marginTop = ".4rem";
  submitBtn.textContent = "Submit my intake";
  submitBtn.addEventListener("click", async ()=>{
    submitBtn.disabled = true;
    errMsg.hidden = true;
    Object.keys(fieldEls).forEach(fid => {
      const el = fieldEls[fid];
      if(el && el.classList) el.classList.remove("intake-err");
    });
    if(saveTimer) clearTimeout(saveTimer);
    let r, d;
    try{
      r = await fetch(`/api/intake/submit?token=${encodeURIComponent(tokenVal)}`, {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({answers: collectAnswers()}),
      });
      d = await r.json().catch(()=>({}));
    }catch(e){ d = {}; }
    if(r && r.ok){ if(onDone) onDone(); return; }
    if(r && r.status === 409 && d && d.error === "already_submitted"){ if(onDone) onDone(); return; }
    if(r && r.status === 400 && d && Array.isArray(d.errors)){
      errMsg.textContent = "Please complete the highlighted fields.";
      errMsg.hidden = false;
      d.errors.forEach(fid => {
        const el = fieldEls[fid];
        if(el && el.classList) el.classList.add("intake-err");
      });
      submitBtn.disabled = false;
      return;
    }
    errMsg.textContent = "Something went wrong saving your intake. Please try again.";
    errMsg.hidden = false;
    submitBtn.disabled = false;
  });
  host.appendChild(submitBtn);
}

// Builds one field's markup for any INTAKE_FORM field type and wires its
// getter (into `getters`) + change listener (debounced autosave via
// `onChange`). Returns the wrapper element to append to the section.
function renderIntakeField(f, val, getters, fieldEls, onChange){
  const ftype = f.type;

  if(ftype === "consent"){
    const wrap = document.createElement("div");
    wrap.className = "intake-consent-wrap";
    const row = document.createElement("label");
    row.className = "intake-consent";
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = !!(val && val.agreed);
    cb.addEventListener("change", onChange);
    row.appendChild(cb);
    const span = document.createElement("span");
    span.textContent = f.label + (f.required ? " *" : "");
    row.appendChild(span);
    wrap.appendChild(row);

    const sigLabel = document.createElement("label");
    sigLabel.className = "intake-sublabel";
    sigLabel.textContent = "Signature (type your full name)";
    wrap.appendChild(sigLabel);
    const sig = document.createElement("input");
    sig.type = "text";
    sig.className = "intake-input";
    sig.value = (val && val.signature) || "";
    sig.addEventListener("input", onChange);
    wrap.appendChild(sig);

    const dateLabel = document.createElement("label");
    dateLabel.className = "intake-sublabel";
    dateLabel.textContent = "Date";
    wrap.appendChild(dateLabel);
    const dt = document.createElement("input");
    dt.type = "date";
    dt.className = "intake-input";
    dt.value = (val && val.date) || "";
    dt.addEventListener("change", onChange);
    wrap.appendChild(dt);

    getters[f.id] = ()=> ({agreed: cb.checked, signature: sig.value, date: dt.value});
    fieldEls[f.id] = wrap;
    return wrap;
  }

  const wrap = document.createElement("div");
  wrap.className = "intake-field";
  const label = document.createElement("label");
  label.textContent = f.label + (f.required ? " *" : "");
  wrap.appendChild(label);
  if(f.help){
    const help = document.createElement("p");
    help.className = "intake-help";
    help.textContent = f.help;
    wrap.appendChild(help);
  }

  if(ftype === "table"){
    const tableWrap = document.createElement("div");
    tableWrap.className = "intake-table-wrap";
    const rowsBox = document.createElement("div");
    tableWrap.appendChild(rowsBox);
    const rows = [];
    const columns = f.columns || [];

    const addRow = (rowVal)=>{
      const row = document.createElement("div");
      row.className = "intake-row";
      const colGetters = {};
      columns.forEach(col => {
        const colWrap = document.createElement("div");
        colWrap.className = "intake-col";
        const colLabel = document.createElement("label");
        colLabel.textContent = col.label || "";
        colWrap.appendChild(colLabel);
        let input;
        if(col.type === "single_choice"){
          input = document.createElement("select");
          input.className = "intake-input";
          const blank = document.createElement("option");
          blank.value = ""; blank.textContent = "Select…";
          input.appendChild(blank);
          (col.options || []).forEach(opt => {
            const o = document.createElement("option");
            o.value = opt; o.textContent = opt;
            input.appendChild(o);
          });
          input.value = (rowVal && rowVal[col.id]) || "";
          input.addEventListener("change", onChange);
          colGetters[col.id] = ()=> input.value || "";
        } else if(col.type === "number"){
          input = document.createElement("input");
          input.type = "number";
          input.className = "intake-input";
          input.value = (rowVal && rowVal[col.id] != null) ? rowVal[col.id] : "";
          input.addEventListener("input", onChange);
          colGetters[col.id] = ()=> (input.value === "" ? null : Number(input.value));
        } else {
          input = document.createElement("input");
          input.type = "text";
          input.className = "intake-input";
          input.value = (rowVal && rowVal[col.id]) || "";
          input.addEventListener("input", onChange);
          colGetters[col.id] = ()=> input.value;
        }
        colWrap.appendChild(input);
        row.appendChild(colWrap);
      });
      const rowEntry = {getters: colGetters};
      const removeBtn = document.createElement("button");
      removeBtn.type = "button";
      removeBtn.className = "btn ghost";
      removeBtn.style.cssText = "padding:6px 12px;font-size:.82rem;flex:0 0 auto;align-self:center";
      removeBtn.textContent = "Remove";
      removeBtn.addEventListener("click", ()=>{
        const idx = rows.indexOf(rowEntry);
        if(idx > -1) rows.splice(idx, 1);
        row.remove();
        onChange();
      });
      row.appendChild(removeBtn);
      rows.push(rowEntry);
      rowsBox.appendChild(row);
    };

    const addBtn = document.createElement("button");
    addBtn.type = "button";
    addBtn.className = "btn ghost";
    addBtn.style.cssText = "margin-top:.5rem;padding:7px 14px;font-size:.85rem";
    addBtn.textContent = "Add row";
    addBtn.addEventListener("click", ()=> addRow(null));
    tableWrap.appendChild(addBtn);
    (Array.isArray(val) ? val : []).forEach(rv => addRow(rv));

    wrap.appendChild(tableWrap);
    getters[f.id] = ()=> rows.map(re => {
      const obj = {};
      Object.keys(re.getters).forEach(cid => { obj[cid] = re.getters[cid](); });
      return obj;
    });
    fieldEls[f.id] = tableWrap;
    return wrap;
  }

  if(ftype === "scale"){
    const group = document.createElement("div");
    group.className = "intake-scale";
    (f.options || []).forEach(opt => {
      const optLabel = document.createElement("label");
      optLabel.className = "intake-scale-opt";
      const radio = document.createElement("input");
      radio.type = "radio";
      radio.name = "intake-scale-" + f.id;
      radio.value = String(opt.value);
      if(val === opt.value) radio.checked = true;
      radio.addEventListener("change", onChange);
      optLabel.appendChild(radio);
      const span = document.createElement("span");
      span.textContent = opt.value + ": " + opt.label;
      optLabel.appendChild(span);
      group.appendChild(optLabel);
    });
    wrap.appendChild(group);
    getters[f.id] = ()=>{
      const checked = group.querySelector("input[type=radio]:checked");
      return checked ? Number(checked.value) : null;
    };
    fieldEls[f.id] = group;
    return wrap;
  }

  if(ftype === "single_choice"){
    const select = document.createElement("select");
    select.className = "intake-input";
    const blank = document.createElement("option");
    blank.value = ""; blank.textContent = "Select…";
    select.appendChild(blank);
    (f.options || []).forEach(opt => {
      const o = document.createElement("option");
      o.value = opt; o.textContent = opt;
      select.appendChild(o);
    });
    select.value = (typeof val === "string") ? val : "";
    select.addEventListener("change", onChange);
    wrap.appendChild(select);
    getters[f.id] = ()=> select.value || "";
    fieldEls[f.id] = select;
    return wrap;
  }

  if(ftype === "textarea"){
    const ta = document.createElement("textarea");
    ta.className = "intake-input";
    ta.rows = 3;
    ta.value = (typeof val === "string") ? val : "";
    ta.addEventListener("input", onChange);
    wrap.appendChild(ta);
    getters[f.id] = ()=> ta.value;
    fieldEls[f.id] = ta;
    return wrap;
  }

  // text / email / tel / date / number
  const input = document.createElement("input");
  input.className = "intake-input";
  let inputType = "text";
  if(ftype === "email" || ftype === "tel" || ftype === "date" || ftype === "number") inputType = ftype;
  input.type = inputType;
  if(ftype === "number"){
    input.value = (val != null) ? val : "";
    input.addEventListener("input", onChange);
    getters[f.id] = ()=> (input.value === "" ? null : Number(input.value));
  } else {
    input.value = (typeof val === "string") ? val : "";
    input.addEventListener("input", onChange);
    getters[f.id] = ()=> input.value;
  }
  wrap.appendChild(input);
  fieldEls[f.id] = input;
  return wrap;
}
<!-- END intake card script -->

// Welcome call (onboarding) card. Member-gated by its own /api/onboarding/state
// fetch (see the placeholder in render()) rather than by v.onboarding, since
// portal_view.py can't check membership. Mirrors the consult card's
// schedule/book/confirm pattern (consultSchedule/consultBook above).
async function initOnboardingCard(){
  const card = document.getElementById("onboarding-card");
  if(!card) return;
  let d = {};
  try{
    const r = await fetch(`/api/onboarding/state?token=${encodeURIComponent(seg)}`);
    d = r.ok ? await r.json() : {};
  }catch(e){ d = {}; }
  if(!d || !d.eligible){ card.hidden = true; card.innerHTML = ""; return; }
  card.hidden = false;
  renderOnboardingCard(card, d.booked);
}

function renderOnboardingCard(card, booked){
  if(booked){
    const when = (booked.start_ts||"").replace("T"," ");
    card.innerHTML = `<h2>Welcome call</h2>
      <p class="muted">Your welcome call with Rae is booked for <b>${esc(when)} HST</b>. This is a phone call, and Rae will call you at your appointment time.</p>`;
    return;
  }
  card.innerHTML = `<h2>Book your welcome call</h2>
    <p class="muted">A free 15-minute phone call with Rae to welcome you and answer your first questions. Rae will call you.</p>
    <div id="onboarding-slots" style="margin-top:.6rem"><p class="muted small">Loading available times…</p></div>`;
  loadOnboardingSlots();
}

async function loadOnboardingSlots(){
  const box = document.getElementById("onboarding-slots");
  if(!box) return;
  let d = {};
  try{
    const r = await fetch(`/api/onboarding/availability?token=${encodeURIComponent(seg)}`);
    d = r.ok ? await r.json() : {};
  }catch(e){ d = {}; }
  const slots = d.slots || [];
  box.innerHTML = slots.length
    ? slots.map(s => `<button class="btn" style="margin:.2rem .3rem .2rem 0" onclick="onboardingBook('${esc(s)}')">${esc(s.replace("T"," "))}</button>`).join("")
    : `<p class="muted small">No open times right now. Please check back soon.</p>`;
}

async function onboardingBook(start_ts){
  let d = {};
  try{
    const r = await fetch(`/api/onboarding/book?token=${encodeURIComponent(seg)}`, {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({start_ts}),
    });
    d = await r.json();
    if(d && d.ok){
      const card = document.getElementById("onboarding-card");
      if(card) renderOnboardingCard(card, {start_ts});
      return;
    }
  }catch(e){ d = {}; }
  alert("That time is no longer available. Please pick another.");
  loadOnboardingSlots();
}

// Meet your coaches (coaching arc, Task 4). Member-gated by its own
// /api/community/coaches fetch (see the placeholder in render()), mirroring
// the onboarding card's own-fetch pattern above. Server strings (name, focus)
// are set via textContent only, never innerHTML. The intro video is rendered
// as a <video> element for self-hosted paths (e.g. /portal-asset/coach-<hex>.mp4)
// or an <iframe> for an embeddable third-party link (e.g. Rumble); either way
// only a validated http(s)/relative url is ever assigned as the src.
async function initCoachesCard(){
  const card = document.getElementById("coaches-card");
  if(!card) return;
  let d = {};
  try{
    const r = await fetch(`/api/community/coaches?token=${encodeURIComponent(token)}`);
    d = r.ok ? await r.json() : {};
  }catch(e){ d = {}; }
  const hasCoaches = Array.isArray(d.coaches) && d.coaches.length > 0;
  if(!d || !d.eligible || (!hasCoaches && !d.all_full && !d.matched)){
    card.hidden = true; card.innerHTML = ""; return;
  }
  card.hidden = false;
  renderCoachesCard(card, d);
}

function safeMediaUrl(url){
  // Only allow http(s) absolute urls or site-relative paths (defense-in-depth,
  // mirrors renderSuggestion's safeUrl pattern above).
  if(typeof url !== "string" || !url) return "";
  if(/^https?:\/\//i.test(url)) return url;
  if(url.charAt(0) === "/") return url;
  return "";
}

function isSelfHostedVideoFile(url){
  return /\.(mp4|mov|webm|m4v)(\?|#|$)/i.test(url);
}

function renderCoachesCard(card, d){
  card.innerHTML = "";
  const h = document.createElement("h2");
  h.textContent = "Meet your coaches";
  card.appendChild(h);
  const coaches = Array.isArray(d.coaches) ? d.coaches : [];
  const matched = !!d.matched;
  if(matched){
    const m = document.createElement("p");
    m.className = "muted small";
    m.textContent = "You are matched with a coach.";
    card.appendChild(m);
    const threadHost = document.createElement("div");
    threadHost.id = "coach-thread-panel";
    card.appendChild(threadHost);
    loadCoachThread(threadHost);
  }
  const appMap = {};
  (Array.isArray(d.applications) ? d.applications : []).forEach(function(a){
    if(a && a.ref) appMap[a.ref] = a.status;
  });
  coaches.forEach(function(c){
    if(!c || typeof c !== "object") return;
    const row = document.createElement("div");
    row.className = "coach-row";
    row.style.margin = ".8rem 0";
    const name = document.createElement("div");
    name.style.fontWeight = "600";
    name.textContent = c.name || "";
    row.appendChild(name);
    if(c.focus){
      const focus = document.createElement("div");
      focus.className = "muted small";
      focus.textContent = c.focus;
      row.appendChild(focus);
    }
    const url = safeMediaUrl(c.intro_video_url);
    if(url){
      let media;
      if(url.charAt(0) === "/" || isSelfHostedVideoFile(url)){
        media = document.createElement("video");
        media.src = url;
        media.controls = true;
      } else {
        media = document.createElement("iframe");
        media.src = url;
        media.setAttribute("allowfullscreen", "");
        media.style.border = "0";
      }
      media.style.width = "100%";
      media.style.maxWidth = "360px";
      media.style.display = "block";
      media.style.marginTop = ".4rem";
      row.appendChild(media);
    }
    if(!matched){
      renderCoachApplyControl(row, c, appMap);
    }
    card.appendChild(row);
  });
  if(!coaches.length && !matched && !d.all_full){
    const note = document.createElement("p");
    note.className = "muted small";
    note.textContent = "No coaches are available to show right now.";
    card.appendChild(note);
  }
  renderWaitlistAndUpsell(card, d);
}
<!-- END coaches script -->

<!-- BEGIN coach-apply script -->
// Per-coach apply control (note + optional intro video), the "all coaches
// full" waitlist button, and the paid-tier upsell offer. Members may apply
// to multiple coaches; a coach's apply control is only suppressed once the
// member is matched (globally) or has already applied to that specific
// coach (per-ref, from d.applications). All server-derived strings are
// still set via textContent only in renderCoachesCard above; nothing here
// ever assigns HTML from server data.

function renderCoachApplyControl(row, c, appMap){
  const ref = c.ref || "";
  const status = appMap[ref];
  if(status){
    const s = document.createElement("p");
    s.className = "muted small";
    s.textContent = status === "accepted" ? "Matched" : "Applied, waiting for a reply";
    row.appendChild(s);
    return;
  }

  const toggle = document.createElement("button");
  toggle.type = "button";
  toggle.className = "btn ghost";
  toggle.style.marginTop = ".4rem";
  toggle.textContent = "Apply to this coach";

  const form = document.createElement("div");
  form.style.marginTop = ".5rem";
  form.hidden = true;

  const note = document.createElement("textarea");
  note.rows = 3;
  note.placeholder = "What are you working on?";
  note.style.cssText = "width:100%;background:var(--card2);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:.9rem;font-family:inherit;resize:vertical";
  form.appendChild(note);

  const videoLabel = document.createElement("label");
  videoLabel.className = "muted small";
  videoLabel.style.display = "block";
  videoLabel.style.marginTop = ".4rem";
  videoLabel.textContent = "Optional: a short video about what you are looking for help with";
  form.appendChild(videoLabel);

  const videoInput = document.createElement("input");
  videoInput.type = "file";
  videoInput.accept = "video/mp4,video/*";
  videoInput.style.display = "block";
  videoInput.style.marginTop = ".2rem";
  form.appendChild(videoInput);

  const err = document.createElement("p");
  err.className = "small err";
  err.hidden = true;
  form.appendChild(err);

  const submit = document.createElement("button");
  submit.type = "button";
  submit.className = "btn full";
  submit.style.marginTop = ".5rem";
  submit.textContent = "Send application";
  submit.addEventListener("click", function(){
    submitCoachApply(ref, note, videoInput, submit, err);
  });
  form.appendChild(submit);

  toggle.addEventListener("click", function(){
    form.hidden = !form.hidden;
    toggle.textContent = form.hidden ? "Apply to this coach" : "Cancel";
  });

  row.appendChild(toggle);
  row.appendChild(form);
}

async function submitCoachApply(ref, noteEl, videoInput, btn, err){
  err.hidden = true;
  const label = btn.textContent;
  btn.disabled = true; btn.textContent = "Sending…";
  try{
    const fd = new FormData();
    fd.append("coach_ref", ref);
    fd.append("note", noteEl.value || "");
    const f = videoInput.files && videoInput.files[0];
    if(f) fd.append("video", f);
    const r = await fetch(`/api/community/coach-request?token=${encodeURIComponent(token)}`, {
      method: "POST",
      body: fd,
    });
    if(!r.ok) throw new Error();
    await initCoachesCard();
  }catch(e){
    err.textContent = "Something went wrong. Please try again.";
    err.hidden = false;
    btn.disabled = false; btn.textContent = label;
  }
}

function renderWaitlistAndUpsell(card, d){
  if(!d.all_full) return;

  const wl = document.createElement("div");
  wl.style.marginTop = "1rem";
  const wlBtn = document.createElement("button");
  wlBtn.type = "button";
  wlBtn.className = "btn full";
  wlBtn.textContent = "Join the waitlist";
  const wlMsg = document.createElement("p");
  wlMsg.className = "muted small";
  wlMsg.hidden = true;
  wlBtn.addEventListener("click", async function(){
    wlBtn.disabled = true; const label = wlBtn.textContent; wlBtn.textContent = "Joining…";
    try{
      const r = await fetch(`/api/community/coach-waitlist?token=${encodeURIComponent(token)}`, {method: "POST"});
      if(!r.ok) throw new Error();
      wlMsg.textContent = "You are on the waitlist. We will let you know as soon as a coach opens up.";
      wlMsg.hidden = false;
      wlBtn.hidden = true;
    }catch(e){
      wlBtn.disabled = false; wlBtn.textContent = label;
    }
  });
  wl.appendChild(wlBtn);
  wl.appendChild(wlMsg);
  card.appendChild(wl);

  const upsell = document.createElement("div");
  upsell.className = "card";
  upsell.style.marginTop = "1rem";
  const uh = document.createElement("h3");
  uh.style.margin = "0 0 .4rem";
  uh.textContent = "Start coaching now";
  upsell.appendChild(uh);
  const up = document.createElement("p");
  up.className = "muted small";
  up.textContent = "Our student coaches are full right now. Join the waitlist, or start coaching now with Rae ($100 a month, includes an EVOX session) or Dr. Glen ($200 a month, includes a Causal Biofield Analysis).";
  upsell.appendChild(up);
  upsell.appendChild(renderCoachingSubscribeOffer("rae", "Rae, $100 a month, includes an EVOX session"));
  upsell.appendChild(renderCoachingSubscribeOffer("glen", "Dr. Glen, $200 a month, includes a Causal Biofield Analysis"));
  upsell.appendChild(renderCoachingCancelLink());
  card.appendChild(upsell);
}

function renderCoachingSubscribeOffer(tier, label){
  const row = document.createElement("div");
  row.style.marginTop = ".6rem";
  const l = document.createElement("div");
  l.className = "muted small";
  l.textContent = label;
  row.appendChild(l);
  const btn = document.createElement("button");
  btn.type = "button";
  btn.className = "btn full";
  btn.style.marginTop = ".3rem";
  btn.textContent = "Subscribe";
  const msg = document.createElement("p");
  msg.className = "muted small";
  msg.hidden = true;
  btn.addEventListener("click", function(){ subscribeCoaching(tier, btn, msg); });
  row.appendChild(btn);
  row.appendChild(msg);
  return row;
}

async function subscribeCoaching(tier, btn, msg){
  btn.disabled = true;
  const label = btn.textContent;
  msg.textContent = "Redirecting to secure checkout...";
  msg.hidden = false;
  try{
    const r = await fetch(`/api/community/coach-subscribe?token=${encodeURIComponent(token)}`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({tier: tier}),
    });
    const data = await r.json();
    if(!r.ok || !data.ok || !data.url) throw new Error();
    window.location = data.url;
  }catch(e){
    btn.disabled = false; btn.textContent = label;
    msg.textContent = "Something went wrong. Please try again.";
    msg.hidden = false;
  }
}

function renderCoachingCancelLink(){
  const row = document.createElement("div");
  row.style.marginTop = ".8rem";
  const btn = document.createElement("button");
  btn.type = "button";
  btn.className = "muted small";
  btn.style.background = "none";
  btn.style.border = "none";
  btn.style.textDecoration = "underline";
  btn.style.cursor = "pointer";
  btn.style.padding = "0";
  btn.textContent = "Cancel coaching";
  const msg = document.createElement("p");
  msg.className = "muted small";
  msg.hidden = true;
  btn.addEventListener("click", async function(){
    btn.disabled = true;
    try{
      const r = await fetch(`/api/community/coach-subscribe/cancel?token=${encodeURIComponent(token)}`, {method: "POST"});
      const data = await r.json();
      if(!r.ok || !data.ok) throw new Error();
      msg.textContent = "Your coaching is canceled.";
      msg.hidden = false;
      btn.hidden = true;
    }catch(e){
      btn.disabled = false;
      msg.textContent = "Something went wrong. Please try again.";
      msg.hidden = false;
    }
  });
  row.appendChild(btn);
  row.appendChild(msg);
  return row;
}
<!-- END coach-apply script -->

<!-- BEGIN coach-thread member script -->
// 1:1 coaching thread panel for a matched member (Task 5). Renders below the
// "You are matched with a coach." line in renderCoachesCard's matched branch.
// All coach/member message bodies are untrusted server strings and are set
// via textContent only, mirroring the rest of this file's pattern.
async function loadCoachThread(host){
  let d = {};
  try{
    const r = await fetch(`/api/coach-thread/member?token=${encodeURIComponent(token)}`);
    d = r.ok ? await r.json() : {};
  }catch(e){ d = {}; }
  renderCoachThreadPanel(host, d);
}

function renderCoachThreadPanel(host, d){
  host.innerHTML = "";
  host.style.marginTop = "1rem";

  if(d.status === "blocked"){
    const note = document.createElement("p");
    note.className = "muted small";
    note.textContent = "This coaching conversation has ended.";
    host.appendChild(note);
    return;
  }

  const heading = document.createElement("h3");
  heading.style.margin = "0 0 .4rem";
  heading.textContent = d.coach_name || "Your coach";
  host.appendChild(heading);

  const messages = Array.isArray(d.messages) ? d.messages : [];
  const list = document.createElement("div");
  list.style.marginBottom = ".6rem";
  if(!messages.length){
    const empty = document.createElement("p");
    empty.className = "muted small";
    empty.textContent = "No messages yet. Say hello.";
    list.appendChild(empty);
  }
  messages.forEach(function(msg){
    if(!msg || typeof msg !== "object") return;
    const row = document.createElement("div");
    row.className = "coach-row";
    row.style.margin = ".4rem 0";
    const who = document.createElement("div");
    who.className = "muted small";
    who.style.fontWeight = "600";
    who.textContent = msg.sender_role === "member" ? "You" : (d.coach_name || "Your coach");
    row.appendChild(who);
    const body = document.createElement("div");
    body.className = "small";
    body.textContent = msg.body || "";
    row.appendChild(body);
    list.appendChild(row);
  });
  host.appendChild(list);

  const err = document.createElement("p");
  err.className = "small err";
  err.hidden = true;

  if(d.can_post){
    const compose = document.createElement("textarea");
    compose.rows = 3;
    compose.placeholder = "Write a message to your coach";
    compose.style.cssText = "width:100%;background:var(--card2);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:.9rem;font-family:inherit;resize:vertical";
    host.appendChild(compose);
    host.appendChild(err);

    const sendBtn = document.createElement("button");
    sendBtn.type = "button";
    sendBtn.className = "btn full";
    sendBtn.style.marginTop = ".4rem";
    sendBtn.textContent = "Send";
    sendBtn.addEventListener("click", function(){
      sendCoachMessage(host, compose, sendBtn, err);
    });
    host.appendChild(sendBtn);
  }

  const linksRow = document.createElement("div");
  linksRow.style.marginTop = ".8rem";

  const blockBtn = document.createElement("button");
  blockBtn.type = "button";
  blockBtn.className = "muted small";
  blockBtn.style.background = "none";
  blockBtn.style.border = "none";
  blockBtn.style.textDecoration = "underline";
  blockBtn.style.cursor = "pointer";
  blockBtn.style.padding = "0";
  blockBtn.style.marginRight = "1rem";
  blockBtn.textContent = "Block this coach";
  blockBtn.addEventListener("click", function(){ blockCoachThread(host, blockBtn); });
  linksRow.appendChild(blockBtn);

  const reportBtn = document.createElement("button");
  reportBtn.type = "button";
  reportBtn.className = "muted small";
  reportBtn.style.background = "none";
  reportBtn.style.border = "none";
  reportBtn.style.textDecoration = "underline";
  reportBtn.style.cursor = "pointer";
  reportBtn.style.padding = "0";
  reportBtn.textContent = "Report a concern";
  reportBtn.addEventListener("click", function(){ reportCoachThread(reportBtn); });
  linksRow.appendChild(reportBtn);

  host.appendChild(linksRow);
}

async function sendCoachMessage(host, compose, btn, err){
  err.hidden = true;
  const body = (compose.value || "").trim();
  if(!body) return;
  const label = btn.textContent;
  btn.disabled = true; btn.textContent = "Sending…";
  try{
    const r = await fetch(`/api/coach-thread/member/message?token=${encodeURIComponent(token)}`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({body: body}),
    });
    if(!r.ok) throw new Error();
    compose.value = "";
    await loadCoachThread(host);
  }catch(e){
    err.textContent = "Something went wrong. Please try again.";
    err.hidden = false;
    btn.disabled = false; btn.textContent = label;
  }
}

async function blockCoachThread(host, btn){
  if(!window.confirm("End this coaching pairing? This cannot be undone.")) return;
  btn.disabled = true;
  try{
    const r = await fetch(`/api/coach-thread/member/block?token=${encodeURIComponent(token)}`, {method: "POST"});
    const data = await r.json();
    if(!r.ok || !data.ok) throw new Error();

async function initPeerCard(){

}

async function peerInterest(host, memberRef, kind, connectBtn, skipBtn, msg, err, blockBtn){
  err.hidden = true;
  connectBtn.disabled = true; skipBtn.disabled = true;
  if(blockBtn) blockBtn.disabled = true;
  try{
    const r = await fetch(`/api/peer/interest?token=${encodeURIComponent(token)}`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({member_ref: memberRef, kind: kind}),
    });
    const data = r.ok ? await r.json() : {};
    if(!r.ok || !data.ok) throw new Error();
    if(kind === "connect"){
      connectBtn.hidden = true; skipBtn.hidden = true;
      if(blockBtn) blockBtn.hidden = true;
      if(data.matched){
        msg.textContent = "You are connected.";
        msg.hidden = false;
        const connHost = document.getElementById("peer-connections-host");
        if(connHost) loadPeerConnections(connHost);
      } else {
        msg.textContent = "We will let you know if it is mutual.";
        msg.hidden = false;
      }
    } else {
      await loadPeerProposal(host);
    }
  }catch(e){
    err.textContent = "Something went wrong. Please try again.";
    err.hidden = false;
    connectBtn.disabled = false; skipBtn.disabled = false;
    if(blockBtn) blockBtn.disabled = false;
  }
}

async function acceptRecommendation(){

  // merges the items into the reorder list. One-shot latch (disabled before any

async function reorderItem(btn){
  // Task 6b: per-row "Reorder" button on the "Your Remedies" module now posts
  // THIS row's slug+qty, so clicking it reorders that product — not the whole
  // practitioner-curated cart. The stepper next to it now actually drives the
  // sent qty (previously display-only). Still add-then-confirm, never a
  // silent charge: the checkout endpoint returns a live Stripe Checkout URL —
  // the actual charge only happens if the client confirms on Stripe's hosted
  // page. One-shot latch: disabled immediately on click (before any await),
  // so a double-click or a slow network can't double-fire it. (This codebase
  // has been bitten by double-fire before — see feedback_print_once_guard.)
  if(btn.disabled) return;
  btn.disabled = true;
  const err = document.getElementById("remErr");
  if(err) err.hidden = true;
  const label = btn.textContent; btn.textContent = "Setting up your order…";
  const row = btn.closest(".remitem");
  const slug = btn.getAttribute("data-slug") || (row && row.getAttribute("data-slug")) || "";
  const qtyVal = row && row.querySelector(".qtyval");
  const qty = Math.max(1, parseInt(qtyVal && qtyVal.getAttribute("data-qty"), 10) || 1);
  try{
    const c = await fetch(`/api/portal/${encodeURIComponent(token)}/checkout`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({items: [{slug, qty}]}),
    });
    const cj = await c.json();
    if(cj.stripe_url){ location.href = cj.stripe_url; return; }
    throw new Error(cj.error || "Checkout is temporarily unavailable. Please reach out to us and we’ll help.");
  }catch(e){
    if(err){ err.textContent = e.message || "Something went wrong. Please reach out and we’ll help."; err.hidden = false; }
    btn.disabled = false; btn.textContent = label;
  }
}

    var body = document.createElement("div");
    body.textContent = entry.content || "";
    div.appendChild(body);
    msgs.appendChild(div);
  });
  msgs.scrollTop = msgs.scrollHeight;
}

function renderSuggestion(sugg){
  if(!sugg || typeof sugg !== "object") return null;
  var name = (sugg.name != null) ? String(sugg.name) : "";
  var price = (sugg.price != null) ? String(sugg.price) : "";
  var url = (sugg.url != null) ? String(sugg.url) : "";
  var el = document.createElement("div");
  el.className = "chat-sugg";
  var safeUrl = /^https?:\/\//i.test(url) ? url : "";   // only http(s) hrefs (defense-in-depth)
  var inner = '<span class="chat-sugg-name">' + esc(name) + "</span>";
  if(price){ inner += '<span class="chat-sugg-price"> &middot; ' + esc(price) + "</span>"; }
  if(safeUrl){ inner += '<a class="btn chat-sugg-btn" href="' + esc(safeUrl) + '" target="_blank" rel="noopener">Order now</a>'; }
  el.innerHTML = inner;
  return el;
}

// --- Community-related cards (Layer C slice C3 Task 3) ---
function renderRelated(items){
  if(!Array.isArray(items) || !items.length) return null;
  var el = document.createElement("div");
  el.className = "chat-related";
  var heading = document.createElement("div");
  heading.className = "chat-related-heading";
  heading.textContent = "From the community";
  el.appendChild(heading);
  items.forEach(function(item){
    if(!item || typeof item !== "object") return;
    var title = (item.title != null) ? String(item.title) : "";
    if(!title) return;
    var row = document.createElement("div");
    row.className = "chat-related-item";
    var link = document.createElement("a");
    link.className = "chat-related-link";
    link.href = "/community?token=" + encodeURIComponent(token);
    link.textContent = title; // server-supplied title: textContent only, never innerHTML
    row.appendChild(link);
    if(item.kind === "teaser"){
      var nudge = document.createElement("div");
      nudge.className = "chat-related-nudge";
      nudge.textContent = "Become a member to watch the full session.";
      row.appendChild(nudge);
    }
    el.appendChild(row);
  });
  return el;
}
// --- end community-related cards ---

function appendChatBubble(role, text){
  var msgs = document.getElementById("chatMsgs");
  if(!msgs) return null;
  var div = document.createElement("div");
  div.className = "chat-bubble " + role;
  if(text) div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

async function sendChatMessage(){
  var input = document.getElementById("chatInput");
  var sendBtn = document.getElementById("chatSend");
  if(!input || !sendBtn) return;
  var query = (input.value || "").trim();
  if(!query) return;
  input.value = "";
  input.disabled = true;
  sendBtn.disabled = true;
  try{
    appendChatBubble("user", query);
    var assistantBubble = appendChatBubble("assistant", "");
    var assistantText = "";
    var resp = await fetch(
      "/api/portal/" + encodeURIComponent(token) + "/chat",
      {
        method: "POST",
        credentials: "same-origin",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({query: query, history: chatHistory.map(function(m){
          return {role: (m.role==="user"||m.role==="client") ? "user" : "assistant",
                  content: m.content || ""};
        })}),
      }
    );
    if(!resp.ok){
      if(assistantBubble){
        assistantBubble.className = "chat-bubble error";
        assistantBubble.textContent = "Unable to reach Dr. Glen right now. Please try again.";
      }
    } else {
      var reader = resp.body.getReader();
      var decoder = new TextDecoder();
      var buf = "";
      var streamDone = false;
      var msgs = document.getElementById("chatMsgs");
      while(!streamDone){
        var chunk = await reader.read();
        if(chunk.done) break;
        buf += decoder.decode(chunk.value, {stream: true});
        var lines = buf.split("\n");
        buf = lines.pop();
        for(var i = 0; i < lines.length; i++){
          var line = lines[i];
          if(line.slice(0,6) !== "data: ") continue;
          var payload = line.slice(6).trim();
          if(!payload) continue;
          try{
            var evt = JSON.parse(payload);
            if(evt.token){
              assistantText += evt.token;
              if(assistantBubble) assistantBubble.textContent = assistantText;
              if(msgs) msgs.scrollTop = msgs.scrollHeight;
            } else if(evt.suggestion){
              var suggEl = renderSuggestion(evt.suggestion);
              if(suggEl && msgs){ msgs.appendChild(suggEl); }
            } else if(evt.related){
              var relEl = renderRelated(evt.related);
              if(relEl && msgs){ msgs.appendChild(relEl); msgs.scrollTop = msgs.scrollHeight; }
            } else if(evt.error){
              if(assistantBubble){
                assistantBubble.className = "chat-bubble error";
                assistantBubble.textContent = String(evt.error);
              }
            } else if(evt.done){
              streamDone = true;
              chatHistory.push({role: "user", content: query});
              chatHistory.push({role: "assistant", content: assistantText});
            }
          } catch(parseErr){ /* skip malformed SSE lines */ }
        }
      }
    }
  } catch(err){
    try{
      appendChatBubble("error", (err && err.message) ? err.message : "Something went wrong. Please try again.");
    } catch(innerErr){ /* never break the portal */ }
  } finally {
    if(input) input.disabled = false;
    if(sendBtn) sendBtn.disabled = false;
    if(input) input.focus();
  }
}

load();
</script>
<script type="module">
  // Element backdrop controller: shows the member's deficient-element Glendalf loop
  // + (opt-in) its ambient soundtrack. Reuses the fireside video-stage machinery.
  import { Ambience } from '/static/fireside/ambience.js';
  import { pickElement, resolveBackdrop, ELEMENT_KEYS } from '/static/fireside/element-backdrop.js';
  import { CatPlayer } from '/static/fireside/cat-player.js';

  const vid = document.getElementById('el-bg');
  const vid2 = document.getElementById('el-bg2');
  const sndBtn = document.getElementById('soundToggle');
  const elPicker = document.getElementById('elPicker');
  const SPK_ON = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7M19 5a9 9 0 0 1 0 14"/></svg>';
  const SPK_OFF = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M22 9l-6 6M16 9l6 6"/></svg>';
  const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const soundOn = () => localStorage.getItem('rm_portal_sound') === 'on';

  // Scene preference. Two layers:
  //  - serverPref: the member's saved choice (element_state.override), authoritative
  //    and remembered per member ACROSS devices. Set via the dropdown, persisted by
  //    POST /scene-pref.
  //  - preview: a ?element=<id> testing override, remembered for THIS browser session
  //    only (sessionStorage). Non-destructive — it never writes the member's saved
  //    choice, so testing on a client's portal can't change what they see later.
  // Precedence: preview -> serverPref -> computed deficient element (Automatic).
  const PORTAL_ID = (location.pathname.match(/\/portal\/([^\/?#]+)/) || [])[1] || 'default';
  const PREVIEW_KEY = 'rm_scene_preview:' + PORTAL_ID;
  let autoSetting = null;   // element_state.setting from the server (the Automatic value)
  let serverPref = null;    // element_state.override — the member's saved choice
  const preview = () => { try { return sessionStorage.getItem(PREVIEW_KEY); } catch (e) { return null; } };
  const setPreview = (v) => { try { if (v === null) sessionStorage.removeItem(PREVIEW_KEY); else sessionStorage.setItem(PREVIEW_KEY, v); } catch (e) {} };
  // The active preference: a session preview wins over the saved choice; either may be
  // null/'auto' -> Automatic.
  const activePref = () => { const pv = preview(); return (pv !== null) ? pv : serverPref; };

  // A ?element=<id> query param previews a scene for this browser session, then is
  // stripped from the URL so a shared/bookmarked link isn't permanently pinned.
  (function consumeQueryOverride(){
    try {
      const p = new URLSearchParams(location.search);
      if (!p.has('element')) return;
      const raw = (p.get('element') || '').trim().toLowerCase();
      if (raw === '' || raw === 'auto') setPreview('auto');
      else if (ELEMENT_KEYS.includes(raw)) setPreview(raw);
      p.delete('element');
      const qs = p.toString();
      history.replaceState(null, '', location.pathname + (qs ? '?' + qs : '') + location.hash);
    } catch (e) {}
  })();

  // Persist the member's saved choice across devices (element key, or null/Automatic).
  function saveServerPref(el){
    try {
      fetch('/api/portal/' + encodeURIComponent(PORTAL_ID) + '/scene-pref', {
        method: 'POST', credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ element: el || 'auto' }),
      }).catch(() => {});
    } catch (e) {}
  }

  let manifestP = null, current = null, amb = null, catPlayer = null;
  function stopCat(){ if (catPlayer) { try { catPlayer.stop(); } catch (e) {} catPlayer = null; } }

  // Resident cat perks up when you start engaging Glendalf's chat (focus the input
  // or send a message). No-op unless the Fire cat is active; the cooldown lives in
  // CatPlayer.wake(), so it fires once per re-engagement, not on every keystroke.
  const _wakeCat = () => { try { if (catPlayer) catPlayer.wake(); } catch (e) {} };
  const _ci = document.getElementById('chatInput'), _cs = document.getElementById('chatSend');
  if (_ci) _ci.addEventListener('focus', _wakeCat);
  if (_cs) _cs.addEventListener('click', _wakeCat);
  const loadManifest = () => (manifestP ||= fetch('/static/fireside/elements-manifest.json').then(r => r.ok ? r.json() : null).catch(() => null));

  // Reflect the saved sound PREFERENCE, not the runtime amb — on a reload the pref
  // can be "on" while audio waits for the first gesture, and the icon must not lie
  // (an "off"-looking speaker that's actually pending-on is what made clicking it
  // seem to do nothing / toggle the wrong way).
  function syncBtn(){ const on = soundOn(); sndBtn.innerHTML = on ? SPK_ON : SPK_OFF; sndBtn.setAttribute('aria-pressed', on ? 'true' : 'false'); }
  // true while Dr. Glen's voice is playing (report audio/video) so the ambient beds
  // duck under him and swell back in the gaps. The backdrop video (#el-bg) is muted,
  // so it's excluded.
  function voicePlaying(){
    return [...document.querySelectorAll('audio,video')].some(m =>
      m !== vid && m !== vid2 && !m.paused && !m.ended && !m.muted && m.currentTime > 0 && m.volume > 0);
  }
  function startAudio(){ if (amb || !current) return; try { amb = new Ambience(current.ambience, { isVoicePlaying: voicePlaying, duck: 0.35 }); amb.start(); } catch (e) { amb = null; } syncBtn(); }
  function stopAudio(){ if (amb) { try { amb.stop(); } catch (e) {} amb = null; } syncBtn(); }
  // Autoplay needs a user gesture. Track whether the page has had one, so we don't
  // pre-create a SILENT ambience on load (its play() would be rejected and the bed
  // would never retry) — and so the speaker click can't turn "off" the very audio
  // it was meant to turn on (the old code created amb before any gesture, then the
  // click saw amb and stopped it).
  let audioUnlocked = false;
  const _markUnlocked = () => { audioUnlocked = true; };
  window.addEventListener('pointerdown', _markUnlocked, { once: true, capture: true });
  window.addEventListener('keydown', _markUnlocked, { once: true, capture: true });

  // Remembered "on": start immediately if audio is already usable (mid-session
  // element switch); otherwise wait for the first gesture and start THEN.
  function armAutoStart(){
    if (audioUnlocked) { startAudio(); return; }
    const h = () => { if (soundOn()) startAudio(); };
    window.addEventListener('pointerdown', h, { once: true });
    window.addEventListener('keydown', h, { once: true });
  }

  // Flip the PREFERENCE (the source of truth), then start/stop to match. This click
  // is itself a user gesture, so startAudio() can actually play. Keying off the pref
  // (not amb) means the very gesture that armAutoStart might use to create amb can't
  // then be read as "amb exists -> turn off".
  sndBtn.addEventListener('click', () => {
    const turnOn = !soundOn();
    localStorage.setItem('rm_portal_sound', turnOn ? 'on' : 'off');
    if (turnOn) startAudio(); else stopAudio();
    syncBtn();
  });

  // Populate the scene dropdown from the manifest labels (once), and keep its
  // selected value in sync with the saved preference.
  function fillPicker(manifest){
    if (!elPicker || elPicker._filled) return;
    const els = (manifest && manifest.elements) || {};
    elPicker.appendChild(new Option('Automatic', 'auto'));
    for (const k of ELEMENT_KEYS) {
      const lab = (els[k] && els[k].label) || (k.charAt(0).toUpperCase() + k.slice(1));
      elPicker.appendChild(new Option(lab, k));
    }
    elPicker._filled = true;
  }
  function syncPicker(){
    if (!elPicker) return;
    const pref = activePref();
    elPicker.value = (pref && ELEMENT_KEYS.includes(pref)) ? pref : 'auto';
  }
  // A deliberate pick is the member's saved choice: clear any session preview, apply
  // optimistically, and persist it server-side so it follows them across devices.
  if (elPicker) elPicker.addEventListener('change', () => {
    const v = elPicker.value === 'auto' ? null : elPicker.value;
    setPreview(null);
    serverPref = v;
    saveServerPref(v);
    applyResolved();
  });

  // Resolve preference over the computed element, then render. This is the single
  // entry point render() and the picker both drive through.
  async function applyResolved(){ await apply(resolveBackdrop(activePref(), autoSetting)); syncPicker(); }

  async function apply(setting){
    const manifest = await loadManifest();
    fillPicker(manifest);
    const entry = pickElement(setting, manifest);
    if (!entry) {
      document.body.classList.remove('has-bg'); stopAudio(); stopCat(); current = null;
      try { vid.pause(); vid.removeAttribute('src'); vid.load(); } catch (e) {}
      try { vid2.pause(); vid2.removeAttribute('src'); } catch (e) {}
      vid.style.opacity = ''; vid2.style.opacity = '';
      return;
    }
    if (current && current.key === entry.key) return; // already showing this element
    current = entry;
    stopAudio(); stopCat();
    document.body.classList.add('has-bg');
    // Fire element ships a resident cat with idle actions + a wake reaction: the
    // CatPlayer double-buffers #el-bg/#el-bg2 and swaps clips at loop boundaries.
    // Everything else (and reduce-motion) uses the plain muted-loop backdrop.
    const comp = entry.companion || entry.cat;
    if (comp && !reduceMotion) {
      vid.style.opacity = ''; vid2.style.opacity = '';
      const cfg = Object.assign({ poster: entry.poster || '' }, comp);
      // On a non-rest (gust) clip, swell the wind ambience to match the canopy gust.
      // `amb` is read live in the closure — it may be null now but set by the time it fires.
      cfg.onClip = (url, isRest) => { if (!isRest && amb && typeof amb.gust === 'function') { try { amb.gust(comp.gust_swell_ms || 9000); } catch (e) {} } };
      catPlayer = new CatPlayer(vid, vid2, cfg);
      catPlayer.start();
    } else {
      try { vid2.pause(); } catch (e) {}
      vid2.style.opacity = '';
      vid.loop = true; vid.style.opacity = ''; vid.style.transition = '';
      vid.poster = entry.poster || '';
      vid.src = entry.video;
      if (!reduceMotion) vid.play().catch(() => {}); // muted autoplay ok; else poster stays
    }
    if (soundOn()) armAutoStart(); syncBtn();
  }

  // render() passes the server-computed element here; we store it as the Automatic
  // value and render whatever the preference resolves to.
  window.applyElementBackdrop = (computed, serverOverride) => {
    autoSetting = computed;
    if (serverOverride !== undefined) serverPref = serverOverride || null;
    applyResolved();
  };
  syncBtn();
  if (window.__pendingBackdrop !== undefined) window.applyElementBackdrop(window.__pendingBackdrop, window.__serverScenePref);
</script>
