<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Your Healing Home · Remedy Match</title>
<script>
  // Set the theme before first paint to avoid a flash. Default: brand dark,
  // unless the client previously chose light or their system prefers light.
  (function(){var t=localStorage.getItem('rm_portal_theme');
    if(!t) t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';
    document.documentElement.setAttribute('data-theme',t);})();
</script>
<style>
  /* Brand palette — deep green + gold (matches the live funnel). */
  :root[data-theme="dark"]{
    --bg:#0a150d; --card:#13241a; --card2:#16291d; --line:#274033;
    --ink:#f3efe2; --muted:#9fb0a4;
    --brand:#5bbf9e; --brand-soft:rgba(91,191,158,.14);
    --btn-bg:#d4a843; --btn-fg:#0a150d; --ok:#5bbf9e; --err:#e88a8a;
    --shadow:0 1px 2px rgba(0,0,0,.30);
  }
  :root[data-theme="light"]{
    --bg:#FBF8F3; --card:#ffffff; --card2:#f6f2e9; --line:#e7e1d4;
    --ink:#1E2A2A; --muted:#6b7268;
    --brand:#2f6f5e; --brand-soft:rgba(47,111,94,.10);
    --btn-bg:#2f6f5e; --btn-fg:#ffffff; --ok:#2f7d6b; --err:#9a3b3b;
    --shadow:0 1px 2px rgba(40,40,30,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    transition:background .25s ease,color .25s ease;}
  .wrap{max-width:640px;margin:0 auto;padding:24px 18px 64px}
  .hero{text-align:center;padding:18px 8px 6px}
  .hello{font-size:1.6rem;font-weight:700;margin:.2rem 0 .4rem}
  .sub{color:var(--muted);margin:0 auto;max-width:34rem}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:18px 18px;margin:16px 0;box-shadow:var(--shadow)}
  .card h2{font-size:1.05rem;margin:0 0 .6rem;letter-spacing:.01em}
  .video-card{text-align:center;background:linear-gradient(180deg,var(--card),var(--card2))}
  .video-wrap{position:relative;width:100%;aspect-ratio:16/9;border-radius:10px;overflow:hidden;background:#000;margin-top:.3rem}
  .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .btn{display:inline-block;background:var(--btn-bg);color:var(--btn-fg);border:0;cursor:pointer;
    font-size:1rem;font-weight:600;border-radius:10px;padding:13px 22px;text-decoration:none}
  .btn:active{transform:translateY(1px)}
  .btn.full{display:block;width:100%;text-align:center}
  /* theme toggle */
  .theme-toggle{position:fixed;top:14px;right:14px;z-index:20;width:40px;height:40px;
    border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--ink);
    cursor:pointer;font-size:1.1rem;line-height:1;display:flex;align-items:center;
    justify-content:center;box-shadow:var(--shadow)}
  /* journey path */
  .path{position:relative;margin:6px 0 0;padding:0}
  .layer{position:relative;padding:2px 0 18px 40px}
  .layer:before{content:"";position:absolute;left:13px;top:6px;bottom:-6px;width:2px;background:var(--line)}
  .layer:last-child:before{display:none}
  .node{position:absolute;left:4px;top:2px;width:20px;height:20px;border-radius:50%;
    background:var(--brand-soft);border:2px solid var(--brand);color:var(--brand);
    font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center}
  .layer h3{margin:0 0 .15rem;font-size:1rem}
  .layer .mean{color:var(--muted);margin:.1rem 0 .4rem}
  .rx{font-size:.92rem;background:var(--brand-soft);border-radius:8px;padding:8px 10px}
  .rx b{color:var(--brand)}
  .dose{display:block;color:var(--muted);font-size:.86rem;margin-top:2px}
  .reitem{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px dashed var(--line)}
  .reitem:last-child{border-bottom:0}
  .reitem .nm{font-weight:600}
  .reitem .pr{color:var(--ink);white-space:nowrap}
  .reg{color:var(--muted);text-decoration:line-through;margin-right:6px;font-size:.86rem}
  .sp{color:var(--brand);font-weight:700}
  .note{background:var(--brand-soft);border-radius:8px;padding:9px 11px;margin:0 0 .7rem;color:var(--ink)}
  .note b{color:var(--brand)}
  .muted{color:var(--muted)} .small{font-size:.86rem}
  .foot{text-align:center;color:var(--muted);font-size:.86rem;margin-top:26px}
  .state{max-width:32rem;margin:18vh auto;text-align:center;color:var(--muted);padding:0 18px}
  .err{color:var(--err)}
  #loading{opacity:.6}
  /* role badges + account */
  .badges{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:.4rem 0 0}
  .badge{background:var(--brand-soft);color:var(--brand);border-radius:999px;
    font-size:.74rem;font-weight:700;padding:3px 10px;letter-spacing:.02em}
  .kv{display:flex;justify-content:space-between;gap:10px;padding:5px 0;border-bottom:1px dashed var(--line)}
  .kv:last-child{border-bottom:0}
  .kv .k{color:var(--muted)} .kv .v{font-weight:600;text-align:right}
  /* order history */
  .ord{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px dashed var(--line)}
  .ord:last-child{border-bottom:0}
  .ord .od{color:var(--muted);font-size:.86rem}
  .pill{font-size:.72rem;font-weight:700;border-radius:999px;padding:2px 9px;background:var(--brand-soft);color:var(--ok)}
  .soon{border-style:dashed;background:linear-gradient(180deg,var(--card),var(--card2));text-align:center}
  .soon .muted{margin:.2rem 0 0}
  /* biofield disclosure + pending-remedy placeholder */
  .disclose{color:var(--muted);font-size:.78rem;margin:.4rem 0 0;display:flex;align-items:center;gap:6px;letter-spacing:.01em}
  .disclose svg{flex:0 0 auto;opacity:.8}
  .rx-pending{margin-top:.9rem;border:1px dashed var(--line);border-radius:8px;
    background:var(--brand-soft);padding:12px 14px;opacity:.72;position:relative}
  .rx-pending .ph{filter:blur(4px);user-select:none;pointer-events:none;color:var(--brand);font-weight:700}
  .rx-pending .ph .dose{filter:blur(3px);display:block;color:var(--muted);font-weight:400;font-size:.86rem;margin-top:3px}
  .rx-pending .lock{position:relative;color:var(--ink);font-size:.92rem;margin-top:.6rem;display:flex;align-items:flex-start;gap:7px}
  .rx-pending .lock svg{flex:0 0 auto;margin-top:2px;color:var(--brand)}
  .rx-pending .req{color:var(--muted);font-size:.86rem;margin:.6rem 0 0}
  /* biofield scan-date tabs */
  .scantabs{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:0 0 .8rem}
  .scantab{background:var(--brand-soft);color:var(--brand);border:1px solid var(--line);
    border-radius:999px;font-size:.8rem;font-weight:600;padding:5px 13px;cursor:pointer;
    line-height:1.2;font-family:inherit}
  .scantab.active{background:var(--brand);color:var(--btn-fg);border-color:var(--brand)}
  .scansel{background:var(--card2);color:var(--ink);border:1px solid var(--line);
    border-radius:999px;font-size:.8rem;font-weight:600;padding:5px 10px;cursor:pointer;
    font-family:inherit}
  .scan-old{color:var(--muted);font-size:.82rem;margin:0 0 .6rem}
  /* cold-portal "preparing your analysis" state */
  .prep{text-align:center;background:linear-gradient(180deg,var(--card),var(--card2))}
  .prep h2{margin:0 0 .2rem}
  .spinner{width:34px;height:34px;margin:14px auto 12px;border-radius:50%;
    border:3px solid var(--line);border-top-color:var(--brand);
    animation:ppspin .9s linear infinite}
  @keyframes ppspin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion: reduce){.spinner{animation-duration:2.4s}}
  .prep .prepline{color:var(--muted);margin:.2rem auto 0;max-width:26rem}
  /* first-view live unfold: patterns then layers assemble (CSS-staggered) */
  .reveal{opacity:0;transform:translateY(8px);animation:rvl .5s ease forwards}
  @keyframes rvl{to{opacity:1;transform:none}}
  .pat-wrap{margin:.6rem 0}
  .pat-chip{display:inline-block;margin:3px 5px 3px 0;padding:4px 10px;border-radius:14px;
    background:var(--brand-soft);border:1px solid var(--line,#21472d);font-size:.85rem}
  @media (prefers-reduced-motion: reduce){.reveal{animation:none;opacity:1;transform:none}}
  /* Ask Dr. Glen concierge chat */
  .chat-msgs{max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:.8rem;min-height:48px}
  .chat-bubble{border-radius:12px;padding:9px 13px;max-width:88%;font-size:.93rem;line-height:1.5;white-space:pre-wrap;word-break:break-word}
  .chat-bubble.user{align-self:flex-end;background:var(--brand);color:var(--btn-fg)}
  .chat-bubble.assistant{align-self:flex-start;background:var(--card2);border:1px solid var(--line)}
  .chat-bubble.error{align-self:flex-start;border:1px solid var(--err);color:var(--err)}
  .chat-input-row{display:flex;gap:8px;align-items:center;margin-top:.2rem}
  .chat-input-row input{flex:1;background:var(--card2);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:10px 14px;font-size:.95rem;font-family:inherit;outline:0}
  .chat-input-row input:focus{border-color:var(--brand)}
  .chat-input-row input::placeholder{color:var(--muted)}
  .chat-sugg{background:var(--brand-soft);border:1px solid var(--line);border-radius:10px;padding:10px 13px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .chat-sugg-name{font-weight:600;font-size:.9rem}
  .chat-sugg-price{color:var(--muted);font-size:.86rem}
  .chat-sugg-btn{font-size:.82rem;padding:5px 12px;border-radius:8px;text-decoration:none;margin-left:auto;display:inline-block}
</style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle light or dark mode" title="Toggle light/dark"></button>
  <script>
    (function(){
      var btn=document.getElementById('themeToggle');
      var SUN='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
      var MOON='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
      function sync(){btn.innerHTML=document.documentElement.getAttribute('data-theme')==='dark'?SUN:MOON;}
      sync();
      btn.addEventListener('click',function(){
        var next=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
        document.documentElement.setAttribute('data-theme',next);
        localStorage.setItem('rm_portal_theme',next); sync();
      });
    })();
  </script>
  <div id="app" class="wrap" hidden></div>
  <div id="loading" class="state">Loading your healing home…</div>
  <div id="notfound" class="state" hidden>
    <p class="err">We couldn’t find that link.</p>
    <p>Please check the link Dr. Glen &amp; Rae sent you, or reach out and we’ll send a fresh one.</p>
  </div>

<script>
// The last path segment is either an emailed portal token or the literal "me"
// (the tokenless logged-in home, authed by the rm_portal_session cookie). Tokens
// are url-safe base64 and never equal "me", so this disambiguates cleanly.
const seg = location.pathname.split("/").filter(Boolean).pop();
const isMe = (seg === "me");
const token = seg; // reused by reorder()/checkout; "me" resolves via the session
const $ = (h)=>{const t=document.createElement("template");t.innerHTML=h.trim();return t.content.firstChild;};
const esc = (s)=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const money = (c)=> (c==null? "" : "$"+(c/100).toFixed(2));
// The biofield scan the page is currently viewing (null = newest, server default).
let selectedScanDate = null;
// Cold-portal "Preparing your analysis…" state. A fresh portal is created with
// biofield_status === "pending" and no analysis yet; we post one process-request
// (a local watcher synthesizes + publishes the draft) and poll until it lands.
let _ppPosted = false;
let _ppPolls = 0;
let _ppTimer = null;
const PP_MAX = 20; // 20 polls × 6s ≈ 2 min before we fall back to the SMS line.
// "2026-06-05" -> "Jun 5, 2026" (parsed as local midnight so the day never slips).
const fmtDate = (d)=>{
  if(!d) return "";
  const dt = new Date(d + "T00:00:00");
  if(isNaN(dt)) return String(d);
  return dt.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"});
};
// Inline SVG icons (no emoji), matching the page's stroked-icon style.
const ICON_INFO = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>';
const ICON_LOCK = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';

function notFound(){
  document.getElementById("loading").hidden = true;
  // A logged-out /portal/me visitor is sent to sign in; a bad token shows help.
  if(isMe){ location.href = "/portal/login"; return; }
  document.getElementById("notfound").hidden = false;
}

async function load(){
  // Two independent sources: content (biofield + reorder, token-or-session) and
  // the role-aware view (account/orders/upgrade, identity seam). Which one MUST
  // succeed depends on the page: a token link lives on its content; the logged-in
  // /me home lives on its session (the view), and biofield content is optional.
  const fetchJson = async (u)=>{ try{ const r=await fetch(u); return r.ok?await r.json():null; }catch(e){ return null; } };
  // When a specific scan is selected, both endpoints take ?scan_date=<YYYY-MM-DD>.
  const sd = selectedScanDate ? `?scan_date=${encodeURIComponent(selectedScanDate)}` : "";
  const [data, view] = await Promise.all([
    fetchJson(`/api/portal/${encodeURIComponent(seg)}${sd}`),
    fetchJson(`/api/portal/${encodeURIComponent(seg)}/view${sd}`),
  ]);
  const ok = isMe ? !!view : !!data;
  if(!ok){ notFound(); return; }
  render(data, view);
}

// Poll loop for the cold-portal "Preparing your analysis…" state. Each tick
// re-fetches via load(); when the watcher has published the draft, the status is
// no longer "pending" and render() stops the timer. After PP_MAX ticks (~2 min)
// we give up the spinner and show the "we'll text you" line (request stays queued).
function pollPending(){
  _ppPolls++;
  if(_ppPolls > PP_MAX){
    clearInterval(_ppTimer); _ppTimer = null;
    load(); // final re-render swaps the spinner for the "we'll text you" line.
    return;
  }
  load();
}

function render(d, v){
  d = d || {};
  if (d && d.tos_agreed === false) {
    var g = '<div class="card"><h2>Welcome to your healing home</h2>'
      + '<p>Before we continue, please review and agree to our Terms of Service.</p>'
      + '<p><a href="' + esc((window.TOS_URL || "https://illtowell.com/terms")) + '" target="_blank" rel="noopener">Read the Terms</a></p>'
      + '<button class="btn" id="tosAgreeBtn">I agree to the Terms</button>'
      + '<div class="err" id="tosErr" hidden></div></div>';
    document.getElementById("app").innerHTML = g;
    var b = document.getElementById("tosAgreeBtn");
    if (b) b.addEventListener("click", async function () {
      b.disabled = true;
      try {
        var r = await fetch("/api/portal/" + encodeURIComponent(seg) + "/agree-tos", {method:"POST", credentials:"same-origin"});
        if (r.ok) { load(); return; }
        throw new Error("retry");
      } catch (e) {
        b.disabled = false;
        var er = document.getElementById("tosErr"); if (er) { er.textContent = "Please try again."; er.hidden = false; }
      }
    });
    return;   // suppress the home until agreed
  }
  const app = document.getElementById("app");
  const displayName = d.name || (v && v.account && v.account.name) || "";
  // Greet by real first name; never show an email-derived token. A name that is
  // blank, or whose first word contains "@" or "." (e.g. "bob@x.com" stored as a
  // name, or "this.elf" mis-synced as a first name) falls back to "friend". Real
  // first names ("Glen", "Prof", "Mary") have no "@"/"." and pass through.
  let first = (displayName||"").split(" ")[0] || "";
  if (!first || /[@.]/.test(first)) first = "friend";
  const badges = (v && v.account && v.account.role_badges) || [];
  let html = `
    <div class="hero">
      <div class="hello">Aloha ${esc(first)}</div>
      <p class="sub">${esc(d.greeting || "This is your personal healing home: your video, your healing path, and your remedies, all in one place.")}</p>
      ${badges.length?`<div class="badges">${badges.map(b=>`<span class="badge">${esc(b)}</span>`).join("")}</div>`:""}
    </div>`;

  // Account snapshot — always shown when we have an identity.
  if(v && v.account){
    const a = v.account;
    const addr = a.address||{};
    const cityline = [addr.city, addr.state, addr.zip].filter(Boolean).join(", ");
    html += `<div class="card"><h2>Your account</h2>
      <div class="kv"><span class="k">Email</span><span class="v">${esc(a.email||"")}</span></div>
      ${cityline?`<div class="kv"><span class="k">Location</span><span class="v">${esc(cityline)}</span></div>`:""}
      ${a.points_cents?`<div class="kv"><span class="k">Reward points</span><span class="v">${esc(money(a.points_cents))}</span></div>`:""}
    </div>`;
  }

  if(d.video && d.video.url){
    // HeyGen: embed the clean player inline (NOT the /share/ page, which exposes
    // "more in this folder" — i.e. other clients' videos). Convert share/owner
    // links to the bare /embeds/<id> player. Non-HeyGen URLs fall back to a link.
    const hg = d.video.url.match(/heygen\.com\/(?:share|embeds|videos)\/(?:[a-z0-9-]*-)?([a-f0-9]{32}|[A-Za-z0-9_-]{8,})/i);
    let inner;
    if(hg){
      inner = `<div class="video-wrap"><iframe src="https://app.heygen.com/embeds/${esc(hg[1])}" allow="encrypted-media; fullscreen" allowfullscreen loading="lazy" title="Your message from Dr. Glen"></iframe></div>`;
    } else {
      inner = `<a class="btn" href="${esc(d.video.url)}" target="_blank" rel="noopener">${esc(d.video.label||"Watch your video")}</a>`;
    }
    html += `
      <div class="card video-card">
        <h2>Your personal message from Dr. Glen</h2>
        ${inner}
      </div>`;
  }

  if(d.audio && d.audio.url){
    html += `
      <div class="card audio-card">
        <h2>Your audio walkthrough</h2>
        <audio controls preload="none" src="${esc(d.audio.url)}" style="width:100%"></audio>
        ${d.audio.label?`<p class="muted">${esc(d.audio.label)}</p>`:""}
      </div>`;
  }
  if(d.report_pdf && d.report_pdf.url){
    html += `
      <div class="card report-card">
        <h2>Your written report</h2>
        <a class="btn" href="${esc(d.report_pdf.url)}" target="_blank" rel="noopener" download>Download your report (PDF)</a>
      </div>`;
  }

  // Cold portal: a freshly-created link arrives with biofield_status === "pending"
  // and no analysis. Show a "Preparing your analysis…" card, post ONE
  // process-request (a local watcher synthesizes + publishes the ai_draft), and
  // poll load() until the status flips. Once it does, this branch is skipped and
  // the normal biofield render below takes over — so polling is stopped there.
  const isPending = (d.biofield_status === "pending");
  if(isPending){
    const capped = _ppPolls > PP_MAX;
    const line = capped
      ? "Still working on your Biofield Analysis, we'll text you the moment it's ready."
      : "This usually takes about a minute. It will appear right here.";
    html += `<div class="card prep"><h2>Preparing your Biofield Analysis…</h2>
      ${capped ? "" : '<div class="spinner" aria-hidden="true"></div>'}
      <p class="prepline">${esc(line)}</p></div>`;
    // Kick the producer once per page load, then poll.
    if(!_ppPosted){
      _ppPosted = true;
      fetch(`/api/portal/${encodeURIComponent(seg)}/process-request`, {
        method:"POST", headers:{"Content-Type":"application/json"}, body:"{}",
      }).catch(()=>{});
    }
    if(!_ppTimer && !capped){ _ppTimer = setInterval(pollPending, 6000); }
  } else if(_ppTimer){
    // The analysis has landed (or we navigated away from pending) — stop polling.
    clearInterval(_ppTimer); _ppTimer = null;
  } else if (d.biofield_status === "none") {
    html += '<div class="card"><h2>Curious what your body is asking for?</h2>'
      + '<p>A quick biofield voice scan reads your stress and terrain patterns and tailors your next steps. It takes about 30 seconds.</p>'
      + '<a class="btn" href="https://Truly.VIP/E4L" target="_blank" rel="noopener">Do your free voice scan</a></div>';
  }

  // Biofield "healing path" — server-gated by status. Remedies/dosing never reach
  // the page until Dr. Glen has confirmed (status === "confirmed"); the earlier
  // states reveal the patterns and a two-click path to request the matches.
  // Prefer the status-aware view block; fall back to the legacy flat content
  // (treated as confirmed) so older token links keep rendering fully.
  const bf = isPending ? null
    : (v && v.biofield && v.biofield.visible) ? v.biofield
    : (Array.isArray(d.layers) && d.layers.length
        ? {visible:true, status:"confirmed", blurred:false, layers:d.layers, pricing_note:d.pricing_note||""}
        : null);
  if(bf){
    const status = bf.status || "confirmed";
    const actionable = bf.actionable === true; // within 30 days AND not confirmed
    const layers = Array.isArray(bf.layers) ? bf.layers : [];
    const disclose = `<p class="disclose">${ICON_INFO}AI-generated, pending Dr. Glen's review.</p>`;

    // First-view live unfold — the stress patterns appear first (as chips), then the
    // healing-path layers assemble one at a time. Plays ONCE per scan (a localStorage
    // guard keyed on the scan date); confirmed analyses and return visits render
    // static. We only animate the patterns + layer interpretation — remedies stay
    // blurred. Staggering is pure CSS animation-delay (one render pass, no setTimeouts).
    const scanDate = bf.scan_date || (v && v.biofield && v.biofield.scan_date) || d.scan_date || null;
    const findings = Array.isArray(d.findings) ? d.findings : [];
    const findingsCount = findings.length;
    const ukey = "rvl:" + (scanDate || "current");
    let firstTime = false;
    if(status !== "confirmed"){
      try{ firstTime = !localStorage.getItem(ukey); }catch(e){ firstTime = false; }
    }
    // Helpers: a reveal class (only on first view) and a per-element delay style.
    const rvlCls = firstTime ? " reveal" : "";
    const layerDelay = (i)=> firstTime
      ? ` style="animation-delay:${(findingsCount*120 + 300 + i*400)}ms"` : "";
    // Patterns block (chips) — staged before the layers on first view.
    const patternsBlock = (firstTime && findingsCount)
      ? `<p class="muted small${rvlCls}" style="margin:.2rem 0 .2rem">Your scan identified these stress patterns</p>
         <div class="pat-wrap">${findings.map((f,i)=>
           `<span class="pat-chip reveal" style="animation-delay:${i*120}ms">${esc(f.name||f.code||"")}</span>`
         ).join("")}</div>`
      : "";
    // Set the guard once, in this render pass, so the unfold does not replay on the
    // next poll/re-render. Only flips when we are actually rendering the analysis.
    if(firstTime){ try{ localStorage.setItem(ukey, "1"); }catch(e){} }

    // Scan-date tabs — only when more than one scan exists. First 3 as pills, the
    // rest reachable via a "More dates" dropdown carrying every date.
    let tabs = "";
    const dates = Array.isArray(bf.scan_dates) ? bf.scan_dates : [];
    const curDate = bf.scan_date || (dates.length ? dates[0] : null);
    if(dates.length > 1){
      const pills = dates.slice(0,3).map(dt =>
        `<button type="button" class="scantab${dt===curDate?" active":""}" data-scan="${esc(dt)}">${esc(fmtDate(dt))}</button>`
      ).join("");
      const opts = dates.map(dt =>
        `<option value="${esc(dt)}"${dt===curDate?" selected":""}>${esc(fmtDate(dt))}</option>`
      ).join("");
      tabs = `<div class="scantabs">${pills}<select class="scansel" id="bfScanSel" aria-label="Choose a scan date"><option value="" disabled${dates.indexOf(curDate)>2?"":" selected"}>More dates ▾</option>${opts}</select></div>`;
    }

    if(status === "ai_draft"){
      // First click: show the greeting + that the analysis is ready. No layers yet.
      // The CTA only appears for an actionable (recent, unconfirmed) scan.
      const cta = actionable
        ? `<button class="btn full" id="bfInterestBtn" data-scan="${esc(curDate||"")}">View your scan analysis</button>`
        : `<p class="scan-old">This analysis is from an earlier scan.</p>`;
      html += `<div class="card"><h2>Your scan analysis</h2>
        ${tabs}
        ${patternsBlock}
        ${bf.greeting?`<p class="muted${rvlCls}" style="margin:.1rem 0 .6rem${firstTime?";animation-delay:"+(findingsCount*120+300)+"ms":""}">${esc(bf.greeting)}</p>`:""}
        <p class="${rvlCls.trim()}" style="margin:.1rem 0 1rem${firstTime?";animation-delay:"+(findingsCount*120+300)+"ms":""}">Your Biofield Analysis is ready: your healing path, mapped from the surface layer down to the deepest root.</p>
        ${cta}
        ${disclose}</div>`;
    } else {
      // interested / requested / confirmed all render the patterns.
      let path = "";
      layers.forEach((L,i)=>{
        path += `
          <div class="layer${rvlCls}"${layerDelay(i)}>
            <div class="node">${esc(L.n!=null?L.n:i+1)}</div>
            <h3>${esc(L.title||"")}</h3>
            ${L.meaning?`<div class="mean">${esc(L.meaning)}</div>`:""}
            ${L.remedy?`<div class="rx"><b>${esc(L.remedy)}</b>${L.dosing?`<span class="dose">${esc(L.dosing)}</span>`:""}</div>`:""}
          </div>`;
      });
      let extra = "";
      if(status !== "confirmed"){
        // Blurred placeholder remedy card. The "Request" CTA only appears on an
        // actionable scan; on an old scan it stays read-only (no button).
        let action;
        if(status === "interested"){
          action = actionable
            ? `<button class="btn full" id="bfRequestBtn" data-scan="${esc(curDate||"")}" style="margin-top:.7rem">Request my remedy matches</button>`
            : `<p class="scan-old" style="margin-top:.7rem">This analysis is from an earlier scan.</p>`;
        } else {
          action = `<p class="req">Requested. Dr. Glen is confirming your matches.</p>`;
        }
        extra = `
          <div class="rx-pending" aria-hidden="false">
            <div class="ph">Remedy match<span class="dose">Personalized dosing</span></div>
            <div class="lock">${ICON_LOCK}<span>Your remedy matches are being confirmed by Dr. Glen.</span></div>
            ${action}
          </div>`;
      } else if(bf.pricing_note){
        extra = `<p class="note small" style="margin-top:.7rem">${esc(bf.pricing_note)}</p>`;
      }
      html += `<div class="card"><h2>Your healing path</h2>
        ${tabs}
        ${patternsBlock}
        <p class="muted small">From the surface layer down to the deepest root, we support them in order, and the whole chain unwinds.</p>
        <div class="path">${path}</div>
        ${extra}
        ${status !== "confirmed" ? disclose : ""}</div>`;
    }
  }

  // "Ask Dr. Glen" concierge chat — always shown for every portal client.
  html += `<div class="card" id="chatCard">
    <h2>Ask Dr. Glen</h2>
    <p class="muted small" style="margin:.3rem 0 .7rem">Questions about your healing path, remedies, or how to feel better? Ask here.</p>
    <div id="chatMsgs" class="chat-msgs"></div>
    <div class="chat-input-row">
      <input id="chatInput" type="text" placeholder="Ask about your scan or remedies..." autocomplete="off">
      <button class="btn" id="chatSend">Send</button>
    </div>
  </div>`;

  if(Array.isArray(d.reorder_items) && d.reorder_items.length){
    let rows = "";
    d.reorder_items.forEach(it=>{
      const price = (it.is_special && it.regular_price_cents)
        ? `<span class="reg">${esc(money(it.regular_price_cents))}</span><span class="sp">${esc(money(it.price_cents))}</span>`
        : `${esc(money(it.price_cents))}`;
      rows += `<div class="reitem"><span class="nm">${esc(it.name||it.slug)}${it.qty>1?` ×${esc(it.qty)}`:""}</span><span class="pr">${price}</span></div>`;
    });
    const note = d.pricing_note ? `<p class="note small">${esc(d.pricing_note)}</p>` : "";
    html += `<div class="card"><h2>Order your remedies</h2>
      ${note}
      <div>${rows}</div>
      <p class="muted small" style="margin:.7rem 0 1rem">Shipping calculated at checkout.</p>
      <button class="btn full" id="reorderBtn">Order my remedies</button>
      <p class="small err" id="reorderErr" hidden></p></div>`;
  }

  // Order history — role-gated (clients) by the view assembler.
  if(v && v.orders && v.orders.visible && Array.isArray(v.orders.items) && v.orders.items.length){
    let rows = "";
    v.orders.items.slice(0,8).forEach(o=>{
      const date = (o.date||"").slice(0,10);
      rows += `<div class="ord"><span><span class="nm">${esc(money(o.total_cents))}</span>
        <span class="od">${esc(date)}</span></span>
        <span class="pill">${esc(o.status||"")}</span></div>`;
    });
    html += `<div class="card"><h2>Your orders</h2><div>${rows}</div></div>`;
  }

  // Sales / upgrade (feature #2): the single next eligible ladder rung + CTA.
  if(v && v.upgrade && v.upgrade.enabled && v.upgrade.offer){
    const o = v.upgrade.offer;
    const price = esc(money(o.price_cents)) + (o.period?esc(o.period):"");
    html += `<div class="card"><h2>What's next for you</h2>
      <div class="reitem"><span class="nm">${esc(o.title)}</span><span class="pr sp">${price}</span></div>
      <p class="muted small" style="margin:.5rem 0 1rem">${esc(o.blurb)}</p>
      <button class="btn full" id="offerBtn" data-path="${esc(o.checkout_path)}">${esc(o.cta_label)}</button>
      <p class="small err" id="offerErr" hidden></p></div>`;
  }

  // Ambassador — enrolled (referral + recruit links) / pending (under review) / none (become CTA).
  if(v && v.ambassador){
    const amb = v.ambassador;
    if(amb.status === "enrolled"){
      const dash = amb.dashboard || {};
      const statsHtml = [
        dash.total_leads!=null?`<div class="kv"><span class="k">Leads</span><span class="v">${esc(dash.total_leads)}</span></div>`:"",
        dash.last_lead?`<div class="kv"><span class="k">Last lead</span><span class="v">${esc(dash.last_lead)}</span></div>`:"",
        dash.conversions_count!=null?`<div class="kv"><span class="k">Conversions</span><span class="v">${esc(dash.conversions_count)}</span></div>`:"",
        dash.member_since?`<div class="kv"><span class="k">Member since</span><span class="v">${esc(dash.member_since)}</span></div>`:""
      ].join("");
      const offersHtml = (dash.offers||[]).map(o=>
        `<div style="margin:.5rem 0"><b>${esc(o.name||"")}</b>`+
        (o.description?`<p class="muted small" style="margin:.2rem 0">${esc(o.description)}</p>`:"")+
        (o.url?`<a class="btn" href="${esc(o.url)}" target="_blank" rel="noopener" style="margin:.4rem 0">View offer</a>`:"")+
        (o.instructions?`<p class="small" style="margin:.3rem 0">${esc(o.instructions)}</p>`:"")+
        `</div>`
      ).join("");
      const recentList = dash.recent||[];
      const recentHtml = recentList.length
        ?recentList.map(r=>`<div class="kv"><span class="k">${esc(r.name||"")}</span><span class="v">score ${esc(r.score||"")} · ${esc(r.received_at||"")}</span></div>`).join("")
        :`<p class="muted small">No referrals yet.</p>`;
      const recruitHtml = dash.recruit_url
        ?`<div class="kv"><span class="k">Recruited</span><span class="v"><a href="${esc(dash.recruit_url)}" target="_blank" rel="noopener">${esc(dash.recruited_count||0)} recruited</a></span></div>`
        :"";
      const socialLinks = dash.social_links || [];
      const socialHtml = socialLinks.length
        ? socialLinks.map(s =>
            `<div class="kv"><span class="k"><a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.url)}</a></span>`+
            `<span class="v muted small">${esc(s.points||0)} pts · ${esc(s.views||0)} views · ${esc(s.likes||0)} likes · ${esc(s.shares||0)} shares</span></div>`
          ).join("")
        : `<p class="muted small">No social shares yet.</p>`;
      html += `<div class="card"><h2>Your Ambassador links</h2>
        <div class="kv"><span class="k">Share &amp; earn</span><span class="v"><a href="${esc(amb.referral_url)}" target="_blank" rel="noopener">${esc(amb.referral_url)}</a></span></div>
        <div class="kv"><span class="k">Invite ambassadors</span><span class="v"><a href="${esc(amb.recruit_url)}" target="_blank" rel="noopener">${esc(amb.recruit_url)}</a></span></div>
        ${statsHtml}
        ${offersHtml?`<h3 style="margin:.8rem 0 .3rem;font-size:.9rem">Offers</h3>${offersHtml}`:""}
        <h3 style="margin:.8rem 0 .3rem;font-size:.9rem">Recent referrals</h3>
        ${recentHtml}
        ${recruitHtml}
        <h3 style="margin:.8rem 0 .3rem;font-size:.9rem">Social shares</h3>
        ${socialHtml}
        <div style="margin-top:.6rem">
          <textarea id="social-url-input" rows="2" placeholder="Paste URL(s) — one per line or comma-separated" style="width:100%;background:var(--card2);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:.9rem;font-family:inherit;resize:vertical"></textarea>
          <button class="btn full" id="socialAddBtn" style="margin-top:.5rem">Add social share</button>
          <p class="small err" id="socialErr" hidden></p>
        </div>
      </div>`;
    } else if(amb.status === "pending"){
      html += `<div class="card"><h2>Ambassador</h2><p class="muted">Your ambassador application is under review.</p></div>`;
    } else {
      html += `<div class="card"><h2>Become an Ambassador</h2>
        <p class="muted">Earn rewards by sharing.</p>
        <a class="btn full" href="${esc(amb.signup_url)}" target="_blank" rel="noopener">Become an Ambassador</a></div>`;
    }
  }

  // Notification preference: lets a client see and change their opt status,
  // so anyone who unsubscribed via the email link can re-subscribe here.
  if(typeof d.notify_on !== "undefined"){
    const on = !!d.notify_on;
    html += `<div class="card notifpref">
      <p class="muted small" id="notifLine" style="margin:.2rem 0 .8rem">Remedy Match notifications: <b>${on?"On":"Off"}</b></p>
      <button class="btn${on?"":" full"}" id="notifBtn" data-on="${on?"1":"0"}">${on?"Turn off":"Turn on"}</button></div>`;
  }

  html += `<div class="foot">With aloha,<br><b>Dr. Glen &amp; Rae</b> · Remedy Match LLC</div>`;

  app.innerHTML = html;
  document.getElementById("loading").hidden = true;
  app.hidden = false;

  var chatSendEl = document.getElementById("chatSend");
  if(chatSendEl){ chatSendEl.addEventListener("click", sendChatMessage); }
  var chatInputEl = document.getElementById("chatInput");
  if(chatInputEl){ chatInputEl.addEventListener("keydown", function(e){ if(e.key==="Enter"&&!e.shiftKey){ sendChatMessage(); } }); }
  repopulateChatHistory();

  const btn = document.getElementById("reorderBtn");
  if(btn) btn.addEventListener("click", reorder);

  const obtn = document.getElementById("offerBtn");
  if(obtn) obtn.addEventListener("click", ()=>startOffer(obtn));

  const ibtn = document.getElementById("bfInterestBtn");
  if(ibtn) ibtn.addEventListener("click", ()=>advanceBiofield(ibtn, "interest"));

  const rbtn = document.getElementById("bfRequestBtn");
  if(rbtn) rbtn.addEventListener("click", ()=>advanceBiofield(rbtn, "request"));

  // Scan-date navigation: a tab or the dropdown selects a scan and re-loads it.
  const selectScan = (dt)=>{ if(!dt) return; selectedScanDate = dt; load(); };
  app.querySelectorAll(".scantab").forEach(t =>
    t.addEventListener("click", ()=>selectScan(t.getAttribute("data-scan"))));
  const ssel = document.getElementById("bfScanSel");
  if(ssel) ssel.addEventListener("change", ()=>selectScan(ssel.value));

  const nbtn = document.getElementById("notifBtn");
  if(nbtn) nbtn.addEventListener("click", ()=>setNotifyPref(nbtn));

  const sabtn = document.getElementById("socialAddBtn");
  if(sabtn) sabtn.addEventListener("click", addSocial);
}

async function setNotifyPref(btn){
  // Toggle the client's notification opt status, then re-render to reflect it.
  const turningOn = btn.getAttribute("data-on") === "0";
  btn.disabled = true; const label = btn.textContent; btn.textContent = "One moment…";
  try{
    const r = await fetch(`/api/portal/${encodeURIComponent(seg)}/notify-pref`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({pref: turningOn ? "in" : "out"}),
    });
    if(!r.ok) throw new Error();
    await load();
  }catch(e){
    btn.disabled = false; btn.textContent = label;
  }
}

async function advanceBiofield(btn, step){
  // POST the transition, then re-run the page load so it re-fetches /view and
  // renders the next state. The token (seg) is the same segment /view uses.
  // The transition acts on a specific scan — the selected one, or the scan this
  // button was rendered for (its data-scan).
  btn.disabled = true; const label = btn.textContent; btn.textContent = "One moment…";
  const bfScanDate = btn.getAttribute("data-scan") || null;
  try{
    const r = await fetch(`/api/portal/${encodeURIComponent(seg)}/biofield/${step}`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({scan_date: selectedScanDate || bfScanDate}),
    });
    if(!r.ok) throw new Error();
    await load();
  }catch(e){
    btn.disabled = false; btn.textContent = label;
  }
}

async function startOffer(btn){
  const err = document.getElementById("offerErr");
  const path = btn.getAttribute("data-path");
  err.hidden = true; btn.disabled = true; const label = btn.textContent; btn.textContent = "One moment…";
  try{
    // Carry the same path segment ("me" or a token) so the server resolves identity.
    const url = `${path}${path.includes("?")?"&":"?"}token=${encodeURIComponent(seg)}`;
    const r = await fetch(url, {method:"POST"});
    const j = await r.json();
    if(j.stripe_url){ location.href = j.stripe_url; return; }
    throw new Error(j.error || "This isn't available right now. Please reach out and we'll help.");
  }catch(e){
    err.textContent = e.message; err.hidden = false; btn.disabled = false; btn.textContent = label;
  }
}

async function reorder(){
  const btn = document.getElementById("reorderBtn");
  const err = document.getElementById("reorderErr");
  err.hidden = true; btn.disabled = true; const label = btn.textContent; btn.textContent = "Setting up your order…";
  try{
    // One call: builds a live Stripe checkout at the client's portal price.
    const c = await fetch(`/api/portal/${encodeURIComponent(token)}/checkout`, {method:"POST"});
    const cj = await c.json();
    if(cj.stripe_url){ location.href = cj.stripe_url; return; }
    throw new Error(cj.error || "Checkout is temporarily unavailable. Please reach out to us and we’ll help.");
  }catch(e){
    err.textContent = e.message || "Something went wrong. Please reach out and we’ll help.";
    err.hidden = false; btn.disabled = false; btn.textContent = label;
  }
}

async function addSocial(){
  const input = document.getElementById("social-url-input");
  const err = document.getElementById("socialErr");
  const btn = document.getElementById("socialAddBtn");
  if(!input || !btn) return;
  const urls = input.value.split(/[\n,]/).map(u=>u.trim()).filter(Boolean);
  if(!urls.length) return;
  err.hidden = true; btn.disabled = true; const label = btn.textContent; btn.textContent = "Adding…";
  try{
    const r = await fetch(`/api/portal/${encodeURIComponent(seg)}/social-links`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({urls}),
    });
    if(!r.ok) throw new Error();
    input.value = "";
    await load();
  }catch(e){
    err.textContent = "Something went wrong. Please try again.";
    err.hidden = false; btn.disabled = false; btn.textContent = label;
  }
}

// ---- Ask Dr. Glen concierge chat ----
let chatHistory = [];

function repopulateChatHistory(){
  var msgs = document.getElementById("chatMsgs");
  if(!msgs || !chatHistory.length) return;
  chatHistory.forEach(function(entry){
    var div = document.createElement("div");
    div.className = "chat-bubble " + (entry.role === "user" ? "user" : "assistant");
    div.textContent = entry.content || "";
    msgs.appendChild(div);
  });
  msgs.scrollTop = msgs.scrollHeight;
}

function renderSuggestion(sugg){
  if(!sugg || typeof sugg !== "object") return null;
  var name = (sugg.name != null) ? String(sugg.name) : "";
  var price = (sugg.price != null) ? String(sugg.price) : "";
  var url = (sugg.url != null) ? String(sugg.url) : "";
  var el = document.createElement("div");
  el.className = "chat-sugg";
  var safeUrl = /^https?:\/\//i.test(url) ? url : "";   // only http(s) hrefs (defense-in-depth)
  var inner = '<span class="chat-sugg-name">' + esc(name) + "</span>";
  if(price){ inner += '<span class="chat-sugg-price"> &middot; ' + esc(price) + "</span>"; }
  if(safeUrl){ inner += '<a class="btn chat-sugg-btn" href="' + esc(safeUrl) + '" target="_blank" rel="noopener">Order now</a>'; }
  el.innerHTML = inner;
  return el;
}

function appendChatBubble(role, text){
  var msgs = document.getElementById("chatMsgs");
  if(!msgs) return null;
  var div = document.createElement("div");
  div.className = "chat-bubble " + role;
  if(text) div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

async function sendChatMessage(){
  var input = document.getElementById("chatInput");
  var sendBtn = document.getElementById("chatSend");
  if(!input || !sendBtn) return;
  var query = (input.value || "").trim();
  if(!query) return;
  input.value = "";
  input.disabled = true;
  sendBtn.disabled = true;
  try{
    appendChatBubble("user", query);
    var assistantBubble = appendChatBubble("assistant", "");
    var assistantText = "";
    var resp = await fetch(
      "/api/portal/" + encodeURIComponent(token) + "/chat",
      {
        method: "POST",
        credentials: "same-origin",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({query: query, history: chatHistory}),
      }
    );
    if(!resp.ok){
      if(assistantBubble){
        assistantBubble.className = "chat-bubble error";
        assistantBubble.textContent = "Unable to reach Dr. Glen right now. Please try again.";
      }
    } else {
      var reader = resp.body.getReader();
      var decoder = new TextDecoder();
      var buf = "";
      var streamDone = false;
      var msgs = document.getElementById("chatMsgs");
      while(!streamDone){
        var chunk = await reader.read();
        if(chunk.done) break;
        buf += decoder.decode(chunk.value, {stream: true});
        var lines = buf.split("\n");
        buf = lines.pop();
        for(var i = 0; i < lines.length; i++){
          var line = lines[i];
          if(line.slice(0,6) !== "data: ") continue;
          var payload = line.slice(6).trim();
          if(!payload) continue;
          try{
            var evt = JSON.parse(payload);
            if(evt.token){
              assistantText += evt.token;
              if(assistantBubble) assistantBubble.textContent = assistantText;
              if(msgs) msgs.scrollTop = msgs.scrollHeight;
            } else if(evt.suggestion){
              var suggEl = renderSuggestion(evt.suggestion);
              if(suggEl && msgs){ msgs.appendChild(suggEl); }
            } else if(evt.error){
              if(assistantBubble){
                assistantBubble.className = "chat-bubble error";
                assistantBubble.textContent = String(evt.error);
              }
            } else if(evt.done){
              streamDone = true;
              chatHistory.push({role: "user", content: query});
              chatHistory.push({role: "assistant", content: assistantText});
            }
          } catch(parseErr){ /* skip malformed SSE lines */ }
        }
      }
    }
  } catch(err){
    try{
      appendChatBubble("error", (err && err.message) ? err.message : "Something went wrong. Please try again.");
    } catch(innerErr){ /* never break the portal */ }
  } finally {
    if(input) input.disabled = false;
    if(sendBtn) sendBtn.disabled = false;
    if(input) input.focus();
  }
}

load();
</script>
