<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Join the Practitioner Wholesale Portal · Remedy Match</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Raleway:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#0a150d; --surface:#111f16; --surface-2:#162318; --border:#21472d;
    --cream:#fdf4d8; --muted:#a89870; --gold:#d4a843; --green:#3d8a52; --radius:14px;
    --font:"Open Sans",system-ui,sans-serif; --heading:"Raleway",system-ui,sans-serif; }
  :root[data-theme="light"]{ --bg:#FBF8F3; --surface:#FFFFFF; --surface-2:#F4ECDE;
    --border:#E2D9C9; --cream:#1E2A2A; --muted:#5F6B6B; --gold:#B08A3E; --green:#2D7A6A; }
  .ghost{ background:transparent; color:var(--gold); border:1px solid var(--border); border-radius:8px; padding:6px 12px; font-weight:600; cursor:pointer; font-family:inherit; width:auto; margin:0; }
  *{box-sizing:border-box}
  body{ margin:0; background:var(--bg); color:var(--cream); font-family:var(--font); line-height:1.6; }
  .wrap{ max-width:620px; margin:0 auto; padding:40px 20px; }
  h1{ font-family:var(--heading); font-weight:700; font-size:28px; margin:0 0 6px; }
  .sub{ color:var(--muted); margin:0 0 28px; }
  .panel{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; }
  label{ display:block; font-weight:600; font-size:14px; margin:14px 0 5px; }
  input[type=text],input[type=email],input[type=tel]{ width:100%; padding:11px 12px; border:1px solid var(--border); border-radius:9px; font-size:15px; font-family:inherit; background:var(--surface-2); color:var(--cream); }
  input::placeholder{ color:#6f7d6f; }
  .roles{ display:flex; gap:10px; margin-top:6px; }
  .role{ flex:1; border:1px solid var(--border); border-radius:10px; padding:12px; cursor:pointer; background:var(--surface-2); }
  .role.sel{ border-color:var(--gold); background:rgba(212,168,67,0.08); }
  .role b{ display:block; } .role span{ font-size:13px; color:var(--muted); }
  .hide{ display:none; }
  button{ margin-top:22px; width:100%; background:var(--green); color:#fff; border:0; border-radius:10px; padding:13px; font-size:16px; font-weight:600; cursor:pointer; font-family:inherit; }
  button:disabled{ opacity:.6; cursor:default; }
  .msg{ margin-top:16px; padding:12px; border-radius:9px; font-size:14px; }
  .msg.err{ background:rgba(180,60,40,0.15); color:#e8a08f; }
  .msg.ok{ background:rgba(61,138,82,0.15); color:#8fd6a3; }
  .foot{ margin-top:18px; font-size:14px; color:var(--muted); }
  a{ color:var(--gold); }
</style>
<script>(function(){var t=localStorage.getItem('rm-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
<div class="wrap">
  <div style="display:flex;justify-content:flex-end;margin-bottom:4px"><button id="theme-toggle" class="ghost" onclick="toggleTheme()">Light</button></div>
  <h1>Join the Wholesale Portal</h1>
  <p class="sub">Order Functional Formulations™ at wholesale. Licensed practitioners unlock pricing right away; coaches start with the first certification module.</p>
  <div class="panel">
    <form id="form">
      <label>Your name</label>
      <input type="text" id="name" autocomplete="name" required>
      <label>Email</label>
      <input type="email" id="email" autocomplete="email" required>
      <label>Phone</label>
      <input type="tel" id="phone" autocomplete="tel">
      <label>Practice name</label>
      <input type="text" id="practice_name">

      <label>How are you joining?</label>
      <div class="roles">
        <div class="role" data-role="licensed"><b>Licensed practitioner</b><span>OD, ND, LAc, DC, etc.</span></div>
        <div class="role" data-role="coach"><b>Coach</b><span>Start with certification</span></div>
      </div>

      <div id="licensed-fields" class="hide">
        <label>License number</label>
        <input type="text" id="license_number">
        <label>License state</label>
        <input type="text" id="license_state">
      </div>
      <div id="coach-fields" class="hide">
        <label>Resale certificate number</label>
        <input type="text" id="resale_license_number">
      </div>

      <button id="submit" type="submit" disabled>Create my account</button>
    </form>
    <div id="msg"></div>
  </div>
  <p class="foot">Already registered? <a href="#" id="signin">Email me a sign-in link</a>.</p>
</div>
<script>
var role = null;
var $ = function(id){ return document.getElementById(id); };
function toggleTheme(){
  var next = document.documentElement.getAttribute('data-theme')==='light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('rm-theme', next);
  var b=document.getElementById('theme-toggle'); if(b) b.textContent = next==='light' ? 'Dark' : 'Light';
}
(function(){ var t=document.documentElement.getAttribute('data-theme'); var b=document.getElementById('theme-toggle'); if(b) b.textContent = t==='light' ? 'Dark' : 'Light'; })();
document.querySelectorAll('.role').forEach(function(el){
  el.addEventListener('click', function(){
    document.querySelectorAll('.role').forEach(function(r){ r.classList.remove('sel'); });
    el.classList.add('sel'); role = el.getAttribute('data-role');
    $('licensed-fields').classList.toggle('hide', role !== 'licensed');
    $('coach-fields').classList.toggle('hide', role !== 'coach');
    $('submit').disabled = false;
  });
});
function show(kind, text){ var m=$('msg'); m.className='msg '+kind; m.textContent=text; }
$('form').addEventListener('submit', function(e){
  e.preventDefault();
  if(!role){ show('err','Please choose how you are joining.'); return; }
  $('submit').disabled = true; $('submit').textContent = 'Creating…';
  var payload = {
    name: $('name').value.trim(), email: $('email').value.trim(),
    phone: $('phone').value.trim(), practice_name: $('practice_name').value.trim(),
    portal_role: role, license_number: $('license_number').value.trim(),
    license_state: $('license_state').value.trim(),
    resale_license_number: $('resale_license_number').value.trim()
  };
  fetch('/api/practitioner/register', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)})
    .then(function(r){ return r.json(); })
    .then(function(d){
      $('submit').disabled = false; $('submit').textContent = 'Create my account';
      if(!d.ok){ show('err', d.error || 'Something went wrong.'); return; }
      show('ok', d.message || 'Check your email for a sign-in link.');
      var mp = d.module_pay;
      if(mp && mp.invoice_id){
        var h = '<div class="msg ok" style="margin-top:10px"><b>Your first certification module — Invoice #'+mp.doc_number+' — $'+Number(mp.total||297).toFixed(2)+'</b><br>Pay by:';
        (mp.pay_instructions||[]).forEach(function(p){ h += '<br>'+p.label+': <b>'+p.to+'</b>'; });
        h += '<br><span style="font-size:13px;color:var(--muted)">Use invoice #'+mp.doc_number+' as the memo. Wholesale ordering is already unlocked, and you can see this invoice in your portal under Order history.</span></div>';
        $('msg').insertAdjacentHTML('beforeend', h);
      }
    })
    .catch(function(){ $('submit').disabled=false; $('submit').textContent='Create my account'; show('err','Network error. Please try again.'); });
});
$('signin').addEventListener('click', function(e){
  e.preventDefault();
  var email = $('email').value.trim();
  if(!email){ show('err','Enter your email above, then click again.'); return; }
  fetch('/practitioner/login-request', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:email})})
    .then(function(r){ return r.json(); })
    .then(function(d){ show('ok', d.message || 'If that email has an account, a link is on its way.'); });
});
</script>
</body>
</html>
