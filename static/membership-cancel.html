<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Membership Cancelled</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f9f9f7;
      color: #2d2d2d;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      max-width: 480px;
      width: 90%;
      padding: 48px 40px;
      text-align: center;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin: 0 0 16px;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #555;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Trial cancelled</h1>
    <p>Your trial has been cancelled. No further charge will occur. Your access continues until the end of your paid period.</p>
  </div>
</body>
</html>
