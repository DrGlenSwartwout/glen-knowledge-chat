<!DOCTYPE html><html lang="en"><head>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinical Glossary · Dr. Glen Swartwout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Raleway:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root{ --bg:#0a150d; --surface:#111f16; --surface-2:#162318; --border:#21472d;
      --cream:#fdf4d8; --muted:#a89870; --gold:#d4a843; --green:#3d8a52; }
    body{margin:0;background:var(--bg);color:var(--cream);font-family:'Open Sans',sans-serif;line-height:1.6}
    .wrap{max-width:760px;margin:0 auto;padding:32px 20px 80px}
    .back{display:inline-block;margin-bottom:16px;color:var(--muted);text-decoration:none;font-size:.9rem}
    h1{font-family:Raleway,sans-serif;font-size:1.8rem;margin:.2rem 0 .3rem;color:var(--cream)}
    .lead{color:var(--muted);margin:0 0 1rem;max-width:640px}
    .filter{width:100%;box-sizing:border-box;background:var(--surface);border:1px solid var(--border);
      color:var(--cream);border-radius:10px;padding:9px 12px;font-size:.95rem;margin:.4rem 0 1.4rem}
    .filter::placeholder{color:var(--muted)}
    .entry{border-top:1px solid var(--border);padding:14px 0}
    .entry h3{font-family:Raleway,sans-serif;font-size:1.05rem;margin:0 0 .3rem;color:var(--cream)}
    .entry .alt{color:var(--muted);font-weight:400;font-size:.9rem;margin-left:6px}
    .entry p{margin:.2rem 0;font-size:.96rem}
    .entry .rem{color:var(--muted);font-size:.85rem;margin-top:.4rem}
    .entry .rem a.rem-link{color:var(--green);text-decoration:none;border-bottom:1px dashed var(--green)}
    .entry .rem a.rem-link:hover{color:var(--gold);border-bottom-color:var(--gold)}
    .entry .pat{color:var(--muted);font-size:.85rem;margin-top:.35rem}
    .entry .pat a.pat-link{color:var(--cream);text-decoration:none;border-bottom:1px dotted var(--muted)}
    .entry .pat a.pat-link:hover{border-bottom-color:var(--gold);color:var(--gold)}
    .entry.hl{background:var(--surface);border-radius:8px;margin:0 -10px;padding-left:10px;padding-right:10px;
      box-shadow:inset 3px 0 0 var(--green)}
    .entry .tox{margin-top:.55rem}
    .entry .tox .tox-h{color:var(--muted);font-size:.78rem;letter-spacing:.04em;text-transform:uppercase;margin-bottom:.3rem}
    .entry .tox ul{list-style:none;margin:0;padding:0}
    .entry .tox li{font-size:.86rem;padding:3px 0;line-height:1.5}
    .entry .tox .tox-name{color:var(--cream);font-weight:600}
    .entry .tox .tier{display:inline-block;font-size:.66rem;font-weight:700;letter-spacing:.03em;text-transform:uppercase;
      border-radius:6px;padding:1px 6px;margin-right:7px;vertical-align:1px}
    .entry .tox .tier.strong{background:var(--green);color:#08130d}
    .entry .tox .tier.moderate{background:var(--gold);color:#241a05}
    .entry .tox .tier.weak{background:var(--surface-2);color:var(--muted);border:1px solid var(--border)}
    .entry .tox .tier.traditional{background:#4a6b8a;color:#eaf2fb}
    .entry .tox .tier.contested{background:#8a5a3a;color:#fbeee2}
    .entry .tox .cat{color:var(--muted);font-size:.72rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin:.55rem 0 .2rem}
    .entry .tox .tox-note{color:var(--muted)}
    .entry .tox a.tox-src{color:var(--muted);text-decoration:none;border-bottom:1px dotted var(--muted);font-size:.78rem}
    .entry .tox a.tox-src:hover{color:var(--gold);border-bottom-color:var(--gold)}
    .count{color:var(--gold);font-size:.8rem;margin-bottom:.6rem}
    .muted{color:var(--muted)} .hidden{display:none}
  </style>
  <script src="/static/theme-toggle.js"></script>
</head><body>
  <div class="wrap">
    <a class="back" href="/learn/glossary">← Clinical Glossary</a>
    <div id="c-loading" class="muted">Loading…</div>
    <div id="c-notfound" class="hidden muted">We couldn't find that section. <a href="/learn/glossary">Back to the glossary</a>.</div>
    <div id="c-body" class="hidden">
      <h1 id="c-title"></h1>
      <p id="c-blurb" class="lead hidden"></p>
      <input id="c-filter" class="filter" type="text" placeholder="Filter…" autocomplete="off">
      <div id="c-count" class="count"></div>
      <div id="c-entries"></div>
    </div>
  </div>
  <script>
    function show(id){document.getElementById(id).classList.remove('hidden');}
    function hide(id){document.getElementById(id).classList.add('hidden');}
    var dim = decodeURIComponent(location.pathname.split('/').filter(Boolean).pop() || '');
    var ALL = [];
    function render(list){
      var host = document.getElementById('c-entries'); host.textContent = '';
      list.forEach(function(e){
        var d = document.createElement('div'); d.className='entry';
        if(e.slug) d.id = e.slug;
        var h = document.createElement('h3'); h.textContent = e.name || '';
        if(e.alt_name){ var a=document.createElement('span'); a.className='alt'; a.textContent='('+e.alt_name+')'; h.appendChild(a); }
        d.appendChild(h);
        if(e.description){ var p=document.createElement('p'); p.textContent = e.description; d.appendChild(p); }
        if(e.affects_links && e.affects_links.length){
          var af=document.createElement('div'); af.className='rem';
          af.appendChild(document.createTextNode('Affects: '));
          e.affects_links.forEach(function(x,i){
            if(i) af.appendChild(document.createTextNode(', '));
            if(x.slug){
              var a=document.createElement('a'); a.className='rem-link';
              a.href='/learn/glossary/organs#'+encodeURIComponent(x.slug); a.textContent=x.name;
              af.appendChild(a);
            } else { af.appendChild(document.createTextNode(x.name)); }
          });
          d.appendChild(af);
        }
        if(e.remedies && e.remedies.length){
          var r=document.createElement('div'); r.className='rem';
          r.appendChild(document.createTextNode('Related remedies: '));
          e.remedies.forEach(function(x, i){
            if(i) r.appendChild(document.createTextNode(', '));
            if(x.product_slug){
              var a=document.createElement('a'); a.className='rem-link';
              a.href='/begin/product/'+encodeURIComponent(x.product_slug);
              a.target='_blank'; a.rel='noopener'; a.textContent=x.name;
              r.appendChild(a);
            } else {
              r.appendChild(document.createTextNode(x.name));
            }
          });
          d.appendChild(r);
        }
        if(e.patterns && e.patterns.length){
          var pl=document.createElement('div'); pl.className='pat';
          pl.appendChild(document.createTextNode('Stress patterns: '));
          e.patterns.forEach(function(p, i){
            if(i) pl.appendChild(document.createTextNode(', '));
            var a=document.createElement('a'); a.className='pat-link';
            a.href='/learn/pattern/'+encodeURIComponent(p.slug); a.textContent=p.name;
            pl.appendChild(a);
          });
          d.appendChild(pl);
        }
        if(e.stress_factors && e.stress_factors.length){
          var CAT_LABEL={toxin:'Toxins',microbe:'Microbial',emotional:'Emotional (TCM)',physical:'Physical'};
          var CAT_ORDER=['toxin','microbe','emotional','physical'];
          var TIERS={strong:1,moderate:1,weak:1,traditional:1,contested:1};
          var tx=document.createElement('div'); tx.className='tox';
          var th=document.createElement('div'); th.className='tox-h'; th.textContent='Common stress factors'; tx.appendChild(th);
          CAT_ORDER.forEach(function(cat){
            var rows=e.stress_factors.filter(function(f){return (f.category||'')===cat;});
            if(!rows.length) return;
            var cl=document.createElement('div'); cl.className='cat'; cl.textContent=CAT_LABEL[cat]||cat; tx.appendChild(cl);
            var ul=document.createElement('ul');
            rows.forEach(function(t){
              var li=document.createElement('li');
              var tier=(t.tier||'').toLowerCase(); if(!TIERS[tier]) tier='weak';
              var badge=document.createElement('span'); badge.className='tier '+tier; badge.textContent=t.tier||'—'; li.appendChild(badge);
              var nm=document.createElement('span'); nm.className='tox-name'; nm.textContent=t.factor||''; li.appendChild(nm);
              if(t.note){ li.appendChild(document.createTextNode(' — ')); var nt=document.createElement('span'); nt.className='tox-note'; nt.textContent=t.note; li.appendChild(nt); }
              if(t.url){ li.appendChild(document.createTextNode(' ')); var a=document.createElement('a'); a.className='tox-src'; a.href=t.url; a.target='_blank'; a.rel='noopener'; a.textContent='['+(t.source||'source')+']'; li.appendChild(a); }
              ul.appendChild(li);
            });
            tx.appendChild(ul);
          });
          d.appendChild(tx);
        }
        host.appendChild(d);
      });
      document.getElementById('c-count').textContent = list.length + ' of ' + ALL.length;
    }
    function highlightHash(){
      if(!location.hash) return;
      var el=document.getElementById(decodeURIComponent(location.hash.slice(1)));
      if(el){ el.scrollIntoView({block:'center'}); el.classList.add('hl'); }
    }
    fetch('/learn/glossary-data/' + encodeURIComponent(dim), {credentials:'same-origin'})
      .then(function(r){ if(!r.ok) return null; return r.json(); })
      .then(function(d){
        hide('c-loading');
        if(!d || d.state === 'unknown'){ show('c-notfound'); return; }
        show('c-body');
        document.title = (d.title || 'Clinical Glossary') + ' · Dr. Glen Swartwout';
        document.getElementById('c-title').textContent = d.title || '';
        if(d.blurb){ var b=document.getElementById('c-blurb'); b.textContent=d.blurb; show('c-blurb'); }
        ALL = d.entries || [];
        render(ALL);
        highlightHash();
        var f = document.getElementById('c-filter');
        f.addEventListener('input', function(){
          var q = f.value.trim().toLowerCase();
          if(!q){ render(ALL); return; }
          render(ALL.filter(function(e){
            return (e.name||'').toLowerCase().indexOf(q) >= 0 || (e.description||'').toLowerCase().indexOf(q) >= 0;
          }));
        });
      })
      .catch(function(){ hide('c-loading'); show('c-notfound'); });
  </script>
</body></html>
