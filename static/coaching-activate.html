<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Start your coaching month</title>
<style>
  :root{ --bg:#0f1a14; --panel:#13241b; --ink:#eaf3ec; --muted:#9fb8a8; --gold:#d8b25a; --line:#22382b; --green:#5aa86b; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.6 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:560px;margin:0 auto;padding:48px 22px}
  h1{font-size:23px;margin:0 0 6px;font-weight:600}
  p{color:var(--muted)} .ink{color:var(--ink)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin:18px 0}
  .btn{display:inline-block;background:var(--gold);color:#1a1208;font-weight:700;border:none;
    border-radius:9px;padding:13px 26px;font-size:16px;cursor:pointer;text-decoration:none;margin-top:6px}
  .date{color:var(--gold);font-weight:600} a{color:var(--gold)}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
(function(){
  var d = window.__COACHING__ || {};
  var app = document.getElementById('app');
  function h(html){ app.innerHTML = html; }
  if(!d.valid){
    h('<h1>This link is no longer valid</h1><p>Open your member portal to start your coaching month when your remedies arrive.</p>');
    return;
  }
  if(d.confirmed){
    if(d.ok){
      h('<h1>Your coaching month has started ✓</h1>'
        + '<div class="panel"><p class="ink">You\'re in live group coaching through '
        + '<span class="date">' + (d.ends_at ? d.ends_at.slice(0,10) : 'the next 30 days') + '</span>.</p>'
        + '<p>Open your portal anytime to see what\'s next.</p></div>'
        + '<p><a href="/coaching">Go to your coaching portal →</a></p>');
    } else if(d.reason === 'ineligible' || d.offer_99){
      h('<h1>Start Continuous Care</h1>'
        + '<div class="panel"><p class="ink">Live group coaching runs with Continuous Care. '
        + 'You can start yours anytime.</p></div>'
        + '<p><a class="btn" href="/begin">See your options</a></p>');
    } else {
      h('<h1>We couldn\'t start coaching</h1><p>Please try again from your portal, or reply to your welcome email.</p>');
    }
    return;
  }
  // Step 1 -- preview + confirm
  h('<h1>Your remedies are on the way</h1>'
    + '<div class="panel"><p class="ink">Tap below once they arrive to start your '
    + (d.window_days || 30) + '-day live group coaching month'
    + (d.order_date ? ' (for your order from <span class="date">' + d.order_date + '</span>)' : '')
    + '.</p></div>'
    + '<form method="post" action=""><button class="btn" type="submit">My remedies arrived — start my coaching month</button></form>'
    + '<p style="margin-top:16px">Not yet? Just close this page and come back when they land.</p>');
})();
</script>
</body>
</html>
