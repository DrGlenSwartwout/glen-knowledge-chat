<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reviews &middot; Console</title>
<style>
  :root{ --bg:#0f1115; --card:#171a21; --line:#262b36; --fg:#e8ebf0; --muted:#9aa3b2;
         --accent:#5b8cff; --ok:#3fb968; --err:#e0556a; --warn:#d4a843; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--fg);
        font:15px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; }
  .wrap{ max-width:900px; margin:0 auto; padding:18px; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:10px;
         padding:16px; margin-bottom:14px; }
  h1{ font-size:20px; margin:0 0 4px; }
  .sub{ color:var(--muted); margin:0 0 14px; }
  .review-row{ border:1px solid var(--line); border-radius:8px; padding:14px;
               margin-bottom:10px; }
  .review-row .meta{ display:flex; gap:12px; align-items:baseline; flex-wrap:wrap;
                     margin-bottom:6px; }
  .review-row .product{ font-weight:600; }
  .review-row .stars{ color:var(--warn); letter-spacing:1px; }
  .review-row .author{ color:var(--muted); font-size:13px; }
  .review-row .body{ margin:6px 0; line-height:1.5; }
  .review-row .video-link{ font-size:13px; color:var(--accent); }
  .review-row .ai-block{ margin:8px 0; padding:8px 10px; border-radius:6px;
                         background:#1a1e2a; font-size:13px; color:var(--muted); }
  .review-row .ai-block .rec{ font-weight:600; }
  .review-row .ai-block .rec.yes{ color:var(--ok); }
  .review-row .ai-block .rec.no{ color:var(--err); }
  .review-row .pts{ font-size:13px; color:var(--muted); margin-bottom:8px; }
  .review-row .video-block{ margin:8px 0; padding:8px 10px; border-radius:6px;
                             background:#1a1e2a; font-size:13px; }
  .review-row .video-block .video-pts{ color:var(--muted); }
  .review-row .video-block .video-transcript{ color:var(--muted); margin-top:4px;
                                              font-style:italic; white-space:pre-wrap; }
  .review-row .publish-risk{ margin:8px 0; padding:8px 12px; border-radius:6px;
                              background:#2a1a1e; border:1px solid var(--err);
                              font-size:13px; font-weight:600; color:var(--err); }
  .review-row .publish-risk .risk-icon{ margin-right:5px; }
  .row{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .btn{ border:0; border-radius:8px; padding:7px 14px; font:inherit; cursor:pointer;
        font-size:13px; }
  .btn.approve{ background:var(--ok); color:#fff; }
  .btn.reject{ background:var(--err); color:#fff; }
  .btn.feature{ background:var(--warn); color:#000; }
  .btn:disabled{ opacity:.5; cursor:default; }
  .action-status{ font-size:12px; color:var(--muted); margin-top:6px; }
  .empty{ color:var(--muted); padding:20px 0; }
  .gift-block{ margin:8px 0; padding:8px 12px; border-radius:6px; background:#1a2218;
               border:1px solid #3a5a30; font-size:13px; }
  .gift-block .gift-label{ font-weight:600; color:var(--ok); }
  .gift-block .gift-reason{ color:var(--muted); margin-left:6px; }
  .gift-block .gift-actions{ margin-top:8px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .btn.gift-approve{ background:var(--ok); color:#fff; }
  .btn.gift-reject{ background:var(--err); color:#fff; }
  .btn.gift-swap{ background:var(--accent); color:#fff; }
  select.gift-sku-select{ font:inherit; font-size:13px; border-radius:6px; padding:5px 8px;
                           background:var(--card); color:var(--fg); border:1px solid var(--line); }
  #gate{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
         background:var(--bg); z-index:50; }
</style>
</head>
<body>
<script src="/static/op-nav.js" data-active="bos" data-sub="reviews"></script>

<div id="gate" style="display:none"><div class="card" style="min-width:300px">
  <h2>Console key</h2>
  <input id="key" type="password" placeholder="CONSOLE_SECRET" style="width:100%;padding:8px">
  <p style="margin-top:10px"><button class="btn approve" onclick="unlock()">Unlock</button></p>
</div></div>

<div id="app" class="wrap" style="display:none">
  <h1>Review Moderation</h1>
  <p class="sub">Pending reviews awaiting moderation. Approve, reject, or feature each one.</p>
  <div id="list"></div>
</div>

<script>
function key(){ return localStorage.getItem('console_key') || ''; }
(function(){ var u=new URLSearchParams(location.search).get('key'); if(u) localStorage.setItem('console_key', u); })();
function unlock(){ localStorage.setItem('console_key', document.getElementById('key').value);
  document.getElementById('gate').style.display='none'; boot(); }
const $ = id => document.getElementById(id);
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function api(method, path, body){
  const opt = { method, headers:{'X-Console-Key':key()} };
  if(body){ opt.headers['Content-Type']='application/json'; opt.body=JSON.stringify(body); }
  const r = await fetch(path, opt);
  return { ok:r.ok, status:r.status, json: await r.json().catch(()=>({})) };
}

function stars(n){
  var s=''; for(var i=1;i<=5;i++) s += (i<=n ? '★' : '☆');
  return s;
}

var _catalog = [];

async function loadCatalog(){
  const r = await api('GET', '/api/console/gift-catalog');
  if(r.ok && r.json.catalog) _catalog = r.json.catalog;
}

function giftBlock(rv, i){
  if(!rv.gift) return '';
  const g = rv.gift;
  if(g.status !== 'suggested') return '';
  const opts = _catalog.map(c =>
    `<option value="${esc(c.sku)}"${c.sku===g.gift_sku?' selected':''}>${esc(c.label)}</option>`
  ).join('');
  return `<div class="gift-block" id="gift-block-${i}">
    Suggested gift: <span class="gift-label">${esc(g.gift_label)}</span>
    <span class="gift-reason">&mdash; ${esc(g.reason)}</span>
    <div class="gift-actions">
      <button class="btn gift-approve" onclick="actGiftApprove(${rv.id}, ${i})">Approve</button>
      <select class="gift-sku-select" id="gift-sku-${i}">${opts}</select>
      <button class="btn gift-swap" onclick="actGiftSwap(${rv.id}, ${i})">Swap + Approve</button>
      <button class="btn gift-reject" onclick="actGift(${rv.id}, 'reviews.gift_reject', {review_id:${rv.id}}, ${i})">Reject</button>
    </div>
    <div class="action-status" id="gift-status-${i}"></div>
  </div>`;
}

function boot(){
  if(!key()){ $('gate').style.display='flex'; return; }
  $('app').style.display='block';
  loadCatalog().then(loadList);
}

async function loadList(){
  const r = await api('GET', '/api/console/reviews');
  if(!r.ok){ $('list').innerHTML='<p class="empty">Could not load (check console key).</p>'; return; }
  const pending = r.json.pending || [];
  if(!pending.length){ $('list').innerHTML='<p class="empty">No pending reviews.</p>'; return; }
  $('list').innerHTML = pending.map((rv, i) => {
    const aiYes = rv.ai_recommend_publish;
    const recLabel = aiYes ? 'Recommend: publish' : 'Recommend: hold';
    const recCls = aiYes ? 'yes' : 'no';
    const videoLinkBlock = rv.video_url
      ? `<div><a class="video-link" href="${esc(rv.video_url)}" target="_blank" rel="noopener">Video link &#8599;</a></div>`
      : '';
    const videoScoredBlock = rv.video_status === 'scored'
      ? `<div class="video-block">
           <span class="video-pts">Video score: ${esc(rv.video_points != null ? rv.video_points : 0)} pts</span>
           ${rv.transcript ? `<div class="video-transcript">${esc(rv.transcript)}</div>` : ''}
         </div>`
      : '';
    const publishRiskBlock = rv.publish_risk
      ? `<div class="publish-risk"><span class="risk-icon">!</span>PUBLISH RISK: ${esc(rv.video_verdict || '')}</div>`
      : '';
    const isTestimonial = rv.product_slug === '_results';
    const testimonialBlock = isTestimonial
      ? `<div class="meta" style="opacity:.85;font-size:13px">`
        + `Public consent: ${rv.consent_public ? 'Yes' : 'No'}`
        + (rv.practitioner_id ? ` &middot; Practitioner #${esc(rv.practitioner_id)}` : '')
        + `</div>`
      : '';
    return `<div class="review-row" id="row-${i}">
      <div class="meta">
        <span class="product">${esc(rv.product_name || rv.product_slug)}</span>
        ${isTestimonial ? '<span class="tag" style="color:var(--gold,#d4a843)">· Testimonial</span>' : ''}
        <span class="stars">${esc(stars(rv.rating))}</span>
        <span class="author">${esc(rv.email)}</span>
      </div>
      ${testimonialBlock}
      <div class="body">${esc(rv.body || '')}</div>
      ${videoLinkBlock}
      ${publishRiskBlock}
      ${videoScoredBlock}
      <div class="ai-block">
        <span class="rec ${recCls}">${esc(recLabel)}</span>
        ${rv.ai_verdict ? ` &mdash; ${esc(rv.ai_verdict)}` : ''}
      </div>
      <div class="pts">Points awarded: ${esc(rv.points_awarded != null ? rv.points_awarded : 0)}</div>
      ${giftBlock(rv, i)}
      <div class="row">
        <button class="btn approve" onclick="act(${rv.id}, 'reviews.approve', {id:${rv.id}}, ${i})">Approve</button>
        <button class="btn reject"  onclick="act(${rv.id}, 'reviews.reject',  {id:${rv.id}}, ${i})">Reject</button>
        <button class="btn feature" onclick="act(${rv.id}, 'reviews.feature', {id:${rv.id}, on:true}, ${i})">Feature</button>
      </div>
      <div class="action-status" id="status-${i}"></div>
    </div>`;
  }).join('');
}

async function actGift(rid, actionKey, params, rowIdx){
  const statusEl = $('gift-status-'+rowIdx);
  if(statusEl) statusEl.textContent = 'Working...';
  const r = await api('POST', '/api/action/'+actionKey, params);
  if(r.ok && r.json.status==='done'){
    const blk = $('gift-block-'+rowIdx);
    if(blk) blk.innerHTML = '<span style="color:var(--muted)">Gift ' + actionKey.split('.')[1].replace('gift_','') + '.</span>';
  } else {
    if(statusEl) statusEl.textContent = 'Failed: ' + (r.json.error || r.status);
  }
}

function actGiftApprove(rid, rowIdx){
  actGift(rid, 'reviews.gift_approve', {review_id: rid}, rowIdx);
}

function actGiftSwap(rid, rowIdx){
  const sel = $('gift-sku-'+rowIdx);
  const sku = sel ? sel.value : '';
  actGift(rid, 'reviews.gift_approve', {review_id: rid, sku: sku}, rowIdx);
}

async function act(rid, actionKey, params, rowIdx){
  const statusEl = $('status-'+rowIdx);
  statusEl.textContent = 'Working...';
  const r = await api('POST', '/api/action/'+actionKey, params);
  if(r.ok && r.json.status==='done'){
    statusEl.textContent = actionKey.split('.')[1] + ' done.';
    const row = $('row-'+rowIdx);
    if(row && actionKey !== 'reviews.feature'){
      setTimeout(() => { row.style.opacity='0.4'; }, 400);
    }
  } else {
    statusEl.textContent = 'Action failed: ' + (r.json.error || r.status);
  }
}

boot();
</script>
</body>
</html>
