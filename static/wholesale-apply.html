<!DOCTYPE html>
<html lang="en"><head>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apply for Wholesale — Remedy Match</title>
<style>
  :root{--bg:#0a150d;--card:#111f16;--line:#21472d;--gold:#d4a843;--text:#fdf4d8;--muted:#bcd3c2;--accent:#6ea8fe}
  *{box-sizing:border-box} body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;margin:0;padding:24px;line-height:1.5}
  .wrap{max-width:540px;margin:0 auto}
  h1{color:var(--gold);margin:0 0 6px} .sub{color:var(--muted);margin:0 0 20px;font-size:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px}
  label{display:block;font-size:13px;color:var(--muted);margin:12px 0 4px}
  input,textarea{width:100%;background:#0a150d;color:var(--text);border:1px solid var(--line);border-radius:8px;padding:10px;font-size:14px;font-family:inherit}
  input:focus,textarea:focus{outline:none;border-color:var(--accent)}
  .row{display:flex;gap:10px} .row > div{flex:1}
  .tos{display:flex;gap:8px;align-items:flex-start;margin:16px 0 4px;font-size:13px;color:var(--text)}
  .tos input{width:auto;margin-top:3px;flex-shrink:0} .tos a{color:var(--accent)}
  .err{color:#e08a8a;font-size:13px;min-height:1em;margin:8px 0 0}
  button{margin-top:14px;width:100%;background:var(--gold);color:#0a150d;border:0;border-radius:8px;padding:12px;font-size:15px;font-weight:600;cursor:pointer}
  button:disabled{opacity:.5;cursor:not-allowed}
  .ok{color:#8fd19e;text-align:center;padding:8px 0;font-size:15px}
  .hint{font-size:12px;color:var(--muted);margin-top:2px}
</style></head><body>
<div class="wrap">
  <h1>Apply for Wholesale</h1>
  <p class="sub">For licensed practitioners, certified coaches, and resellers with a resale license. We review each application and email you when you're approved to order at wholesale.</p>
  <div class="card" id="form">
    <div class="row">
      <div><label>First &amp; last name *</label><input id="name" autocomplete="name" placeholder="Jane Smith"></div>
    </div>
    <label>Email *</label><input id="email" type="email" autocomplete="email" placeholder="you@practice.com">
    <div class="row">
      <div><label>Resale license / certificate # *</label><input id="resale" placeholder="e.g. GE-123-4567"></div>
      <div><label>State</label><input id="state" placeholder="HI" maxlength="2" style="text-transform:uppercase"></div>
    </div>
    <label>Practice / business name</label><input id="practice" placeholder="Optional">
    <label>Phone</label><input id="phone" type="tel" autocomplete="tel" placeholder="Optional">
    <label>Credentials / notes</label><textarea id="notes" rows="2" placeholder="Optional — license, certification, anything we should know"></textarea>
    <label class="tos"><input id="tos" type="checkbox">
      <span>I understand this is wellness coaching and education, not medical advice, and I agree to the
      <a href="https://illtowell.com/terms" target="_blank" rel="noopener">Terms &amp; Conditions</a>.</span></label>
    <div class="err" id="err"></div>
    <button id="submit">Submit application</button>
  </div>
</div>
<script>
const BASE = "";
const $ = id => document.getElementById(id);
$("submit").addEventListener("click", async () => {
  const name = $("name").value.trim(), email = $("email").value.trim();
  const resale = $("resale").value.trim();
  const err = $("err");
  if(!name){ err.textContent = "Please enter your first and last name."; return; }
  if(!email || email.indexOf("@") < 1){ err.textContent = "Please enter a valid email."; return; }
  if(!resale){ err.textContent = "A resale license / certificate number is required."; return; }
  if(!$("tos").checked){ err.textContent = "Please agree to the Terms to apply."; return; }
  err.textContent = "";
  const btn = $("submit"); btn.disabled = true; btn.textContent = "Submitting…";
  try{
    const r = await fetch(BASE + "/api/wholesale/apply", {
      method:"POST", credentials:"same-origin", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        name, email, resale_license_number: resale,
        license_state: $("state").value.trim(),
        practice_name: $("practice").value.trim(),
        phone: $("phone").value.trim(),
        credentials: $("notes").value.trim(),
        tos: true
      })
    });
    const d = await r.json().catch(()=>({}));
    if(r.ok && d.ok){
      $("form").innerHTML = '<div class="ok">'+(d.message||"Application received. Check your email.")+'</div>';
    }else{
      btn.disabled = false; btn.textContent = "Submit application";
      err.textContent = d.error || ("Error (HTTP "+r.status+")");
    }
  }catch(e){
    btn.disabled = false; btn.textContent = "Submit application";
    err.textContent = "Connection hiccup. Please try again.";
  }
});
</script></body></html>
