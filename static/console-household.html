<!doctype html><html><head><meta charset="utf-8"><title>Household</title>
<style>body{font-family:-apple-system,sans-serif;max-width:820px;margin:24px auto;padding:0 16px}
input,select,button{padding:6px 8px;margin:2px}table{border-collapse:collapse;width:100%}
td,th{border:1px solid #ccc;padding:6px;text-align:left;font-size:14px}.err{color:#b00}</style></head>
<body>
<script src="/static/op-nav.js" data-active="fulfillment" data-sub="household"></script>
<h1>Household accounts</h1>
<p>Primary: <input id="primary" placeholder="caregiver@email"><button onclick="load()">Load</button></p>
<div id="out"></div>
<h3>Reassign a scan</h3>
<p>Date <input id="rd" placeholder="2026-06-25"> from <input id="rf" placeholder="wrong@email">
to <input id="rt" placeholder="right@email"> <button onclick="reassign()">Reassign</button>
<span id="rerr" class="err"></span></p>
<script>
// Auth: accept ?key= (scriptable), but persist it and fall back to the SAME
// localStorage key the main console stores, so an already-unlocked console
// session works here without re-pasting the key into this page's URL.
const KEY = (function(){
  const k = new URLSearchParams(location.search).get("key");
  if (k) { try { localStorage.setItem("console_key", k); } catch(e){} }
  try { return localStorage.getItem("console_key") || ""; } catch(e){ return k || ""; }
})();
const H = {"Content-Type":"application/json","X-Console-Key":KEY};
const esc = s => String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
async function load(){
  const p = document.getElementById("primary").value.trim().toLowerCase();
  const r = await fetch("/api/console/household?primary_email="+encodeURIComponent(p),{headers:H});
  if(!r.ok){
    // Never fall through to an empty table on a failed load: an empty table is
    // indistinguishable from "this caregiver has no members" and silently lies.
    document.getElementById("out").innerHTML = `<p class="err">${r.status === 401
      ? "Unauthorized. Unlock the main console (/console) and reload this page, or open this page with ?key=&lt;console key&gt;."
      : "Load failed (HTTP " + r.status + ")."}</p>`;
    return;
  }
  const j = await r.json();
  let h = `<table><tr><th>Member</th><th>Label</th><th>Rel</th><th>Scan dates</th><th>Share</th><th>CC</th><th></th></tr>`;
  for(const m of (j.members||[])){
    h += `<tr><td>${esc(m.email)}</td><td>${esc(m.label)}</td><td>${esc(m.relationship)}</td>
      <td>${(m.scan_dates||[]).map(esc).join(", ")}</td>
      <td><input type="checkbox" class="hh-share" data-member="${esc(m.email)}" ${m.share_consent ? "checked":""}></td>
      <td><input type="checkbox" class="hh-cc" data-member="${esc(m.email)}" ${m.cc_enabled ? "checked":""}></td>
      <td><button class="hh-rm" data-email="${esc(m.email)}">remove</button></td></tr>`;
  }
  h += `</table><p>Add member: <input id="me" placeholder="member@email">
    <input id="ml" placeholder="label"> <input id="mrel" placeholder="pet/child/…">
    <button onclick="add()">Add</button></p>`;
  document.getElementById("out").innerHTML = h;
  document.querySelectorAll(".hh-rm").forEach(b => b.addEventListener("click", () => rm(b.dataset.email)));
  document.querySelectorAll(".hh-share").forEach(el => el.addEventListener("change", () =>
    fetch("/api/console/household",{method:"POST",headers:H,body:JSON.stringify(
      {primary_email:document.getElementById("primary").value.trim().toLowerCase(),
       member_email:el.dataset.member, share_consent: el.checked?1:0})})));
  document.querySelectorAll(".hh-cc").forEach(el => el.addEventListener("change", () =>
    fetch("/api/console/household",{method:"POST",headers:H,body:JSON.stringify(
      {primary_email:document.getElementById("primary").value.trim().toLowerCase(),
       member_email:el.dataset.member, cc_enabled: el.checked?1:0})})));
}
async function add(){
  const p=document.getElementById("primary").value.trim().toLowerCase();
  const r = await fetch("/api/console/household",{method:"POST",headers:H,body:JSON.stringify({
    primary_email:p, member_email:document.getElementById("me").value.trim(),
    label:document.getElementById("ml").value, relationship:document.getElementById("mrel").value})});
  if(!r.ok){
    // Surface the failure. Silently calling load() here made a rejected add look
    // like a successful one that simply didn't show up.
    document.getElementById("out").innerHTML = `<p class="err">Add failed (HTTP ${r.status})${
      r.status === 401 ? ". Unlock the main console (/console) and reload this page." : "."}</p>`;
    return;
  }
  load();
}
async function rm(email){
  const p=document.getElementById("primary").value.trim().toLowerCase();
  const r = await fetch("/api/console/household",{method:"DELETE",headers:H,
    body:JSON.stringify({primary_email:p, member_email:email})});
  if(!r.ok){
    document.getElementById("out").innerHTML = `<p class="err">Remove failed (HTTP ${r.status})${
      r.status === 401 ? ". Unlock the main console (/console) and reload this page." : "."}</p>`;
    return;
  }
  load();
}
async function reassign(){
  document.getElementById("rerr").textContent="";
  const r = await fetch("/api/console/household/reassign",{method:"POST",headers:H,body:JSON.stringify({
    scan_date:document.getElementById("rd").value.trim(),
    from_email:document.getElementById("rf").value.trim(),
    to_email:document.getElementById("rt").value.trim()})});
  const j = await r.json();
  if(!j.ok){ document.getElementById("rerr").textContent = j.error || "failed"; return; }
  load();
}
</script></body></html>
