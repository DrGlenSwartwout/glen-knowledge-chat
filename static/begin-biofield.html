<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Biofield Analysis - Dr. Glen Swartwout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Raleway:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a150d;
      --surface: #111f16;
      --surface-2: #162318;
      --border: #21472d;
      --cream: #fdf4d8;
      --muted: #a89870;
      --gold: #d4a843;
      --green: #3d8a52;
      --maxw: 760px;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body {
      background: var(--bg);
      color: var(--cream);
      font-family: "Open Sans", system-ui, sans-serif;
      font-weight: 400;
      line-height: 1.7;
      font-size: 17px;
      letter-spacing: 0.01em;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      background-image:
        radial-gradient(120% 80% at 50% -10%, rgba(212, 168, 67, 0.07), transparent 60%),
        radial-gradient(100% 60% at 50% 110%, rgba(61, 138, 82, 0.05), transparent 60%);
      background-attachment: fixed;
      padding-bottom: 80px;
    }
    ::selection { background: rgba(212, 168, 67, 0.25); color: var(--cream); }
    h1, h2, h3 {
      font-family: "Raleway", system-ui, sans-serif;
      font-weight: 600;
      line-height: 1.22;
      letter-spacing: -0.01em;
    }
    a { color: inherit; text-decoration: none; }

    .shell { max-width: var(--maxw); margin: 0 auto; padding: 0 24px; }

    .brandbar {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 30px 24px 8px;
      display: flex; align-items: center; justify-content: center; gap: 14px;
    }
    .brand-name {
      font-family: "Raleway", system-ui, sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.85;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 20px;
    }

    /* --- Interpretation --- */
    .interp-greeting {
      font-size: 24px;
      color: var(--cream);
      margin-bottom: 18px;
    }
    .interp-body p {
      color: var(--cream);
      margin-bottom: 14px;
    }
    .interp-body p:last-child { margin-bottom: 0; }

    /* --- ToS gate --- */
    .tos-gate {
      max-width: 480px;
      margin: 60px auto 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      text-align: center;
    }
    .tos-gate h2 {
      font-size: 20px;
      color: var(--cream);
      margin-bottom: 14px;
    }
    .tos-gate p {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 22px;
    }
    .tos-check-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      text-align: left;
      margin-bottom: 22px;
      justify-content: center;
    }
    .tos-check-row input[type="checkbox"] {
      margin-top: 3px;
      accent-color: var(--gold);
      width: 16px; height: 16px;
      flex: none;
    }
    .tos-check-row label {
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
    }
    .tos-agree-btn {
      display: inline-block;
      background: var(--gold);
      color: #0a150d;
      font-family: "Raleway", system-ui, sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.04em;
      padding: 13px 28px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }
    .tos-agree-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .tos-msg {
      color: var(--muted);
      font-size: 13px;
      margin-top: 12px;
    }

    /* --- Remedy card --- */
    .remedy-section { margin-top: 28px; }
    .remedy-section-label {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 10px;
    }
    .remedy-name-link {
      font-size: 26px;
      color: var(--cream);
      margin-bottom: 10px;
      display: block;
      text-decoration: underline;
      text-decoration-color: rgba(212, 168, 67, 0.4);
    }
    .remedy-name-link:hover {
      text-decoration-color: var(--gold);
    }
    .remedy-meaning {
      color: var(--muted);
      font-size: 16px;
      margin-bottom: 22px;
    }
    .buy-btn {
      display: inline-block;
      background: var(--gold);
      color: #0a150d;
      font-family: "Raleway", system-ui, sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.04em;
      padding: 13px 28px;
      border-radius: 8px;
      text-decoration: none;
      border: none;
      cursor: pointer;
    }

    /* --- Free reveal button --- */
    .free-reveal-btn {
      display: inline-block;
      background: var(--gold);
      color: #0a150d;
      font-family: "Raleway", system-ui, sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.04em;
      padding: 13px 28px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }
    .free-reveal-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .free-reveal-msg {
      color: var(--muted);
      font-size: 14px;
      margin-top: 12px;
    }

    /* --- Blurred section --- */
    .blurred-section { margin-top: 32px; }
    .blurred-section-label {
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 14px;
    }
    .blurred-stack { position: relative; }
    .blurred-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 24px;
      margin-bottom: 10px;
      filter: blur(6px);
      user-select: none;
      pointer-events: none;
    }
    .blurred-card-inner {
      height: 18px;
      background: rgba(253, 244, 216, 0.12);
      border-radius: 4px;
      width: 60%;
    }
    .blurred-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 0%, rgba(10, 21, 13, 0.72) 100%);
      border-radius: 10px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 18px;
    }
    .blurred-teaser {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    /* --- CTA stub --- */
    .cta-section { margin-top: 28px; text-align: center; }
    .cta-btn-disabled {
      display: inline-block;
      background: var(--surface-2);
      color: var(--muted);
      font-family: "Raleway", system-ui, sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.04em;
      padding: 13px 28px;
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: not-allowed;
      opacity: 0.7;
    }
    .cta-note {
      color: var(--muted);
      font-size: 13px;
      margin-top: 10px;
    }

    /* --- Invalid token --- */
    .invalid-card {
      max-width: 480px;
      margin: 80px auto 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      text-align: center;
    }
    .invalid-card h2 {
      font-size: 20px;
      color: var(--cream);
      margin-bottom: 14px;
    }
    .invalid-card p {
      color: var(--muted);
      font-size: 15px;
    }

    /* --- Titled stress-pattern layers --- */
    .bf-layer{ margin-top:22px; padding-top:16px; border-top:1px solid var(--border,#ddd); }
    .bf-layer .layer-title{ font-weight:700; font-size:1.05em; }
    .bf-layer .layer-summary{ color:var(--muted,#666); margin:6px 0 10px; white-space:pre-wrap; }
    .bf-layer .layer-blurred{ filter:blur(5px); user-select:none; pointer-events:none; }

    /* --- Cart affordances + sticky bar --- */
    .bf-cart-row{ display:flex; align-items:center; gap:10px; margin-top:10px; }
    .bf-cart-row input[type=number]{ width:64px; padding:6px; }
    #bf-cart-bar{ position:sticky; bottom:0; left:0; right:0; margin-top:24px;
      background:var(--card,#fff); border-top:1px solid var(--border,#ddd);
      padding:14px 18px; display:none; align-items:center; justify-content:space-between; gap:14px; }
    #bf-cart-bar.show{ display:flex; }
    #bf-cart-bar .bf-cart-total{ font-weight:600; }
    #bf-cart-bar .bf-cart-save{ color:#2e7d32; font-size:0.9em; }
    #bf-cart-bar button{ padding:10px 18px; cursor:pointer; }
    #bf-cart-bar button[disabled]{ opacity:0.5; cursor:default; }
    /* --- In-app order review (items + shipping) before Stripe --- */
    #bf-review-back{ position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; z-index:60; }
    #bf-review-back.show{ display:block; }
    #bf-review{ position:fixed; z-index:61; left:50%; top:50%; transform:translate(-50%,-50%);
      width:min(520px,92vw); max-height:90vh; overflow:auto; background:var(--card,#fff);
      color:var(--text,#1a1a1a); border-radius:14px; padding:22px 24px; box-shadow:0 18px 50px rgba(0,0,0,.4); }
    #bf-review h3{ margin:0 0 4px; font-size:20px; }
    #bf-review .sub{ color:var(--muted,#667); font-size:13px; margin:0 0 14px; }
    #bf-review .r-items{ border:1px solid var(--border,#e2e2e2); border-radius:10px; padding:10px 12px; margin-bottom:14px; }
    #bf-review .r-line{ display:flex; justify-content:space-between; padding:3px 0; font-size:14px; }
    #bf-review .r-total{ font-weight:700; border-top:1px solid var(--border,#e2e2e2); margin-top:6px; padding-top:6px; }
    #bf-review label{ display:block; font-size:12px; color:var(--muted,#667); margin:8px 0 3px; }
    #bf-review input{ width:100%; padding:9px 11px; border-radius:8px; border:1px solid var(--border,#ccc); font-size:14px; }
    #bf-review .row2{ display:flex; gap:10px; } #bf-review .row2>div{ flex:1; }
    #bf-review .r-actions{ display:flex; gap:10px; align-items:center; margin-top:18px; }
    #bf-review .r-actions button{ padding:11px 18px; border-radius:9px; cursor:pointer; }
    #bf-review .r-pay{ background:var(--accent,#2e7d32); color:#fff; border:none; font-weight:600; flex:1; }
    #bf-review .r-pay[disabled]{ opacity:.5; cursor:default; }
    #bf-review .r-cancel{ background:none; border:none; color:var(--muted,#667); cursor:pointer; }
    #bf-review .r-err{ color:#c0392b; font-size:13px; margin-top:8px; min-height:1em; }
    #bf-review .r-secure{ color:var(--muted,#667); font-size:12px; margin-top:10px; text-align:center; }
    @keyframes bf-pulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(46,125,50,.0); } 50%{ box-shadow:0 0 0 6px rgba(46,125,50,.35); } }
    .bf-pulse{ animation:bf-pulse 1s ease-in-out 2; border-radius:8px; }
  </style>
</head>
<body>
  <div class="brandbar">
    <span class="brand-name">Dr. Glen Swartwout</span>
  </div>

  <div id="app-root" class="shell"></div>

  <script>
    (function () {
      var reveal = window.__REVEAL__;
      var root = document.getElementById("app-root");

      // Extract token from URL path: last non-empty segment
      var _pathParts = location.pathname.replace(/\/+$/, "").split("/");
      var _token = _pathParts[_pathParts.length - 1] || "";

      // ---------------------------------------------------------------
      // State 1: Invalid token
      // ---------------------------------------------------------------
      if (reveal === null) {
        var card = document.createElement("div");
        card.className = "invalid-card";
        var h = document.createElement("h2");
        h.textContent = "This link is no longer valid.";
        var p = document.createElement("p");
        p.textContent = "Please request a fresh one.";
        card.appendChild(h);
        card.appendChild(p);
        var btn = document.createElement("button");
        btn.textContent = "Request a fresh link";
        btn.className = "resend-btn";
        btn.onclick = function(){
          btn.disabled = true;
          fetch("/link/resend", {method:"POST", headers:{"Content-Type":"application/json"},
                                 body: JSON.stringify({token: _token})})
            .then(function(){ p.textContent = "Check your email for a fresh link."; })
            .catch(function(){ btn.disabled = false; });
        };
        card.appendChild(btn);
        root.appendChild(card);
        return;
      }

      // ---------------------------------------------------------------
      // State 2: ToS gate (not a member yet)
      // ---------------------------------------------------------------
      if (reveal.needs_tos) {
        var tosCard = document.createElement("div");
        tosCard.className = "tos-gate";

        var tosH = document.createElement("h2");
        tosH.textContent = "Your Biofield Analysis is ready.";
        tosCard.appendChild(tosH);

        var tosP = document.createElement("p");
        tosP.textContent = "To view your personal Biofield Analysis, please agree to our terms.";
        tosCard.appendChild(tosP);

        var checkRow = document.createElement("div");
        checkRow.className = "tos-check-row";

        var chk = document.createElement("input");
        chk.type = "checkbox";
        chk.id = "tos-chk";
        checkRow.appendChild(chk);

        var lbl = document.createElement("label");
        lbl.setAttribute("for", "tos-chk");
        lbl.textContent = "I agree to the terms of service and consent to receive personalized health information.";
        checkRow.appendChild(lbl);
        tosCard.appendChild(checkRow);

        var agreeBtn = document.createElement("button");
        agreeBtn.className = "tos-agree-btn";
        agreeBtn.textContent = "Agree and view";
        agreeBtn.disabled = true;
        tosCard.appendChild(agreeBtn);

        var tosMsg = document.createElement("p");
        tosMsg.className = "tos-msg";
        tosCard.appendChild(tosMsg);

        chk.addEventListener("change", function () {
          agreeBtn.disabled = !chk.checked;
        });

        agreeBtn.addEventListener("click", function () {
          if (!chk.checked) return;
          agreeBtn.disabled = true;
          tosMsg.textContent = "Saving...";
          fetch("/begin/unlock", {
            method: "POST",
            credentials: "same-origin",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({trigger: "tos", email: reveal.email, tos: true})
          }).then(function (res) { return res.json(); }).then(function () {
            location.reload();
          }).catch(function () {
            tosMsg.textContent = "Something went wrong. Please try again.";
            agreeBtn.disabled = false;
          });
        });

        root.appendChild(tosCard);
        return;
      }

      // ---------------------------------------------------------------
      // State 3: Member -- render interpretation + remedies area
      // ---------------------------------------------------------------
      var data = reveal;

      // -- Interpretation card --
      var interp = data.interpretation || {};
      if (interp.greeting || interp.body) {
        var interpCard = document.createElement("div");
        interpCard.className = "card";
        interpCard.style.marginTop = "32px";

        if (interp.greeting) {
          var greetEl = document.createElement("h2");
          greetEl.className = "interp-greeting";
          greetEl.textContent = interp.greeting;
          interpCard.appendChild(greetEl);
        }

        if (interp.body) {
          var bodyDiv = document.createElement("div");
          bodyDiv.className = "interp-body";
          var lines = interp.body.split("\n");
          var buf = [];
          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            if (line.trim() === "") {
              if (buf.length) {
                var pEl = document.createElement("p");
                pEl.textContent = buf.join(" ");
                bodyDiv.appendChild(pEl);
                buf = [];
              }
            } else {
              buf.push(line);
            }
          }
          if (buf.length) {
            var pEl2 = document.createElement("p");
            pEl2.textContent = buf.join(" ");
            bodyDiv.appendChild(pEl2);
          }
          interpCard.appendChild(bodyDiv);
        }
        root.appendChild(interpCard);
      }

      // -- Helper: render a single remedy (name link + meaning + Order btn + optional cart row) --
      var cartItems = {};  // slug -> qty (only checked items)

      function renderRemedyInto(container, rem) {
        var nameLink = document.createElement("a");
        nameLink.className = "remedy-name-link";
        nameLink.setAttribute("href", rem.page_url || "/begin/match");
        nameLink.setAttribute("target", "_blank");
        nameLink.setAttribute("rel", "noopener");
        nameLink.textContent = rem.name || "";
        container.appendChild(nameLink);

        if (rem.meaning) {
          var meaningEl = document.createElement("p");
          meaningEl.className = "remedy-meaning";
          meaningEl.textContent = rem.meaning;
          container.appendChild(meaningEl);
        }

        // Order routes through the in-app review (items + shipping) before Stripe —
        // no more jumping straight to a bare payment screen. Falls back to the direct
        // buy link only when the cart isn't enabled.
        var orderBtn;
        if (data.cart_enabled && rem.slug) {
          orderBtn = document.createElement("button");
          orderBtn.type = "button";
          orderBtn.addEventListener("click", function () { openReview([{ slug: rem.slug, qty: 1 }]); });
        } else {
          orderBtn = document.createElement("a");
          orderBtn.setAttribute("href", rem.buy_url || "/begin/match");
        }
        orderBtn.className = "buy-btn";
        orderBtn.textContent = "Order";
        container.appendChild(orderBtn);

        if (data.cart_enabled && rem.slug) {
          var row = document.createElement("div");
          row.className = "bf-cart-row";
          var cb = document.createElement("input");
          cb.type = "checkbox"; cb.checked = true;
          var qty = document.createElement("input");
          qty.type = "number"; qty.min = "1"; qty.value = "1";
          var lbl = document.createElement("span");
          lbl.textContent = "Add to my order";
          cartItems[rem.slug] = 1;
          function sync() {
            if (cb.checked) { cartItems[rem.slug] = Math.max(1, parseInt(qty.value || "1", 10)); }
            else { delete cartItems[rem.slug]; }
            refreshCartBar();
          }
          cb.addEventListener("change", sync);
          qty.addEventListener("input", sync);
          row.appendChild(cb); row.appendChild(qty); row.appendChild(lbl);
          container.appendChild(row);
        }
      }

      // -- Titled stress-pattern layers (new reveals carry data.layers) --
      function renderLayers(root, data) {
        var layers = data.layers || [];
        for (var i = 0; i < layers.length; i++) {
          var L = layers[i];
          var sec = document.createElement("div");
          sec.className = "bf-layer";
          var t = document.createElement("div"); t.className = "layer-title"; t.textContent = L.title || ("Layer " + (L.n || (i + 1)));
          sec.appendChild(t);
          if (L.summary) { var s = document.createElement("p"); s.className = "layer-summary"; s.textContent = L.summary; sec.appendChild(s); }
          if (L.remedy && L.remedy.slug) {
            renderRemedyInto(sec, L.remedy);              // existing helper: name link + meaning + Order btn (+ #4c cart row)
          } else if (L.remedy_blurred) {
            var b = document.createElement("p"); b.className = "layer-blurred"; b.textContent = "Your matched remedy for this layer";
            sec.appendChild(b);
          }
          root.appendChild(sec);
        }
      }

      // -- Decide how to render the remedy area:
      //    (a) layered: titled stress-pattern layers
      //    (b) paid flat: all remedies visible
      //    (c) non-paid flat: top-remedy card + blurred section
      //    The non-paid monetisation UI (free-reveal btn, $1 CTA) runs for BOTH
      //    the layered and non-paid-flat paths, guarded by !data.paid.
      // --

      if (data.layers && data.layers.length) {
        // -- (a) Layered reveal: titled layers, remedy visible only when unlocked --
        var layersCard = document.createElement("div");
        layersCard.className = "card";
        var layersLabel = document.createElement("div");
        layersLabel.className = "remedy-section-label";
        layersLabel.textContent = "Your Biofield Stress Pattern Layers";
        layersCard.appendChild(layersLabel);
        renderLayers(layersCard, data);
        root.appendChild(layersCard);

      } else if (data.paid) {
        // -- (b) PAID flat: render all remedies, no blurred section, no CTA --
        var remedies = data.remedies || [];
        var allRemedyCard = document.createElement("div");
        allRemedyCard.className = "card";

        var allRemedyLabel = document.createElement("div");
        allRemedyLabel.className = "remedy-section-label";
        allRemedyLabel.textContent = "Your Remedy Matches";
        allRemedyCard.appendChild(allRemedyLabel);

        for (var ri = 0; ri < remedies.length; ri++) {
          if (ri > 0) {
            var divider = document.createElement("div");
            divider.style.cssText = "border-top:1px solid var(--border);margin:24px 0;";
            allRemedyCard.appendChild(divider);
          }
          renderRemedyInto(allRemedyCard, remedies[ri]);
        }

        root.appendChild(allRemedyCard);

      } else {
        // -- (c) NOT PAID flat: top remedy card + blurred depth block --
        var remedyCard = document.createElement("div");
        remedyCard.className = "card";

        var remedyLabel = document.createElement("div");
        remedyLabel.className = "remedy-section-label";
        remedyLabel.textContent = "Your Top Remedy Match";
        remedyCard.appendChild(remedyLabel);

        if (data.top_unlocked && data.top) {
          // Already revealed -- show immediately
          renderRemedyInto(remedyCard, data.top);

        } else if (data.free_available) {
          // Free-reveal button rendered below (shared with layered path)

        } else if (data.first_approved) {
          // Free already used -- prompt to unlock
          var usedMsg = document.createElement("p");
          usedMsg.style.color = "var(--muted)";
          usedMsg.style.fontSize = "15px";
          usedMsg.style.marginBottom = "20px";
          usedMsg.textContent = "Your top match is ready. Unlock your full analysis to view it.";
          remedyCard.appendChild(usedMsg);

        } else {
          // Not yet approved
          var pendingMsg = document.createElement("p");
          pendingMsg.style.color = "var(--muted)";
          pendingMsg.style.fontSize = "15px";
          pendingMsg.textContent = "Your top match is being finalized.";
          remedyCard.appendChild(pendingMsg);
        }

        root.appendChild(remedyCard);

        // -- Blurred depth block (non-paid flat only) --
        var blurredCount = data.blurred_count || 0;
        if (blurredCount > 0) {
          var blurSection = document.createElement("div");
          blurSection.className = "blurred-section";

          var blurLabel = document.createElement("div");
          blurLabel.className = "blurred-section-label";
          blurLabel.textContent = "Deeper in your analysis";
          blurSection.appendChild(blurLabel);

          var stack = document.createElement("div");
          stack.className = "blurred-stack";

          for (var j = 0; j < Math.min(blurredCount, 3); j++) {
            var bc = document.createElement("div");
            bc.className = "blurred-card";
            var bi = document.createElement("div");
            bi.className = "blurred-card-inner";
            bc.appendChild(bi);
            stack.appendChild(bc);
          }

          var overlay = document.createElement("div");
          overlay.className = "blurred-overlay";
          var teaser = document.createElement("span");
          teaser.className = "blurred-teaser";
          teaser.textContent = "and " + blurredCount + " more in your full analysis";
          overlay.appendChild(teaser);
          stack.appendChild(overlay);
          blurSection.appendChild(stack);
          root.appendChild(blurSection);
        }
      }

      // -- Non-paid affordances: free-reveal button + $1 trial CTA.
      //    Runs for BOTH layered (!data.paid) and non-paid-flat paths.
      //    Skipped entirely when data.paid (paid flat path handles its own display above). --
      if (!data.paid) {
        // Free-reveal button (layered: reloads page so layer 0 remedy then shows;
        //                     flat: removes btn and renders remedy inline)
        if (data.free_available) {
          var freeCard = document.createElement("div");
          freeCard.className = "card";

          var freeBtn = document.createElement("button");
          freeBtn.className = "free-reveal-btn";
          freeBtn.textContent = "Reveal my top match (free)";
          freeCard.appendChild(freeBtn);

          var freeMsg = document.createElement("p");
          freeMsg.className = "free-reveal-msg";
          freeCard.appendChild(freeMsg);

          root.appendChild(freeCard);

          freeBtn.addEventListener("click", function () {
            freeBtn.disabled = true;
            freeMsg.textContent = "Loading...";
            fetch("/begin/biofield/" + _token + "/reveal-top", {
              method: "POST",
              credentials: "same-origin"
            }).then(function (res) { return res.json(); }).then(function (body) {
              if (body.ok && body.top) {
                // For layered reveals, reload so layer 0 remedy un-blurs server-side.
                // For flat reveals (legacy), render inline as before.
                if (data.layers && data.layers.length) {
                  location.reload();
                } else {
                  freeBtn.remove();
                  freeMsg.remove();
                  renderRemedyInto(freeCard, body.top);
                }
              } else {
                var reason = body.reason || "";
                if (reason === "used") {
                  freeMsg.textContent = "You have already used your free reveal - unlock your full analysis below.";
                } else if (reason === "pending") {
                  freeMsg.textContent = "Your top match is being finalized.";
                } else if (reason === "tos") {
                  location.reload();
                } else {
                  freeMsg.textContent = "Something went wrong. Please try again.";
                  freeBtn.disabled = false;
                }
              }
            }).catch(function () {
              freeMsg.textContent = "Something went wrong. Please try again.";
              freeBtn.disabled = false;
            });
          });
        }

        // -- Full-analysis CTA (active $1 or disabled stub) --
        var ctaSection = document.createElement("div");
        ctaSection.className = "cta-section";

        if (data.trial_enabled) {
          // Active $1 unlock button
          var unlockBtn = document.createElement("button");
          unlockBtn.className = "buy-btn";
          unlockBtn.id = "unlock-checkout";
          unlockBtn.textContent = "Unlock lifetime access ($1)";
          ctaSection.appendChild(unlockBtn);

          var unlockNote = document.createElement("p");
          unlockNote.className = "cta-note";
          unlockNote.textContent = "One-time $1 — your full analysis and all your matches, unlocked for life. No subscription.";
          ctaSection.appendChild(unlockNote);

          var unlockMsg = document.createElement("p");
          unlockMsg.className = "cta-note";
          unlockMsg.style.marginTop = "8px";
          ctaSection.appendChild(unlockMsg);

          unlockBtn.addEventListener("click", function () {
            unlockBtn.disabled = true;
            unlockMsg.textContent = "Loading...";
            fetch("/begin/biofield/" + _token + "/unlock-checkout", {
              method: "POST",
              credentials: "same-origin"
            }).then(function (res) { return res.json(); }).then(function (body) {
              if (body.ok && body.url) {
                location.href = body.url;
              } else if (body.ok && body.already) {
                location.reload();
              } else {
                unlockMsg.textContent = "Something went wrong. Please try again.";
                unlockBtn.disabled = false;
              }
            }).catch(function () {
              unlockMsg.textContent = "Something went wrong. Please try again.";
              unlockBtn.disabled = false;
            });
          });

        } else {
          // Disabled stub (unlocking soon)
          var ctaBtn = document.createElement("button");
          ctaBtn.className = "cta-btn-disabled";
          ctaBtn.disabled = true;
          ctaBtn.textContent = "Unlock your full Biofield Analysis";
          ctaSection.appendChild(ctaBtn);

          var ctaNote = document.createElement("p");
          ctaNote.className = "cta-note";
          ctaNote.textContent = "(unlocking soon)";
          ctaSection.appendChild(ctaNote);
        }

        root.appendChild(ctaSection);
      }

      // -- In-app order review (items + shipping) shown before Stripe --
      function esc(s){ var d=document.createElement("div"); d.textContent=(s==null?"":s); return d.innerHTML; }
      function currentItems(){ var out=[]; for (var s in cartItems){ out.push({ slug: s, qty: cartItems[s] }); } return out; }
      var REVIEW_ITEMS = [], reviewBack, reviewBox, rItems, rErr, rPayBtn, rPrefilled = false;
      function buildReviewModal(){
        if (reviewBox) return;
        reviewBack = document.createElement("div"); reviewBack.id = "bf-review-back";
        reviewBox = document.createElement("div"); reviewBox.id = "bf-review";
        reviewBox.innerHTML =
          '<h3>Review your order</h3>'
          + '<p class="sub">Confirm your remedies and shipping address. You’ll enter payment on the next secure step.</p>'
          + '<div class="r-items"></div>'
          + '<label>Full name</label><input id="r-name" autocomplete="name">'
          + '<label>Street address</label><input id="r-street" autocomplete="address-line1">'
          + '<div class="row2"><div><label>City</label><input id="r-city" autocomplete="address-level2"></div>'
          +   '<div><label>State</label><input id="r-state" autocomplete="address-level1"></div>'
          +   '<div><label>ZIP</label><input id="r-zip" autocomplete="postal-code"></div></div>'
          + '<div class="r-err"></div>'
          + '<div class="r-actions"><button class="r-pay" type="button">Continue to secure payment →</button>'
          +   '<button class="r-cancel" type="button">Cancel</button></div>'
          + '<p class="r-secure">🔒 Payment is processed securely by Stripe.</p>';
        document.body.appendChild(reviewBack); document.body.appendChild(reviewBox);
        rItems = reviewBox.querySelector(".r-items");
        rErr = reviewBox.querySelector(".r-err");
        rPayBtn = reviewBox.querySelector(".r-pay");
        reviewBox.querySelector(".r-cancel").addEventListener("click", closeReview);
        reviewBack.addEventListener("click", closeReview);
        rPayBtn.addEventListener("click", submitReview);
        ["r-street","r-city","r-state","r-zip"].forEach(function(id){
          reviewBox.querySelector("#"+id).addEventListener("input", validateReview);
        });
      }
      function prefillReview(){
        if (rPrefilled) return; rPrefilled = true;
        var sp = data.ship_prefill || {};
        function set(id, v){ var el = reviewBox.querySelector("#"+id); if (el) el.value = v || ""; }
        set("r-name", sp.name); set("r-street", sp.street || sp.address1);
        set("r-city", sp.city); set("r-state", sp.state); set("r-zip", sp.zip);
      }
      function reviewAddress(){
        var g = function(id){ return (reviewBox.querySelector("#"+id).value || "").trim(); };
        return { name:g("r-name"), street:g("r-street"), city:g("r-city"), state:g("r-state"), zip:g("r-zip"), country:"US" };
      }
      function validateReview(){
        var a = reviewAddress(); var ok = !!(a.street && a.city && a.state && a.zip);
        if (rPayBtn) rPayBtn.disabled = !ok; return ok;
      }
      function openReview(explicitItems){
        buildReviewModal();
        var its = explicitItems || currentItems();
        if (!its.length) { return; }
        REVIEW_ITEMS = its; prefillReview(); rErr.textContent = "";
        rItems.innerHTML = '<div class="r-line"><span>'+its.length+' remed'+(its.length===1?'y':'ies')+'</span><span>…</span></div>';
        fetch("/begin/biofield/" + _token + "/order-preview", {
          method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify({ items: REVIEW_ITEMS })
        }).then(function(r){ return r.json(); }).then(function(p){
          if (p && p.ok) {
            var lines = (p.lines || []).map(function(l){
              return '<div class="r-line"><span>'+esc(l.name || l.slug || "Remedy")+(l.qty>1?" ×"+l.qty:"")+'</span><span>$'+(((l.line_total_cents||0))/100).toFixed(2)+'</span></div>';
            }).join("");
            rItems.innerHTML = lines + '<div class="r-line r-total"><span>Total</span><span>$'+(((p.total_cents||0))/100).toFixed(2)+' + shipping</span></div>';
          }
        }).catch(function(){});
        validateReview();
        reviewBack.classList.add("show"); reviewBox.style.display = "block"; reviewBox.scrollTop = 0;
      }
      function closeReview(){
        if (reviewBack) reviewBack.classList.remove("show");
        if (reviewBox) reviewBox.style.display = "none";
        if (rPayBtn) rPayBtn.disabled = false;
      }
      function submitReview(){
        if (!validateReview()) { rErr.textContent = "Please complete your shipping address."; return; }
        rPayBtn.disabled = true; rErr.textContent = "";
        fetch("/begin/biofield/" + _token + "/order-checkout", {
          method:"POST", headers:{ "Content-Type":"application/json" },
          body:JSON.stringify({ items: REVIEW_ITEMS, address: reviewAddress() })
        }).then(function(r){ return r.json(); }).then(function(res){
          if (res && res.ok && res.stripe_url) { window.location.href = res.stripe_url; return; }
          if (res && res.need_unlock) { closeReview(); routeToUnlock(res.error); return; }
          rErr.textContent = (res && res.error) || "Could not start checkout.";
          rPayBtn.disabled = false;
        }).catch(function(){ rErr.textContent = "Network error — please try again."; rPayBtn.disabled = false; });
      }
      function routeToUnlock(msg){
        var el = document.getElementById("unlock-checkout") || document.querySelector(".free-reveal-btn");
        if (el) { el.scrollIntoView({ behavior:"smooth", block:"center" }); el.classList.add("bf-pulse");
                  setTimeout(function(){ el.classList.remove("bf-pulse"); }, 2100); }
        else { alert(msg || "Unlock your full analysis to order these matches."); }
      }

      // -- Matched-set cart (sticky bar) --
      if (data.cart_enabled) {
        var token = (window.location.pathname.split("/")[3] || "");
        var bar = document.createElement("div");
        bar.id = "bf-cart-bar";
        var info = document.createElement("div");
        var totalEl = document.createElement("span"); totalEl.className = "bf-cart-total";
        var saveEl = document.createElement("span"); saveEl.className = "bf-cart-save";
        info.appendChild(totalEl); info.appendChild(document.createTextNode(" "));
        info.appendChild(saveEl);
        var btn = document.createElement("button");
        btn.textContent = "Order my remedies";
        bar.appendChild(info); bar.appendChild(btn);
        document.body.appendChild(bar);

        var previewTimer = null;
        function items() {
          var out = [];
          for (var s in cartItems) { out.push({ slug: s, qty: cartItems[s] }); }
          return out;
        }
        window.refreshCartBar = function () {
          var its = items();
          if (!its.length) { bar.classList.remove("show"); return; }
          bar.classList.add("show");
          if (previewTimer) { clearTimeout(previewTimer); }
          previewTimer = setTimeout(function () {
            fetch("/begin/biofield/" + token + "/order-preview", {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ items: its })
            }).then(function (r) { return r.json(); }).then(function (p) {
              if (!p || !p.ok) { return; }
              var n = (p.lines || []).length;
              totalEl.textContent = "Order " + n + " remedies - $" + (p.total_cents / 100).toFixed(2);
              saveEl.textContent = p.savings_cents > 0 ? ("You save $" + (p.savings_cents / 100).toFixed(2) + " ordering together") : "";
            }).catch(function () {});
          }, 250);
        };
        btn.addEventListener("click", function () {
          var its = items();
          if (!its.length) { return; }
          // Open the in-app review (items + shipping) — the checkout call happens
          // from there, so the client is never dumped straight onto Stripe.
          openReview(its);
        });
        refreshCartBar();
      }

      // -- Program CTA: flag-gated $100 scalable program front-door.
      //    Hidden by default (dark behind PROGRAM_CARE_TASTER_ENABLED); shown when
      //    window.__REVEAL__.program_enabled is true. Independent of paid/non-paid state. --
      if (data.program_enabled) {
        var programSection = document.createElement("div");
        programSection.className = "cta-section";
        programSection.id = "program-cta-section";

        var programBtn = document.createElement("button");
        programBtn.className = "buy-btn";
        programBtn.id = "program-checkout";
        programBtn.textContent = "Continue to your program";
        programSection.appendChild(programBtn);

        var programMsg = document.createElement("p");
        programMsg.className = "cta-note";
        programSection.appendChild(programMsg);

        programBtn.addEventListener("click", function () {
          programBtn.disabled = true;
          programMsg.textContent = "Loading...";
          fetch("/biofield/checkout", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: data.email, tier: "scalable" })
          }).then(function (res) { return res.json(); }).then(function (body) {
            if (body && body.ok && body.stripe_url) {
              window.location = body.stripe_url;
            } else {
              programMsg.textContent = "Something went wrong. Please try again.";
              programBtn.disabled = false;
            }
          }).catch(function () {
            programMsg.textContent = "Something went wrong. Please try again.";
            programBtn.disabled = false;
          });
        });

        root.appendChild(programSection);
      }

      // -- Two-door handoff CTA: flag-dark behind TWO_DOOR_ENABLED (data.choose_enabled).
      //    Carries the reveal token to /begin/choose so Door A can link back to the
      //    token-scoped cart. Hidden when the flag is off -> reveal page unchanged. --
      if (data.choose_enabled) {
        var chooseSection = document.createElement("div");
        chooseSection.className = "cta-section";
        chooseSection.id = "choose-cta-section";
        var chooseLink = document.createElement("a");
        chooseLink.className = "buy-btn";
        chooseLink.id = "choose-continue";
        chooseLink.textContent = "Choose how you want to continue";
        chooseLink.href = "/begin/choose?token=" + encodeURIComponent(token);
        chooseSection.appendChild(chooseLink);
        root.appendChild(chooseSection);
      }

    })();
  </script>
</body>
</html>
