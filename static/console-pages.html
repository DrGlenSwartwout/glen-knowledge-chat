<!doctype html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/static/favicon.png">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pages &middot; Console</title>
<style>
  :root{ --bg:#0a150d; --surface:#111f16; --border:#21472d; --cream:#fdf4d8; --muted:#a89870;
         --gold:#d4a843; --ok:#3d8a52; --err:#c0432b; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--cream);
        font:15px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; }
  .wrap{ max-width:1100px; margin:0 auto; padding:18px; display:flex; gap:18px; }
  .col-list{ flex:0 0 280px; } .col-edit{ flex:1; min-width:0; }
  .card{ background:var(--surface); border:1px solid var(--border); border-radius:10px;
         padding:14px; margin-bottom:14px; }
  h1{ font-size:20px; margin:0 0 4px; } h2{ font-size:15px; margin:0 0 8px; }
  .sub{ color:var(--muted); margin:0 0 14px; }
  .item{ padding:9px 11px; border:1px solid var(--border); border-radius:8px;
         margin-bottom:7px; cursor:pointer; display:flex; justify-content:space-between; }
  .item:hover{ border-color:var(--gold); } .item.sel{ border-color:var(--gold); }
  .pill{ font-size:11px; padding:1px 7px; border-radius:20px; border:1px solid var(--border);
         color:var(--muted); } .pill.approved{ color:var(--ok); border-color:var(--ok); }
  label{ display:block; font-size:12px; color:var(--muted); margin:10px 0 4px; }
  textarea{ width:100%; min-height:90px; background:var(--bg); color:var(--cream);
            border:1px solid var(--border); border-radius:8px; padding:9px; font:inherit; resize:vertical; }
  input[type=number]{ background:var(--bg); color:var(--cream); border:1px solid var(--border);
                      border-radius:8px; padding:7px 9px; font:inherit; width:80px; }
  .btn{ background:var(--gold); color:#0a150d; border:0; border-radius:8px;
        padding:8px 14px; font:inherit; cursor:pointer; }
  .btn.ghost{ background:transparent; color:var(--cream); border:1px solid var(--border); }
  .btn.ok{ background:var(--ok); color:var(--cream); }
  .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:12px; }
  .preview{ color:var(--gold); text-decoration:none; font-size:13px; }
  .status{ min-height:20px; color:var(--muted); font-size:13px; margin-top:10px; }
  #gate{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
         background:var(--bg); z-index:50; }
  .compliance-ok{ color:var(--ok); font-size:13px; }
  .compliance-fail{ color:var(--err); font-size:13px; }
  .compliance-flags{ margin:4px 0 0 0; padding:0; list-style:none; font-size:12px; color:var(--err); }
  .compliance-flags li::before{ content:"! "; }
  .pages-tabs{display:flex;gap:6px;padding:0 20px;border-bottom:1px solid var(--border)}
  .ptab{background:transparent;border:0;border-bottom:2px solid transparent;color:var(--muted);font:600 14px/1 inherit;padding:10px 16px;cursor:pointer}
  .ptab.active{color:var(--cream);border-bottom-color:var(--gold)}
</style>
</head>
<body>
<script src="/static/op-nav.js" data-active="marketing" data-sub="pages"></script>

<div id="gate" style="display:none"><div class="card" style="min-width:300px">
  <h2>Console key</h2>
  <input id="key" type="password" placeholder="CONSOLE_SECRET" style="width:100%;padding:8px">
  <p style="margin-top:10px"><button class="btn" onclick="unlock()">Unlock</button></p>
</div></div>

<div id="app" style="display:none">
  <div style="max-width:1100px;margin:0 auto;padding:18px 20px 0"><h1>Pages</h1></div>
  <div class="pages-tabs">
    <button class="ptab active" data-type="sales"       onclick="switchType('sales')">Sales</button>
    <button class="ptab"        data-type="ingredient"  onclick="switchType('ingredient')">Ingredient</button>
    <button class="ptab"        data-type="topic"       onclick="switchType('topic')">Topic</button>
    <button class="ptab"        data-type="suggestions" onclick="switchType('suggestions')">Suggestions</button>
  </div>
  <div class="wrap">
    <div class="col-list">
      <div id="list"></div>
    </div>
    <div class="col-edit">
      <div id="editor" class="card" style="display:none">
        <h2 id="ed-title">&nbsp;</h2>
        <a id="ed-live" class="preview" target="_blank" rel="noopener">View live page &#8599;</a>
        <span id="ed-state" class="pill" style="margin-left:8px"></span>
        <div id="ed-sections"></div>
        <div id="ed-scores" style="display:none"></div>
        <div id="ed-traditional-use" style="display:none"></div>
        <div id="ed-related-forms" style="display:none"></div>
        <div id="ed-compliance" style="display:none"></div>
        <div class="row" id="ed-actions">
          <button class="btn ghost" id="btn-regen"    onclick="regen()">Regenerate &amp; review</button>
          <button class="btn ok"    id="btn-approve"  onclick="approve()">Approve</button>
          <button class="btn ghost" id="btn-build"    style="display:none" onclick="build()">Build</button>
          <button class="btn ghost" id="btn-dismiss"  style="display:none" onclick="dismiss()">Dismiss</button>
        </div>
        <div id="status" class="status"></div>
      </div>
      <div id="empty" class="card"><p class="sub" style="margin:0">Select an item to edit.</p></div>
    </div>
  </div>
</div>

<script>
function key(){ return localStorage.getItem('console_key') || ''; }
(function(){ var u=new URLSearchParams(location.search).get('key'); if(u) localStorage.setItem('console_key', u); })();
function unlock(){ localStorage.setItem('console_key', document.getElementById('key').value);
  document.getElementById('gate').style.display='none'; boot(); }
const $ = id => document.getElementById(id);

const TYPES = {
  sales: {
    key: 'sales',
    list: '/api/console/sales-pages',
    respKey: 'pages',
    detail: function(slug){ return '/api/console/sales-page/' + encodeURIComponent(slug); },
    edit: 'sales_pages.edit',
    regen: 'sales_pages.regenerate',
    approve: 'sales_pages.approve',
    approveLabel: 'Approve',
    approveMsg: 'Approved. The live page no longer shows the draft banner.',
    live: function(slug, data){ return (data && data.live_url) || ('/begin/product/' + encodeURIComponent(slug)); },
    labels: { intro: 'Intro (what this does)', description: 'Overview', research: 'The research' }
  },
  ingredient: {
    key: 'ingredient',
    list: '/api/console/ingredient-pages',
    respKey: 'pages',
    detail: function(slug){ return '/api/console/ingredient-page/' + encodeURIComponent(slug); },
    edit: 'ingredient_page.edit',
    regen: 'ingredient_page.regenerate',
    approve: 'ingredient_page.approve',
    approveLabel: 'Approve and notify',
    approveMsg: 'Approved. Requesters have been notified.',
    live: function(slug){ return '/begin/ingredient/' + encodeURIComponent(slug); },
    labels: { what_it_is: 'What it is', research: 'The research' }
  },
  topic: {
    key: 'topic',
    list: '/api/console/topic-pages',
    respKey: 'pages',
    detail: function(slug){ return '/api/console/topic-page/' + encodeURIComponent(slug); },
    edit: 'topic_page.edit',
    regen: 'topic_page.regenerate',
    approve: 'topic_page.approve',
    approveLabel: 'Approve and publish',
    approveMsg: 'Approved. Topic page is now public.',
    live: function(slug){ return '/learn/' + encodeURIComponent(slug); },
    labels: { overview: 'Overview', symptoms: 'Symptoms', causes: 'Causes',
               solutions: 'Solutions', lifestyle: 'Lifestyle', when_to_seek: 'When to Seek Help' }
  },
  suggestions: {
    key: 'suggestions',
    list: '/api/console/topic-suggestions',
    respKey: 'suggestions',
    detail: function(slug){ return '/api/console/topic-page/' + encodeURIComponent(slug); },
    edit: 'topic_page.edit',
    regen: null,
    approve: null,
    approveLabel: null,
    approveMsg: null,
    live: function(slug){ return '/learn/' + encodeURIComponent(slug); },
    labels: { overview: 'Overview', symptoms: 'Symptoms', causes: 'Causes',
               solutions: 'Solutions', lifestyle: 'Lifestyle', when_to_seek: 'When to Seek Help' },
    mode: 'queue'
  }
};

let ACTIVE = null;
let CURRENT = null;
let CURRENT_DATA = null;

async function api(method, path, body){
  const opt = { method, headers:{'X-Console-Key':key()} };
  if(body){ opt.headers['Content-Type']='application/json'; opt.body=JSON.stringify(body); }
  const r = await fetch(path, opt);
  return { ok:r.ok, status:r.status, json: await r.json().catch(()=>({})) };
}

async function act(actionKey, params){
  const r = await api('POST', '/api/action/' + actionKey, params);
  return r;
}

function setStatePill(state){
  const el = $('ed-state');
  el.textContent = state || 'none';
  el.className = 'pill' + (state === 'approved' ? ' approved' : '');
}

function boot(){
  if(!key()){ $('gate').style.display='flex'; return; }
  $('app').style.display='';
  initType();
}

function initType(){
  var t = (location.hash || '').replace('#', '');
  switchType(TYPES[t] ? t : 'sales');
}

function switchType(t){
  ACTIVE = TYPES[t];
  document.querySelectorAll('.ptab').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('data-type') === t);
  });
  if(location.hash !== '#' + t) location.hash = t;
  // reset editor
  CURRENT = null;
  CURRENT_DATA = null;
  $('editor').style.display = 'none';
  $('empty').style.display = '';
  // swap action buttons by mode
  if(ACTIVE.mode === 'queue'){
    $('btn-regen').style.display = 'none';
    $('btn-approve').style.display = 'none';
    $('btn-build').style.display = '';
    $('btn-dismiss').style.display = '';
  } else {
    $('btn-regen').style.display = '';
    $('btn-approve').style.display = '';
    $('btn-build').style.display = 'none';
    $('btn-dismiss').style.display = 'none';
    $('btn-approve').textContent = ACTIVE.approveLabel;
  }
  loadList();
}

async function loadList(){
  const r = await api('GET', ACTIVE.list);
  if(!r.ok){ $('list').textContent = 'Could not load (check console key).'; return; }
  const items = (r.json || {})[ACTIVE.respKey] || [];
  if(!items.length){ $('list').textContent = 'No items yet.'; return; }
  const el = $('list');
  el.innerHTML = '';
  items.forEach(function(p){
    var div = document.createElement('div');
    div.className = 'item' + (p.slug === CURRENT ? ' sel' : '');
    div.setAttribute('data-slug', p.slug);
    div.onclick = (function(slug){ return function(){ select(slug); }; })(p.slug);
    var nameSpan = document.createElement('span');
    nameSpan.textContent = p.name || p.slug;
    var badge = document.createElement('span');
    if(ACTIVE.mode === 'queue'){
      var demandSpan = document.createElement('span');
      demandSpan.className = 'demand';
      demandSpan.textContent = ' (' + (p.demand || 0) + ')';
      nameSpan.appendChild(demandSpan);
      badge.className = 'pill';
      badge.textContent = p.kind || '';
    } else {
      badge.className = 'pill' + (p.state === 'approved' ? ' approved' : '');
      badge.textContent = p.state;
    }
    div.appendChild(nameSpan);
    div.appendChild(badge);
    el.appendChild(div);
  });
}

async function select(slug){
  CURRENT = slug;
  document.querySelectorAll('.item').forEach(function(el){
    el.classList.toggle('sel', el.getAttribute('data-slug') === slug);
  });
  const r = await api('GET', ACTIVE.detail(slug));
  if(!r.ok) return;
  const match = (r.json || {}).page || r.json;
  CURRENT_DATA = match;
  $('editor').style.display = '';
  $('empty').style.display = 'none';
  $('ed-title').textContent = match.name || slug;
  $('ed-live').href = ACTIVE.live(slug, match);
  setStatePill(match.state || 'draft');
  // render section textareas
  const sections = match.sections || [];
  const secContainer = $('ed-sections');
  secContainer.innerHTML = '';
  sections.forEach(function(s){
    var id = s.id || s;
    var text = s.text != null ? s.text : '';
    const lbl = document.createElement('label');
    lbl.textContent = ACTIVE.labels[id] || id;
    const ta = document.createElement('textarea');
    ta.id = 'sec-' + id;
    ta.value = text;
    const row = document.createElement('div');
    row.className = 'row';
    const btn = document.createElement('button');
    btn.className = 'btn ghost';
    btn.textContent = 'Save ' + (ACTIVE.labels[id] || id);
    btn.onclick = (function(secId){ return function(){ saveSection(secId); }; })(id);
    row.appendChild(btn);
    secContainer.appendChild(lbl);
    secContainer.appendChild(ta);
    secContainer.appendChild(row);
  });
  afterSections(match);
  $('status').textContent = '';
}

async function saveSection(id){
  if(!ACTIVE.edit) return;
  const ta = $('sec-' + id);
  if(!CURRENT || !ta) return;
  $('status').textContent = 'Saving ' + id + '...';
  const r = await act(ACTIVE.edit, { slug: CURRENT, section: id, text: ta.value });
  if(r.ok && r.json.status === 'done'){
    setStatePill('draft');
    $('status').textContent = 'Saved ' + id + ' (still draft).';
  } else {
    $('status').textContent = 'Save failed.';
  }
}

async function regen(){
  if(!CURRENT) return;
  $('status').textContent = 'Regenerating...';
  $('btn-regen').disabled = true;
  const r = await act(ACTIVE.regen, { slug: CURRENT });
  $('btn-regen').disabled = false;
  if(r.ok && r.json.status === 'done'){
    const content = (r.json.result || {}).content || {};
    Object.keys(content).forEach(function(id){
      const t = $('sec-' + id);
      if(t) t.value = content[id];
    });
    setStatePill('draft');
    afterRegen(r.json.result || {});
    $('status').textContent = 'Regenerated. Review the content, then Approve.';
  } else {
    $('status').textContent = 'Regenerate failed.';
  }
}

async function approve(){
  if(!CURRENT) return;
  $('status').textContent = 'Approving...';
  const r = await act(ACTIVE.approve, { slug: CURRENT });
  if(r.ok && r.json.status === 'done'){
    setStatePill('approved');
    $('status').textContent = ACTIVE.approveMsg;
    loadList();
  } else {
    if(!onApproveFail(r)){
      $('status').textContent = 'Approve failed: ' + ((r.json || {}).error || r.status);
    }
  }
}

async function build(){
  if(!CURRENT) return;
  $('status').textContent = 'Building...';
  $('btn-build').disabled = true;
  const r = await act('topic_page.regenerate', {slug: CURRENT});
  $('btn-build').disabled = false;
  if(r.ok){
    const c = (r.json.result || {});
    const content = c.content || {};
    Object.keys(content).forEach(function(id){
      const t = $('sec-' + id);
      if(t) t.value = content[id];
    });
    setStatePill('draft');
    renderCompliance(c.compliance || {});
    $('status').textContent = 'Built. Review in Topic Pages to approve.';
    loadList();
  } else {
    $('status').textContent = 'Build failed: ' + ((r.json || {}).error || r.status);
  }
}
async function dismiss(){
  if(!CURRENT) return;
  const r = await act('topic_page.dismiss', {slug: CURRENT});
  if(r.ok){
    CURRENT = null;
    $('editor').style.display = 'none';
    $('empty').style.display = '';
    loadList();
  } else {
    $('status').textContent = 'Dismiss failed: ' + ((r.json || {}).error || r.status);
  }
}

// Per-type hooks
function afterSections(match){
  ['ed-scores','ed-traditional-use','ed-related-forms','ed-compliance'].forEach(function(id){
    $(id).style.display = 'none';
    $(id).innerHTML = '';
  });
  if(ACTIVE.key === 'ingredient') renderIngredientPanels(match);
  if(ACTIVE.key === 'topic' || ACTIVE.key === 'suggestions'){
    $('ed-compliance').style.display = '';
    renderCompliance(match.compliance || {});
  }
}

function afterRegen(result){
  if(ACTIVE.key === 'topic' || ACTIVE.key === 'suggestions'){
    renderCompliance((result || {}).compliance || {});
  }
}

function onApproveFail(r){  // returns true if it handled the message
  if(ACTIVE.key === 'topic' && (r.json || {}).error === 'compliance_failed'){
    $('ed-compliance').style.display = '';
    renderCompliance({ passed: false, flags: (r.json || {}).flags });
    $('status').textContent = 'Approve blocked: compliance failed. Resolve the flags and retry.';
    return true;
  }
  return false;
}

// Renders compliance block for topic pages
function renderCompliance(compliance){
  const el = $('ed-compliance');
  el.innerHTML = '';
  const lbl = document.createElement('label');
  lbl.textContent = 'Compliance';
  el.appendChild(lbl);
  if(compliance.passed === true){
    const ok = document.createElement('div');
    ok.className = 'compliance-ok';
    ok.textContent = 'Passed';
    el.appendChild(ok);
  } else if(compliance.passed === false){
    const fail = document.createElement('div');
    fail.className = 'compliance-fail';
    fail.textContent = 'Failed — page is gated until issues are resolved.';
    el.appendChild(fail);
    const flags = compliance.flags || [];
    if(flags.length){
      const ul = document.createElement('ul');
      ul.className = 'compliance-flags';
      flags.forEach(function(f){
        const li = document.createElement('li');
        li.textContent = typeof f === 'string' ? f : (f.phrase || JSON.stringify(f));
        ul.appendChild(li);
      });
      el.appendChild(ul);
    }
  } else {
    const none = document.createElement('div');
    none.style.color = 'var(--muted)';
    none.style.fontSize = '13px';
    none.textContent = 'Not yet scanned.';
    el.appendChild(none);
  }
}

// Renders ingredient panels (scores, traditional use, related forms)
function renderIngredientPanels(match){
  // Scores
  const scoresEl = $('ed-scores');
  scoresEl.style.display = '';
  scoresEl.innerHTML = '';
  const scoresLbl = document.createElement('label');
  scoresLbl.textContent = 'Scores (1-10)';
  scoresEl.appendChild(scoresLbl);
  const scoreRow = document.createElement('div');
  scoreRow.className = 'row';
  ['research_score','traditional_score'].forEach(function(field){
    const wrap = document.createElement('span');
    const lbl2 = document.createElement('label');
    lbl2.textContent = field === 'research_score' ? 'Research' : 'Traditional';
    lbl2.style.margin = '0 4px 0 0';
    const inp = document.createElement('input');
    inp.type = 'number';
    inp.id = field;
    inp.min = '1';
    inp.max = '10';
    inp.value = match[field] != null ? String(match[field]) : '';
    wrap.appendChild(lbl2);
    wrap.appendChild(inp);
    scoreRow.appendChild(wrap);
  });
  const saveScrBtn = document.createElement('button');
  saveScrBtn.className = 'btn ghost';
  saveScrBtn.textContent = 'Save scores';
  saveScrBtn.onclick = saveScores;
  scoreRow.appendChild(saveScrBtn);
  scoresEl.appendChild(scoreRow);

  // Traditional use (raw JSON textarea)
  const tuEl = $('ed-traditional-use');
  tuEl.style.display = '';
  tuEl.innerHTML = '';
  const tuLbl = document.createElement('label');
  tuLbl.textContent = 'Traditional use (JSON array)';
  const tuTa = document.createElement('textarea');
  tuTa.id = 'traditional-use-json';
  tuTa.style.minHeight = '80px';
  try { tuTa.value = JSON.stringify(match.traditional_use || [], null, 2); }
  catch(e){ tuTa.value = '[]'; }
  const tuRow = document.createElement('div');
  tuRow.className = 'row';
  const tuBtn = document.createElement('button');
  tuBtn.className = 'btn ghost';
  tuBtn.textContent = 'Save traditional use';
  tuBtn.onclick = saveTraditionalUse;
  tuRow.appendChild(tuBtn);
  tuEl.appendChild(tuLbl);
  tuEl.appendChild(tuTa);
  tuEl.appendChild(tuRow);

  // Related forms (raw JSON textarea)
  const rfEl = $('ed-related-forms');
  rfEl.style.display = '';
  rfEl.innerHTML = '';
  const rfLbl = document.createElement('label');
  rfLbl.textContent = 'Related forms (JSON array)';
  const rfTa = document.createElement('textarea');
  rfTa.id = 'related-forms-json';
  rfTa.style.minHeight = '80px';
  try { rfTa.value = JSON.stringify(match.related_forms || [], null, 2); }
  catch(e){ rfTa.value = '[]'; }
  const rfRow = document.createElement('div');
  rfRow.className = 'row';
  const rfBtn = document.createElement('button');
  rfBtn.className = 'btn ghost';
  rfBtn.textContent = 'Save related forms';
  rfBtn.onclick = saveRelatedForms;
  rfRow.appendChild(rfBtn);
  rfEl.appendChild(rfLbl);
  rfEl.appendChild(rfTa);
  rfEl.appendChild(rfRow);
}

async function saveScores(){
  if(!CURRENT) return;
  $('status').textContent = 'Saving scores...';
  const r = parseInt($('research_score').value, 10) || null;
  const t = parseInt($('traditional_score').value, 10) || null;
  const res = await act('ingredient_page.edit', {
    slug: CURRENT, research_score: r, traditional_score: t
  });
  if(res.ok && res.json.status === 'done'){
    setStatePill('draft');
    $('status').textContent = 'Scores saved (still draft).';
  } else {
    $('status').textContent = 'Save scores failed.';
  }
}

async function saveTraditionalUse(){
  if(!CURRENT) return;
  const ta = $('traditional-use-json');
  let parsed;
  try { parsed = JSON.parse(ta.value); } catch(e){ $('status').textContent = 'Invalid JSON for traditional use.'; return; }
  $('status').textContent = 'Saving traditional use...';
  const res = await act('ingredient_page.edit', { slug: CURRENT, traditional_use: parsed });
  if(res.ok && res.json.status === 'done'){
    setStatePill('draft');
    $('status').textContent = 'Traditional use saved (still draft).';
  } else {
    $('status').textContent = 'Save failed.';
  }
}

async function saveRelatedForms(){
  if(!CURRENT) return;
  const ta = $('related-forms-json');
  let parsed;
  try { parsed = JSON.parse(ta.value); } catch(e){ $('status').textContent = 'Invalid JSON for related forms.'; return; }
  $('status').textContent = 'Saving related forms...';
  const res = await act('ingredient_page.edit', { slug: CURRENT, related_forms: parsed });
  if(res.ok && res.json.status === 'done'){
    setStatePill('draft');
    $('status').textContent = 'Related forms saved (still draft).';
  } else {
    $('status').textContent = 'Save failed.';
  }
}

boot();
</script>
</body>
</html>
