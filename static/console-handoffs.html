<link rel="icon" type="image/png" href="/static/favicon.png">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Handoffs waiting</title>
<style>
  :root{ --bg:#0a150d; --surface:#0f1f14; --border:#21472d; --cream:#eaf3ec; --muted:#8aa594; --gold:#d4a843; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--cream);
        font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  h1{ margin:18px 24px 2px; font-size:22px; }
  .sub{ margin:0 24px 16px; color:var(--muted); font-size:13px; }
  .wrap{ margin:0 24px 40px; overflow-x:auto; }
  table{ border-collapse:collapse; width:100%; min-width:600px; }
  th,td{ text-align:left; padding:10px 12px; border-bottom:1px solid var(--border); font-size:14px; vertical-align:middle; }
  th{ color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
  tr:hover td{ background:rgba(255,255,255,.02); }
  .email{ color:#9db4ff; font-size:13px; }
  a.gobtn{ padding:7px 12px; border-radius:8px; border:1px solid var(--gold); background:var(--gold);
           color:#0a150d; font-weight:600; text-decoration:none; white-space:nowrap; }
  a.gobtn:hover{ filter:brightness(1.08); }
  .empty{ margin:24px; color:var(--muted); font-size:16px; }
  #keybox{ margin:24px; }
  #keybox input{ padding:9px 12px; border-radius:8px; border:1px solid var(--border);
                 background:var(--surface); color:var(--cream); min-width:260px; }
  #keybox button{ padding:9px 13px; border-radius:8px; border:1px solid var(--gold);
                  background:var(--gold); color:#0a150d; font-weight:600; cursor:pointer; }
</style>
<script src="/static/op-nav.js" data-active="communication" data-sub="handoffs"></script>
<h1>Handoffs waiting</h1>
<p class="sub">Client analyses Dr. Glen handed off for you to review &amp; publish. Open each one, check it looks right, then Publish &amp; email the client.</p>
<div id="content"><p class="sub">Loading…</p></div>
<div id="keybox" style="display:none"><input id="key-input" type="text" placeholder="console key"> <button onclick="unlock()">Unlock</button></div>
<script>
  function key(){ return localStorage.getItem('console_key') || ''; }
  (function(){ var u = new URLSearchParams(location.search).get('key'); if(u) localStorage.setItem('console_key', u); })();
  function hdr(){ return { 'X-Console-Key': key(), 'Content-Type':'application/json' }; }
  function unlock(){ localStorage.setItem('console_key', document.getElementById('key-input').value); document.getElementById('keybox').style.display='none'; boot(); }
  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  async function boot(){
    var r;
    try { r = await fetch('/api/console/handoffs', { headers: hdr() }); }
    catch(e){ document.getElementById('content').innerHTML='<p class="empty">Could not reach the server.</p>'; return; }
    if(r.status===401){ document.getElementById('content').innerHTML=''; document.getElementById('keybox').style.display='block'; return; }
    var j = await r.json();
    var list = j.handoffs || [];
    if(!list.length){ document.getElementById('content').innerHTML='<p class="empty">Nothing waiting — you’re all caught up. 🌺</p>'; return; }
    var rows = list.map(function(h){
      var url = '/console/biofield-portal?email='+encodeURIComponent(h.email)+'&key='+encodeURIComponent(key());
      return '<tr><td>'+esc(h.name||'(unnamed)')+'</td><td class="email">'+esc(h.email)+'</td><td>'
        +esc((h.handed_off_at||'').slice(0,10))+'</td><td><a class="gobtn" href="'+url+'">Review &amp; publish &rarr;</a></td></tr>';
    }).join('');
    document.getElementById('content').innerHTML='<div class="wrap"><table><tr><th>Client</th><th>Email</th>'
      +'<th>Handed off</th><th></th></tr>'+rows+'</table></div>';
  }
  boot();
</script>
