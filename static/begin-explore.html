<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Explore Everything · Dr. Glen Swartwout</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Raleway:wght@600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a150d;
    --surface: #111f16;
    --surface-2: #162318;
    --border: #21472d;
    --cream: #fdf4d8;
    --muted: #a89870;
    --gold: #d4a843;
    --green: #3d8a52;

    --maxw: 760px;
    --radius: 14px;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--cream);
    font-family: "Open Sans", system-ui, sans-serif;
    font-weight: 400;
    line-height: 1.7;
    font-size: 17px;
    letter-spacing: 0.01em;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    background-image:
      radial-gradient(120% 80% at 50% -10%, rgba(212, 168, 67, 0.07), transparent 60%),
      radial-gradient(100% 60% at 50% 110%, rgba(61, 138, 82, 0.05), transparent 60%);
    background-attachment: fixed;
    padding-bottom: 80px;
  }
  ::selection { background: rgba(212, 168, 67, 0.25); color: var(--cream); }
  h1, h2, h3 {
    font-family: "Raleway", system-ui, sans-serif;
    font-weight: 600;
    line-height: 1.22;
    letter-spacing: -0.01em;
  }
  a { color: inherit; text-decoration: none; }

  .shell { max-width: var(--maxw); margin: 0 auto; padding: 0 24px; }

  .brandbar {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 30px 24px 8px;
    display: flex; align-items: center; justify-content: center; gap: 14px;
  }
  .brand-mark {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--gold); box-shadow: 0 0 0 4px rgba(212, 168, 67, 0.12); flex: none;
  }
  .brand-name {
    font-family: "Raleway", sans-serif; font-weight: 600;
    font-size: 13px; letter-spacing: 0.32em; color: var(--muted);
  }

  .page-head { text-align: center; margin: 30px auto 8px; }
  .page-head h1 { font-size: clamp(26px, 6vw, 38px); color: var(--cream); }
  .page-head p { color: var(--muted); font-size: 16px; margin-top: 10px; }

  .explore-section { margin-top: 52px; }
  .section-title { margin-bottom: 20px; }
  .section-title h2 { font-size: clamp(18px, 4vw, 22px); color: var(--cream); }
  .section-title p { color: var(--muted); font-size: 14.5px; margin-top: 4px; }

  /* "For practitioners" gets a clear separation from the patient journey */
  .explore-section.practitioner {
    margin-top: 72px; padding-top: 44px; border-top: 1px solid var(--border);
  }

  .cards { display: grid; grid-template-columns: 1fr; gap: 14px; }
  .card {
    position: relative; display: flex; align-items: center; gap: 20px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px 26px; cursor: pointer; overflow: hidden;
    transition: transform 0.4s var(--ease), border-color 0.4s var(--ease), background 0.4s var(--ease);
  }
  .card::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
    background: var(--gold); transform: scaleY(0); transform-origin: top;
    transition: transform 0.45s var(--ease);
  }
  .card:hover { transform: translateY(-2px); border-color: rgba(212, 168, 67, 0.45); background: var(--surface-2); }
  .card:hover::before { transform: scaleY(1); }

  .card-body { flex: 1; min-width: 0; }
  .card-title {
    display: block; font-family: "Raleway", sans-serif; font-weight: 600;
    font-size: 17.5px; color: var(--cream); line-height: 1.3;
  }
  .card-sub { display: block; font-size: 14px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
  .card-arrow { flex: none; color: var(--muted); transition: transform 0.4s var(--ease), color 0.4s var(--ease); }
  .card-arrow svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.6; }
  .card:hover .card-arrow { color: var(--gold); transform: translateX(4px); }
  .card-ext { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; opacity: 0.7; margin-left: 8px; }

  .backlink { text-align: center; margin-top: 64px; }
  .backlink a {
    font-family: "Raleway", sans-serif; font-weight: 600; font-size: 14px;
    letter-spacing: 0.04em; color: var(--gold);
    border-bottom: 1px solid rgba(212, 168, 67, 0.35); padding-bottom: 2px;
  }
  .backlink a:hover { color: var(--cream); }

  .reveal { opacity: 0; transform: translateY(14px); }
  .reveal.in { opacity: 1; transform: none; transition: opacity 0.9s var(--ease), transform 0.9s var(--ease); }
  @media (prefers-reduced-motion: reduce) { .reveal { opacity: 1; transform: none; } }

  @media (max-width: 600px) {
    .shell { padding: 0 18px; }
    .brandbar { padding-top: 24px; }
    .card { padding: 22px 18px; gap: 15px; }
    .card-title { font-size: 16px; }
    .explore-section { margin-top: 44px; }
  }
</style>
</head>
<body>
  <header class="brandbar">
    <span class="brand-mark"></span>
    <span class="brand-name">DR. GLEN SWARTWOUT</span>
  </header>

  <main class="shell">
    <div class="page-head reveal">
      <h1>Explore Everything</h1>
      <p>Everything available to you, in one place. Wander wherever you like.</p>
    </div>

    <div id="explore-host"></div>

    <div class="backlink reveal">
      <a href="/begin" id="back-link">Back to your guided path</a>
    </div>
  </main>

  <script>
    (function () {
      var data = window.__EXPLORE__ || [];
      var host = document.getElementById('explore-host');

      data.forEach(function (sec) {
        var section = document.createElement('section');
        section.className = 'explore-section reveal' +
          (sec.audience === 'practitioner' ? ' practitioner' : '');

        var head = document.createElement('div');
        head.className = 'section-title';
        var h2 = document.createElement('h2');
        h2.textContent = sec.title || '';
        var blurb = document.createElement('p');
        blurb.textContent = sec.blurb || '';
        head.appendChild(h2);
        head.appendChild(blurb);
        section.appendChild(head);

        var grid = document.createElement('div');
        grid.className = 'cards';
        (sec.cards || []).forEach(function (c) {
          var a = document.createElement('a');
          a.className = 'card';
          a.href = c.href || '#';
          if (c.external) { a.target = '_blank'; a.rel = 'noopener'; }
          a.innerHTML =
            '<span class="card-body"><span class="card-title"></span>' +
            '<span class="card-sub"></span></span>' +
            '<span class="card-arrow" aria-hidden="true"><svg viewBox="0 0 24 24">' +
            '<path d="M5 12h14M13 6l6 6-6 6"/></svg></span>';
          a.querySelector('.card-title').textContent = c.title || '';
          var sub = a.querySelector('.card-sub');
          sub.textContent = c.sub || '';
          if (c.external) {
            var ext = document.createElement('span');
            ext.className = 'card-ext';
            ext.textContent = 'opens in new tab';
            sub.appendChild(document.createTextNode(' '));
            sub.appendChild(ext);
          }
          grid.appendChild(a);
        });
        section.appendChild(grid);
        host.appendChild(section);
      });

      // Preserve referral slug on the back link, if present in the URL.
      try {
        var ref = new URLSearchParams(location.search).get('ref');
        if (ref) {
          document.getElementById('back-link').href =
            '/begin?ref=' + encodeURIComponent(ref);
        }
      } catch (e) {}

      // Reveal-on-scroll (mirrors begin.html).
      var reduce = window.matchMedia &&
        window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      var items = Array.prototype.slice.call(document.querySelectorAll('.reveal'));
      if (reduce || !('IntersectionObserver' in window)) {
        items.forEach(function (el) { el.classList.add('in'); });
      } else {
        var io = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              var el = entry.target;
              setTimeout(function () { el.classList.add('in'); }, 60);
              io.unobserve(el);
            }
          });
        }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
        items.forEach(function (el) { io.observe(el); });
      }
    })();
  </script>
</body>
</html>
