<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/static/favicon.png">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Orders - Business OS</title>
<style>
  :root { --bg:#0a150d; --surface:#111f16; --surface2:#162318; --border:#21472d;
          --cream:#fdf4d8; --muted:#a89870; --gold:#d4a843; --green:#3d8a52; --red:#c0432b; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--cream);
         font-family:"Open Sans",system-ui,sans-serif; padding:24px; }
  /* Center page content in a column (full-width nav preserved), matching the
     other consoles. Every direct body child except the injected op-nav bars and
     the fixed gate gets a centered max-width. */
  body > :not(.op-nav-bar):not(.op-nav-sub):not(#gate):not(script):not(style) {
    max-width:1280px; margin-left:auto; margin-right:auto; }
  h1 { font-family:"Raleway",sans-serif; font-size:22px; margin-bottom:2px; }
  .sub { color:var(--muted); font-size:13px; margin-bottom:20px; }
  .cols { display:grid; grid-template-columns:repeat(8,1fr); gap:14px; align-items:start; }
  @media (max-width:1500px){ .cols { grid-template-columns:repeat(4,1fr); } }
  @media (max-width:1100px){ .cols { grid-template-columns:repeat(3,1fr); } }
  .col { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px; }
  .col h2 { font-family:"Raleway",sans-serif; font-size:13px; letter-spacing:.08em;
            text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
  .col h2 .n { color:var(--gold); }
  .card { background:var(--surface2); border:1px solid var(--border); border-radius:9px;
          padding:11px 12px; margin-bottom:10px; }
  .card .who { font-weight:600; font-size:14px; }
  .card .meta { color:var(--muted); font-size:12px; margin-top:3px; line-height:1.5; }
  .card .src { display:inline-block; font-size:10px; letter-spacing:.05em; text-transform:uppercase;
               color:var(--muted); border:1px solid var(--border); border-radius:5px; padding:1px 6px; }
  .card .age.old { color:var(--red); }
  /* Collapsed by default: header shows; body (products, fulfillment, actions) opens on click. */
  .card-head { cursor:pointer; }
  .card .chev { display:inline-block; color:var(--muted); font-size:10px; margin-left:4px; transition:transform .15s; }
  .card.open .chev { transform:rotate(90deg); }
  .card-body { display:none; margin-top:8px; }
  .card.open .card-body { display:block; }
  .card-body .prods { color:var(--cream); }
  .acts { margin-top:9px; display:flex; flex-wrap:wrap; gap:6px; }
  .acts button { font-size:11px; border:1px solid var(--border); background:transparent;
                 color:var(--cream); border-radius:6px; padding:3px 9px; cursor:pointer; }
  .acts button:hover { border-color:var(--gold); color:var(--gold); }
  .acts button.cancel:hover { border-color:var(--red); color:var(--red); }
  /* Sent-invoice confirmation state: green so "Invoice Sent" reads at a glance. */
  .acts button.inv-sent { background:rgba(58,90,64,0.28); border-color:#3a5a40; color:#9fd3a6; }
  .acts button.inv-sent:hover { border-color:#66bb6a; color:#c6ecc9; }
  .bo-badge { display:inline-block; font-size:10px; font-weight:600; color:var(--red);
              border:1px solid var(--red); border-radius:5px; padding:1px 5px; margin-left:6px; }
  .pay-badge { display:inline-block; font-size:10px; font-weight:600; border-radius:5px;
               padding:1px 5px; margin-left:6px; border:1px solid currentColor; }
  .pay-badge.paid { color:#2f8a4f; }
  .pay-badge.unpaid { color:#b04a2f; }
  .pay-badge.claimed { color:#8a6d2f; }
  details.fulfill { margin-top:8px; font-size:12px; border-top:1px solid var(--border); padding-top:7px; }
  details.fulfill summary { cursor:pointer; color:var(--muted); font-size:11px; }
  .ffline { display:flex; align-items:center; justify-content:space-between; gap:8px; margin:6px 0; color:var(--cream); }
  .ffline.ok { color:var(--muted); }
  .ffline input { width:50px; padding:2px 4px; border:1px solid var(--border); background:var(--surface); color:var(--cream); border-radius:5px; }
  button.ff-rec { font-size:11px; border:1px solid var(--border); background:transparent; color:var(--cream);
                  border-radius:6px; padding:3px 9px; cursor:pointer; margin-top:4px; }
  button.ff-rec:hover { border-color:var(--gold); color:var(--gold); }
  #gate { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; }
  #gate input { padding:10px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--cream); }
  @keyframes ord-flash { 0% { background: rgba(212,175,55,0.45); } 100% { background: transparent; } }
  .card.ord-flash { animation: ord-flash 2.4s ease-out; }
  /* Household / combined-shipment UI */
  .hh-check { margin-right:7px; transform:scale(1.15); cursor:pointer; vertical-align:middle; }
  .hh-badge { display:inline-block; margin-left:6px; padding:1px 7px; border-radius:10px;
    background:rgba(124,156,255,0.18); color:#9db4ff; font-size:11px; }
  .onum { font-weight:600; color:var(--cream); }
  #hhbar { position:fixed; left:50%; bottom:18px; transform:translateX(-50%); z-index:40;
    display:none; align-items:center; gap:12px; padding:10px 16px; border-radius:12px;
    background:var(--surface); border:1px solid var(--gold); box-shadow:0 6px 24px rgba(0,0,0,0.45); }
  #hhbar button { padding:7px 14px; border-radius:8px; border:1px solid var(--gold);
    background:var(--gold); color:#0a150d; cursor:pointer; font-weight:600; }
  #hhbar .link { background:none; border:none; color:var(--muted); cursor:pointer; font-weight:400; }
  #hhbanner { display:none; margin:0 12px 10px; padding:9px 13px; border-radius:10px;
    background:rgba(124,156,255,0.10); border:1px solid rgba(124,156,255,0.35); color:#c7d2ff; font-size:13px; }
  #hhbanner button { margin-left:8px; padding:3px 10px; border-radius:7px; border:1px solid #7c9cff;
    background:none; color:#9db4ff; cursor:pointer; }
  .hh-ship { border:1px solid rgba(124,156,255,0.5) !important; }
  .hh-ship .card-head .who::before { content:"\1F3E0 "; }
</style>
</head>
<body>
<script src="/static/op-nav.js" data-active="sales" data-sub="orders"></script>
  <div id="gate"><div style="text-align:center">
    <p style="margin-bottom:10px;color:var(--muted)">Enter console key</p>
    <input id="key" type="password" placeholder="console key" />
    <button onclick="unlock()" style="padding:10px 14px;margin-left:6px;border-radius:8px;border:1px solid var(--border);background:var(--gold);color:#0a150d;cursor:pointer">Unlock</button>
  </div></div>

  <h1>Orders</h1>
  <div class="sub">Every order, from every channel, through one lifecycle.</div>
  <div id="hhbanner"></div>
  <div class="cols" id="board"></div>
  <div id="hhbar">
    <span id="hhbar-label"></span>
    <button onclick="combineSelected()">Combine into shipment &rarr;</button>
    <button class="link" onclick="clearSelection()">clear</button>
  </div>

<script>
  // A "new" (in-fulfillment) order is paid-ready only once its payment is paid or
  // claimed; otherwise it's an unpaid cart awaiting payment. Portal/reorder flows
  // land directly in 'new' as unpaid, so we split the old "New" lane in two.
  function isPaidReady(o){ var ps=(o.pay_status||'unpaid'); return ps==='paid' || ps==='claimed'; }
  // Lane: [statusKey, label, optionalPredicate]. Predicate overrides status match.
  var LANES = [["proposed","Proposed"],["confirmed","Confirmed"],
               ["cart","Cart", function(o){ return o.status==='new' && !isPaidReady(o); }],
               ["paid","Paid", function(o){ return o.status==='new' && isPaidReady(o); }],
               ["packed","Packed"],["shipped","Shipped"],["delivered","Delivered"],["done","Done"]];
  function key(){ return localStorage.getItem('console_key') || ''; }
  // Auto-unlock: if arriving with ?key= (from the ops nav), seed the console key once.
  (function(){ var u=new URLSearchParams(location.search).get('key'); if(u) localStorage.setItem('console_key', u); })();
  function unlock(){ localStorage.setItem('console_key', document.getElementById('key').value); document.getElementById('gate').style.display='none'; load(); }
  function hdr(){ return { 'X-Console-Key': key(), 'Content-Type':'application/json' }; }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  // Display-only relabel of order source (DB values unchanged).
  function srcLabel(s){ var m={'reorder':'Order','portal-reorder':'Portal order'}; return m[s]||s; }

  // Household / combined-shipment state (feature-flagged server-side).
  var HH = { enabled:false, sel:{}, clusters:[] };
  var _TERMINAL = {shipped:1, delivered:1, done:1, cancelled:1};
  // An order can join a new combined shipment if it's not out the door, not a
  // pickup, and not already in a shipment. Payment is NOT required to group (a
  // household can be set up while orders are still proposed/cart); the shipment
  // card blocks label/ship until every member is paid.
  function combinable(o){ return !_TERMINAL[o.status] && o.channel!=='pickup' && o.group_shipment_id==null; }

  function cardHtml(o){
    var total = o.total_cents ? '$'+(o.total_cents/100).toFixed(2) : '';
    var items = (o.items||[]).map(function(i){ return (i.qty?i.qty+'x ':'')+esc(i.name||''); }).join(', ');
    var acts = '';
    if (o.status==='proposed') acts = editBtn(o.id) + ' ' + btn(o.id,'orders.confirm','Confirm') + ' ' + sendInvBtn(o) + ' ' + payBtn(o.id);
    else if (o.status==='confirmed') acts = editBtn(o.id) + ' ' + sendInvBtn(o) + ' ' + payBtn(o.id);
    else if (o.status==='new' && !isPaidReady(o)) acts = editBtn(o.id) + ' ' + sendInvBtn(o) + ' ' + payBtn(o.id);
    else if (o.status==='new')     acts = editBtn(o.id) + ' ' + btn(o.id,'orders.mark_packed','Pack') + ' ' + sendInvBtn(o);
    else if (o.status==='packed') acts = btn(o.id,'orders.create_label','Create label') + ' ' + shipBtn(o.id);
    else if (o.status==='shipped') acts = btn(o.id,'orders.send_tracking','Send tracking') + ' ' + btn(o.id,'orders.mark_delivered','Mark delivered') + ' ' + btn(o.id,'orders.mark_done','Mark done');
    if (o.pay_status === 'claimed') acts = '<button onclick="confirmClaimed(' + Number(o.id) + ",'" + String(o.pay_method || '').replace(/'/g, '') + "'" + ')">Confirm payment' + (o.pay_method ? ' (' + esc(o.pay_method) + ')' : '') + '</button> ' + acts;
    if (o.status!=='done' && o.status!=='delivered' && o.status!=='cancelled') acts += ' <button class="cancel" onclick="act('+Number(o.id)+',\'orders.cancel\',{})">Cancel</button>';
    // Grouped into a combined shipment: fulfillment is driven by the shipment
    // card (in the Households column), so suppress this order's own shipping
    // buttons. Money actions (invoice/pay) stay reachable when still unpaid.
    if (o.group_shipment_id!=null && (o.status==='new' || o.status==='packed' || o.status==='shipped') && isPaidReady(o)) {
      // Keep the money action reachable (a claimed payment still needs confirming);
      // only the fulfillment buttons move to the shipment card.
      var keep = (o.pay_status==='claimed')
        ? '<button onclick="confirmClaimed(' + Number(o.id) + ",'" + String(o.pay_method || '').replace(/'/g, '') + "'" + ')">Confirm payment' + (o.pay_method ? ' (' + esc(o.pay_method) + ')' : '') + '</button> ' : '';
      acts = keep + '<span class="meta">Shipping handled in shipment #'+Number(o.group_shipment_id)+' (Households column).</span>';
    }
    // Print invoice on every card lane (reprint a receipt at any point —
    // packed/shipped/done included) EXCEPT cancelled, where there's nothing to
    // reprint. Appended last so it survives the grouped-shipment acts rebuild
    // above and reads as the trailing action on the card.
    if (o.status!=='cancelled') acts += (acts ? ' ' : '') + printInvBtn(o.id);
    var bo = Number(o.backorder_units||0);
    // Backorder only applies once an order is paid + in fulfillment (new/packed/
    // shipped) — never on an unpaid proposed/confirmed invoice (all-unfulfilled).
    var ful = (o.status==='new' || o.status==='packed' || o.status==='shipped');
    var badge = (ful && bo>0) ? ' <span class="bo-badge">&#9650; '+bo+' backordered</span>' : '';
    // Payment status badge (paid shows method; claimed prompts a confirm; unpaid flags it).
    var ps = (o.pay_status||'unpaid');
    if (ps==='paid') badge += ' <span class="pay-badge paid">Paid'+(o.pay_method?' &middot; '+esc(o.pay_method):'')+'</span>';
    else if (ps==='claimed') badge += ' <span class="pay-badge claimed">payment claimed — confirm'+(o.pay_method?' ('+esc(o.pay_method)+')':'')+'</span>';
    else badge += ' <span class="pay-badge unpaid">Unpaid</span>';
    // Collapsed default: clickable HEADER (name + pay/backorder badge ; date placed ·
    // where/how placed · amount). Click opens the BODY (products, tracking, fulfillment,
    // actions). Action buttons live in the body, so clicking them never toggles the card.
    // Household select checkbox (only for combinable orders when the flag is on)
    // and a badge when the order is already in a combined shipment.
    var sel = (HH.enabled && combinable(o))
      ? '<input type="checkbox" class="hh-check" '+(HH.sel[o.id]?'checked ':'')
        +'onclick="event.stopPropagation(); toggleSel('+Number(o.id)+', this)">' : '';
    var gb = (o.group_shipment_id!=null)
      ? '<span class="hh-badge">shipment #'+Number(o.group_shipment_id)+'</span>' : '';
    var head = '<div class="card-head" onclick="toggleCard(this)">'
      + '<div class="who">'+sel+esc(o.name||o.email||'Order #'+o.id)+gb+badge+'<span class="chev">&#9656;</span></div>'
      + '<div class="meta"><span class="onum">#'+Number(o.id)+'</span>'
        + (o.external_ref?' &middot; '+esc(o.external_ref):'')
        + ' &middot; '+esc(dateStr(o.created_at))+' &middot; <span class="src">'+esc(whereLabel(o))+'</span>'
        + (total?' &middot; '+total:'')+'</div>'
      + '</div>';
    var body = '<div class="card-body">'
      + (items?'<div class="meta prods">'+items+'</div>':'')
      + (o.tracking_number?'<div class="meta">tracking '+esc(o.tracking_number)+'</div>':'')
      + (o.biofield_pdf_url?'<div class="meta"><a href="'+esc(o.biofield_pdf_url)+'" target="_blank" rel="noopener">&#128424; Biofield report (PDF)</a></div>':'')
      + fulfillHtml(o)
      + '<div class="acts">'+acts+'</div>'
      + '</div>';
    return '<div class="card" data-oid="'+o.id+'">'+head+body+'</div>';
  }
  // Click the header to expand/collapse a card. Bound to .card-head (not the buttons),
  // so action clicks in the body don't toggle it.
  function toggleCard(head){ if(head && head.parentNode) head.parentNode.classList.toggle('open'); }
  // Date the order was placed, e.g. "Jun 28, 2026".
  function dateStr(iso){ try { return new Date(iso).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); } catch(e){ return ''; } }
  // Friendly "where/how placed" label from the order source (+ pickup), plain text (esc'd by caller).
  function whereLabel(o){
    var m={'in-house':'In-house (phone/email)','portal-reorder':'Portal order','reorder':'Order',
           'funnel':'Website','biofield_trial':'Biofield trial','biofield':'Biofield'};
    var lbl = m[(o.source||'')] || srcLabel(o.source) || o.source || '—';
    if (o.channel==='pickup') lbl += ' · Pickup';
    return lbl;
  }
  // Per-line partial fulfillment (Phase 2): record qty shipped; shortfall stays backordered.
  function showFulfill(o){ return o.status==='new' || o.status==='packed' || o.status==='shipped'; }
  function fulfillHtml(o){
    if (!showFulfill(o)) return '';
    var rows = (o.fulfillment||[]).map(function(f){
      var it = (o.items||[])[f.index] || {};
      var name = esc(it.name||('Line '+(f.index+1)));
      if (Number(f.backordered)<=0) return '<div class="ffline ok">'+name+' &mdash; sent '+f.fulfilled+'/'+f.ordered+' &#10003;</div>';
      return '<div class="ffline"><span>'+name+' &mdash; sent '+f.fulfilled+'/'+f.ordered+'</span>'
        + '<input type="number" min="0" max="'+f.backordered+'" value="0" id="ff-'+Number(o.id)+'-'+f.index+'"></div>';
    }).join('');
    if (!rows) return '';
    return '<details class="fulfill"><summary>Fulfill lines</summary>'+rows
      + '<button class="ff-rec" onclick="fillAllLines('+Number(o.id)+')">Fill all</button> '
      + '<button class="ff-rec" onclick="fulfillLines('+Number(o.id)+')">Record shipment</button></details>';
  }
  // Fill every backordered line's input with its remaining (= ordered, when nothing
  // shipped yet) quantity; the user reviews, then clicks Record shipment.
  function fillAllLines(id){
    document.querySelectorAll('[id^="ff-'+id+'-"]').forEach(function(inp){
      if (inp.max) inp.value = inp.max;
    });
  }
  function fulfillLines(id){
    var lines = [];
    document.querySelectorAll('[id^="ff-'+id+'-"]').forEach(function(inp){
      var q = parseInt(inp.value||'0',10);
      if (q>0) lines.push({index: parseInt(inp.id.split('-').pop(),10), qty: q});
    });
    if (!lines.length){ alert('Enter a quantity to ship on at least one line.'); return; }
    act(id, 'orders.fulfill_lines', {lines: lines});
  }
  function btn(id,key,label){ return '<button onclick="act('+Number(id)+',\''+key+'\',{})">'+label+'</button>'; }
  function shipBtn(id){ return '<button onclick="ship('+Number(id)+')">Ship + tracking</button>'; }
  function payBtn(id){ return '<button onclick="recordPay('+Number(id)+')">Record payment</button>'; }
  function printInvBtn(id){ return '<button onclick="printInvoice('+Number(id)+')">Print invoice</button>'; }
  function editBtn(id){ return '<button onclick="editInvoice('+Number(id)+')">Edit</button>'; }
  // Open the data-entry form in edit mode (prefilled with this order's lines/prices).
  function editInvoice(id){ location.href = '/orders/new?edit_order='+Number(id)+'&key='+encodeURIComponent(key()); }
  // Open the customer invoice page (with ?print=1 to auto-trigger the print dialog).
  // Open a blank tab synchronously first so the async fetch doesn't trip popup blockers.
  function printInvoice(id){
    var w = window.open('', '_blank');
    fetch('/api/console/order/'+Number(id)+'/invoice-link', {headers:hdr()})
      .then(function(r){ return r.json(); })
      .then(function(res){
        if (res && res.ok && res.link){ if (w) w.location = res.link; else window.open(res.link,'_blank'); }
        else { if (w) w.close(); alert('Could not open invoice: '+((res&&res.error)||'error')); }
      })
      .catch(function(){ if (w) w.close(); alert('Could not open invoice.'); });
  }
  function recordPay(id){
    var m = prompt('Payment method (Check / Cash / Venmo / PayPal / eProcessing / Stripe / Zelle / Wise):','Check');
    if (m===null) return;
    var a = prompt('Amount in dollars (blank = invoice total):','');
    var p = { method: m };
    if (a && !isNaN(parseFloat(a))) p.amount_cents = Math.round(parseFloat(a)*100);
    act(id, 'orders.record_payment', p);
  }
  function confirmClaimed(id, method){
    if (!confirm('Confirm ' + (method || 'this') + ' payment for order #' + id + '?')) return;
    act(id, 'orders.record_payment', { method: method });
  }

  async function load(){
    var r = await fetch('/api/orders?limit=300', {headers:hdr()});
    if (r.status===401){ document.getElementById('gate').style.display='flex'; return; }
    var orders = (await r.json()).data || [];
    // Combined-shipment feature flag + auto-suggest clusters (best-effort).
    try {
      var sr = await fetch('/api/console/shipments/suggestions', {headers:hdr()});
      if (sr.ok){ var sj = await sr.json(); HH.enabled = !!sj.enabled; HH.clusters = sj.clusters || []; }
    } catch(e){ HH.enabled = false; HH.clusters = []; }
    HH.byId = {}; orders.forEach(function(o){ HH.byId[o.id] = o; });  // for the combine confirm
    // Header-search deep link (Records mode): /console/orders?q=<ref|name|email>
    var q = (new URLSearchParams(location.search).get('q') || '').trim().toLowerCase();
    if (q) {
      orders = orders.filter(function(o){
        return [o.id, '#'+o.id, o.external_ref, o.name, o.email].some(function(v){
          return (v || '').toString().toLowerCase().indexOf(q) >= 0;
        });
      });
    }
    var board = document.getElementById('board'); board.innerHTML='';
    if (q) {
      var note = document.createElement('div');
      note.style.cssText = 'padding:6px 12px;margin-bottom:8px;color:#9aa0b4;font-size:13px';
      note.innerHTML = 'Filtered by "<b>' + q.replace(/[<>&]/g,'') + '</b>" — '
        + orders.length + ' match' + (orders.length===1?'':'es')
        + ' · <a href="/console/orders" style="color:#7c9cff">clear</a>';
      board.appendChild(note);
    }
    // Households column (leftmost): one card per open combined shipment, built
    // purely from the orders that carry a group_shipment_id.
    var groups = {};
    orders.forEach(function(o){ if(o.group_shipment_id!=null){ (groups[o.group_shipment_id]=groups[o.group_shipment_id]||[]).push(o); } });
    var gids = Object.keys(groups);
    if (gids.length){
      var gcol = document.createElement('div'); gcol.className='col';
      gcol.innerHTML = '<h2>Households <span class="n">'+gids.length+'</span></h2>'
        + gids.map(function(id){ return shipmentCardHtml(id, groups[id]); }).join('');
      board.appendChild(gcol);
    }
    LANES.forEach(function(l){
      var pred = l[2] || function(o){ return o.status===l[0]; };
      var inLane = orders.filter(pred);
      var col = document.createElement('div'); col.className='col';
      col.innerHTML = '<h2>'+l[1]+' <span class="n">'+inLane.length+'</span></h2>'
        + inLane.map(cardHtml).join('');
      board.appendChild(col);
    });
    renderBanner();
    updateBar();
    maybeHighlight();
  }

  // One card summarizing a combined shipment (status/tracking are lockstep across
  // members, so any member reflects the shipment). Buttons act on shipment_id.
  function shipmentCardHtml(sid, ms){
    var st = (ms[0]||{}).status || '';
    var tn = ''; ms.forEach(function(m){ if(m.tracking_number) tn = m.tracking_number; });
    var who = ms.map(function(m){ return esc(m.name||m.email||('#'+m.id)); }).join(' + ');
    var items = ms.map(function(m){ return (m.items||[]).map(function(i){ return (i.qty?i.qty+'x ':'')+esc(i.name||''); }).join(', '); }).filter(Boolean).join(' | ');
    // Shipping is blocked until every member is paid — you can group early, but
    // you can't put a label on / ship an unpaid order (backend enforces this too).
    var unpaid = ms.filter(function(m){ return !isPaidReady(m); });
    var allPaid = unpaid.length === 0;
    var unpaidNames = unpaid.map(function(m){ return esc(m.name||m.email||('#'+m.id)); });
    var acts = '';
    if (!allPaid) {
      acts += '<span class="meta" style="color:var(--gold)">Waiting on payment: '+unpaidNames.join(', ')
        +' &mdash; collect on each order card, then ship together.</span> ';
    } else {
      if (!tn) acts += gbtn(sid,'shipments.create_label','Create label') + ' <button onclick="setGroupTracking('+Number(sid)+')">Set tracking</button> ';
      if (st==='new') acts += gbtn(sid,'shipments.mark_packed','Pack') + ' ';
      if (tn) acts += gbtn(sid,'shipments.send_tracking','Send tracking') + ' ' + gbtn(sid,'shipments.mark_delivered','Mark delivered') + ' ' + gbtn(sid,'shipments.mark_done','Mark done') + ' ';
    }
    // Recompute + split the one-parcel shipping (only meaningful while still open).
    if (!tn) acts += '<button onclick="recalcShipping('+Number(sid)+',false)">Recalc shipping</button> ';
    acts += '<button class="cancel" onclick="if(confirm(\'Un-group shipment #'+Number(sid)+' back into standalone orders?\'))actGroup('+Number(sid)+',\'shipments.cancel\',{})">Cancel</button>';
    // While still open (no label bought), each member can be pulled out individually.
    var memberList = '';
    if (!tn) memberList = '<div class="meta">Members:<br>' + ms.map(function(m){
        var pm = isPaidReady(m) ? '' : ' <span style="color:var(--gold)">unpaid</span>';
        var shp = ' &middot; ship $'+(((m.shipping_cents||0))/100).toFixed(2);
        return '&bull; '+esc(m.name||m.email||('#'+m.id)) + pm + shp
          + ' <button onclick="actGroup('+Number(sid)+',\'shipments.remove\',{order_id:'+Number(m.id)+'})" style="padding:0 6px;border:1px solid var(--border);border-radius:5px;background:none;color:var(--muted);cursor:pointer">remove</button>';
      }).join('<br>') + '</div>';
    var stLabel = allPaid ? esc(st)
      : ('awaiting payment ('+(ms.length-unpaid.length)+'/'+ms.length+' paid)');
    var head = '<div class="card-head" onclick="toggleCard(this)"><div class="who">'+who
      + '<span class="hh-badge">shipment #'+Number(sid)+'</span><span class="chev">&#9656;</span></div>'
      + '<div class="meta">'+stLabel+(tn?' &middot; tracking '+esc(tn):'')+'</div></div>';
    var body = '<div class="card-body">'
      + (items?'<div class="meta prods">'+items+'</div>':'')
      + memberList
      + '<div class="acts">'+acts+'</div></div>';
    return '<div class="card hh-ship" data-sid="'+Number(sid)+'">'+head+body+'</div>';
  }
  function gbtn(sid,key,label){ return '<button onclick="actGroup('+Number(sid)+',\''+key+'\',{})">'+label+'</button>'; }

  // ── Selection + combine ──
  function toggleSel(id, el){ if(el && el.checked) HH.sel[id]=true; else delete HH.sel[id]; updateBar(); }
  function selCount(){ return Object.keys(HH.sel).length; }
  function updateBar(){
    var bar = document.getElementById('hhbar'); if(!bar) return;
    var n = selCount();
    document.getElementById('hhbar-label').textContent = n+' order'+(n===1?'':'s')+' selected';
    bar.style.display = (n>=2) ? 'flex' : 'none';
  }
  function clearSelection(){ HH.sel={}; document.querySelectorAll('.hh-check').forEach(function(c){ c.checked=false; }); updateBar(); }
  function _addrStr(a){ a=a||{}; return [a.street,a.city,a.state,a.zip].filter(Boolean).join(', '); }
  async function combineSelected(){
    var ids = Object.keys(HH.sel).map(Number);
    if (ids.length<2){ alert('Select at least 2 orders to combine.'); return; }
    // Show the shared ship-to (the first order's address) and warn loudly if the
    // selected orders don't all share one address — this is the mis-ship guard.
    var norm = function(a){ a=a||{}; return ((a.street||'')+'|'+(a.zip||'')).toLowerCase().trim(); };
    var distinct = {}; ids.forEach(function(id){ var o=HH.byId[id]||{}; distinct[norm(o.address)]=1; });
    var shipTo = _addrStr((HH.byId[ids[0]]||{}).address);
    var warn = (Object.keys(distinct).length>1)
      ? '\n\n⚠️ These orders have DIFFERENT ship-to addresses. Everything will ship to the address above — make sure that is right.' : '';
    if (!confirm('Combine '+ids.length+' orders into one household shipment, shipping to:\n\n'+(shipTo||'(no address on the first order)')+'\n\nEach client keeps their own invoice and payment.'+warn)) return;
    var r = await fetch('/api/action/shipments.combine', {method:'POST', headers:hdr(), body:JSON.stringify({order_ids:ids})});
    var res = await r.json();
    if (res.status!=='done'){ alert('Could not combine: '+(res.error||'error')); return; }
    HH.sel={};
    // One parcel = one shipping charge: recompute + split it across members right away.
    var sid = res.result && res.result.shipment_id;
    if (sid){ await recalcShipping(sid, true); } else { load(); }
  }

  // Recompute the one-parcel shipping and split it across the shipment's unpaid
  // members (proportional to each member's own standalone shipping). quiet=true
  // suppresses the summary alert (used right after combine).
  async function recalcShipping(sid, quiet){
    try {
      var r = await fetch('/api/console/shipments/'+Number(sid)+'/recalc-shipping', {method:'POST', headers:hdr()});
      var j = await r.json();
      if (!j.ok){ if(!quiet) alert('Could not recalc shipping: '+(j.error||'error')); load(); return; }
      if (!quiet){
        var lines = (j.members||[]).map(function(m){
          return '• '+(m.name||('#'+m.order_id))+': '
            + (m.skipped==='paid'
                ? '$'+((m.shipping_cents||0)/100).toFixed(2)+' (paid, unchanged)'
                : '$'+((m.new_shipping_cents||0)/100).toFixed(2));
        }).join('\n');
        alert('Combined parcel shipping $'+((j.combined_shipping_cents||0)/100).toFixed(2)+', split:\n'+lines);
      }
      load();
    } catch(e){ if(!quiet) alert('Could not recalc shipping.'); load(); }
  }
  function combineCluster(i){
    var c = HH.clusters[i]; if(!c) return;
    HH.sel = {}; c.orders.forEach(function(o){ HH.sel[o.id]=true; });
    combineSelected();
  }
  async function actGroup(sid, key, params){
    params = params || {}; params.shipment_id = Number(sid);
    var r = await fetch('/api/action/'+key, {method:'POST', headers:hdr(), body:JSON.stringify(params)});
    var res = await r.json();
    if (res.status!=='done'){ alert('Action failed: '+(res.error||'error')); return; }
    var out = res.result || {};
    if (out.handoff) window.open(out.handoff, '_blank');   // Click-N-Ship handoff
    load();
  }
  function setGroupTracking(sid){
    var tn = prompt('USPS tracking number (from Click-N-Ship, for the combined parcel):',''); if(tn===null) return;
    if(!tn.trim()){ alert('Enter a tracking number.'); return; }
    actGroup(sid, 'shipments.set_tracking', {tracking_number: tn.trim()});
  }
  function renderBanner(){
    var b = document.getElementById('hhbanner'); if(!b) return;
    if(!HH.enabled || !HH.clusters.length){ b.style.display='none'; return; }
    var c = HH.clusters[0];
    var names = c.orders.map(function(o){ return o.name||o.email||('#'+o.id); }).join(' + ');
    b.innerHTML = '&#127968; These orders share '+(c.key_type==='household'?'a household':'an address')
      + ' and could ship together: <b>'+esc(names)+'</b>'
      + '<button onclick="combineCluster(0)">Combine</button>'
      + (HH.clusters.length>1?' <span class="meta">(+'+(HH.clusters.length-1)+' more)</span>':'');
    b.style.display='block';
  }

  function maybeHighlight(){
    var id = new URLSearchParams(location.search).get('order');
    if (!id) return;
    var card = document.querySelector('.card[data-oid="' + (window.CSS && CSS.escape ? CSS.escape(id) : id) + '"]');
    if (!card) return;
    card.classList.add('open');  // expand the deep-linked card so its details are visible
    card.scrollIntoView({behavior:'smooth', block:'center'});
    card.classList.add('ord-flash');
    setTimeout(function(){ card.classList.remove('ord-flash'); }, 2600);
  }

  // Send-invoice button reflects whether it's already been emailed: once sent it
  // turns green and reads "Invoice Sent M/D/YY", and re-clicking re-sends.
  function invSentStr(iso){ try { return new Date(iso).toLocaleDateString('en-US',{month:'numeric',day:'numeric',year:'2-digit'}); } catch(e){ return ''; } }
  function sendInvBtn(o){
    if (o.invoice_sent_at){
      return '<button class="inv-sent" onclick="act('+Number(o.id)+',\'orders.send_invoice\',{})">Invoice Sent '+esc(invSentStr(o.invoice_sent_at))+' (re-send)</button>';
    }
    return '<button onclick="act('+Number(o.id)+',\'orders.send_invoice\',{})">Send invoice</button>';
  }
  async function act(id, key, params){
    params = params || {}; params.order_id = id;
    var r = await fetch('/api/action/'+key, {method:'POST', headers:hdr(), body:JSON.stringify(params)});
    var res = await r.json().catch(function(){ return {}; });
    // Surface failures — the board used to swallow them, so a Send invoice that
    // errored (e.g. no customer email) silently left the button unchanged.
    if (res && res.status && res.status!=='done'){
      alert((res.result && res.result.error) || res.error || ('Action did not complete ('+res.status+').'));
    }
    load();
  }
  function ship(id){
    var tn = prompt('Tracking number (optional):','');
    act(id, 'orders.set_tracking', {tracking_number: tn||''});
  }

  if (key()) { document.getElementById('gate').style.display='none'; load(); }
</script>
</body>
</html>
