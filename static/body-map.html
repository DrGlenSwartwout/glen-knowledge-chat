<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Body Map: Iris & Sclera</title>
  <link rel="stylesheet" href="/body-map.css">
</head>
<body>
  <header class="bm-head">
    <h1>Body Map</h1>
    <p class="bm-sub">An interactive atlas of the iris and sclera. Explore the reference chart, or map the zones onto a photo of your own eye.</p>
  </header>

  <div class="bm-controls">
    <label>System
      <select id="bm-system">
        <option value="iridology">Iridology (iris)</option>
        <option value="sclerology">Sclerology (sclera)</option>
      </select>
    </label>
    <label>Eye
      <select id="bm-eye">
        <option value="right">Right</option>
        <option value="left">Left</option>
      </select>
    </label>
    <div class="bm-modes">
      <button id="bm-mode-ref" class="bm-active">Reference chart</button>
      <button id="bm-mode-photo">Your photo</button>
    </div>
    <div id="bm-layers" class="bm-layers"></div>
  </div>

  <main class="bm-stage">
    <div class="bm-canvas">
      <img id="bm-photo" alt="" hidden>
      <svg id="bm-svg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid meet"></svg>
      <p id="bm-disclaimer" class="bm-disclaimer" hidden>This is a visual approximation, not a diagnosis.</p>
    </div>
    <aside id="bm-panel" class="bm-panel">
      <p class="bm-hint">Select a zone to read what it maps to.</p>
    </aside>
  </main>

  <div id="bm-photo-tools" class="bm-photo-tools" hidden>
    <input type="file" id="bm-upload" accept="image/*">
    <p class="bm-anchor-hint" id="bm-anchor-hint"></p>
  </div>

  <script src="/body-map.js"></script>
</body>
</html>
