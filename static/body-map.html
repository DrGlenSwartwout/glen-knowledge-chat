<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Body Map</title>
  <link rel="stylesheet" href="/body-map.css">
</head>
<body>
  <header class="bm-head">
    <h1>Body Map</h1>
    <p class="bm-sub">An interactive atlas of the body's reflex maps: iris, sclera, ear, and foot. Explore a reference chart, or map the zones onto a photo of your own.</p>
    <p class="bm-sub"><a href="/atlas" style="color:var(--bm-line)">Part of the Knowledge Atlas</a></p>
  </header>

  <div class="bm-controls">
    <label>System
      <select id="bm-system">
        <option value="iridology">Iridology (iris)</option>
        <option value="sclerology">Sclerology (sclera)</option>
        <option value="ear">Ear (auricular)</option>
        <option value="foot">Foot (reflexology)</option>
        <option value="hand">Hand (reflexology)</option>
        <option value="meridian">Meridians (acupuncture)</option>
        <option value="eav">Acupuncture &amp; EAV (hands/feet)</option>
        <option value="neurotome">Neurotomes (dermatomes)</option>
        <option value="lymph">Immune, lymphatic &amp; connective tissue</option>
        <option value="face">Face (facial diagnosis)</option>
        <option value="organs">Organ atlas (whole body)</option>
        <option value="skeleton">Skeleton (bones & joints)</option>
        <option value="muscle">Muscles</option>
        <option value="dental">Dental / meridian chart</option>
        <option value="organclock">Chinese organ clock (24h)</option>
        <option value="nervous">Nervous system</option>
        <option value="endocrine">Endocrine system</option>
        <option value="respiratory">Respiratory system</option>
        <option value="digestive">Digestive system</option>
        <option value="cardiovascular">Cardiovascular system</option>
        <option value="urogenital">Urogenital system (male / female)</option>
      </select>
    </label>
    <label><span id="bm-side-label">Eye</span>
      <select id="bm-eye">
        <option value="right">Right</option>
        <option value="left">Left</option>
      </select>
    </label>
    <div class="bm-modes">
      <button id="bm-mode-ref" class="bm-active">Reference chart</button>
      <button id="bm-mode-photo">Your photo</button>
    </div>
    <div id="bm-depth" class="bm-depth" title="Peel back the embryological germ layers">
      <span class="bm-depth-label">Peel:</span>
      <button data-depth="ectoderm">Ectoderm</button>
      <button data-depth="mesoderm">Mesoderm</button>
      <button data-depth="endoderm">Endoderm</button>
      <button data-depth="" class="bm-active">All</button>
    </div>
    <div id="bm-layers" class="bm-layers"></div>
  </div>

  <main class="bm-stage">
    <div class="bm-canvas">
      <img id="bm-photo" alt="" hidden>
      <svg id="bm-svg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid meet"></svg>
      <p id="bm-disclaimer" class="bm-disclaimer" hidden>This is a visual approximation, not a diagnosis.</p>
    </div>
    <aside id="bm-panel" class="bm-panel">
      <p class="bm-hint">Select a zone to read what it maps to.</p>
    </aside>
  </main>

  <div id="bm-photo-tools" class="bm-photo-tools" hidden>
    <input type="file" id="bm-upload" accept="image/*">
    <button id="bm-autodetect" type="button" hidden>Auto-detect landmarks</button>
    <p class="bm-anchor-hint" id="bm-anchor-hint"></p>
  </div>

  <script src="/body-map.js"></script>
</body>
</html>
