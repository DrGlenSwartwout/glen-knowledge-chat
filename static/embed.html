<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Minding Body Mentor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Raleway:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a150d;
    --surface: #111f16;
    --surface2: #162318;
    --border: #21472d;
    --text: #fdf4d8;
    --text-muted: #a89870;
    --accent: #d4a843;
    --accent2: #3d8a52;
    --radius: 8px;
    --font: "Open Sans", -apple-system, BlinkMacSystemFont, sans-serif;
    --heading-font: "Raleway", -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: "SFMono-Regular", Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.6;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Mini header ── */
  .embed-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .embed-header .logo {
    width: 24px; height: 24px;
    border-radius: 4px; overflow: hidden; flex-shrink: 0;
  }
  .embed-header .logo img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .embed-header h1 {
    font-size: 13px; font-weight: 700; flex: 1; font-family: var(--heading-font);
  }
  #clear-btn {
    background: none; border: 1px solid var(--border);
    color: var(--text-muted); border-radius: 5px;
    padding: 3px 9px; font-size: 11px; cursor: pointer;
  }
  #clear-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 5px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .message {
    margin-bottom: 10px;
    padding: 10px 12px;
    border-radius: var(--radius);
  }
  .message.user {
    background: #152019;
    border-left: 3px solid var(--accent);
  }
  .message.assistant {
    background: var(--surface);
    border-left: 3px solid var(--accent2);
  }
  .role-label {
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-muted); margin-bottom: 5px;
  }
  .message.user .role-label { color: var(--accent); }
  .message.assistant .role-label { color: var(--accent2); }

  .message-body { font-size: 13px; line-height: 1.65; }
  .message-body p { margin-bottom: 0.6em; }
  .message-body p:last-child { margin-bottom: 0; }
  .message-body strong { color: var(--text); }
  .message-body ul, .message-body ol { padding-left: 1.3em; margin-bottom: 0.6em; }
  .message-body li { margin-bottom: 0.2em; }
  .message-body h3 { font-size: 13px; font-weight: 700; margin: 0.8em 0 0.3em; font-family: var(--heading-font); }
  .message-body code {
    font-family: var(--mono); font-size: 12px;
    background: var(--surface2); border-radius: 3px;
    padding: 1px 4px; color: #f78166;
  }
  .message-body hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

  /* ── Inline sources ── */
  .inline-sources {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-items: center;
  }
  .sources-label {
    font-size: 10px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-right: 2px;
  }
  .source-pill {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 11px; color: var(--text-muted);
    cursor: pointer;
    transition: all 0.12s;
  }
  .source-pill:hover { border-color: var(--accent); color: var(--text); }
  .source-pill .pill-score {
    font-weight: 700;
    font-size: 10px;
  }
  .pill-high { color: #3d8a52; }
  .pill-mid  { color: #d4a843; }
  .pill-low  { color: #a89870; }

  /* ── Action buttons ── */
  .msg-actions {
    display: flex; gap: 5px; margin-top: 8px;
  }
  .action-btn {
    display: flex; align-items: center; gap: 4px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text-muted);
    font-size: 11px; padding: 3px 8px;
    cursor: pointer; font-family: var(--font);
    transition: all 0.12s;
  }
  .action-btn:hover { border-color: var(--accent); color: var(--text); }
  .action-btn.copied { border-color: var(--accent2); color: var(--accent2); }
  .action-btn svg { width: 11px; height: 11px; }

  /* Quiet (icon-only, low-contrast) copy button per Glen spec */
  .action-btn.quiet {
    background: transparent; border: none; padding: 3px 5px;
    color: var(--text-muted); opacity: 0.45; gap: 0;
  }
  .action-btn.quiet:hover { opacity: 1; color: var(--accent); }
  .action-btn.quiet.copied { opacity: 1; color: var(--accent2); }

  /* ── Opt-in row (below input box) ── */
  #optin-bar {
    padding: 6px 12px 8px;
    background: var(--surface);
    display: flex; flex-wrap: wrap; gap: 6px 10px;
    align-items: center;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    font-size: 11px;
  }
  .optin-field { display: flex; align-items: center; gap: 4px; flex: 1; min-width: 110px; }
  .optin-field label { color: var(--text-muted); white-space: nowrap; }
  .optin-field input {
    flex: 1; min-width: 70px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--font);
    font-size: 11px;
    padding: 3px 7px;
    outline: none;
  }
  .optin-field input:focus { border-color: var(--accent); }
  .optin-field input::placeholder { color: var(--text-muted); opacity: 0.55; }
  .optin-consent {
    display: flex; align-items: center; gap: 6px;
    flex: 1 1 100%;
  }
  .consent-text { color: var(--text-muted); white-space: nowrap; }
  .freq-group { display: flex; gap: 2px; align-items: center; }
  .freq-group label {
    color: var(--text-muted); cursor: pointer;
    padding: 2px 6px; border: 1px solid var(--border);
    border-radius: 3px; transition: all 0.12s; white-space: nowrap;
    font-size: 10px;
  }
  .freq-group label.active { border-color: var(--accent2); color: var(--accent2); background: #3d8a5212; }
  .freq-group label:not(.active):hover { border-color: var(--accent); color: var(--text); }
  .freq-group input[type=radio],
  .freq-group input[type=checkbox] { display: none; }

  /* ── Restored-history divider ── */
  .meta-bar {
    text-align: center; font-size: 10px; color: var(--text-muted);
    padding: 4px 8px; opacity: 0.6;
  }

  .share-wrap { position: relative; }
  .share-popover {
    display: none;
    position: absolute;
    bottom: calc(100% + 5px);
    left: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    z-index: 200;
    min-width: 160px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
  }
  .share-popover.open { display: block; }
  .share-option {
    display: flex; align-items: center; gap: 7px;
    padding: 6px 8px; border-radius: 5px;
    color: var(--text-muted); font-size: 12px;
    cursor: pointer; text-decoration: none;
    transition: background 0.1s, color 0.1s;
    white-space: nowrap;
  }
  .share-option:hover { background: var(--border); color: var(--text); }
  .share-option svg { width: 13px; height: 13px; flex-shrink: 0; }

  /* ── Thinking ── */
  .thinking {
    display: flex; align-items: center; gap: 7px;
    padding: 8px 12px;
    color: var(--text-muted); font-size: 12px;
    margin-bottom: 8px;
  }
  .dots span {
    display: inline-block; width: 5px; height: 5px;
    background: var(--text-muted); border-radius: 50%;
    animation: bounce 1.2s infinite ease-in-out; margin-right: 2px;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  /* ── Level selector ── */
  #level-bar {
    display: flex; gap: 5px; align-items: center;
    padding: 7px 12px 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #level-bar .level-label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--text-muted);
    margin-right: 3px; white-space: nowrap;
  }
  .level-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; color: var(--text-muted);
    font-family: var(--font); font-size: 11px;
    padding: 3px 10px; cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .level-btn:hover { border-color: var(--accent); color: var(--text); }
  .level-btn.active {
    background: var(--accent); border-color: var(--accent);
    color: #000; font-weight: 700;
  }

  /* ── Input bar ── */
  #input-bar {
    padding: 6px 12px 10px;
    background: var(--surface);
    display: flex; gap: 8px; align-items: flex-end;
    flex-shrink: 0;
  }
  #query-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 8px 11px;
    resize: none;
    min-height: 38px;
    max-height: 120px;
    line-height: 1.4;
    outline: none;
    transition: border-color 0.15s;
  }
  #query-input:focus { border-color: var(--accent); }
  #query-input::placeholder { color: var(--text-muted); }
  #send-btn {
    background: var(--accent);
    border: none; border-radius: var(--radius);
    color: #000; font-weight: 700;
    font-size: 12px; padding: 8px 14px;
    cursor: pointer; flex-shrink: 0;
    transition: opacity 0.15s; height: 38px;
  }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Empty state ── */
  .empty-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; gap: 8px;
    color: var(--text-muted); text-align: center;
    padding: 20px;
  }
  .empty-state .icon { font-size: 32px; opacity: 0.3; }
  .empty-state .logo-icon { width: 120px; height: 120px; object-fit: contain; opacity: 0.9; }
  .empty-state p { font-size: 12px; max-width: 200px; }
  .example-queries { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; width: 100%; }
  .example-q {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px;
    font-size: 11px; color: var(--text-muted);
    cursor: pointer; text-align: left; transition: all 0.12s;
  }
  .example-q:hover { border-color: var(--accent); color: var(--text); }

  /* ── Star rating ── */
  .star-rating {
    display: flex; align-items: center; gap: 5px;
    margin-top: 8px; padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .star-rating .rate-label {
    font-size: 10px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .stars { display: flex; gap: 2px; }
  .star {
    font-size: 16px; cursor: pointer; color: var(--border);
    transition: color 0.12s, transform 0.1s;
    line-height: 1; user-select: none;
  }
  .star:hover, .star.hover, .star.filled { color: var(--accent); }
  .star:hover { transform: scale(1.2); }
  .rate-thanks { font-size: 10px; color: var(--accent2); display: none; }
  .rate-thanks.visible { display: inline; }

  /* ── Feedback link ── */
  #feedback-bar {
    padding: 4px 12px 6px;
    background: var(--surface);
    text-align: center;
  }
  #feedback-bar a {
    font-size: 11px; color: var(--text-muted);
    text-decoration: none; transition: color 0.15s;
  }
  #feedback-bar a:hover { color: var(--accent); }

  /* ── Branding footer ── */
  .embed-footer {
    text-align: center; padding: 4px;
    font-size: 10px; color: var(--text-muted);
    background: var(--bg); border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .embed-footer a { color: var(--text-muted); text-decoration: none; }
  .embed-footer a:hover { color: var(--accent); }
</style>
</head>
<body>

<div class="embed-header">
  <span class="logo"><img src="/static/logo.png" alt="Mentorship University"></span>
  <h1>The Minding Body Mentor</h1>
  <button id="clear-btn" onclick="clearChat()">Clear</button>
</div>

<div id="messages">
  <div class="empty-state" id="empty-state">
    <img class="logo-icon" src="/static/logo.png" alt="Mentorship University">
    <p>Ask about healing yourself, those in your care, or the sciences.</p>
    <div class="example-queries">
      <button class="example-q" onclick="fillQuery(this.textContent)">What is the 5 Phases of Health model?</button>
      <button class="example-q" onclick="fillQuery(this.textContent)">How does biophoton coherence relate to healing?</button>
      <button class="example-q" onclick="fillQuery(this.textContent)">What is Spirit Mineral / ORMUS?</button>
    </div>
  </div>
</div>

<div id="level-bar">
  <span class="level-label">Level:</span>
  <button class="level-btn active" data-level="self-healing" onclick="setLevel(this)">Self-Healing</button>
  <button class="level-btn" data-level="health-care" onclick="setLevel(this)">Health Care</button>
  <button class="level-btn" data-level="science" onclick="setLevel(this)">Science</button>
</div>
<div id="input-bar">
  <textarea id="query-input"
    placeholder="Ask about self-healing, clinical praxis, clinical theory…"
    rows="1"
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button id="send-btn" onclick="sendQuery()">Send</button>
</div>

<div id="optin-bar">
  <div class="optin-field">
    <label>Name</label>
    <input type="text" id="optin-name" placeholder="optional">
  </div>
  <div class="optin-field">
    <label>Email</label>
    <input type="email" id="optin-email" placeholder="optional">
  </div>
  <div class="optin-consent">
    <span class="consent-text">Email from Dr. Glen</span>
    <div class="freq-group">
      <label class="active"><input type="checkbox" id="optin-personal"><span>Personal</span></label>
      <label class="active"><input type="checkbox" id="optin-newsletter" checked><span>Newsletter</span></label>
    </div>
  </div>
</div>

<div id="feedback-bar">
  <a id="feedback-submit-link" href="https://Truly.VIP/Results" target="_blank">Leave feedback or a video message ↗</a>
  <span style="color:var(--border);margin:0 6px">·</span>
  <a id="feedback-view-link" href="https://Truly.VIP/Feedback" target="_blank">View feedback ↗</a>
</div>
<div class="embed-footer">
  Powered by <a href="https://mentorshipu.com" target="_blank">Mentorship University</a>
</div>

<script>
  const history = [];
  let isLoading = false;
  let _mc = 0;
  let currentLevel = 'self-healing';

  const BASE = window.location.origin;

  function setLevel(btn) {
    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLevel = btn.dataset.level;
  }

  fetch(BASE + '/feedback-url').then(r => r.json()).then(d => {
    if (d.submit) { const l = document.getElementById('feedback-submit-link'); if (l) l.href = d.submit; }
    if (d.view)   { const l = document.getElementById('feedback-view-link');   if (l) l.href = d.view; }
  }).catch(() => {});

  // ── Init: restore opt-in fields (localStorage + /me) and past Q&A (/history) ──
  function restoreContactFromLocalStorage() {
    try {
      const e = localStorage.getItem('amg_email');
      const n = localStorage.getItem('amg_name');
      const eEl = document.getElementById('optin-email');
      const nEl = document.getElementById('optin-name');
      if (e && eEl && !eEl.value) eEl.value = e;
      if (n && nEl && !nEl.value) nEl.value = n;

      const p  = localStorage.getItem('amg_personal_optin');
      const nl = localStorage.getItem('amg_newsletter_optin');
      const pEl = document.getElementById('optin-personal');
      const nEl2 = document.getElementById('optin-newsletter');
      if (p !== null && pEl) {
        pEl.checked = (p === '1');
        pEl.closest('label').classList.toggle('active', pEl.checked);
      }
      if (nl !== null && nEl2) {
        nEl2.checked = (nl === '1');
        nEl2.closest('label').classList.toggle('active', nEl2.checked);
      }
    } catch (_) {}
  }

  document.addEventListener('DOMContentLoaded', () => {
    // freq-group active-class swap on change (checkboxes)
    ['optin-personal', 'optin-newsletter'].forEach(id => {
      const cb = document.getElementById(id);
      if (!cb) return;
      cb.addEventListener('change', () => {
        cb.closest('label').classList.toggle('active', cb.checked);
      });
    });
    restoreContactFromLocalStorage();
    // Server-side autofill via session cookie
    fetch(BASE + '/me', { credentials: 'same-origin' })
      .then(r => r.json())
      .then(d => {
        const eEl = document.getElementById('optin-email');
        const nEl = document.getElementById('optin-name');
        if (d.email && eEl && !eEl.value) eEl.value = d.email;
        if (d.name  && nEl && !nEl.value) nEl.value = d.name;
      })
      .catch(() => {});
    // Cross-page-reload conversation memory hydration
    fetch(BASE + '/history?limit=20', { credentials: 'same-origin' })
      .then(r => r.json())
      .then(d => {
        if (!d || !d.turns || d.turns.length === 0) return;
        const empty = document.getElementById('empty-state');
        if (empty) empty.remove();
        const msgs = document.getElementById('messages');
        if (msgs) {
          const divider = document.createElement('div');
          divider.className = 'meta-bar';
          divider.textContent = `— Previously (${d.turns.length} turn${d.turns.length===1?'':'s'} restored) —`;
          msgs.appendChild(divider);
        }
        d.turns.forEach(t => {
          if (t.query) {
            appendMessage('user', t.query, null, null);
            history.push({ role: 'user', content: t.query });
          }
          if (t.answer) {
            appendMessage('assistant', t.answer, null, null, t.log_id);
            history.push({ role: 'assistant', content: t.answer });
          }
        });
      })
      .catch(() => {});
  });

  function buildStars(logId) {
    const wrap = document.createElement('div');
    wrap.className = 'star-rating';
    wrap.innerHTML = `<span class="rate-label">Rate:</span>
      <div class="stars" id="stars-${logId}">
        ${[1,2,3,4,5].map(n =>
          `<span class="star" data-n="${n}"
            onmouseenter="hoverStars(${logId},${n})"
            onmouseleave="unhoverStars(${logId})"
            onclick="submitRating(${logId},${n})">★</span>`
        ).join('')}
      </div>
      <span class="rate-thanks" id="thanks-${logId}">Thanks!</span>`;
    return wrap;
  }
  function hoverStars(logId, n) {
    document.querySelectorAll(`#stars-${logId} .star`).forEach(s => {
      s.classList.toggle('hover', +s.dataset.n <= n);
    });
  }
  function unhoverStars(logId) {
    document.querySelectorAll(`#stars-${logId} .star`).forEach(s => {
      if (!s.classList.contains('filled')) s.classList.remove('hover');
    });
  }
  async function submitRating(logId, rating) {
    document.querySelectorAll(`#stars-${logId} .star`).forEach(s => {
      s.classList.toggle('filled', +s.dataset.n <= rating);
      s.classList.remove('hover');
      s.style.cursor = 'default';
      s.onmouseenter = null; s.onmouseleave = null; s.onclick = null;
    });
    document.getElementById(`thanks-${logId}`).classList.add('visible');
    await fetch(BASE + '/rate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ log_id: logId, rating })
    }).catch(() => {});
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
  }

  function fillQuery(text) {
    const inp = document.getElementById('query-input');
    inp.value = text; autoResize(inp); inp.focus();
  }

  function clearChat() {
    history.length = 0;
    document.getElementById('messages').innerHTML = `
      <div class="empty-state" id="empty-state">
        <div class="icon">◈</div>
        <p>Ask about mentors, clinical theory, energy medicine, or organizations.</p>
        <div class="example-queries">
          <button class="example-q" onclick="fillQuery(this.textContent)">What is the 5 Phases of Health model?</button>
          <button class="example-q" onclick="fillQuery(this.textContent)">How does biophoton coherence relate to healing?</button>
          <button class="example-q" onclick="fillQuery(this.textContent)">What is Spirit Mineral / ORMUS?</button>
        </div>
      </div>`;
  }

  async function sendQuery() {
    if (isLoading) return;
    const inp = document.getElementById('query-input');
    const query = inp.value.trim();
    if (!query) return;
    inp.value = ''; inp.style.height = 'auto';
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();
    appendMessage('user', query, null, null);
    const tid = 't' + Date.now();
    appendThinking(tid);
    isLoading = true;
    document.getElementById('send-btn').disabled = true;

    const _name      = (document.getElementById('optin-name').value || '').trim();
    const _email     = (document.getElementById('optin-email').value || '').trim();
    const _personal_optin   = !!(document.getElementById('optin-personal') || {}).checked;
    const _newsletter_optin = !!(document.getElementById('optin-newsletter') || {}).checked;
    try {
      if (_email) localStorage.setItem('amg_email', _email);
      if (_name)  localStorage.setItem('amg_name', _name);
      localStorage.setItem('amg_personal_optin',   _personal_optin   ? '1' : '0');
      localStorage.setItem('amg_newsletter_optin', _newsletter_optin ? '1' : '0');
    } catch (_) {}

    try {
      const r = await fetch(BASE + '/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({
          query,
          history:   history.slice(),
          level:     currentLevel,
          name:      _name,
          email:     _email,
          personal_optin:   _personal_optin,
          newsletter_optin: _newsletter_optin
        })
      });

      if (!r.ok || !r.body) {
        const data = await r.json().catch(() => ({ error: `HTTP ${r.status}` }));
        removeEl(tid);
        appendMessage('assistant', `**Error:** ${data.error || r.statusText}`, null, null);
      } else {
        // Streaming SSE response
        const reader = r.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        let accumulated = '';
        let streamDiv = null;
        let bodyDiv = null;

        const msgs = document.getElementById('messages');

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const raw = line.slice(6).trim();
            if (!raw) continue;
            let evt;
            try { evt = JSON.parse(raw); } catch { continue; }

            if (evt.error) {
              removeEl(tid);
              appendMessage('assistant', `**Error:** ${evt.error}`, null, null);
              break;
            }

            if (evt.token) {
              if (!streamDiv) {
                removeEl(tid);
                streamDiv = document.createElement('div');
                streamDiv.className = 'message assistant';
                bodyDiv = document.createElement('div');
                bodyDiv.className = 'message-body';
                const label = document.createElement('div');
                label.className = 'role-label';
                label.textContent = 'Mentor';
                streamDiv.appendChild(label);
                streamDiv.appendChild(bodyDiv);
                msgs.appendChild(streamDiv);
              }
              accumulated += evt.token;
              bodyDiv.innerHTML = md(accumulated);
              msgs.scrollTop = msgs.scrollHeight;
            }

            if (evt.done) {
              // Replace streaming div with fully rendered message (with sources, actions, stars)
              if (streamDiv) streamDiv.remove();
              appendMessage('assistant', accumulated || '(no response)', evt.sources, evt.chunks_retrieved, evt.log_id);
              history.push({ role: 'user', content: query });
              history.push({ role: 'assistant', content: accumulated });
            }
          }
        }

        // Handle case where stream ended without a done event
        if (streamDiv && !accumulated) {
          streamDiv.remove();
          removeEl(tid);
          appendMessage('assistant', '**Error:** Empty response from server.', null, null);
        }
      }
    } catch(e) {
      removeEl(tid);
      appendMessage('assistant', `**Connection error:** ${e.message}`, null, null);
    }
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    inp.focus();
  }

  function appendMessage(role, text, sources, chunks, logId) {
    const msgs = document.getElementById('messages');
    const id = 'msg-' + (++_mc);
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.dataset.msgId = id;
    div.dataset.rawText = text;

    const label = role === 'user' ? 'You' : 'Mentor';

    // Source pills (assistant only)
    let pillsHtml = '';
    if (role === 'assistant' && sources && sources.length) {
      const pills = sources.slice(0, 6).map(s => {
        const pct = Math.round(s.score * 100);
        const cls = s.score >= 0.82 ? 'pill-high' : s.score >= 0.76 ? 'pill-mid' : 'pill-low';
        return `<span class="source-pill" title="${escHtml(s.field || '')}">`
          + `<span class="pill-score ${cls}">${pct}%</span>${escHtml(s.name)}</span>`;
      }).join('');
      pillsHtml = `<div class="inline-sources">
        <span class="sources-label">Sources</span>${pills}
      </div>`;
    }

    // Action buttons (assistant only)
    let actionsHtml = '';
    if (role === 'assistant') {
      actionsHtml = `<div class="msg-actions">
        <button class="action-btn quiet" onclick="copyMsg('${id}')" id="copy-${id}" title="Copy question and answer as plain text" aria-label="Copy Q&amp;A">
          <svg viewBox="0 0 16 16" fill="currentColor"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"/><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/></svg>
        </button>
        <div class="share-wrap">
          <button class="action-btn" onclick="toggleShare('${id}',event)">
            <svg viewBox="0 0 16 16" fill="currentColor"><path d="M11.5 2.75a2.25 2.25 0 1 1 4.5 0 2.25 2.25 0 0 1-4.5 0Zm-9.25 5a2.25 2.25 0 1 1 4.5 0 2.25 2.25 0 0 1-4.5 0Zm9.25 5a2.25 2.25 0 1 1 4.5 0 2.25 2.25 0 0 1-4.5 0ZM12.99 4.061l-5.48 2.739a.75.75 0 0 1-.67-1.34l5.48-2.739a.75.75 0 0 1 .67 1.34Zm-.67 6.68-5.48 2.739a.75.75 0 1 1-.67-1.34l5.48-2.739a.75.75 0 0 1 .67 1.34Z"/></svg>
            Share
          </button>
          <div class="share-popover" id="share-${id}">
            <a class="share-option" href="#" onclick="shareEmail('${id}');return false;">
              <svg viewBox="0 0 16 16" fill="currentColor"><path d="M1.75 2h12.5c.966 0 1.75.784 1.75 1.75v8.5A1.75 1.75 0 0 1 14.25 14H1.75A1.75 1.75 0 0 1 0 12.25v-8.5C0 2.784.784 2 1.75 2ZM1.5 4.552v7.698c0 .138.112.25.25.25h12.5a.25.25 0 0 0 .25-.25V4.552L8.66 8.944a1 1 0 0 1-1.32 0Zm13-1.102-6.5 5.2-6.5-5.2Z"/></svg>Email
            </a>
            <a class="share-option" href="#" onclick="shareTwitter('${id}');return false;">
              <svg viewBox="0 0 16 16" fill="currentColor"><path d="M9.294 7.28 14.99 0h-1.37L8.672 6.35 4.565 0H0l5.981 8.706L0 16h1.37l5.226-5.975L11.435 16H16ZM6.251 9.474l-.605-.847L1.87 1.04h2.073l3.884 5.437.605.847 5.048 7.068h-2.073Z"/></svg>X/Twitter
            </a>
            <a class="share-option" href="#" onclick="shareWA('${id}');return false;">
              <svg viewBox="0 0 16 16" fill="currentColor"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/></svg>WhatsApp
            </a>
          </div>
        </div>
      </div>`;
    }

    div.innerHTML = `
      <div class="role-label">${label}</div>
      <div class="message-body">${md(text)}</div>
      ${pillsHtml}
      ${actionsHtml}
    `;
    if (role === 'assistant' && logId) {
      div.appendChild(buildStars(logId));
    }
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function appendThinking(id) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.id = id; div.className = 'thinking';
    div.innerHTML = `<span>Thinking</span><div class="dots"><span></span><span></span><span></span></div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeEl(id) { const e = document.getElementById(id); if(e) e.remove(); }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Copy & Share ──
  function getT(id) {
    const el = document.querySelector(`[data-msg-id="${id}"]`);
    return el ? (el.dataset.rawText || '') : '';
  }
  // Build "Q: ...\n\nA: ..." plain text — copy walks back to the preceding
  // user message so the Q&A pair lands in the clipboard together.
  function getQAPairText(id) {
    const el = document.querySelector(`[data-msg-id="${id}"]`);
    if (!el) return '';
    const answer = el.dataset.rawText || '';
    let q = '';
    let prev = el.previousElementSibling;
    while (prev) {
      if (prev.classList && prev.classList.contains('message') && prev.classList.contains('user')) {
        q = prev.dataset.rawText || ''; break;
      }
      prev = prev.previousElementSibling;
    }
    return q ? `Q: ${q}\n\nA: ${answer}` : answer;
  }
  async function copyMsg(id) {
    const btn = document.getElementById('copy-' + id);
    const text = getQAPairText(id);
    try { await navigator.clipboard.writeText(text); }
    catch { const t=document.createElement('textarea');t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove(); }
    btn.classList.add('copied');
    setTimeout(()=>{ btn.classList.remove('copied'); }, 1500);
  }
  function toggleShare(id,e) {
    e.stopPropagation();
    document.querySelectorAll('.share-popover.open').forEach(p=>{ if(p.id!=='share-'+id) p.classList.remove('open'); });
    document.getElementById('share-'+id).classList.toggle('open');
  }
  document.addEventListener('click', ()=>{ document.querySelectorAll('.share-popover.open').forEach(p=>p.classList.remove('open')); });
  function snip(id) { const t=getT(id); return t.length>280?t.slice(0,277)+'…':t; }
  function shareEmail(id) { window.open(`mailto:?subject=${encodeURIComponent('The Minding Body Mentor')}&body=${encodeURIComponent(getT(id))}`); document.getElementById('share-'+id).classList.remove('open'); }
  function shareTwitter(id) { window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(snip(id))}`, '_blank'); document.getElementById('share-'+id).classList.remove('open'); }
  function shareWA(id) { window.open(`https://wa.me/?text=${encodeURIComponent(snip(id))}`, '_blank'); document.getElementById('share-'+id).classList.remove('open'); }

  // ── Markdown renderer ──
  function md(text) {
    let h = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    h = h.replace(/```[\s\S]*?```/g, m => {
      const c = m.replace(/^```[^\n]*\n?/,'').replace(/```$/,'');
      return `<pre style="background:var(--surface2);padding:10px;border-radius:5px;overflow-x:auto;font-size:11px;margin:6px 0"><code>${c}</code></pre>`;
    });
    h = h.replace(/`([^`]+)`/g,'<code>$1</code>');
    h = h.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    h = h.replace(/\*([^*]+)\*/g,'<em>$1</em>');
    h = h.replace(/^#{1,3} (.+)$/gm,'<h3>$1</h3>');
    h = h.replace(/^\s*[-*] (.+)$/gm,'<li>$1</li>');
    h = h.replace(/(<li>.*<\/li>(\n|$))+/g, m=>`<ul>${m}</ul>`);
    h = h.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
    h = h.replace(/^---+$/gm,'<hr>');
    h = h.split(/\n\n+/).map(p=>{
      p=p.trim(); if(!p) return '';
      if(p.startsWith('<h3>')||p.startsWith('<ul>')||p.startsWith('<pre>')||p.startsWith('<hr')) return p;
      return `<p>${p.replace(/\n/g,'<br>')}</p>`;
    }).join('');
    return h;
  }
</script>
