<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Body Map — Systems Overview</title>
  <link rel="stylesheet" href="/body-map.css">
  <style>
    .ov-wrap { max-width: 1100px; margin: 0 auto; padding: 0 20px 48px; }
    .ov-cat { margin: 28px 0 10px; color: var(--bm-heading); font-size: 1.15rem;
              border-bottom: 2px solid var(--bm-accent); padding-bottom: 6px; }
    .ov-grid { display: grid; gap: 14px;
               grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
    .ov-card { display: flex; flex-direction: column; gap: 6px; text-decoration: none;
               background: var(--bm-surface); border: 1px solid var(--bm-border); border-radius: 12px;
               padding: 16px; color: inherit; transition: border-color .12s, box-shadow .12s, transform .12s; }
    .ov-card:hover { border-color: var(--bm-accent); box-shadow: 0 4px 14px rgba(47,111,94,0.16);
                     transform: translateY(-2px); }
    .ov-card h3 { margin: 0; color: var(--bm-heading); font-size: 1rem; }
    .ov-card p { margin: 0; color: var(--bm-muted); font-size: .88rem; line-height: 1.35; flex: 1; }
    .ov-open { color: var(--bm-line); font-size: .82rem; font-weight: 600; }
    .ov-feats { display: flex; flex-wrap: wrap; gap: 10px; margin: 14px 0 4px; }
    .ov-feat { background: var(--bm-surface); border: 1px solid var(--bm-border); border-radius: 20px;
               padding: 6px 14px; font-size: .82rem; color: var(--bm-heading); }
    .ov-hint { color: var(--bm-muted); }
  </style>
</head>
<body>
  <header class="bm-head">
    <h1>Body Map</h1>
    <p class="bm-sub">An interactive atlas of the body's maps. Choose a system to explore its zones, peel back the embryological layers, or map it onto a photo of your own.</p>
    <p class="bm-sub"><a href="/atlas" style="color:var(--bm-line)">Part of the Knowledge Atlas</a></p>
    <div class="ov-feats">
      <span class="ov-feat">Tap any zone to read what it maps to</span>
      <span class="ov-feat">Peel back the germ layers</span>
      <span class="ov-feat">Map it onto your own photo</span>
    </div>
  </header>

  <main class="ov-wrap">
    <p id="ov-status" class="ov-hint">Loading systems…</p>
    <div id="ov-cats"></div>
  </main>

  <script>
    (async function () {
      const status = document.getElementById("ov-status");
      const host = document.getElementById("ov-cats");
      let systems = [];
      try {
        const res = await fetch("/body-map/systems");
        systems = (await res.json()).systems || [];
      } catch (e) { systems = []; }
      if (!systems.length) { status.textContent = "Couldn't load the systems list. Try refreshing."; return; }
      status.remove();
      // group by category, preserving first-seen order
      const order = [], byCat = {};
      systems.forEach(s => {
        if (!byCat[s.category]) { byCat[s.category] = []; order.push(s.category); }
        byCat[s.category].push(s);
      });
      order.forEach(cat => {
        const h = document.createElement("h2"); h.className = "ov-cat"; h.textContent = cat;
        const grid = document.createElement("div"); grid.className = "ov-grid";
        byCat[cat].forEach(s => {
          const a = document.createElement("a");
          a.className = "ov-card";
          a.href = "/body-map?system=" + encodeURIComponent(s.id);
          const t = document.createElement("h3"); t.textContent = s.name;
          const p = document.createElement("p"); p.textContent = s.description;
          const o = document.createElement("span"); o.className = "ov-open"; o.textContent = "Open the map ▸";
          a.append(t, p, o);
          grid.appendChild(a);
        });
        host.append(h, grid);
      });
    })();
  </script>
</body>
</html>
