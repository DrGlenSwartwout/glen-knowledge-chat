<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/static/favicon.png">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Sign in · Remedy Match</title>
<style>
  /* Brand palette — deep green + gold (matches the client portal + live funnel).
     Dark is the brand default, defined on bare :root too so the page renders
     branded even when data-theme is unset (shell.js can leave it null for a
     first-time visitor); light is the override. */
  :root,
  :root[data-theme="dark"]{
    --bg:#0a150d; --card:#13241a; --line:#274033; --ink:#f3efe2; --muted:#9fb0a4;
    --brand:#5bbf9e; --btn-bg:#d4a843; --btn-fg:#0a150d; --shadow:0 1px 2px rgba(0,0,0,.30);
  }
  :root[data-theme="light"]{
    --bg:#FBF8F3; --card:#ffffff; --line:#e7e1d4; --ink:#1E2A2A; --muted:#6b7268;
    --brand:#2f6f5e; --btn-bg:#2f6f5e; --btn-fg:#ffffff; --shadow:0 1px 2px rgba(40,40,30,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    transition:background .25s ease,color .25s ease}
  .wrap{max-width:420px;margin:14vh auto;padding:0 18px;text-align:center}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:24px 20px;box-shadow:var(--shadow)}
  h1{font-size:1.3rem;margin:.2rem 0 .6rem}
  p.sub{color:var(--muted);margin:0 0 1rem}
  input{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:10px;font-size:1rem;margin:0 0 12px;
    background:var(--card);color:var(--ink)}
  .btn{display:block;width:100%;background:var(--btn-bg);color:var(--btn-fg);border:0;cursor:pointer;
    font-size:1rem;font-weight:600;border-radius:10px;padding:13px 18px}
  .btn[hidden]{display:none!important}   /* beat .btn{display:block} so hidden hides */
  .btn-secondary{background:transparent;color:var(--brand);border:1px solid var(--brand)}
  .msg{color:var(--brand);margin-top:12px;min-height:1.4em}
  /* New-visitor join path — revealed only when HEALING_OASIS_ENABLED (see script). */
  .join{margin-top:20px;border-top:1px solid var(--line);padding-top:16px;text-align:left}
  .join[hidden]{display:none}
  .join-sep{color:var(--muted);font-size:.85rem;font-weight:600;letter-spacing:.03em;margin:0 0 4px;text-align:center}
  .join-sub{color:var(--muted);font-size:.9rem;margin:0 0 12px;text-align:center}
  .theme-toggle{position:fixed;top:14px;right:14px}
</style>
</head>
<body>
  <div class="theme-toggle" id="themeToggle" role="group" aria-label="Theme mode"></div>
  <script>
    (function(){
      var host = document.getElementById('themeToggle');
      if (host && window.RMTheme) window.RMTheme.mountToggle(host);
    })();
  </script>
  <div class="wrap"><div class="card">
    <h1>Welcome to your healing home</h1>
    <p class="sub">Enter your email and we'll send you a sign-in link.</p>
    <input id="email" type="email" placeholder="you@example.com" autocomplete="email">
    <button class="btn" id="go">Send my sign-in link</button>
    <p class="msg" id="msg"></p>

    <!-- New-visitor join. Hidden until /api/healing-oasis/status reports the feature
         is live (HEALING_OASIS_ENABLED); reveal mirrors static/begin.html. Reuses the
         #email field above and the shared #msg line. -->
    <div class="join" id="join" hidden>
      <p class="join-sep">New here?</p>
      <p class="join-sub">Create your Healing Oasis and we'll email your private link.</p>
      <input id="joinName" type="text" placeholder="Your name" autocomplete="name">
      <button class="btn btn-secondary" id="joinGo">Create my Healing Oasis</button>
    </div>
  </div></div>
<script>
const go = document.getElementById("go"), msg = document.getElementById("msg");
go.addEventListener("click", async ()=>{
  const email = (document.getElementById("email").value||"").trim();
  if(!email){ msg.textContent = "Please enter your email."; return; }
  go.disabled = true;
  try{
    const r = await fetch("/portal/login-request", {method:"POST",
      headers:{"Content-Type":"application/json"}, body:JSON.stringify({email})});
    const j = await r.json();
    msg.textContent = j.message || "Check your email for a sign-in link.";
  }catch(e){ msg.textContent = "Something went wrong — please try again."; }
  go.disabled = false;
});

// New-visitor join: reveal only when the feature is live, then wire it up. Same
// backend the begin.html "My Healing Oasis" button uses (provisions anyone).
const join = document.getElementById("join");
fetch("/api/healing-oasis/status").then(r=>r.json()).then(d=>{
  if(d && d.enabled) join.hidden = false;
}).catch(()=>{});

const joinGo = document.getElementById("joinGo");
joinGo.addEventListener("click", async ()=>{
  const email = (document.getElementById("email").value||"").trim();
  const name = (document.getElementById("joinName").value||"").trim();
  if(email.indexOf("@") < 1){ msg.textContent = "Please enter a valid email address."; return; }
  joinGo.disabled = true; msg.textContent = "Sending…";
  try{
    const r = await fetch("/api/healing-oasis/request", {method:"POST",
      headers:{"Content-Type":"application/json"}, body:JSON.stringify({name, email})});
    const j = await r.json();
    msg.textContent = j.message || "Check your email for your link.";
  }catch(e){ msg.textContent = "Something went wrong — please try again."; }
  joinGo.disabled = false;
});
</script>
</body>
</html>
