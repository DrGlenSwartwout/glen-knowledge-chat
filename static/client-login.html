<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Sign in · Remedy Match</title>
<style>
  :root{--brand:#7c5cbf;--brand-soft:#efeaf8;--ink:#2b2740;--muted:#6b6480;--line:#e7e3f0;--bg:#f7f5fb}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:420px;margin:14vh auto;padding:0 18px;text-align:center}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:24px 20px}
  h1{font-size:1.3rem;margin:.2rem 0 .6rem}
  p.sub{color:var(--muted);margin:0 0 1rem}
  input{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:10px;font-size:1rem;margin:0 0 12px}
  .btn{display:block;width:100%;background:var(--brand);color:#fff;border:0;cursor:pointer;
    font-size:1rem;font-weight:600;border-radius:10px;padding:13px 18px}
  .msg{color:var(--brand);margin-top:12px;min-height:1.4em}
</style>
</head>
<body>
  <div class="wrap"><div class="card">
    <h1>Welcome to your healing home 🌺</h1>
    <p class="sub">Enter your email and we'll send you a sign-in link.</p>
    <input id="email" type="email" placeholder="you@example.com" autocomplete="email">
    <button class="btn" id="go">Send my sign-in link</button>
    <p class="msg" id="msg"></p>
  </div></div>
<script>
const go = document.getElementById("go"), msg = document.getElementById("msg");
go.addEventListener("click", async ()=>{
  const email = (document.getElementById("email").value||"").trim();
  if(!email){ msg.textContent = "Please enter your email."; return; }
  go.disabled = true;
  try{
    const r = await fetch("/portal/login-request", {method:"POST",
      headers:{"Content-Type":"application/json"}, body:JSON.stringify({email})});
    const j = await r.json();
    msg.textContent = j.message || "Check your email for a sign-in link.";
  }catch(e){ msg.textContent = "Something went wrong — please try again."; }
  go.disabled = false;
});
</script>
</body>
</html>
