<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ingredient Pages &middot; Console</title>
<style>
  :root{ --bg:#0f1115; --card:#171a21; --line:#262b36; --fg:#e8ebf0; --muted:#9aa3b2;
         --accent:#5b8cff; --ok:#3fb968; --err:#e0556a; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--fg);
        font:15px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; }
  .wrap{ max-width:1100px; margin:0 auto; padding:18px; display:flex; gap:18px; }
  .col-list{ flex:0 0 280px; } .col-edit{ flex:1; min-width:0; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:10px;
         padding:14px; margin-bottom:14px; }
  h1{ font-size:20px; margin:0 0 4px; } h2{ font-size:15px; margin:0 0 8px; }
  .sub{ color:var(--muted); margin:0 0 14px; }
  .item{ padding:9px 11px; border:1px solid var(--line); border-radius:8px;
         margin-bottom:7px; cursor:pointer; display:flex; justify-content:space-between; }
  .item:hover{ border-color:var(--accent); } .item.sel{ border-color:var(--accent); }
  .pill{ font-size:11px; padding:1px 7px; border-radius:20px; border:1px solid var(--line);
         color:var(--muted); } .pill.approved{ color:var(--ok); border-color:var(--ok); }
  label{ display:block; font-size:12px; color:var(--muted); margin:10px 0 4px; }
  textarea{ width:100%; min-height:90px; background:#0c0e12; color:var(--fg);
            border:1px solid var(--line); border-radius:8px; padding:9px; font:inherit; resize:vertical; }
  input[type=number]{ background:#0c0e12; color:var(--fg); border:1px solid var(--line);
                      border-radius:8px; padding:7px 9px; font:inherit; width:80px; }
  .btn{ background:var(--accent); color:#fff; border:0; border-radius:8px;
        padding:8px 14px; font:inherit; cursor:pointer; }
  .btn.ghost{ background:transparent; color:var(--fg); border:1px solid var(--line); }
  .btn.ok{ background:var(--ok); }
  .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:12px; }
  .preview{ color:var(--accent); text-decoration:none; font-size:13px; }
  .status{ min-height:20px; color:var(--muted); font-size:13px; margin-top:10px; }
  #gate{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
         background:var(--bg); z-index:50; }
</style>
</head>
<body>
<script src="/static/op-nav.js" data-active="bos" data-sub="ingredients"></script>

<div id="gate" style="display:none"><div class="card" style="min-width:300px">
  <h2>Console key</h2>
  <input id="key" type="password" placeholder="CONSOLE_SECRET" style="width:100%;padding:8px">
  <p style="margin-top:10px"><button class="btn" onclick="unlock()">Unlock</button></p>
</div></div>

<div id="app" class="wrap" style="display:none">
  <div class="col-list">
    <h1>Ingredient Pages</h1>
    <p class="sub">Review AI-generated ingredient content, edit it, regenerate, and approve.</p>
    <div id="list"></div>
  </div>
  <div class="col-edit">
    <div id="editor" class="card" style="display:none">
      <h2 id="ed-title">&nbsp;</h2>
      <a id="ed-live" class="preview" target="_blank" rel="noopener">View live page &#8599;</a>
      <span id="ed-state" class="pill" style="margin-left:8px"></span>
      <div id="ed-sections"></div>
      <div id="ed-scores"></div>
      <div id="ed-traditional-use"></div>
      <div id="ed-related-forms"></div>
      <div class="row">
        <button class="btn ghost" id="btn-regen" onclick="regen()">Regenerate &amp; review</button>
        <button class="btn ok" id="btn-approve" onclick="approve()">Approve and notify</button>
      </div>
      <div id="status" class="status"></div>
    </div>
    <div id="empty" class="card"><p class="sub" style="margin:0">Select an ingredient on the left to review its page.</p></div>
  </div>
</div>

<script>
function key(){ return localStorage.getItem('console_key') || ''; }
(function(){ var u=new URLSearchParams(location.search).get('key'); if(u) localStorage.setItem('console_key', u); })();
function unlock(){ localStorage.setItem('console_key', document.getElementById('key').value);
  document.getElementById('gate').style.display='none'; boot(); }
const $ = id => document.getElementById(id);
const SECTION_LABELS = { what_it_is:'What it is', research:'The research' };
let CURRENT = null;
let CURRENT_DATA = null;

async function api(method, path, body){
  const opt = { method, headers:{'X-Console-Key':key()} };
  if(body){ opt.headers['Content-Type']='application/json'; opt.body=JSON.stringify(body); }
  const r = await fetch(path, opt);
  return { ok:r.ok, status:r.status, json: await r.json().catch(()=>({})) };
}

function boot(){
  if(!key()){ $('gate').style.display='flex'; return; }
  $('app').style.display='flex';
  loadList();
}

async function loadList(){
  const r = await api('GET', '/api/console/ingredient-pages');
  if(!r.ok){ $('list').textContent = 'Could not load (check console key).'; return; }
  const pages = r.json.pages || [];
  if(!pages.length){ $('list').textContent = 'No ingredient pages yet.'; return; }
  const el = $('list');
  el.innerHTML = '';
  pages.forEach(function(p){
    const div = document.createElement('div');
    div.className = 'item' + (p.slug === CURRENT ? ' sel' : '');
    div.setAttribute('data-slug', p.slug);
    div.onclick = function(){ select(p.slug); };
    const name = document.createElement('span');
    name.textContent = p.name || p.slug;
    const pill = document.createElement('span');
    pill.className = 'pill' + (p.state === 'approved' ? ' approved' : '');
    pill.textContent = p.state;
    div.appendChild(name);
    div.appendChild(pill);
    el.appendChild(div);
  });
}

async function select(slug){
  CURRENT = slug;
  document.querySelectorAll('.item').forEach(function(el){
    el.classList.toggle('sel', el.getAttribute('data-slug') === slug);
  });
  const r = await api('GET', '/api/console/ingredient-page/' + encodeURIComponent(slug));
  if(!r.ok) return;
  const match = r.json;
  CURRENT_DATA = match;
  $('empty').style.display='none';
  $('editor').style.display='block';

  const titleEl = $('ed-title');
  titleEl.textContent = match.name || slug;

  const liveEl = $('ed-live');
  liveEl.href = '/begin/ingredient/' + encodeURIComponent(slug);

  setStatePill(match.state);

  // render section textareas (sections is [{id, text}] from the per-slug endpoint)
  const sections = match.sections || [];
  const secContainer = $('ed-sections');
  secContainer.innerHTML = '';
  sections.forEach(function(s){
    var id = s.id || s;
    var text = s.text != null ? s.text : '';
    const lbl = document.createElement('label');
    lbl.textContent = SECTION_LABELS[id] || id;
    const ta = document.createElement('textarea');
    ta.id = 'sec-' + id;
    ta.value = text;
    const row = document.createElement('div');
    row.className = 'row';
    const btn = document.createElement('button');
    btn.className = 'btn ghost';
    btn.textContent = 'Save ' + (SECTION_LABELS[id] || id);
    btn.onclick = (function(secId){ return function(){ saveSection(secId); }; })(id);
    row.appendChild(btn);
    secContainer.appendChild(lbl);
    secContainer.appendChild(ta);
    secContainer.appendChild(row);
  });

  // scores
  const scoresEl = $('ed-scores');
  scoresEl.innerHTML = '';
  const scoresLbl = document.createElement('label');
  scoresLbl.textContent = 'Scores (1-10)';
  scoresEl.appendChild(scoresLbl);
  const scoreRow = document.createElement('div');
  scoreRow.className = 'row';
  ['research_score','traditional_score'].forEach(function(field){
    const wrap = document.createElement('span');
    const lbl2 = document.createElement('label');
    lbl2.textContent = field === 'research_score' ? 'Research' : 'Traditional';
    lbl2.style.margin = '0 4px 0 0';
    const inp = document.createElement('input');
    inp.type = 'number';
    inp.id = field;
    inp.min = '1';
    inp.max = '10';
    inp.value = match[field] != null ? String(match[field]) : '';
    wrap.appendChild(lbl2);
    wrap.appendChild(inp);
    scoreRow.appendChild(wrap);
  });
  const saveScrBtn = document.createElement('button');
  saveScrBtn.className = 'btn ghost';
  saveScrBtn.textContent = 'Save scores';
  saveScrBtn.onclick = saveScores;
  scoreRow.appendChild(saveScrBtn);
  scoresEl.appendChild(scoreRow);

  // traditional use (raw JSON textarea)
  const tuEl = $('ed-traditional-use');
  tuEl.innerHTML = '';
  const tuLbl = document.createElement('label');
  tuLbl.textContent = 'Traditional use (JSON array)';
  const tuTa = document.createElement('textarea');
  tuTa.id = 'traditional-use-json';
  tuTa.style.minHeight = '80px';
  try { tuTa.value = JSON.stringify(match.traditional_use || [], null, 2); }
  catch(e){ tuTa.value = '[]'; }
  const tuRow = document.createElement('div');
  tuRow.className = 'row';
  const tuBtn = document.createElement('button');
  tuBtn.className = 'btn ghost';
  tuBtn.textContent = 'Save traditional use';
  tuBtn.onclick = saveTraditionalUse;
  tuRow.appendChild(tuBtn);
  tuEl.appendChild(tuLbl);
  tuEl.appendChild(tuTa);
  tuEl.appendChild(tuRow);

  // related forms (raw JSON textarea)
  const rfEl = $('ed-related-forms');
  rfEl.innerHTML = '';
  const rfLbl = document.createElement('label');
  rfLbl.textContent = 'Related forms (JSON array)';
  const rfTa = document.createElement('textarea');
  rfTa.id = 'related-forms-json';
  rfTa.style.minHeight = '80px';
  try { rfTa.value = JSON.stringify(match.related_forms || [], null, 2); }
  catch(e){ rfTa.value = '[]'; }
  const rfRow = document.createElement('div');
  rfRow.className = 'row';
  const rfBtn = document.createElement('button');
  rfBtn.className = 'btn ghost';
  rfBtn.textContent = 'Save related forms';
  rfBtn.onclick = saveRelatedForms;
  rfRow.appendChild(rfBtn);
  rfEl.appendChild(rfLbl);
  rfEl.appendChild(rfTa);
  rfEl.appendChild(rfRow);

  $('status').textContent = '';
}

function setStatePill(state){
  const el = $('ed-state');
  el.textContent = state || 'none';
  el.className = 'pill' + (state === 'approved' ? ' approved' : '');
}

async function act(actionKey, params){
  const r = await api('POST', '/api/action/' + actionKey, params);
  return r;
}

async function saveSection(id){
  const ta = $('sec-' + id);
  if(!CURRENT || !ta) return;
  $('status').textContent = 'Saving ' + id + '...';
  const r = await act('ingredient_page.edit', { slug: CURRENT, section: id, text: ta.value });
  if(r.ok && r.json.status === 'done'){
    setStatePill('draft');
    $('status').textContent = 'Saved ' + id + ' (still draft).';
  } else {
    $('status').textContent = 'Save failed.';
  }
}

async function saveScores(){
  if(!CURRENT) return;
  $('status').textContent = 'Saving scores...';
  const r = parseInt($('research_score').value, 10) || null;
  const t = parseInt($('traditional_score').value, 10) || null;
  const res = await act('ingredient_page.edit', {
    slug: CURRENT, research_score: r, traditional_score: t
  });
  if(res.ok && res.json.status === 'done'){
    setStatePill('draft');
    $('status').textContent = 'Scores saved (still draft).';
  } else {
    $('status').textContent = 'Save scores failed.';
  }
}

async function saveTraditionalUse(){
  if(!CURRENT) return;
  const ta = $('traditional-use-json');
  let parsed;
  try { parsed = JSON.parse(ta.value); } catch(e){ $('status').textContent = 'Invalid JSON for traditional use.'; return; }
  $('status').textContent = 'Saving traditional use...';
  const res = await act('ingredient_page.edit', { slug: CURRENT, traditional_use: parsed });
  if(res.ok && res.json.status === 'done'){
    setStatePill('draft');
    $('status').textContent = 'Traditional use saved (still draft).';
  } else {
    $('status').textContent = 'Save failed.';
  }
}

async function saveRelatedForms(){
  if(!CURRENT) return;
  const ta = $('related-forms-json');
  let parsed;
  try { parsed = JSON.parse(ta.value); } catch(e){ $('status').textContent = 'Invalid JSON for related forms.'; return; }
  $('status').textContent = 'Saving related forms...';
  const res = await act('ingredient_page.edit', { slug: CURRENT, related_forms: parsed });
  if(res.ok && res.json.status === 'done'){
    setStatePill('draft');
    $('status').textContent = 'Related forms saved (still draft).';
  } else {
    $('status').textContent = 'Save failed.';
  }
}

async function regen(){
  if(!CURRENT) return;
  $('status').textContent = 'Regenerating...';
  $('btn-regen').disabled = true;
  const r = await act('ingredient_page.regenerate', { slug: CURRENT });
  $('btn-regen').disabled = false;
  if(r.ok && r.json.status === 'done'){
    const content = (r.json.result || {}).content || {};
    Object.keys(content).forEach(function(id){
      const t = $('sec-' + id);
      if(t) t.value = content[id];
    });
    setStatePill('draft');
    $('status').textContent = 'Regenerated. Review the content, then Approve.';
  } else {
    $('status').textContent = 'Regenerate failed.';
  }
}

async function approve(){
  if(!CURRENT) return;
  $('status').textContent = 'Approving...';
  const r = await act('ingredient_page.approve', { slug: CURRENT });
  if(r.ok && r.json.status === 'done'){
    setStatePill('approved');
    $('status').textContent = 'Approved. Requesters have been notified.';
    loadList();
  } else {
    $('status').textContent = 'Approve failed.';
  }
}

boot();
</script>
</body>
</html>
