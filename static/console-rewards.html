<link rel="icon" type="image/png" href="/static/favicon.png">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reward Gifts</title>
<style>
  :root{ --bg:#0a150d; --surface:#0f1f14; --border:#21472d; --cream:#eaf3ec; --muted:#8aa594;
         --gold:#d4a843; --green:#7fd6a0; --amber:#e0b96b; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--cream);
        font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  h1{ margin:18px 24px 2px; font-size:22px; }
  .sub{ margin:0 24px 14px; color:var(--muted); font-size:13px; }
  .grid{ margin:0 24px 48px; display:grid; gap:14px; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); }
  .dcard{ background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 16px; }
  .dhead{ display:flex; justify-content:space-between; align-items:baseline; gap:8px; margin-bottom:10px; }
  .dhead b{ font-size:15px; } .email{ color:#9db4ff; font-size:12px; margin-left:6px; }
  .tier{ color:var(--muted); font-size:12px; white-space:nowrap; }
  .rtype{ color:var(--muted); font-size:12.5px; margin:4px 0 10px; }
  select{ width:100%; padding:6px 8px; border-radius:7px; border:1px solid var(--border);
          background:var(--bg); color:var(--cream); font-size:13px; font-family:inherit; }
  .actions{ margin-top:12px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  button.select-gift{ padding:8px 14px; border-radius:8px; border:1px solid var(--gold);
         background:var(--gold); color:#0a150d; font-weight:600; cursor:pointer; font-size:13px; }
  button.select-gift:hover{ filter:brightness(1.08); }
  button.select-gift:disabled{ opacity:0.6; cursor:default; }
  button.dismiss{ padding:8px 14px; border-radius:8px; border:1px solid var(--border);
         background:transparent; color:var(--cream); cursor:pointer; font-size:13px; }
  button.dismiss:hover{ border-color:#e08a8a; color:#e08a8a; }
  button.dismiss:disabled{ opacity:0.6; cursor:default; }
  .status{ font-size:12px; color:var(--muted); flex-basis:100%; }
  .status.err{ color:#e08a8a; }
  .status.ok{ color:var(--green); }
  .empty{ margin:24px; color:var(--muted); font-size:16px; }
  #keybox{ margin:24px; }
  #keybox input{ padding:9px 12px; border-radius:8px; border:1px solid var(--border);
                 background:var(--surface); color:var(--cream); min-width:260px; }
  #keybox button{ padding:9px 13px; border-radius:8px; border:1px solid var(--gold);
                  background:var(--gold); color:#0a150d; font-weight:600; cursor:pointer; }
  .catalog-section{ margin:0 24px 48px; }
  .catalog-section h2{ font-size:18px; margin:0 0 4px; }
  .catalog-section .sub{ margin:0 0 14px; padding:0; }
  .glevel{ background:var(--surface); border:1px solid var(--border); border-radius:12px;
            padding:12px 16px; margin-bottom:12px; }
  .glevel h3{ margin:0 0 8px; font-size:14px; color:var(--gold); }
  .gopt{ display:flex; align-items:center; gap:10px; padding:6px 0; border-top:1px solid var(--border); flex-wrap:wrap; }
  .gopt:first-of-type{ border-top:none; }
  .gopt.inactive{ opacity:0.5; }
  .gopt .gsku{ font-weight:600; min-width:140px; }
  .gopt .glabel{ color:var(--muted); flex:1; min-width:140px; }
  .gopt .gflags em{ color:var(--amber); font-style:normal; font-size:12px; }
  .gopt button{ padding:5px 10px; border-radius:7px; border:1px solid var(--border);
                background:transparent; color:var(--cream); cursor:pointer; font-size:12.5px; }
  .gopt button.gdelete:hover{ border-color:#e08a8a; color:#e08a8a; }
  .gopt button.gtoggle:hover{ border-color:var(--gold); color:var(--gold); }
  .add-form{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:6px; }
  .add-form input{ padding:8px 10px; border-radius:7px; border:1px solid var(--border);
                    background:var(--bg); color:var(--cream); font-size:13px; font-family:inherit; }
  .add-form input#add-level{ width:70px; }
  .add-form input#add-sku{ width:160px; }
  .add-form input#add-label{ width:220px; flex:1; min-width:160px; }
  .add-form button{ padding:8px 14px; border-radius:8px; border:1px solid var(--gold);
         background:var(--gold); color:#0a150d; font-weight:600; cursor:pointer; font-size:13px; }
</style>
<script src="/static/op-nav.js" data-active="marketing" data-sub="rewards"></script>
<h1>Reward Gifts</h1>
<p class="sub">Pending data-sharing reward grants awaiting a gift pick. Choose a catalog gift for the member's tier, or dismiss the grant.</p>
<div id="content"><p class="sub">Loading&hellip;</p></div>
<div id="catalog"></div>
<datalist id="gift-product-list"></datalist>
<div id="keybox" style="display:none"><input id="key-input" type="text" placeholder="console key"> <button onclick="unlock()">Unlock</button></div>
<script>
  function key(){ return localStorage.getItem('console_key') || ''; }
  (function(){ var u = new URLSearchParams(location.search).get('key'); if(u) localStorage.setItem('console_key', u); })();
  function hdr(){ return { 'X-Console-Key': key(), 'Content-Type':'application/json' }; }
  function unlock(){ localStorage.setItem('console_key', document.getElementById('key-input').value); document.getElementById('keybox').style.display='none'; boot(); }
  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

  var ITEMS = [];

  function optionsHtml(opts){
    return (opts || []).map(function(o){ return '<option value="'+esc(o.sku)+'">'+esc(o.label)+'</option>'; }).join('');
  }

  function card(it, di){
    return '<div class="dcard" data-di="'+di+'">'
      + '<div class="dhead"><div><b>'+esc(it.reward_type)+'</b><span class="email">'+esc(it.email)+'</span></div>'
      + '<div class="tier">tier '+esc(it.tier)+'</div></div>'
      + '<div class="rtype">Granted '+esc(it.granted_at||'')+'</div>'
      + '<select class="gift-sku" data-di="'+di+'">'+optionsHtml(it.options)+'</select>'
      + '<div class="actions">'
      + '<button class="select-gift" data-di="'+di+'">Select gift</button>'
      + '<button class="dismiss" data-di="'+di+'">Dismiss</button>'
      + '<span class="status" data-di-status="'+di+'"></span>'
      + '</div>'
      + '</div>';
  }

  async function dispatch(actionKey, params, di, okMsg){
    var statusEl = document.querySelector('[data-di-status="'+di+'"]');
    var buttons = document.querySelectorAll('.dcard[data-di="'+di+'"] button');
    buttons.forEach(function(b){ b.disabled = true; });
    if (statusEl){ statusEl.className = 'status'; statusEl.textContent = 'Working…'; }
    var r;
    try {
      r = await fetch('/api/action/'+actionKey, { method: 'POST', headers: hdr(), body: JSON.stringify(params) });
    } catch(e){
      if (statusEl){ statusEl.className = 'status err'; statusEl.textContent = 'Network error.'; }
      buttons.forEach(function(b){ b.disabled = false; });
      return;
    }
    if (r.status === 401) {
      document.getElementById('keybox').style.display = 'block';
      buttons.forEach(function(b){ b.disabled = false; });
      return;
    }
    var j = await r.json().catch(function(){ return {}; });
    if (j && j.status === 'done' && j.result && j.result.ok !== false) {
      if (statusEl){ statusEl.className = 'status ok'; statusEl.textContent = okMsg; }
      boot();
    } else {
      if (statusEl){
        statusEl.className = 'status err';
        statusEl.textContent = (j && j.result && j.result.error) || (j && j.error) || 'Action failed.';
      }
      buttons.forEach(function(b){ b.disabled = false; });
    }
  }

  function selectGift(di){
    var it = ITEMS[di];
    var sel = document.querySelector('select.gift-sku[data-di="'+di+'"]');
    var sku = sel ? sel.value : '';
    if (!sku){ alert('Choose a gift.'); return; }
    dispatch('reward.select_gift', { grant_id: it.grant_id, sku: sku }, di, 'Gift selected.');
  }

  function dismiss(di){
    var it = ITEMS[di];
    dispatch('reward.dismiss', { grant_id: it.grant_id }, di, 'Dismissed.');
  }

  function wireButtons(){
    document.querySelectorAll('button.select-gift').forEach(function(btn){
      btn.addEventListener('click', function(){ selectGift(Number(btn.getAttribute('data-di'))); });
    });
    document.querySelectorAll('button.dismiss').forEach(function(btn){
      btn.addEventListener('click', function(){ dismiss(Number(btn.getAttribute('data-di'))); });
    });
  }

  async function boot(){
    var r;
    try { r = await fetch('/api/console/rewards', { headers: hdr() }); }
    catch(e){ document.getElementById('content').innerHTML = '<p class="empty">Could not reach the server.</p>'; return; }
    if (r.status === 401) { document.getElementById('content').innerHTML = ''; document.getElementById('keybox').style.display = 'block'; return; }
    var j = await r.json();
    ITEMS = j.items || [];
    if (!ITEMS.length) { document.getElementById('content').innerHTML = '<p class="empty">No pending rewards awaiting a gift.</p>'; return; }
    document.getElementById('content').innerHTML = '<div class="grid">' + ITEMS.map(card).join('') + '</div>';
    wireButtons();
  }

  // ---- Gift catalog editor ----

  function levelGroups(options){
    var map = {};
    (options || []).forEach(function(o){
      var lv = o.level;
      if (!map[lv]) map[lv] = [];
      map[lv].push(o);
    });
    return Object.keys(map).map(Number).sort(function(a,b){ return a-b; })
      .map(function(lv){ return { level: lv, opts: map[lv] }; });
  }

  function optionRow(o){
    return '<div class="gopt'+(o.active ? '' : ' inactive')+'" data-oid="'+o.id+'">'
      + '<span class="gsku">'+esc(o.sku)+'</span>'
      + '<span class="glabel">'+esc(o.label)+'</span>'
      + '<span class="gflags">'+(o.active ? '' : '<em>inactive</em>')+'</span>'
      + '<button class="gtoggle" data-oid="'+o.id+'">'+(o.active ? 'Deactivate' : 'Activate')+'</button>'
      + '<button class="gdelete" data-oid="'+o.id+'">Delete</button>'
      + '</div>';
  }

  // ---- Product lookup (add-gift field is a catalog search, like console-related-products) ----
  var PRODUCTS_BY_SLUG = {}, PRODUCTS_NAME_TO_SLUG = {}, PRODUCTS_LOADED = false;
  async function loadProductCatalog(){
    if (PRODUCTS_LOADED) return;
    try {
      var r = await fetch('/api/products?all=1', { headers: hdr() });
      if (!r.ok) return;
      var j = await r.json();
      var list = j.data || j.products || j || [];
      var dl = document.getElementById('gift-product-list');
      var opts = '';
      (list || []).forEach(function(p){
        var slug = p.slug, name = p.name || slug;
        if (!slug) return;
        PRODUCTS_BY_SLUG[slug] = name;
        PRODUCTS_NAME_TO_SLUG[String(name).toLowerCase()] = slug;
        opts += '<option value="'+esc(name)+' — '+esc(slug)+'"></option>';
      });
      if (dl) dl.innerHTML = opts;
      PRODUCTS_LOADED = true;
    } catch(e){ /* leave unloaded; resolveProduct will reject until retried */ }
  }
  // Resolve whatever the operator typed (product name, slug, or "name — slug") to a real
  // catalog product; returns {slug, name} or null so we never save a non-catalog gift.
  function resolveProduct(input){
    input = (input || '').trim();
    if (!input) return null;
    var slug = input.split('—').pop().trim();               // "Name — slug" -> slug
    if (PRODUCTS_BY_SLUG[slug]) return { slug: slug, name: PRODUCTS_BY_SLUG[slug] };
    if (PRODUCTS_BY_SLUG[input]) return { slug: input, name: PRODUCTS_BY_SLUG[input] };   // bare slug
    var bySlug = PRODUCTS_NAME_TO_SLUG[input.toLowerCase()];                              // bare name
    if (bySlug) return { slug: bySlug, name: PRODUCTS_BY_SLUG[bySlug] };
    return null;
  }

  // Gift tiers that carry a physical gift: 3 = attributed story, 4 = video testimonial.
  var LEVEL_NAMES = { 3: 'Story', 4: 'Video' };
  function levelLabel(l){ var n = LEVEL_NAMES[l]; return 'Level ' + l + (n ? ': ' + n : ''); }

  function catalogHtml(options){
    var groups = levelGroups(options);
    if (!groups.length) return '';
    var body = groups.map(function(g){
      return '<div class="glevel"><h3>'+esc(levelLabel(g.level))+'</h3>' + g.opts.map(optionRow).join('') + '</div>';
    }).join('');
    return '<div class="catalog-section">'
      + '<h2>Gift catalog</h2>'
      + '<p class="sub">Manage the gift options members can choose from at each tier.</p>'
      + body
      + '<form id="add-gift-form" class="add-form">'
      + '<select id="add-level" required><option value="">Level…</option><option value="3">Level 3: Story</option><option value="4">Level 4: Video</option></select>'
      + '<input type="text" id="add-product" list="gift-product-list" placeholder="Search product…" autocomplete="off" required>'
      + '<button type="submit">Add gift</button>'
      + '<span class="status" id="add-status"></span>'
      + '</form>'
      + '</div>';
  }

  async function postCatalog(suffix, body){
    var r;
    try {
      r = await fetch('/api/console/reward-gift-options'+suffix, { method: 'POST', headers: hdr(), body: JSON.stringify(body) });
    } catch(e){ return { ok: false, error: 'Network error.' }; }
    if (r.status === 401) { document.getElementById('keybox').style.display = 'block'; return { ok: false, error: 'unauthorized' }; }
    return await r.json().catch(function(){ return {}; });
  }

  async function deleteOption(id){
    await postCatalog('/delete', { id: id });
    fetchCatalog();
  }

  async function toggleOption(id){
    await postCatalog('/toggle', { id: id });
    fetchCatalog();
  }

  async function addOption(){
    var lvl = document.getElementById('add-level').value;
    var typed = document.getElementById('add-product').value;
    var statusEl = document.getElementById('add-status');
    var prod = resolveProduct(typed);
    if (lvl === '' || !prod) {
      if (statusEl){ statusEl.className = 'status err'; statusEl.textContent = prod ? 'Level is required.' : 'Pick a product from the list.'; }
      return;
    }
    var j = await postCatalog('', { level: Number(lvl), sku: prod.slug, label: prod.name });
    if (j && j.ok) {
      document.getElementById('add-product').value = '';
      fetchCatalog();
    } else {
      if (statusEl){ statusEl.className = 'status err'; statusEl.textContent = (j && j.error) || 'Add failed.'; }
    }
  }

  function wireCatalog(){
    document.querySelectorAll('button.gdelete').forEach(function(btn){
      btn.addEventListener('click', function(){ deleteOption(Number(btn.getAttribute('data-oid'))); });
    });
    document.querySelectorAll('button.gtoggle').forEach(function(btn){
      btn.addEventListener('click', function(){ toggleOption(Number(btn.getAttribute('data-oid'))); });
    });
    var form = document.getElementById('add-gift-form');
    if (form) form.addEventListener('submit', function(ev){ ev.preventDefault(); addOption(); });
  }

  async function fetchCatalog(){
    var r;
    try { r = await fetch('/api/console/reward-gift-options', { headers: hdr() }); }
    catch(e){ return; }
    if (r.status === 401) { document.getElementById('catalog').innerHTML = ''; return; }
    var j = await r.json();
    document.getElementById('catalog').innerHTML = catalogHtml(j.options || []);
    wireCatalog();
    loadProductCatalog();
  }

  boot();
  fetchCatalog();
</script>
