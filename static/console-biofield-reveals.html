<!doctype html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/static/favicon.png">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Biofield Reveals &middot; Console</title>
<style>
  :root{ --bg:#0f1115; --card:#171a21; --line:#262b36; --fg:#e8ebf0; --muted:#9aa3b2;
         --accent:#5b8cff; --ok:#3fb968; --err:#e0556a; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--fg);
        font:15px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; }
  .wrap{ max-width:1240px; margin:0 auto; padding:18px; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:10px;
         padding:16px; margin-bottom:16px; }
  .toolbar{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:0 0 14px; }
  .board{ display:flex; gap:14px; align-items:flex-start; }
  .col{ flex:1 1 0; min-width:0; }
  .col-head{ font-size:13px; font-weight:600; color:var(--fg); margin:0 0 10px;
             padding-bottom:6px; border-bottom:1px solid var(--line); }
  .col-head .count{ color:var(--muted); font-weight:500; }
  .col-head .col-sub{ font-size:11px; font-weight:400; color:var(--muted); margin-top:2px; }
  .col-empty{ color:var(--muted); font-size:13px; padding:10px 0; }
  @media(max-width:820px){ .board{ flex-direction:column; } }
  h1{ font-size:20px; margin:0 0 4px; }
  h2{ font-size:14px; margin:0 0 10px; color:var(--muted); font-weight:500; }
  .meta{ font-size:12px; color:var(--muted); margin-bottom:10px; }
  .card-summary{ display:flex; align-items:baseline; gap:8px; cursor:pointer;
                 font-size:14px; color:var(--fg); margin-bottom:0; user-select:none; }
  .card-summary .caret{ color:var(--muted); font-size:12px; width:12px; flex:0 0 auto; }
  .card-summary .sum-id{ color:var(--muted); }
  .card-summary .sum-name{ font-weight:600; }
  .card-summary .sum-rest{ color:var(--muted); }
  .card-summary .sum-status{ margin-left:auto; display:flex; gap:6px; align-items:baseline;
                             flex:0 0 auto; font-size:12px; }
  .sum-order.ordered{ color:var(--ok); }
  .sum-order.none{ color:var(--muted); opacity:.7; }
  .sum-sent{ color:var(--ok); }
  .sum-unsent{ color:#e0a23a; }
  .card-body{ margin-top:14px; }
  .section-head{ font-size:13px; font-weight:600; margin:14px 0 6px; color:var(--muted); }
  label{ display:block; font-size:12px; color:var(--muted); margin:10px 0 4px; }
  input[type=text], textarea{
    width:100%; background:#0c0e12; color:var(--fg);
    border:1px solid var(--line); border-radius:8px; padding:8px; font:inherit;
  }
  textarea{ min-height:70px; resize:vertical; }
  .remedy-row{ border:1px solid var(--line); border-radius:8px; padding:10px; margin-bottom:8px; background:#0c0e12; }
  .remedy-row .tag{ font-size:11px; color:var(--ok); margin-bottom:6px; }
  .remedy-search{ position:relative; }
  .remedy-dd{ position:absolute; top:100%; left:0; right:0; z-index:60; margin-top:2px;
    background:var(--card); border:1px solid var(--line); border-radius:6px; max-height:260px;
    overflow:auto; display:none; box-shadow:0 6px 20px rgba(0,0,0,.4); }
  .remedy-dd-item{ padding:7px 11px; cursor:pointer; font-size:13px; border-bottom:1px solid var(--line); }
  .remedy-dd-item:last-child{ border-bottom:0; }
  .remedy-dd-item:hover,.remedy-dd-item.active{ background:rgba(255,255,255,.07); }
  .remedy-dd-item .mslug{ color:var(--muted); font-size:11px; }
  .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:12px; }
  .btn{ background:var(--accent); color:#fff; border:0; border-radius:8px;
        padding:8px 14px; font:inherit; cursor:pointer; }
  .btn.ok{ background:var(--ok); }
  .btn.approved{ background:#2f5d43; color:#cfe9d8; cursor:default; }
  .btn.approved::before{ content:'✓ '; }
  .btn.ghost{ background:transparent; color:var(--fg); border:1px solid var(--line); }
  .pullwrap{ display:inline-flex; gap:6px; align-items:center; }
  .pullinput{ background:transparent; color:var(--fg); border:1px solid var(--line);
              border-radius:8px; padding:8px 10px; font:inherit; min-width:220px; }
  .pullstatus{ font-size:13px; color:var(--fg); opacity:.8; }
  .status{ min-height:18px; color:var(--muted); font-size:13px; margin-top:8px; }
  .dropped-note{ color:var(--muted); font-size:13px; margin-top:8px; }
  #gate{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
         background:var(--bg); z-index:50; }
  #gate .card{ min-width:300px; }
  #app{ display:none; }
</style>
</head>
<body>
<script src="/static/op-nav.js" data-active="bos" data-sub="biofield-reveals"></script>

<div id="gate" style="display:none">
  <div class="card">
    <h2>Console key</h2>
    <input id="key-input" type="password" placeholder="CONSOLE_SECRET" style="width:100%;padding:8px">
    <p style="margin-top:10px"><button class="btn" onclick="unlock()">Unlock</button></p>
  </div>
</div>

<div id="app" class="wrap">
  <h1>Biofield Reveals</h1>
  <p style="color:var(--muted);margin:0 0 16px">Review each reveal, then <strong>Approve &amp; send link</strong> — that un-blurs the top remedy and emails the client. The rest unlock when they become a paying member.</p>
  <div id="list"></div>
</div>

<script>
function key(){ return localStorage.getItem('console_key') || ''; }
(function(){
  var u = new URLSearchParams(location.search).get('key');
  if(u) localStorage.setItem('console_key', u);
})();

function unlock(){
  localStorage.setItem('console_key', document.getElementById('key-input').value);
  document.getElementById('gate').style.display = 'none';
  boot();
}

async function api(method, path, body){
  var opt = { method: method, headers: { 'X-Console-Key': key() } };
  if(body){ opt.headers['Content-Type'] = 'application/json'; opt.body = JSON.stringify(body); }
  var r = await fetch(path, opt);
  return { ok: r.ok, status: r.status, json: await r.json().catch(function(){ return {}; }) };
}

function boot(){
  if(!key()){ document.getElementById('gate').style.display = 'flex'; return; }
  document.getElementById('app').style.display = 'block';
  loadList();
}

var CANON = {};   // slug -> {meaning, source}; used to pre-check "Remember this meaning"
var REMEDIES = [];  // [{slug,name}] full product catalog, for remedy-name type-ahead

function esc(s){ var d=document.createElement('div'); d.textContent=(s==null?'':s); return d.innerHTML; }

function _canonMeaning(slug){
  var c = CANON[slug];
  return c ? (typeof c === 'string' ? c : (c.meaning || '')) : '';
}

// Type-ahead on a remedy-name input: type letters -> dropdown of matching remedies;
// picking one autofills the slug and (if we have a stored meaning) the meaning field.
function attachRemedySearch(nameInput, slugInput, meaningArea){
  var wrap = document.createElement('div');
  wrap.className = 'remedy-search';
  nameInput.parentNode.insertBefore(wrap, nameInput);
  wrap.appendChild(nameInput);
  var dd = document.createElement('div');
  dd.className = 'remedy-dd';
  wrap.appendChild(dd);
  var active = -1, shown = [];
  function hide(){ dd.style.display='none'; dd.innerHTML=''; active=-1; shown=[]; }
  function pick(p){
    nameInput.value = p.name || '';
    if(slugInput) slugInput.value = p.slug || '';
    var m = _canonMeaning(p.slug);
    if(meaningArea && m) meaningArea.value = m;   // autofill meaning when we have one
    hide();
    if(slugInput) slugInput.dispatchEvent(new Event('change'));
  }
  function render(matches){
    shown = matches; active = -1; dd.innerHTML='';
    matches.forEach(function(p){
      var item = document.createElement('div');
      item.className = 'remedy-dd-item';
      var mk = _canonMeaning(p.slug) ? ' &middot; has meaning' : '';
      item.innerHTML = esc(p.name || '') + ' <span class="mslug">' + esc(p.slug || '') + mk + '</span>';
      item.addEventListener('mousedown', function(e){ e.preventDefault(); pick(p); });
      dd.appendChild(item);
    });
    dd.style.display = matches.length ? 'block' : 'none';
  }
  nameInput.addEventListener('input', function(){
    var q = nameInput.value.trim().toLowerCase();
    if(q.length < 2){ hide(); return; }
    render(REMEDIES.filter(function(p){
      return ((p.name||'').toLowerCase().indexOf(q) !== -1) ||
             ((p.slug||'').toLowerCase().indexOf(q) !== -1);
    }).slice(0, 15));
  });
  nameInput.addEventListener('keydown', function(e){
    if(dd.style.display !== 'block') return;
    if(e.key === 'ArrowDown'){ e.preventDefault(); active=Math.min(active+1,shown.length-1); }
    else if(e.key === 'ArrowUp'){ e.preventDefault(); active=Math.max(active-1,0); }
    else if(e.key === 'Enter' && active >= 0){ e.preventDefault(); pick(shown[active]); return; }
    else if(e.key === 'Escape'){ hide(); return; }
    else return;
    Array.prototype.forEach.call(dd.children, function(el,i){ el.classList.toggle('active', i===active); });
  });
  nameInput.addEventListener('blur', function(){ setTimeout(hide, 150); });
}

// "Remember this meaning" = Glen has REVIEWED this meaning. Pre-check ONLY when a
// Glen-reviewed canonical meaning (source 'glen') exists and matches what's shown.
// AI-proposed meanings (source 'ai') stay UNCHECKED until Glen reviews and checks
// the box himself — which saves it as source 'glen' so it reads checked next time.
function wireRemember(cb, rem){
  var c = (rem.slug && CANON[rem.slug]) ? CANON[rem.slug] : null;
  cb.checked = !!(c && c.source === 'glen' && c.meaning === (rem.meaning || ''));
  cb.addEventListener('change', async function(){
    if(!cb.checked) return;   // unchecking leaves the saved canonical meaning in place
    var row = cb.closest('.remedy-row');
    var slugEl = row.querySelector('.remedy-slug');
    var meaningEl = row.querySelector('.remedy-meaning');
    var slug = slugEl ? slugEl.value.trim() : '';
    var meaning = meaningEl ? meaningEl.value : '';
    if(!slug){ cb.checked = false; alert('Add a remedy slug before remembering its meaning.'); return; }
    var r = await api('POST', '/api/action/remedy_meaning.save', { slug: slug, meaning: meaning });
    if(r.ok && r.json.status === 'done'){ CANON[slug] = { meaning: meaning, source: 'glen' }; }
    else { cb.checked = false; alert('Could not save the meaning. Try again.'); }
  });
}

async function loadList(){
  var r = await api('GET', '/api/console/biofield-reveals');
  window.__SCAN_PULL_ENABLED__ = !!(r.json && r.json.scan_pull_enabled);
  var el = document.getElementById('list');
  if(!r.ok){
    el.textContent = 'Could not load (check console key).';
    return;
  }
  try {
    var rm = await api('GET', '/api/console/remedy-meanings');
    if(rm.ok && rm.json && rm.json.rows){
      CANON = {};
      rm.json.rows.forEach(function(x){ if(x.slug) CANON[x.slug] = x.meaning || ''; });
    }
  } catch(e) {}
  try {
    var cat = await api('GET', '/api/console/biofield-portal/catalog');
    if(cat.ok && cat.json && Array.isArray(cat.json.products)) REMEDIES = cat.json.products;
  } catch(e) {}
  el.innerHTML = '';
  var all = (r.json.drafts || []).concat(r.json.approved || []);
  if(!all.length){
    el.textContent = 'No reveals yet.';
    return;
  }

  // Bucket by lifecycle stage. Paid wins over approval: a paying member sees the
  // full stack regardless of approval. Else approved => top remedy live. Else review.
  var cols = { review: [], top: [], unlocked: [] };
  all.forEach(function(d){
    if(d.paid) cols.unlocked.push(d);
    else if(d.first_approved) cols.top.push(d);
    else cols.review.push(d);
  });

  var toolbar = document.createElement('div');
  toolbar.className = 'toolbar';
  var sendAllBtn = document.createElement('button');
  sendAllBtn.className = 'btn';
  sendAllBtn.textContent = 'Send all approved un-notified';
  sendAllBtn.onclick = doSendAll;
  // --- Pull-scan control (left of Send all), only when the feature is on ---
  if (window.__SCAN_PULL_ENABLED__) {
    var pullWrap = document.createElement('span');
    pullWrap.className = 'pullwrap';
    var pullInput = document.createElement('input');
    pullInput.type = 'text';
    pullInput.className = 'pullinput';
    pullInput.placeholder = 'email, E4L client id, or name';
    var pullBtn = document.createElement('button');
    pullBtn.className = 'btn ghost';
    pullBtn.textContent = 'Pull scan';
    var pullStatus = document.createElement('span');
    pullStatus.className = 'pullstatus';
    pullBtn.onclick = function(){ doPullScan(pullInput, pullBtn, pullStatus); };
    pullInput.addEventListener('keydown', function(e){
      if (e.key === 'Enter') { doPullScan(pullInput, pullBtn, pullStatus); }
    });
    pullWrap.appendChild(pullInput);
    pullWrap.appendChild(pullBtn);
    pullWrap.appendChild(pullStatus);
    toolbar.appendChild(pullWrap);
  }
  toolbar.appendChild(sendAllBtn);   // <-- existing line stays; ensure it is AFTER the block above
  el.appendChild(toolbar);

  var board = document.createElement('div');
  board.className = 'board';
  board.appendChild(buildColumn('Needs Review', cols.review, 'you act here'));
  board.appendChild(buildColumn('Top Remedy Live', cols.top, 'free taste — waiting on client'));
  board.appendChild(buildColumn('All Unlocked', cols.unlocked, 'paid member — full stack'));
  el.appendChild(board);
}

function buildColumn(title, items, sub){
  var col = document.createElement('div');
  col.className = 'col';
  var head = document.createElement('div');
  head.className = 'col-head';
  var t = document.createElement('span');
  t.textContent = title + ' ';
  var c = document.createElement('span');
  c.className = 'count';
  c.textContent = '(' + items.length + ')';
  head.appendChild(t);
  head.appendChild(c);
  if(sub){
    var s = document.createElement('div');
    s.className = 'col-sub';
    s.textContent = sub;
    head.appendChild(s);
  }
  col.appendChild(head);
  if(!items.length){
    var e = document.createElement('div');
    e.className = 'col-empty';
    e.textContent = '—';
    col.appendChild(e);
  } else {
    items.forEach(function(d){ col.appendChild(buildCard(d)); });
  }
  return col;
}

function buildCard(d){
  var wrap = document.createElement('div');
  wrap.className = 'card';
  wrap.dataset.id = String(d.id);

  // Always-visible summary row: click to expand the full reveal. Shows the key
  // data (name, email, date) so the list can be scanned and the right one opened.
  var meta = document.createElement('div');
  meta.className = 'card-summary';

  var caret = document.createElement('span');
  caret.className = 'caret';
  caret.textContent = '▸';   // ▸
  meta.appendChild(caret);

  var idSpan = document.createElement('span');
  idSpan.className = 'sum-id';
  idSpan.textContent = '#' + (d.id != null ? d.id : '?');
  meta.appendChild(idSpan);

  if (d.client_name) {
    var nameSpan = document.createElement('span');
    nameSpan.className = 'sum-name';
    nameSpan.textContent = d.client_name;
    meta.appendChild(nameSpan);
  }

  var restSpan = document.createElement('span');
  restSpan.className = 'sum-rest';
  restSpan.textContent = (d.email || '(no email)') + ' · ' + (d.scan_date || 'no date');
  meta.appendChild(restSpan);

  // Right-aligned at-a-glance status: order badge + (for approved) link-sent state.
  var statusWrap = document.createElement('span');
  statusWrap.className = 'sum-status';

  var orderBadge = document.createElement('span');
  if(d.ordered){
    var cents = (typeof d.order_total_cents === 'number') ? d.order_total_cents : 0;
    orderBadge.className = 'sum-order ordered';
    orderBadge.textContent = '🛒 $' + Math.round(cents/100);
  } else {
    orderBadge.className = 'sum-order none';
    orderBadge.textContent = 'no order';
  }
  statusWrap.appendChild(orderBadge);

  if(d.first_approved){
    var sentPill = document.createElement('span');
    if(d.notified_at){
      sentPill.className = 'sum-sent';
      sentPill.textContent = '✉ sent ' + d.notified_at.slice(0,10);
    } else {
      sentPill.className = 'sum-unsent';
      sentPill.textContent = '✉ not sent';
    }
    statusWrap.appendChild(sentPill);
  }
  meta.appendChild(statusWrap);

  wrap.appendChild(meta);
  var tags = Array.isArray(d.tags) ? d.tags : [];
  if (tags.length) {
    var tagRow = document.createElement('div');
    tagRow.className = 'client-tags';
    tagRow.textContent = 'Tags: ' + tags.join(', ');
    wrap.appendChild(tagRow);
  }

  // Interpretation section
  var interpHead = document.createElement('div');
  interpHead.className = 'section-head';
  interpHead.textContent = 'Interpretation (auto-shown to visitor)';
  wrap.appendChild(interpHead);

  var greetingLabel = document.createElement('label');
  greetingLabel.textContent = 'Greeting';
  wrap.appendChild(greetingLabel);

  var greetingInput = document.createElement('input');
  greetingInput.type = 'text';
  greetingInput.className = 'greeting-field';
  greetingInput.value = (d.interpretation && d.interpretation.greeting) ? d.interpretation.greeting : '';
  wrap.appendChild(greetingInput);

  var bodyLabel = document.createElement('label');
  bodyLabel.textContent = 'Body';
  wrap.appendChild(bodyLabel);

  var bodyArea = document.createElement('textarea');
  bodyArea.className = 'body-field';
  bodyArea.value = (d.interpretation && d.interpretation.body) ? d.interpretation.body : '';
  wrap.appendChild(bodyArea);

  // Layers section (preferred) or flat remedies fallback
  var layersHead = document.createElement('div');
  layersHead.className = 'section-head';
  layersHead.textContent = 'Stress-pattern layers (title and summary always shown; remedy blurred until approved)';
  wrap.appendChild(layersHead);

  var layers = Array.isArray(d.layers) ? d.layers : [];
  var remediesContainer = document.createElement('div');
  remediesContainer.className = 'remedies-container';

  if(layers.length){
    layers.forEach(function(L, idx){
      var row = document.createElement('div');
      row.className = 'remedy-row';

      if(idx === 0){
        var tag = document.createElement('div');
        tag.className = 'tag';
        tag.textContent = 'Layer 1 - top remedy un-blurs when approved';
        row.appendChild(tag);
      }

      var titleLabel = document.createElement('label');
      titleLabel.textContent = 'Layer title';
      row.appendChild(titleLabel);

      var titleInput = document.createElement('input');
      titleInput.type = 'text';
      titleInput.className = 'layer-title-field';
      titleInput.value = L.title || '';
      row.appendChild(titleInput);

      var summaryLabel = document.createElement('label');
      summaryLabel.textContent = 'Summary';
      row.appendChild(summaryLabel);

      var summaryArea = document.createElement('textarea');
      summaryArea.className = 'layer-summary-field';
      summaryArea.value = L.summary || '';
      row.appendChild(summaryArea);

      // Read-only stress factors (console only; never shown to the member).
      var factors = Array.isArray(L.pattern_labels) && L.pattern_labels.length
        ? L.pattern_labels
        : (Array.isArray(L.patterns) ? L.patterns : []);
      if (factors.length) {
        var sf = document.createElement('div');
        sf.className = 'stress-factors';
        sf.textContent = 'Stress factors: ' + factors.join(', ');
        row.appendChild(sf);
      }
      // Stash the originals so Save (collectLayers) preserves them.
      row.dataset.patterns = JSON.stringify(L.patterns || []);
      row.dataset.patternLabels = JSON.stringify(L.pattern_labels || []);

      var rem = L.remedy || {};

      var nameLabel = document.createElement('label');
      nameLabel.textContent = 'Remedy name';
      row.appendChild(nameLabel);

      var nameInput = document.createElement('input');
      nameInput.type = 'text';
      nameInput.className = 'remedy-name';
      nameInput.value = rem.name || '';
      row.appendChild(nameInput);

      var slugLabel = document.createElement('label');
      slugLabel.textContent = 'Remedy slug';
      row.appendChild(slugLabel);

      var slugInput = document.createElement('input');
      slugInput.type = 'text';
      slugInput.className = 'remedy-slug';
      slugInput.value = rem.slug || '';
      row.appendChild(slugInput);

      var meaningLabel = document.createElement('label');
      meaningLabel.textContent = 'Remedy meaning';
      row.appendChild(meaningLabel);

      var meaningArea = document.createElement('textarea');
      meaningArea.className = 'remedy-meaning';
      meaningArea.value = rem.meaning || '';
      row.appendChild(meaningArea);
      attachRemedySearch(nameInput, slugInput, meaningArea);

      var rememberLabel = document.createElement('label');
      var rememberCheck = document.createElement('input');
      rememberCheck.type = 'checkbox';
      rememberCheck.className = 'remedy-remember';
      wireRemember(rememberCheck, rem);
      rememberLabel.appendChild(rememberCheck);
      var rememberText = document.createTextNode(' Remember this meaning');
      rememberLabel.appendChild(rememberText);
      row.appendChild(rememberLabel);

      remediesContainer.appendChild(row);
    });
  } else {
    // fallback: flat remedies (legacy push without layers)
    var remedies = Array.isArray(d.remedies) ? d.remedies : [];
    remedies.forEach(function(rem, idx){
      var row = document.createElement('div');
      row.className = 'remedy-row';

      if(idx === 0){
        var tag = document.createElement('div');
        tag.className = 'tag';
        tag.textContent = 'Top remedy - un-blurs when approved';
        row.appendChild(tag);
      }

      var nameLabel = document.createElement('label');
      nameLabel.textContent = 'Remedy name';
      row.appendChild(nameLabel);

      var nameInput = document.createElement('input');
      nameInput.type = 'text';
      nameInput.className = 'remedy-name';
      nameInput.value = rem.name || '';
      row.appendChild(nameInput);

      var slugLabel = document.createElement('label');
      slugLabel.textContent = 'Remedy slug';
      row.appendChild(slugLabel);

      var slugInput = document.createElement('input');
      slugInput.type = 'text';
      slugInput.className = 'remedy-slug';
      slugInput.value = rem.slug || '';
      row.appendChild(slugInput);

      var meaningLabel = document.createElement('label');
      meaningLabel.textContent = 'Remedy meaning';
      row.appendChild(meaningLabel);

      var meaningArea = document.createElement('textarea');
      meaningArea.className = 'remedy-meaning';
      meaningArea.value = rem.meaning || '';
      row.appendChild(meaningArea);
      attachRemedySearch(nameInput, slugInput, meaningArea);

      remediesContainer.appendChild(row);
    });
  }

  wrap.appendChild(remediesContainer);

  // Dropped notice (d.dropped is a JSON list, not a string)
  var dropped = Array.isArray(d.dropped) ? d.dropped : [];
  if(dropped.length){
    var droppedNote = document.createElement('div');
    droppedNote.className = 'dropped-note';
    var droppedPrefix = document.createTextNode('Dropped (not in catalog): ');
    droppedNote.appendChild(droppedPrefix);
    var droppedSpan = document.createElement('span');
    droppedSpan.textContent = dropped.join(', ');
    droppedNote.appendChild(droppedSpan);
    wrap.appendChild(droppedNote);
  }

  var row = document.createElement('div');
  row.className = 'row';

  var saveBtn = document.createElement('button');
  saveBtn.className = 'btn ghost';
  saveBtn.textContent = 'Save edit';
  saveBtn.onclick = function(){ saveEdit(wrap, d.id); };
  row.appendChild(saveBtn);

  var approveBtn = document.createElement('button');
  if(d.first_approved){
    approveBtn.className = 'btn approved';
    approveBtn.disabled = true;
    approveBtn.textContent = 'Top Remedy Approved' + (d.approved_at ? ' ' + d.approved_at.slice(0,10) : '');
  } else {
    approveBtn.className = 'btn ok';
    approveBtn.textContent = 'Approve & send link';
    approveBtn.onclick = function(){ doApprove(wrap, d.id, approveBtn); };
  }
  row.appendChild(approveBtn);

  var deleteBtn = document.createElement('button');
  deleteBtn.className = 'btn ghost';
  deleteBtn.textContent = 'Delete';
  deleteBtn.onclick = function(){ doDelete(wrap, d.id, deleteBtn); };
  row.appendChild(deleteBtn);

  // Owner one-click: turn this reveal's recommended remedies into a proposed
  // in-house order (no Stripe). Reuses /api/orders/manual, which resolves the
  // client's person_id + address from email and prices everything.
  var orderBtn = document.createElement('button');
  orderBtn.className = 'btn';
  orderBtn.textContent = '🛒 Order remedies';
  orderBtn.title = "Create a proposed in-house order from this reveal's remedies";
  orderBtn.onclick = function(){ orderRemedies(wrap, d, orderBtn); };
  row.appendChild(orderBtn);

  if(d.first_approved){
    var sendBtn = document.createElement('button');
    sendBtn.className = 'btn';
    sendBtn.textContent = d.notified_at ? ('Sent ' + d.notified_at.slice(0,10) + ' (re-send)') : 'Send reveal link';
    sendBtn.onclick = function(){ doSend(wrap, d.id, sendBtn); };
    row.appendChild(sendBtn);
  }

  var portalLink = document.createElement('a');
  portalLink.href = '/console/biofield-portal?email=' + encodeURIComponent(d.email || '')
                  + '&key=' + encodeURIComponent(key());
  portalLink.target = '_blank';
  portalLink.rel = 'noopener';
  portalLink.textContent = 'Open Portal →';
  portalLink.style.cssText = 'margin-left:10px;color:var(--gold,#d4a843);text-decoration:none;font-size:13px';
  row.appendChild(portalLink);

  wrap.appendChild(row);

  var statusEl = document.createElement('div');
  statusEl.className = 'status';
  wrap.appendChild(statusEl);

  // Collapse everything except the summary header into a togglable body so the
  // list opens scannable; click the header (or caret) to expand one reveal.
  var body = document.createElement('div');
  body.className = 'card-body';
  while (wrap.childNodes.length > 1) {   // childNodes[0] is the summary header
    body.appendChild(wrap.childNodes[1]);
  }
  wrap.appendChild(body);
  body.style.display = 'none';
  wrap.classList.add('collapsed');
  meta.addEventListener('click', function(){
    var open = body.style.display === 'none';
    body.style.display = open ? 'block' : 'none';
    caret.textContent = open ? '▾' : '▸';   // ▾ / ▸
    wrap.classList.toggle('collapsed', !open);
  });

  return wrap;
}

function collectRemedies(card){
  var remedyRows = card.querySelectorAll('.remedy-row');
  var out = [];
  remedyRows.forEach(function(row){
    out.push({
      name: row.querySelector('.remedy-name') ? row.querySelector('.remedy-name').value : '',
      slug: row.querySelector('.remedy-slug') ? row.querySelector('.remedy-slug').value : '',
      meaning: row.querySelector('.remedy-meaning') ? row.querySelector('.remedy-meaning').value : ''
    });
  });
  return out;
}

function collectLayers(card){
  var remedyRows = card.querySelectorAll('.remedy-row');
  var out = [];
  remedyRows.forEach(function(row, idx){
    var titleEl = row.querySelector('.layer-title-field');
    var summaryEl = row.querySelector('.layer-summary-field');
    var nameEl = row.querySelector('.remedy-name');
    var slugEl = row.querySelector('.remedy-slug');
    var meaningEl = row.querySelector('.remedy-meaning');
    var rememberEl = row.querySelector('.remedy-remember');
    var patterns = [];
    var patternLabels = [];
    try { patterns = JSON.parse(row.dataset.patterns || '[]'); } catch (e) {}
    try { patternLabels = JSON.parse(row.dataset.patternLabels || '[]'); } catch (e) {}
    out.push({
      n: idx + 1,
      title: titleEl ? titleEl.value : '',
      summary: summaryEl ? summaryEl.value : '',
      patterns: patterns,
      pattern_labels: patternLabels,
      remedy: {
        name: nameEl ? nameEl.value : '',
        slug: slugEl ? slugEl.value : '',
        meaning: meaningEl ? meaningEl.value : '',
        remember: rememberEl ? rememberEl.checked : false
      }
    });
  });
  return out;
}

async function saveEdit(card, id){
  var greeting = card.querySelector('.greeting-field').value;
  var body = card.querySelector('.body-field').value;
  var layers = collectLayers(card);
  var statusEl = card.querySelector('.status');
  statusEl.textContent = 'Saving...';
  var r = await api('POST', '/api/action/biofield_reveal.edit', { id: id, greeting: greeting, body: body, layers: layers });
  if(r.ok && r.json.status === 'done'){
    // Reload so any server-resolved slug + filled-in meaning (from a typed-only
    // remedy name) show up in the editor.
    statusEl.textContent = 'Saved.';
    setTimeout(loadList, 600);
  } else {
    statusEl.textContent = 'Save failed.';
  }
}

async function orderRemedies(card, d, btn){
  // Build a proposed in-house order from the remedies currently on the card
  // (reflects any edits). Owner override: ALL remedies, not the client-visible
  // subset. Dedup by slug, qty 1 each.
  var statusEl = card.querySelector('.status');
  var seen = {}, lines = [];
  collectRemedies(card).forEach(function(rem){
    var slug = (rem.slug || '').trim();
    if(slug && !seen[slug]){ seen[slug] = 1; lines.push({ slug: slug, qty: 1 }); }
  });
  if(!lines.length){ window.alert('No remedies with product slugs on this reveal — add slugs first.'); return; }
  var who = d.client_name || d.email || ('reveal #' + d.id);
  if(!d.email && !window.confirm("No email on this reveal — the order won't link to a client record. Create it anyway?")) return;
  var msg = d.ordered
    ? (who + ' already has an order ($' + Math.round((d.order_total_cents||0)/100) + '). Create ANOTHER proposed order with ' + lines.length + ' remedies?')
    : ('Create a proposed order for ' + who + ' with ' + lines.length + ' remed' + (lines.length===1?'y':'ies') + '?');
  if(!window.confirm(msg)) return;
  btn.disabled = true;
  if(statusEl) statusEl.textContent = 'Creating order…';
  var r = await api('POST', '/api/orders/manual', { customer: { email: d.email || '', name: d.client_name || '' }, lines: lines });
  if(r.ok && r.json && r.json.ok){
    var oid = r.json.order_id;
    if(statusEl) statusEl.textContent = 'Proposed order #' + oid + ' created.';
    if(window.confirm('Order #' + oid + ' created (proposed). Open it on the Orders board?')){
      window.open('/console/orders?order=' + encodeURIComponent(oid) + '&key=' + encodeURIComponent(key()), '_blank');
    }
    setTimeout(loadList, 600);   // refresh so the 🛒 order badge updates
  } else {
    btn.disabled = false;
    var err = (r.json && r.json.error) ? r.json.error : ('HTTP ' + r.status);
    if(statusEl) statusEl.textContent = 'Order not created: ' + err;
    window.alert('Could not create order: ' + err);
  }
}

async function doDelete(card, id, btn){
  if(!window.confirm('Delete reveal #' + id + '? This cannot be undone.')) return;
  var statusEl = card.querySelector('.status');
  statusEl.textContent = 'Deleting...';
  btn.disabled = true;
  var r = await api('POST', '/api/action/biofield_reveal.delete', { id: id });
  if(r.ok && r.json.status === 'done'){
    statusEl.textContent = 'Deleted.';
    setTimeout(loadList, 600);
  } else {
    btn.disabled = false;
    statusEl.textContent = 'Delete failed (HTTP ' + r.status + ').';
  }
}

async function doApprove(card, id, btn){
  // One click: approve (un-blur the top remedy) AND email the client their reveal
  // link. Approve is the gate; the send runs only after it succeeds.
  var statusEl = card.querySelector('.status');
  statusEl.textContent = 'Approving...';
  btn.disabled = true;
  var r = await api('POST', '/api/action/biofield_reveal.approve', { id: id });
  if(!(r.ok && r.json.status === 'done')){
    btn.disabled = false;
    statusEl.textContent = 'Approve failed (HTTP ' + r.status + '). Try re-opening the page with your console key.';
    return;
  }
  btn.className = 'btn approved';
  btn.textContent = 'Top Remedy Approved ' + new Date().toISOString().slice(0,10);
  statusEl.textContent = 'Approved. Sending reveal link…';

  var s = await api('POST', '/api/action/biofield_reveal.send', { id: id });
  if(s.ok && s.json.status === 'done' && s.json.result && s.json.result.sent){
    statusEl.textContent = 'Approved and reveal link sent.';
  } else {
    var reason = (s.json && s.json.result && s.json.result.reason) ? ' (' + s.json.result.reason + ')' : '';
    statusEl.textContent = 'Approved, but link NOT sent' + reason + ' — use “Send reveal link” to retry.';
  }
  // Reload so the card moves into the Top Remedy Live column with its sent state.
  setTimeout(loadList, 1100);
}

async function doSend(card, id, btn){
  var statusEl = card.querySelector('.status');
  statusEl.textContent = 'Sending...';
  btn.disabled = true;
  var r = await api('POST', '/api/action/biofield_reveal.send', { id: id });
  if(r.ok && r.json.status === 'done' && r.json.result && r.json.result.sent){
    statusEl.textContent = 'Reveal link sent.';
    setTimeout(loadList, 700);
  } else {
    btn.disabled = false;
    statusEl.textContent = 'Not sent' + (r.json && r.json.result && r.json.result.reason ? ' (' + r.json.result.reason + ')' : '') + '.';
  }
}

async function doSendAll(){
  if(!window.confirm('Email every approved, not-yet-notified client their reveal link?')) return;
  var r = await api('POST', '/api/action/biofield_reveal.send_all', {});
  if(r.ok && r.json.status === 'done'){
    alert('Sent ' + r.json.result.sent + ' of ' + r.json.result.of + '.');
    loadList();
  } else {
    alert('Send-all failed (HTTP ' + r.status + ').');
  }
}

async function doPullScan(input, btn, st){
  var q = (input.value || '').trim();
  if(!q){ input.focus(); return; }
  btn.disabled = true; input.disabled = true;
  st.textContent = 'Queued, pulling from E4L. Usually a few minutes.';
  var r = await api('POST', '/api/console/scan-pull-requests', { query: q });
  if(!r.ok || !r.json || !r.json.id){
    st.textContent = (r.json && r.json.status === 'disabled')
      ? 'Scan pull is currently off.'
      : 'Could not queue (HTTP ' + r.status + ').';
    btn.disabled = false; input.disabled = false;
    return;
  }
  pollPull(r.json.id, input, btn, st, 0);
}

async function pollPull(id, input, btn, st, tries){
  if(tries > 30){   // about 5 minutes at 10s
    st.textContent = 'Still working. Refresh shortly.';
    btn.disabled = false; input.disabled = false;
    return;
  }
  var r = await api('GET', '/api/console/scan-pull-requests/' + id);
  var row = r.ok && r.json && r.json.request;
  if(row && row.status === 'done'){
    st.textContent = 'Pulled. Draft ready.';
    input.value = '';
    btn.disabled = false; input.disabled = false;
    loadList();
    return;
  }
  if(row && row.status === 'failed'){
    st.textContent = row.message || 'Pull failed.';
    btn.disabled = false; input.disabled = false;
    return;
  }
  setTimeout(function(){ pollPull(id, input, btn, st, tries + 1); }, 10000);
}

boot();
</script>
