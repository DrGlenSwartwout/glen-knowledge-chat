<!doctype html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/static/favicon.png">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your Invoice — Remedy Match</title>
<style>
  :root { --bg:#f6f5fb; --surface:#fff; --border:#e6e3f0; --muted:#6b6480; --brand:#7c5cbf; --brand2:#a07fe0; }
  * { box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:#1c1830; margin:0; }
  .wrap { max-width:640px; margin:0 auto; padding:24px 16px 64px; }
  h1 { font-size:20px; margin:0 0 2px; }
  .billto { margin:6px 0 4px; }
  .billto-k { display:block; font-size:11px; letter-spacing:.02em; color:var(--muted); }
  .billto-nm { font-size:22px; font-weight:700; color:#1c1830; }
  .ref { color:var(--muted); font-size:13px; margin-bottom:18px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px; margin-bottom:16px; }
  .card h2 { font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:0 0 12px; }
  .line { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
  .line:last-child { border-bottom:0; }
  .line .nm { flex:1; font-size:14px; }
  .line .pr { color:var(--muted); font-size:13px; min-width:72px; text-align:right; }
  .line.svc .nm { font-weight:600; }
  .line .anchor { display:block; color:var(--muted); font-size:11px; margin-top:2px; }
  .line .anchor s { opacity:.85; }
  .qty { display:flex; align-items:center; gap:6px; }
  .qty button { width:26px; height:26px; border:1px solid var(--border); background:#fff; border-radius:6px; cursor:pointer; font-size:15px; }
  .qty input { width:40px; text-align:center; padding:4px; border:1px solid var(--border); border-radius:6px; }
  .totals { font-size:14px; }
  .totals .row { display:flex; justify-content:space-between; padding:4px 0; }
  .totals .grand { font-weight:700; font-size:17px; border-top:1px solid var(--border); margin-top:6px; padding-top:8px; }
  .totals .save { color:#2f7d4f; font-weight:600; }
  select, input[type=text] { padding:8px; border:1px solid var(--border); border-radius:8px; font-size:14px; }
  button.primary { background:var(--brand); color:#fff; border:0; border-radius:8px; padding:11px 18px; font-size:14px; font-weight:600; cursor:pointer; }
  button.ghost { background:#fff; color:var(--brand); border:1px solid var(--border); border-radius:8px; padding:9px 14px; font-size:13px; cursor:pointer; }
  .pay-methods { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
  .pay-methods label { border:1px solid var(--border); border-radius:8px; padding:8px 14px; cursor:pointer; font-size:14px; }
  .pay-methods input { margin-right:6px; }
  .notice { background:#fff7e6; border:1px solid #f0d9a0; color:#8a6d2f; padding:10px 12px; border-radius:8px; font-size:13px; margin-bottom:12px; }
  .paid { background:#e9f8ee; border:1px solid #a8e0bd; color:#2f7d4f; padding:12px; border-radius:8px; text-align:center; font-weight:600; }
  /* Pay card: accented so it reads as the primary action, and placed right under the total. */
  .card.pay-card { border:2px solid var(--brand); box-shadow:0 3px 14px rgba(124,92,191,.14); }
  .card.pay-card h2 { color:var(--brand); }
  .pay-due { font-size:14px; color:#1c1830; margin-bottom:12px; }
  .pay-due b { font-size:22px; font-weight:700; }
  #pay-btn { font-size:15px; padding:13px 22px; }
  #chatlog { max-height:200px; overflow:auto; font-size:13px; margin-bottom:10px; }
  #chatlog .u { color:var(--brand); } #chatlog .a { color:#1c1830; margin-bottom:8px; }
  .sugg button { margin:4px 4px 0 0; }
  .row-add { display:flex; gap:8px; margin-top:10px; }
  .muted { color:var(--muted); font-size:12px; }

  /* ── Print / Save-as-PDF: render ONLY #print-root (no chat, no pay buttons). ── */
  #print-root{ display:none; }
  @media print{
    body > *:not(#print-root){ display:none !important; }
    #print-root{ display:block !important; }
    html,body{ background:#fff !important; }
    @page{ margin:0.6in; }
  }
  #print-root .pd{ color:#1b1b1b; font:13px/1.55 Georgia,"Times New Roman",serif; max-width:7.3in; }
  #print-root .pd-head{ display:flex; align-items:center; gap:14px; border-bottom:2px solid #b8902f; padding-bottom:10px; margin-bottom:14px; }
  #print-root .pd-logo{ width:76px; height:76px; object-fit:contain; }
  #print-root .pd-org-name{ font-size:18px; font-weight:700; color:#3a5a40; }
  #print-root .pd-org-line{ font-size:11px; color:#444; }
  #print-root .pd-title{ margin-left:auto; text-align:right; font-size:20px; font-weight:700; color:#b8902f; letter-spacing:.4px; }
  #print-root .pd-billto{ margin:2px 0 10px; }
  #print-root .pd-billto-k{ display:block; font-size:10.5px; letter-spacing:.2px; color:#8a8a8a; margin-bottom:1px; }
  #print-root .pd-billto-nm{ font-size:19px; font-weight:700; color:#1b1b1b; }
  #print-root .pd-meta{ display:flex; flex-wrap:wrap; gap:8px 26px; font-size:12px; margin-bottom:14px; }
  #print-root .pd-k{ color:#8a8a8a; }
  #print-root table.pd-lines{ width:100%; border-collapse:collapse; font-size:12.5px; margin:6px 0 12px; }
  #print-root table.pd-lines th{ text-align:left; border-bottom:1.5px solid #3a5a40; padding:5px 6px; font-size:11px; color:#3a5a40; text-transform:uppercase; letter-spacing:.4px; }
  #print-root table.pd-lines td{ padding:5px 6px; border-bottom:1px solid #ececec; }
  #print-root table.pd-lines td.num,#print-root table.pd-lines th.num{ text-align:right; white-space:nowrap; }
  #print-root table.pd-lines tr.svc td:first-child{ font-weight:700; }
  #print-root table.pd-lines td.anc{ color:#9a9a9a; font-size:11px; }
  #print-root .pd-tot .save{ color:#3a5a40; font-weight:700; }
  #print-root .pd-anchor{ font-weight:400; font-size:10.5px; color:#8a8a8a; margin-top:2px; }
  #print-root .pd-anchor s{ opacity:.85; }
  #print-root .pd-tot{ width:48%; margin-left:auto; font-size:12.5px; }
  #print-root .pd-tot .r{ display:flex; justify-content:space-between; padding:3px 6px; }
  #print-root .pd-tot .grand{ border-top:1.5px solid #3a5a40; margin-top:4px; padding-top:6px; font-weight:700; font-size:14px; }
  #print-root .pd-paid{ display:inline-block; margin-top:12px; padding:3px 10px; border:1.5px solid #3a5a40; color:#3a5a40; border-radius:6px; font-weight:700; font-size:12px; }
  #print-root .pd-note{ margin-top:16px; padding:10px 12px; background:#f7f6fb; border:1px solid #e2e2e2; border-radius:6px; font-size:12px; color:#1b1b1b; white-space:pre-wrap; }
  #print-root .pd-note-k{ display:block; font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:#8a8a8a; margin-bottom:3px; }
  #print-root .pd-foot{ margin-top:20px; padding-top:10px; border-top:1px solid #e2e2e2; font-style:italic; color:#555; font-size:12px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Your Remedy Match invoice</h1>
  <div class="billto" id="billto" style="display:none"><span class="billto-k">Billed to</span><span class="billto-nm" id="billto-nm"></span></div>
  <div class="ref" id="ref">Loading…</div>
  <button class="ghost" id="print-btn" onclick="printInvoice()" style="display:none;margin-bottom:16px">🖨 Save Invoice as PDF</button>

  <div id="paid-banner" class="paid" style="display:none">This invoice is paid. Mahalo! 🌿</div>

  <div class="card">
    <h2>Items</h2>
    <div id="lines"></div>
    <div class="row-add" id="add-row" style="display:none">
      <select id="add-sel"><option value="">+ add a product…</option></select>
      <button class="ghost" onclick="addProduct()">Add</button>
    </div>
  </div>

  <div class="card">
    <h2>Summary</h2>
    <div class="totals" id="totals"></div>
  </div>

  <div id="savings" style="display:none"></div>

  <!-- Pay sits directly under the total so it's the first thing after the amount,
       not buried below the chat card. -->
  <div class="card pay-card" id="pay-card">
    <h2>Pay</h2>
    <div class="pay-due" id="pay-due" style="display:none"></div>
    <div id="pay-notice"></div>
    <div class="pay-methods" id="pay-methods">
      <label><input type="radio" name="m" value="card" checked>Credit card</label>
      <label><input type="radio" name="m" value="zelle">Zelle</label>
      <label><input type="radio" name="m" value="wise">Wise</label>
    </div>
    <div id="pay-instr" class="notice" style="display:none"></div>
    <button class="primary" id="pay-btn" onclick="pay()">Pay now</button>
    <button class="ghost" id="claim-btn" style="display:none" onclick="claim()">I’ve sent payment</button>
    <div id="pay-msg" class="muted" style="margin-top:8px"></div>
    <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px">
      <button class="ghost" id="cancel-btn" onclick="cancelOrder()">Cancel this order</button>
      <div id="cancel-msg" class="muted" style="margin-top:6px"></div>
    </div>
  </div>

  <div class="card" id="note-card" style="display:none">
    <h2>Notes</h2>
    <div id="note-text" style="font-size:14px;color:#1c1830;white-space:pre-wrap"></div>
  </div>

  <div class="card" id="chat-card">
    <h2>Questions? Chat about products</h2>
    <div id="chatlog"></div>
    <div class="sugg" id="sugg"></div>
    <div class="row-add">
      <input type="text" id="chat-in" placeholder="Ask a question…" style="flex:1" onkeydown="if(event.key==='Enter')sendChat()">
      <button class="ghost" onclick="sendChat()">Send</button>
    </div>
  </div>
</div>
<!-- Print/PDF surface: filled on demand by printInvoice(); shown only when printing. -->
<div id="print-root" aria-hidden="true"></div>

<script>
const TOKEN = location.pathname.split('/').filter(Boolean).pop();
const API = '/api/invoice/' + TOKEN;
let ORDER = null, LINES = [], CATALOG = [], curMethod = 'card';
const $ = id => document.getElementById(id);
const money = c => '$' + (Number(c||0)/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
// A service-fee line (e.g. Biofield Analysis) shows struck-through Value/Regular
// anchors above its per-client Special (unit_cents). `inline` = on-screen <span>,
// else a block <div> for the print table cell.
function svcAnchor(l, inline){
  if(!l) return '';
  const price = l.unit_cents||0, p=[];
  if(l.srp_cents && l.srp_cents>price) p.push('Value <s>'+money(l.srp_cents)+'</s>');
  // Show Regular only when it's a distinct middle tier (e.g. the service); for
  // products Regular == Value, so we don't repeat it on screen.
  if(l.regular_cents && l.regular_cents>price && l.regular_cents!==l.srp_cents)
    p.push('Regular <s>'+money(l.regular_cents)+'</s>');
  if(!p.length) return '';
  return inline ? ' <span class="anchor">'+p.join(' · ')+'</span>'
                : '<div class="pd-anchor">'+p.join(' · ')+'</div>';
}
// Total saved vs Value (SRP) across all lines — the comparative-savings figure.
function totalSavings(lines){
  return (lines||[]).reduce((s,l)=>{ const pr=l.unit_cents||0;
    return s + ((l.srp_cents && l.srp_cents>pr) ? (l.srp_cents-pr)*(l.qty||0) : 0); }, 0);
}
// Service-fee lines sort to the TOP of the invoice; otherwise original order is kept.
function svcFirst(lines){ return lines.map((x,i)=>[x,i])
  .sort((a,b)=>((b[0]&&b[0].service?1:0)-(a[0]&&a[0].service?1:0))||(a[1]-b[1])); }

async function load() {
  const r = await fetch(API);
  if (!r.ok) { $('ref').textContent = 'This invoice link is invalid or expired.'; return; }
  const j = await r.json(); ORDER = j.order;
  if (ORDER.name){ $('billto-nm').textContent = ORDER.name; $('billto').style.display = ''; }
  $('ref').textContent = 'Invoice ' + (ORDER.external_ref||'');
  LINES = ORDER.lines.map(l => ({slug:l.slug, name:l.name, qty:l.qty, unit_cents:l.unit_cents,
    service:l.service, srp_cents:l.srp_cents, regular_cents:l.regular_cents}));
  if (ORDER.pay_status === 'paid' || !ORDER.editable) {
    $('paid-banner').style.display = ORDER.pay_status==='paid' ? 'block' : 'none';
  }
  renderLines(); renderTotals(); setupPay(); renderSavings();
  if (ORDER.invoice_note){ $('note-text').textContent = ORDER.invoice_note; $('note-card').style.display=''; }
  $('print-btn').style.display = 'inline-block';
  // Console "Print invoice" deep-links here with ?print=1 to auto-open the dialog.
  if (new URLSearchParams(location.search).get('print')) setTimeout(printInvoice, 250);

  // Read-receipt: collapse invoice detail behind a New/date header; expand = tracked open.
  if (ORDER.opened !== undefined) {
    const isNew = !ORDER.opened;
    const invoiceDateStr = ORDER.created_at || '';
    const invoiceDate = invoiceDateStr
      ? new Date(invoiceDateStr).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'})
      : '—';

    // Guarded so re-clicking an already-expanded header doesn't re-POST the
    // open event (mirrors client-portal.html's rr-header dataset.opened flag).
    let _invoiceOpened = false;
    window.__openInvoice = async () => {
      if (_invoiceOpened) return;
      _invoiceOpened = true;
      try { await fetch('/api/invoice/' + encodeURIComponent(TOKEN) + '/open', {method:'POST'}); } catch(e) {}
      const det = document.getElementById('inv-detail'); if (det) det.style.display = '';
      const b = document.getElementById('inv-new'); if (b) b.remove();
    };

    const headerHtml = `<div style="display:flex;align-items:center;gap:10px;cursor:pointer" onclick="window.__openInvoice()">
      <strong>Invoice — ${esc(invoiceDate)}</strong>
      ${isNew ? `<span id="inv-new" style="background:#d4a843;color:#000;font-size:12px;font-weight:700;padding:1px 7px;border-radius:10px">New</span>` : ``}
      <span style="flex:1"></span><span style="color:var(--muted)">▾</span>
    </div>`;

    // Find items and summary cards
    const cards = document.querySelectorAll('.card');
    let itemsCardIdx = -1, summaryCardIdx = -1;
    for (let i = 0; i < cards.length; i++) {
      const h2 = cards[i].querySelector('h2');
      if (h2) {
        if (h2.textContent === 'Items') itemsCardIdx = i;
        else if (h2.textContent === 'Summary') summaryCardIdx = i;
      }
    }

    if (itemsCardIdx >= 0) {
      const itemsCard = cards[itemsCardIdx];
      const summaryCard = summaryCardIdx >= 0 ? cards[summaryCardIdx] : null;

      // Create wrapper for invoice detail
      const wrapper = document.createElement('div');
      wrapper.id = 'inv-detail';
      wrapper.style.display = isNew ? 'none' : '';

      // Insert wrapper before items card
      itemsCard.parentNode.insertBefore(wrapper, itemsCard);

      // Move items and summary cards into wrapper
      wrapper.appendChild(itemsCard);
      if (summaryCard) wrapper.appendChild(summaryCard);

      // Insert header before wrapper
      wrapper.insertAdjacentHTML('beforebegin', headerHtml);
    }
  }

  try { const cr = await fetch('/api/products?all=1'); CATALOG = (await cr.json()).products||[]; fillAdd(); } catch(e){}
}

// ── Print / Save-as-PDF: a self-contained invoice (logo header + line items +
// totals only) into #print-root; @media print hides the rest (chat, pay UI). ──
const PRINT_HEADER = (title)=>`
  <div class="pd-head">
    <img class="pd-logo" src="/static/favicon.png" alt="Remedy Match LLC logo">
    <div class="pd-org">
      <div class="pd-org-name">Remedy Match LLC</div>
      <div class="pd-org-line">351 Wailuku Drive, Hilo, Hawai‘i 96720</div>
      <div class="pd-org-line">(808) 217-9647 · illtowell.com</div>
    </div>
    <div class="pd-title">${esc(title)}</div>
  </div>`;
function buildInvoicePrintHtml(o){
  o = o || {};
  const lines = Array.isArray(o.lines) ? o.lines : [];
  const anc = (v,price)=> (v && v>price) ? '<s>'+money(v)+'</s>' : '';
  const rows = svcFirst(lines).map(([l])=>{
    const price = l.unit_cents||0, qty = l.qty||0;
    return `<tr${l.service?' class="svc"':''}>`
      + `<td>${esc(l.name||l.slug||'')}</td>`
      + `<td class="num anc">${anc(l.srp_cents, price)}</td>`
      + `<td class="num anc">${anc(l.regular_cents, price)}</td>`
      + `<td class="num">${money(price)}</td><td class="num">${esc(qty)}</td>`
      + `<td class="num">${money(price*qty)}</td></tr>`;
  }).join('');
  const r = (lbl,v,neg,cls)=>`<div class="r${cls?' '+cls:''}"><span>${esc(lbl)}</span><span>${neg?'−':''}${money(v)}</span></div>`;
  let tot = r('Subtotal', o.subtotal_cents);
  if(o.discount_cents) tot += r('Discount', o.discount_cents, true);
  if(o.adjustment_cents) tot += `<div class="r"><span>Adjustment</span><span>${o.adjustment_cents<0?'−':'+'}${money(Math.abs(o.adjustment_cents))}</span></div>`;
  tot += r('Shipping', o.shipping_cents);
  if(o.get_cents) tot += r('Hawai‘i GET (absorbed)', o.get_cents);
  if(o.points_redeemed_cents) tot += r('Points', o.points_redeemed_cents, true);
  tot += `<div class="r grand"><span>Total</span><span>${money(o.total_cents)}</span></div>`;
  const savings = totalSavings(lines);
  if(savings>0) tot += r('You save', savings, false, 'save');
  const today = new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
  return `<div class="pd invoice">
    ${PRINT_HEADER("Invoice")}
    ${o.name?`<div class="pd-billto"><span class="pd-billto-k">Billed to</span><span class="pd-billto-nm">${esc(o.name)}</span></div>`:""}
    <div class="pd-meta">
      ${o.external_ref?`<div><span class="pd-k">Invoice</span> ${esc(o.external_ref)}</div>`:""}
      <div><span class="pd-k">Date</span> ${esc(today)}</div>
    </div>
    <table class="pd-lines"><thead><tr><th>Item</th><th class="num">Value</th><th class="num">Regular</th><th class="num">Price</th><th class="num">Qty</th><th class="num">Amount</th></tr></thead>
      <tbody>${rows || '<tr><td colspan="6">No items.</td></tr>'}</tbody></table>
    <div class="pd-tot">${tot}</div>
    ${o.pay_status==='paid' ? `<div class="pd-paid">Paid. Mahalo 🌿</div>` : ''}
    ${o.invoice_note ? `<div class="pd-note"><span class="pd-note-k">Notes</span>${esc(o.invoice_note)}</div>` : ''}
    <div class="pd-foot">Thank you. Questions? (808) 217-9647 · Remedy Match LLC, Hilo, Hawai‘i</div>
  </div>`;
}
function printInvoice(){
  const root = document.getElementById('print-root');
  if(!root || !ORDER) return;
  root.innerHTML = buildInvoicePrintHtml(ORDER);
  const img = root.querySelector('.pd-logo');
  // Print exactly once: the logo may resolve via onload/onerror OR the timeout
  // fallback — without this guard both fire and open two identical print dialogs.
  let fired = false;
  const go = ()=>{ if(fired) return; fired = true; window.print(); };
  if(img && !img.complete){ img.onload = go; img.onerror = go; setTimeout(go, 1200); }
  else { go(); }
}
function renderLines() {
  // Services to the top; keep the ORIGINAL index for the qty controls (LINES order
  // is unchanged, so bump/setQty/pushUpdate still address the right line).
  $('lines').innerHTML = svcFirst(LINES).map(([l,i]) => {
    const qty = l.service ? '<span class="muted">×'+l.qty+'</span>'
      : (ORDER.editable ? '<span class="qty"><button onclick="bump('+i+',-1)">−</button>'
          + '<input type="number" min="0" value="'+l.qty+'" onchange="setQty('+i+',this.value)">'
          + '<button onclick="bump('+i+',1)">+</button></span>' : '<span class="muted">×'+l.qty+'</span>');
    return '<div class="line'+(l.service?' svc':'')+'"><span class="nm">'+esc(l.name)+svcAnchor(l,true)+'</span>'
      + qty + '<span class="pr">'+money(l.unit_cents*l.qty)+'</span></div>';
  }).join('') || '<div class="muted">No items.</div>';
  $('add-row').style.display = ORDER.editable ? 'flex' : 'none';
}
function renderTotals() {
  const t = ORDER;
  let pointsRow = t.points_redeemed_cents ? row('Points','-'+money(t.points_redeemed_cents),true) : '';
  // When the invoice is still editable and the customer has a balance, let them apply points.
  const bal = Number(t.points_balance_cents||0);
  if (t.editable && bal>0){
    pointsRow = '<div class="row"><span>Points (avail '+money(bal)+')</span><span>'
      + '<input id="pts-in" type="number" min="0" step="0.01" style="width:80px" value="'+((t.points_redeemed_cents||0)/100).toFixed(2)+'">'
      + ' <button onclick="applyPoints()">Apply</button></span></div>';
  }
  $('totals').innerHTML =
    row('Subtotal', t.subtotal_cents) + (t.discount_cents?row('Discount','-'+money(t.discount_cents),true):'')
    + (t.adjustment_cents?('<div class="row"><span>Adjustment</span><span>'+(t.adjustment_cents<0?'−':'+')+money(Math.abs(t.adjustment_cents))+'</span></div>'):'')
    + row('Shipping', t.shipping_cents) + (t.get_cents?row('Hawai‘i GET (absorbed)', t.get_cents):'')
    + pointsRow
    + '<div class="row grand"><span>Total</span><span>'+money(t.total_cents)+'</span></div>'
    + (totalSavings(ORDER.lines)>0 ? '<div class="row save"><span>You save</span><span>'+money(totalSavings(ORDER.lines))+'</span></div>' : '')
    // Upgrade hook (on-screen only — deliberately NOT in the print/PDF #print-root,
    // which buildInvoicePrintHtml renders separately): the volume discount this
    // non-member missed on this order. Shown only when there's a discount to gain.
    + (Number(t.member_credit_cents||0)>0
        ? '<div style="margin-top:12px;background:#fffbf3;border:1px solid #f0c987;border-radius:6px;padding:9px 11px;color:#7a4a00;font-size:13px">Start Continuous Care and get <strong>'+money(t.member_credit_cents)+'</strong> back toward your next order.</div>'
        : '');
}
async function applyPoints(){
  const cents = Math.max(0, Math.round(parseFloat(($('pts-in')||{}).value||'0')*100));
  const r = await fetch(API+'/apply-points', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({cents})});
  const j = await r.json(); if(!j.ok){ alert(j.error||'could not apply points'); return; }
  ORDER=j.order; renderTotals();
}
async function cancelOrder(){
  if(!confirm('Cancel this order? You can always reach out and we’ll be glad to help you reorder.')) return;
  const btn=$('cancel-btn'); btn.disabled=true; $('cancel-msg').textContent='Cancelling…';
  try{
    const r=await fetch(API+'/cancel',{method:'POST',headers:{'Content-Type':'application/json'}});
    const j=await r.json();
    if(!j.ok){ $('cancel-msg').textContent=j.error||'Could not cancel — please reach out.'; btn.disabled=false; return; }
    $('pay-card').innerHTML='<div class="notice">Your order has been cancelled. Mahalo — reach out anytime and we’ll be glad to help you reorder.</div>';
    $('add-row').style.display='none';
    ORDER.editable=false; renderLines();
  }catch(e){ $('cancel-msg').textContent='Network error — please try again.'; btn.disabled=false; }
}
function renderSavings(){
  const s=$('savings'), o=ORDER.savings_offer;
  if(!o || !ORDER.editable || ORDER.pay_status==='paid'){ s.style.display='none'; return; }
  s.style.display='block';
  s.innerHTML='<div class="card" style="border:1px solid #2f7d4f;background:#f4fbf6">'
    +'<div style="font-weight:600;color:#22623c">\u{1F49A} We found you a better price</div>'
    +'<div style="margin:6px 0 10px">This order would be <b>'+money(o.savings_cents)+' less</b> on the <b>'
      +esc(o.cohort_name)+'</b> plan — '+money(o.new_total_cents)+' instead of '+money(o.current_total_cents)+'.</div>'
    +'<button class="primary" onclick="applyPlan(false,this)">Apply to this order</button> '
    +'<button class="ghost" onclick="applyPlan(true,this)">Make it my plan going forward</button>'
    +'<div id="savings-msg" class="muted" style="margin-top:6px"></div></div>';
}
async function applyPlan(forever, btn){
  const o=ORDER.savings_offer; if(!o) return;
  if(btn) btn.disabled=true;
  try{
    const r=await fetch(API+'/apply-plan',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({cohort_key:o.cohort_key, forever:!!forever})});
    const j=await r.json();
    if(!j.ok){ $('savings-msg').textContent=j.error||'Could not apply — please reach out.'; if(btn) btn.disabled=false; return; }
    ORDER=j.order;
    LINES=ORDER.lines.map(l=>({slug:l.slug,name:l.name,qty:l.qty,unit_cents:l.unit_cents,
      service:l.service,srp_cents:l.srp_cents,regular_cents:l.regular_cents}));
    renderLines(); renderTotals(); renderSavings();   // offer now absent -> banner hides
  }catch(e){ $('savings-msg').textContent='Network error — please try again.'; if(btn) btn.disabled=false; }
}
function row(label, v, raw){ return '<div class="row"><span>'+label+'</span><span>'+(raw?v:money(v))+'</span></div>'; }
function fillAdd(){ $('add-sel').innerHTML = '<option value="">+ add a product…</option>' +
  CATALOG.map(p=>'<option value="'+p.slug+'">'+esc(p.name)+' — '+money(p.price_cents||0)+'</option>').join(''); }
function bump(i,d){ LINES[i].qty=Math.max(0,LINES[i].qty+d); pushUpdate(); }
function setQty(i,v){ LINES[i].qty=Math.max(0,parseInt(v)||0); pushUpdate(); }
function addProduct(){ const s=$('add-sel').value; if(!s)return; const p=CATALOG.find(x=>x.slug===s);
  const ex=LINES.find(l=>l.slug===s); if(ex){ex.qty++;} else LINES.push({slug:s,name:p.name,qty:1,unit_cents:p.price_cents||0}); pushUpdate(); }
async function pushUpdate(){
  const lines = LINES.filter(l=>l.qty>0).map(l=>({slug:l.slug, qty:l.qty}));
  const r = await fetch(API+'/update', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({lines})});
  const j = await r.json(); if(!j.ok){ alert(j.error||'update failed'); return; }
  ORDER=j.order; LINES=ORDER.lines.map(l=>({slug:l.slug,name:l.name,qty:l.qty,unit_cents:l.unit_cents,
    service:l.service, srp_cents:l.srp_cents, regular_cents:l.regular_cents}));
  renderLines(); renderTotals();
}
function setupPay(){
  if (ORDER.pay_status==='paid' || !ORDER.editable){ $('pay-card').style.display='none'; return; }
  // Amount due, up top, so the call to action is unmistakable.
  $('pay-due').innerHTML = 'Amount due: <b>'+money(ORDER.total_cents)+'</b>';
  $('pay-due').style.display = '';
  $('pay-btn').textContent = 'Pay '+money(ORDER.total_cents);
  if (!ORDER.paylink_enabled){ $('pay-notice').innerHTML='<div class="notice">Online payment isn’t enabled yet — we’ll be in touch.</div>'; $('pay-btn').disabled=true; return; }
  document.querySelectorAll('input[name=m]').forEach(el=>el.onchange=()=>{curMethod=el.value; $('claim-btn').style.display='none'; $('pay-instr').style.display='none';});
}
async function pay(){
  $('pay-msg').textContent='…';
  const r = await fetch(API+'/pay', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({method:curMethod})});
  const j = await r.json(); if(!j.ok){ $('pay-msg').textContent=j.error||'payment unavailable'; return; }
  $('pay-msg').textContent='';
  if (j.method==='card' && j.url){ location.href=j.url; return; }
  if (j.instructions){ $('pay-instr').textContent=j.instructions; $('pay-instr').style.display='block'; $('claim-btn').style.display='inline-block'; }
}
async function claim(){
  const r = await fetch(API+'/claim-paid', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({method:curMethod})});
  const j = await r.json(); $('pay-msg').textContent = j.message || (j.error||'');
}
let HIST=[];
async function sendChat(){
  const m=$('chat-in').value.trim(); if(!m)return; $('chat-in').value='';
  $('chatlog').innerHTML += '<div class="u">You: '+esc(m)+'</div>'; HIST.push({role:'user',content:m});
  const r=await fetch(API+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:m,history:HIST})});
  const j=await r.json(); if(!j.ok){return;}
  $('chatlog').innerHTML += '<div class="a">'+esc(j.reply||'')+'</div>'; HIST.push({role:'assistant',content:j.reply||''});
  $('chatlog').scrollTop=$('chatlog').scrollHeight;
  $('sugg').innerHTML = (j.suggestions||[]).map(s=>'<button class="ghost" onclick="addBySlug(\''+s.slug+'\')">+ '+esc(s.name)+' '+money(s.price_cents)+'</button>').join('');
}
function addBySlug(slug){ const p=CATALOG.find(x=>x.slug===slug)|| {slug,name:slug,price_cents:0}; const ex=LINES.find(l=>l.slug===slug); if(ex)ex.qty++; else LINES.push({slug,name:p.name,qty:1,unit_cents:p.price_cents||0}); pushUpdate(); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
load();
</script>
