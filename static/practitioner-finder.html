<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find a Practitioner — Functional Formulations®</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.css">
  <style>
    :root {
      --bg: #faf7f2;
      --fg: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #2a5d4f;
      --accent-soft: #e7efec;
      --border: #e2dcd2;
      --serif: 'Cormorant Garamond', serif;
      --sans: 'Inter', system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: var(--sans); background: var(--bg); color: var(--fg);
      line-height: 1.5;
    }
    header { padding: clamp(1rem, 3vw, 2.5rem) clamp(1rem, 4vw, 3rem) 0.5rem; }
    header h1 {
      font-family: var(--serif); margin: 0 0 0.4rem;
      font-size: clamp(1.6rem, 3vw, 2.4rem); font-weight: 600;
    }
    header p { margin: 0; color: var(--muted); max-width: 60ch; }

    .controls {
      padding: 1rem clamp(1rem, 4vw, 3rem);
      display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center;
    }
    .zip-search {
      display: flex; align-items: center; gap: 0.5rem;
      background: white; border: 1px solid var(--border); border-radius: 999px;
      padding: 0.5rem 1rem;
    }
    .zip-search input {
      border: 0; outline: 0; font: inherit; width: 8ch; background: transparent; min-width: 0;
    }
    .zip-search select { border: 0; outline: 0; font: inherit; background: transparent; min-width: 0; }
    @media (max-width: 480px) {
      .zip-search { flex-wrap: wrap; border-radius: 0.8rem; }
      .zip-search button { flex: 1 0 100%; text-align: center; border-radius: 0.5rem; }
    }
    .zip-search button {
      background: var(--accent); color: white; border: 0; border-radius: 999px;
      padding: 0.4rem 1rem; font: inherit; cursor: pointer;
    }

    .chips { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .chip {
      background: white; border: 1px solid var(--border); border-radius: 999px;
      padding: 0.5rem 1rem; cursor: pointer; font: inherit; white-space: nowrap;
    }
    .chip[aria-pressed="true"] { background: var(--accent); color: white; border-color: var(--accent); }

    .drill-down {
      display: none;
      padding: 0 clamp(1rem, 4vw, 3rem) 0.5rem;
    }
    .drill-down.open { display: block; }
    .drill-down .sub-chips {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      background: var(--accent-soft); padding: 0.6rem 0.8rem; border-radius: 0.6rem;
    }
    .sub-chip {
      background: transparent; border: 1px solid transparent; border-radius: 999px;
      padding: 0.3rem 0.9rem; cursor: pointer; font: inherit; color: var(--fg);
    }
    .sub-chip[aria-pressed="true"] { background: white; border-color: var(--accent); color: var(--accent); }

    .layout {
      display: grid; grid-template-columns: 1fr; gap: 1rem;
      padding: 0 clamp(1rem, 4vw, 3rem) clamp(1rem, 4vw, 3rem);
      min-height: 60vh;
    }
    @media (min-width: 900px) {
      .layout { grid-template-columns: 3fr 2fr; }
    }
    #map { height: 60vh; min-height: 400px; border-radius: 0.6rem; background: #ddd; }
    .results { max-height: 60vh; overflow-y: auto; }
    .results .empty { color: var(--muted); padding: 1rem; }
    .result-card {
      padding: 0.8rem 1rem; border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .result-card:hover { background: var(--accent-soft); }
    .result-card h3 { margin: 0 0 0.2rem; font-family: var(--serif); font-size: 1.1rem; }
    .result-card .meta { font-size: 0.85rem; color: var(--muted); }

    .side-panel {
      position: fixed; top: 0; right: 0; height: 100vh; width: min(420px, 100%);
      background: white; box-shadow: -8px 0 24px rgba(0,0,0,0.1);
      transform: translateX(100%); transition: transform 0.2s ease;
      overflow-y: auto; padding: 2rem 1.5rem;
    }
    .side-panel.open { transform: translateX(0); }
    .side-panel .close {
      background: transparent; border: 0; font-size: 1.5rem; cursor: pointer;
      position: absolute; top: 0.5rem; right: 0.8rem;
    }

    footer {
      padding: 1rem clamp(1rem, 4vw, 3rem) 2rem;
      color: var(--muted); font-size: 0.85rem;
    }
    footer a { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>Find a Practitioner</h1>
    <p>Practitioners aligned with Functional Formulations® across functional eye care, biological dentistry, and integrative health.</p>
  </header>

  <div class="controls">
    <form class="zip-search" id="zip-form">
      <label>ZIP <input id="zip-input" type="text" inputmode="numeric" pattern="\d{5}" placeholder="96813" required></label>
      <label>Within
        <select id="radius-select">
          <option value="5">5 mi</option>
          <option value="10">10 mi</option>
          <option value="25" selected>25 mi</option>
          <option value="50">50 mi</option>
          <option value="100">100 mi</option>
          <option value="9999">Nationwide</option>
        </select>
      </label>
      <button type="submit">Search</button>
    </form>
    <div class="chips" role="tablist">
      <button class="chip" data-parent="eye_care" aria-pressed="false">Eye Care</button>
      <button class="chip" data-parent="dental" aria-pressed="false">Dental</button>
      <button class="chip" data-parent="holistic_health" aria-pressed="false">Holistic Health</button>
      <button class="chip" data-parent="__all__" aria-pressed="false">Show All</button>
    </div>
  </div>

  <div class="drill-down" id="drill-eye_care">
    <div class="sub-chips">
      <button class="sub-chip" data-sub="__all__" aria-pressed="true">All Eye Care</button>
      <button class="sub-chip" data-sub="functional" aria-pressed="false">Functional</button>
      <button class="sub-chip" data-sub="rehabilitation" aria-pressed="false">Rehabilitation</button>
      <button class="sub-chip" data-sub="syntonic" aria-pressed="false">Syntonic</button>
      <button class="sub-chip" data-sub="nutritional_eye_care" aria-pressed="false">Nutritional Eye Care</button>
    </div>
  </div>
  <div class="drill-down" id="drill-dental">
    <div class="sub-chips">
      <button class="sub-chip" data-sub="__all__" aria-pressed="true">All Dental</button>
      <button class="sub-chip" data-sub="biological" aria-pressed="false">Biological</button>
    </div>
  </div>
  <div class="drill-down" id="drill-holistic_health">
    <div class="sub-chips">
      <button class="sub-chip" data-sub="__all__" aria-pressed="true">All Holistic Health</button>
      <button class="sub-chip" data-sub="functional_medicine" aria-pressed="false">Functional Medicine</button>
      <button class="sub-chip" data-sub="naturopathy" aria-pressed="false">Naturopathy</button>
      <button class="sub-chip" data-sub="acupuncture_tcm" aria-pressed="false">Acupuncture / TCM</button>
      <button class="sub-chip" data-sub="medical_acupuncture" aria-pressed="false">Medical Acupuncture</button>
      <button class="sub-chip" data-sub="nutrition" aria-pressed="false">Nutrition</button>
    </div>
  </div>

  <main class="layout">
    <div id="map"></div>
    <div class="results">
      <div class="empty" id="empty-state">Enter a ZIP and choose a category to begin.</div>
      <div id="results-list"></div>
    </div>
  </main>

  <aside class="side-panel" id="side-panel" aria-hidden="true">
    <button class="close" aria-label="Close">×</button>
    <div id="side-panel-content"></div>
  </aside>

  <footer>
    Are you a practitioner listed here who would like to be removed?
    <a href="mailto:suerae1111@gmail.com?subject=Practitioner%20Finder%20Removal%20Request">Email Rae</a>.
  </footer>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.js"></script>
  <script>
    const MAPBOX_TOKEN = window.__MAPBOX_TOKEN__ || '';

    // Filter state
    const filterState = {
      parent: null,
      sub: '__all__',
    };

    // Initialize Mapbox map (centered on continental US until user searches)
    let map;
    const markers = [];
    let lastSearchCenter = null;

    if (MAPBOX_TOKEN) {
      mapboxgl.accessToken = MAPBOX_TOKEN;
      map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/streets-v12',
        center: [-98.58, 39.83],
        zoom: 3,
      });
    }

    // Top-level chip behavior
    document.querySelectorAll('.chip').forEach(btn => {
      btn.addEventListener('click', () => {
        const parent = btn.dataset.parent;
        if (filterState.parent === parent) {
          filterState.parent = null;
          btn.setAttribute('aria-pressed', 'false');
          closeAllDrillDowns();
        } else {
          filterState.parent = parent;
          filterState.sub = '__all__';
          document.querySelectorAll('.chip').forEach(c => c.setAttribute('aria-pressed', 'false'));
          btn.setAttribute('aria-pressed', 'true');
          closeAllDrillDowns();
          if (parent !== '__all__') {
            const drill = document.getElementById(`drill-${parent}`);
            if (drill) drill.classList.add('open');
          }
        }
        runSearch();
      });
    });

    function closeAllDrillDowns() {
      document.querySelectorAll('.drill-down').forEach(d => d.classList.remove('open'));
    }

    document.querySelectorAll('.drill-down').forEach(drill => {
      drill.querySelectorAll('.sub-chip').forEach(btn => {
        btn.addEventListener('click', () => {
          drill.querySelectorAll('.sub-chip').forEach(c => c.setAttribute('aria-pressed', 'false'));
          btn.setAttribute('aria-pressed', 'true');
          filterState.sub = btn.dataset.sub;
          runSearch();
        });
      });
    });

    // ZIP form submission
    document.getElementById('zip-form').addEventListener('submit', (e) => {
      e.preventDefault();
      runSearch();
    });

    async function runSearch() {
      const zip = document.getElementById('zip-input').value.trim();
      if (!zip) {
        document.getElementById('empty-state').textContent = 'Enter a ZIP to search.';
        return;
      }
      const radius = document.getElementById('radius-select').value;
      const params = new URLSearchParams();
      params.set('zip', zip);
      params.set('radius_miles', radius);
      if (filterState.parent && filterState.parent !== '__all__') {
        if (filterState.sub === '__all__') {
          params.append('specialties[]', filterState.parent);
        } else {
          params.append('specialties[]', filterState.sub);
        }
      }

      const resp = await fetch(`/api/practitioner-finder/search?${params}`);
      if (!resp.ok) {
        document.getElementById('empty-state').textContent =
          `Search failed (${resp.status}). Try a different ZIP.`;
        document.getElementById('empty-state').style.display = '';
        document.getElementById('results-list').innerHTML = '';
        return;
      }
      const data = await resp.json();
      renderResults(data);
    }

    function clearMarkers() {
      markers.forEach(m => m.remove());
      markers.length = 0;
    }

    function renderResults(data) {
      clearMarkers();
      const list = document.getElementById('results-list');
      const empty = document.getElementById('empty-state');
      list.innerHTML = '';

      if (data.count === 0) {
        empty.style.display = '';
        empty.textContent = 'No practitioners found in this radius. Try a wider search or a different category.';
        return;
      }
      empty.style.display = 'none';

      if (data.search_center && map) {
        map.flyTo({ center: [data.search_center.lng, data.search_center.lat], zoom: 9 });
        lastSearchCenter = data.search_center;
      }

      data.practitioners.forEach((p, i) => {
        const card = document.createElement('div');
        card.className = 'result-card';
        card.innerHTML = `
          <h3>${escapeHtml(p.name)}</h3>
          <div class="meta">
            ${p.credentials ? escapeHtml(p.credentials) + ' &middot; ' : ''}
            ${p.city ? escapeHtml(p.city) : ''}${p.state ? ', ' + escapeHtml(p.state) : ''}
            ${typeof p.distance_miles === 'number' ? ' &middot; ' + p.distance_miles.toFixed(1) + ' mi' : ''}
          </div>
        `;
        card.addEventListener('click', () => openSidePanel(p));
        list.appendChild(card);

        if (p.lat && p.lng && map) {
          const color = p.geocode_quality === 'full' ? '#c0392b' : '#3a78b8';
          const marker = new mapboxgl.Marker({ color })
            .setLngLat([p.lng, p.lat])
            .addTo(map);
          marker.getElement().addEventListener('click', () => openSidePanel(p));
          markers.push(marker);
        }
      });
    }

    function openSidePanel(p) {
      const panel = document.getElementById('side-panel');
      const content = document.getElementById('side-panel-content');
      const parts = [];
      parts.push(`<h2 style="font-family:var(--serif);margin-top:0">${escapeHtml(p.name)}</h2>`);
      if (p.credentials) parts.push(`<div style="color:var(--muted)">${escapeHtml(p.credentials)}</div>`);
      if (p.practice_name) parts.push(`<div>${escapeHtml(p.practice_name)}</div>`);
      parts.push('<hr>');
      const addrParts = [p.address1, p.city, p.state, p.postal].filter(Boolean).map(escapeHtml);
      if (addrParts.length) parts.push(`<div>${addrParts.join(', ')}</div>`);
      if (p.geocode_quality && p.geocode_quality !== 'full') {
        parts.push('<div style="color:var(--muted);font-size:0.85rem;margin-top:0.2rem">Approximate — call the practice for exact address.</div>');
      }
      if (p.phone) parts.push(`<div style="margin-top:0.4rem"><a href="tel:${escapeHtml(p.phone)}">${escapeHtml(p.phone)}</a></div>`);
      if (p.email) parts.push(`<div><a href="mailto:${escapeHtml(p.email)}">${escapeHtml(p.email)}</a></div>`);
      if (p.website) parts.push(`<div><a href="${escapeHtml(p.website)}" target="_blank" rel="noopener">${escapeHtml(p.website)}</a></div>`);
      if (p.source_org) {
        parts.push(`<div style="margin-top:1rem;color:var(--muted);font-size:0.85rem">Source: ${escapeHtml(p.source_org)}${p.fellowship_level ? ' (Fellow)' : ''}</div>`);
      }
      content.innerHTML = parts.join('');
      panel.classList.add('open');
      panel.setAttribute('aria-hidden', 'false');
    }

    document.querySelector('.side-panel .close').addEventListener('click', () => {
      const panel = document.getElementById('side-panel');
      panel.classList.remove('open');
      panel.setAttribute('aria-hidden', 'true');
    });

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }
  </script>
</body>
</html>
