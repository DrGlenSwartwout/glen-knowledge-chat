name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    # Placeholder credentials on purpose. `import app` no longer dials out (the
    # Pinecone index is built lazily), so 6,394 of 6,555 tests run without any
    # real secret. CI therefore needs NO access to Doppler or production keys,
    # and cannot touch live Pinecone, QBO, Stripe, or Gmail.
    env:
      PINECONE_API_KEY: pcsk_fake
      OPENAI_API_KEY: sk-fake
      ANTHROPIC_API_KEY: sk-ant-fake
      SECRET_KEY: ci-test
      PUBLIC_BASE_URL: https://illtowell.com
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Tests (fails only on NEW failures vs tests/known_failures.txt)
        run: python3 scripts/ci_check.py
