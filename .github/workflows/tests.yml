name: tests

# PR gate for glen-knowledge-chat.
#
# Intentionally thin: all logic lives in ci/run-tests.sh so it can be changed with an
# ordinary push. Editing anything under .github/workflows/ requires the `workflow` OAuth
# scope, which the usual gh token lacks, so changes here need a web-UI edit -- avoid them.
#
# The gate runs the whole suite with NO real secrets. See ci/run-tests.sh for how, and
# ci/excluded-tests.txt for the files that need live credentials and are skipped.

on:
  pull_request:
  push:
    branches: [main]

# A newer push to the same branch supersedes an in-flight run.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  suite:
    name: test suite (secretless)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        run: bash ci/run-tests.sh
